<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DNC vs DJT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
  canvas { display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─────────────────────────────────────────────
//  SPRITE IMAGES
// ─────────────────────────────────────────────
const sprites = {};
const spriteData = {
  dtj_idle: 'sprites/dtj_idle.png',
  dtj_walk: 'sprites/dtj_walk.png',
  dtj_walk2: 'sprites/dtj_walk2.png',
  dtj_throw: 'sprites/dtj_throw.png',
  djt1: 'sprites/djt1.png',
  djt2: 'sprites/djt2.png',
  djt3: 'sprites/djt3.png',
  djt4: 'sprites/djt4.png',
  djt5: 'sprites/djt5.png',
  djt6: 'sprites/djt6.png',
  pelosi_idle: 'sprites/pelosi_idle.png',
  pelosi_tear: 'sprites/pelosi_tear.png',
  eagle_fly: 'sprites/eagle_fly.png',
  eagle_carry: 'sprites/eagle_carry.png',
  antifa: 'sprites/antifa.png',
  secret_service: 'sprites/secret_service.png',
  briefcase: 'sprites/briefcase.png',
  zombie_winemom: 'sprites/zombie_winemom.png',
  zombie_pinkhair: 'sprites/zombie_pinkhair.png',
  zombie_glasses: 'sprites/zombie_glasses.png',
  zombie_dad: 'sprites/zombie_dad.png',
  barrel_upright: 'sprites/barrel_upright.png',
  barrel_endview: 'sprites/barrel_endview.png'
};

// G1 REPLACEMENT — sprites ship as PNGs with real alpha (rembg-converted from the original JPGs;
// see scripts/convert_sprites_to_png.py). Runtime alpha-keying is removed. Each loaded image is
// drawn to its own offscreen canvas, then trimmed to the tight bounding box of the alpha channel
// (the F5 footprint anchor). drawSprite reads exclusively from spriteCache[name].
const spriteCache = {};                                       // name -> HTMLCanvasElement (trimmed, alpha intact)
let spritesLoaded = 0;
const spritesTotal = Object.keys(spriteData).length;

function processSprite(name, img) {
  const w = img.naturalWidth, h = img.naturalHeight;
  if (!w || !h) {
    console.warn('Sprite has no dimensions:', name);
    return;
  }
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const ictx = off.getContext('2d');
  ictx.drawImage(img, 0, 0);
  const id = ictx.getImageData(0, 0, w, h);
  const d = id.data;

  // F5 — find tight bounding box of pixels that have non-zero alpha. Also count alpha < 255
  // pixels (informational — confirms the PNG actually has a usable alpha channel).
  let alphaPixels = 0;
  let minX = w, maxX = -1, minY = h, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const a = d[(y * w + x) * 4 + 3];
      if (a < 255) alphaPixels++;
      if (a > 0) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (maxX < 0 || maxY < 0) {
    // entirely transparent — extremely unlikely for a converted sprite, but defend anyway
    spriteCache[name] = off;
    console.warn('Sprite ' + name + ' is fully transparent — keeping as-is');
    return;
  }
  const tw = maxX - minX + 1;
  const th = maxY - minY + 1;
  if (tw === w && th === h) {
    spriteCache[name] = off;                                  // already tight, no trim needed
  } else {
    const trimmed = document.createElement('canvas');
    trimmed.width = tw; trimmed.height = th;
    const tctx = trimmed.getContext('2d');
    tctx.drawImage(off, minX, minY, tw, th, 0, 0, tw, th);
    spriteCache[name] = trimmed;
  }
  console.log('Sprite loaded:', name,
              'native=' + w + 'x' + h,
              'trimmed=' + spriteCache[name].width + 'x' + spriteCache[name].height,
              'alphaPixels=' + alphaPixels);
}

for (const [name, src] of Object.entries(spriteData)) {
  sprites[name] = new Image();
  sprites[name].onload = () => {
    processSprite(name, sprites[name]);
    spritesLoaded++;
    // G1 — once all sprites have finished loading + processing, enumerate the cache so it's
    // immediately visible in devtools whether anything is missing.
    if (spritesLoaded === spritesTotal) {
      const keys = Object.keys(spriteCache).sort();
      console.log('G1 — sprite cache ready: ' + keys.length + ' / ' + spritesTotal + ' sprites');
      console.log('G1 — cache keys: ' + keys.join(', '));
      const missing = Object.keys(spriteData).filter(k => !spriteCache[k]);
      if (missing.length) console.error('G1 — sprites MISSING from cache:', missing);
    }
  };
  sprites[name].onerror = (e) => console.warn('Block A — sprite FAILED to load:', name, e);
  sprites[name].src = src;
}

// Draw a sprite centered on x, feet at y. ALWAYS uses the alpha-keyed cached canvas.
// G1 — raw-img fallback removed. If the cache is missing for a loaded sprite, we log loudly
// and SKIP the draw rather than fall back to the un-keyed JPG (that fallback was the source
// of the white/gray boxes around briefcase, barrel, etc.).
function drawSprite(name, x, y, targetH, flip=false, footFrac=1.0) {
  const cached = spriteCache[name];
  if (!cached) {
    const img = sprites[name];
    if (img && img.complete && img.naturalWidth) {
      // Loaded but somehow not in cache — should never happen; surface immediately.
      console.error('drawSprite: cache MISSING for loaded sprite "' + name + '"');
    }
    return;                                                              // skip draw — never use raw img
  }
  const nw = cached.width, nh = cached.height;
  if (!nw || !nh) return;

  const aspect = nw / nh;
  const targetW = targetH * aspect;
  const drawX = x - targetW / 2;
  const drawY = y - targetH * footFrac;

  ctx.save();
  if (flip) { ctx.translate(drawX*2 + targetW, 0); ctx.scale(-1, 1); }
  ctx.drawImage(cached, drawX, drawY, targetW, targetH);
  ctx.restore();
}

// Safe ellipse wrapper — ctx.ellipse needs 7 args, this handles the translate/scale approach
function ell(x, y, rx, ry, rot, s, e) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(rx, ry);
  ctx.arc(0, 0, 1, s, e);
  ctx.restore();
}
const W = 480, H = 854;
let scale = 1;

function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─────────────────────────────────────────────
//  GAME LAYOUT DATA
// ─────────────────────────────────────────────
const PLAT_H = 14;
// Block B — geometry per Notion spec (canonical baseline). Pre-audited 6/6 PASS.
const platforms = [
  { x:  0, y: 790, w: 480, h: 14, tilt:  0   },  // FLOOR — full width
  { x: 80, y: 660, w: 400, h: 14, tilt: -2.5 },  // P1 — tilts right-down
  { x: 10, y: 530, w: 370, h: 14, tilt:  2.5 },  // P2 — tilts left-down
  { x: 80, y: 400, w: 370, h: 14, tilt: -2.5 },  // P3
  { x: 10, y: 270, w: 370, h: 14, tilt:  2.5 },  // P4
  { x: 60, y: 140, w: 420, h: 14, tilt:  0   }   // TOP — F1: extends to right screen edge (x=480)
];
const ladders = [
  { x:  80, y: 672, h: 118 },  // [0] FLOOR -> P1 left  (cx=92, inside P1 x=80)
  { x: 370, y: 672, h: 118 },  // [1] FLOOR -> P1 right
  { x: 120, y: 548, h: 118 },  // [2] P1 -> P2
  { x: 340, y: 419, h: 118 },  // [3] P2 -> P3
  { x:  90, y: 289, h: 118 },  // [4] P3 -> P4
  { x: 350, y: 159, h: 118 }   // [5] P4 -> TOP
];
const LADDER_W = 24;
const TOP = platforms[5];
const FLOOR = platforms[0];
// Block C / F2 — single source of truth for DTJ + barrel positions on TOP.
// TOP is x=60 w=420 (after F1 extension). Layout left→right:
//   CNN col @ TOP.x+8 (range 68–104)
//   → DTJ @ DTJ_GAMEPLAY_X (just LEFT of barrel)
//   → barrel decoration @ BARREL_X (capsule spawn origin)
//   → MSNBC col @ TOP.x+TOP.w-40 (right edge of TOP, range 440–476)
const BARREL_X        = TOP.x + 170;   // = 230 (unchanged from Block C)
const DTJ_GAMEPLAY_X  = TOP.x + 100;   // F2: DTJ moved from TOP.x+260 to LEFT of barrel

// ─────────────────────────────────────────────
//  STATE MACHINE
// ─────────────────────────────────────────────
// INTRO_BLACK → INTRO_TITLE → INTRO_ESCALATOR → INTRO_STAIRS
// → INTRO_TAUNT → INTRO_SHATTER → GAMEPLAY
let state = 'INTRO_BLACK', stateT = 0, totalT = 0;
let skipDone = false;

function skipToGame() {
  if (state !== 'GAMEPLAY') { state = 'GAMEPLAY'; stateT = 0; particles = []; bricks = []; zoomScale = 1; capsules.length = 0; capsuleSpawnT = 0; capsuleSpawnInterval = 2.5 + Math.random() * 2.0; dtjAnimState = 'IDLE'; dtjAnimT = 0; dtjAnimX = DTJ_GAMEPLAY_X; helpers.length = 0; player.lives = 3; player.invulnT = 0; playerScore = 0; multiplier = 1.0; multiplierT = 0; pickupSpawnTimer = 0; pickupRespawnDelay = 0; pickup.active = false; spawnFirstPickup(); pelosi.active = false; pelosi.phase = 'IDLE'; pelosi.phaseT = 0; pelosi.timer = PELOSI_INTERVAL_MIN + Math.random() * (PELOSI_INTERVAL_MAX - PELOSI_INTERVAL_MIN); pelosi.facing = -1; pelosi.targetCapsule = null; pelosiFlash.active = false; tornPieces.length = 0; }
}

// ─────────────────────────────────────────────
//  INPUT
// ─────────────────────────────────────────────
const keys = {};
const GAME_KEYS = new Set(['ArrowLeft','ArrowRight','Space','KeyA','KeyZ']);
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (GAME_KEYS.has(e.code)) e.preventDefault();
  if (state !== 'GAMEPLAY') skipToGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch state
const touch = { left:false, right:false, climbUp:false, climbDown:false, jump:false };
const activeTouches = {};

// ─────────────────────────────────────────────
//  PLAYER STATE
// ─────────────────────────────────────────────
const GRAVITY   = 1400;
const JUMP_VY   = -560;
const WALK_SPD  = 130;
const CLIMB_SPD = 110;

const player = {
  x: FLOOR.x + 60,
  y: FLOOR.y - 1,
  vx: 0, vy: 0,
  onGround: false,
  onLadder: false,
  facing: 1,
  walkT: 0,
  ladderCooldown: 0,
  ladderEntryY: 0,   // y position when ladder was grabbed — for exit detection
  lives: 3,          // Block 3 — decremented by hit(), reset on GAMEPLAY entry
  invulnT: 0,        // Block 3 — invulnerability timer (s); blink while >0
};

// ─────────────────────────────────────────────
//  PHYSICS HELPERS
// ─────────────────────────────────────────────
function getPlatY(plat, px) {
  const mid = plat.x + plat.w / 2;
  const rad = plat.tilt * Math.PI / 180;
  return plat.y + Math.tan(rad) * (px - mid);
}

// Can player grab ladder from TOP? Must be on platform just above ladder top.
function ladderAtTop(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.8) continue;
    // Player must be near the top of this ladder (within 28px above lad.y)
    if (py < lad.y - 28 || py > lad.y + 6) continue;
    return lad;
  }
  return null;
}

// Can player grab this ladder? Must be near the ladder's BASE platform surface.
function ladderAtBase(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.8) continue;
    // Find the platform at the bottom of this ladder
    for (const plat of platforms) {
      if (px < plat.x - 2 || px > plat.x + plat.w + 2) continue;
      const platY = getPlatY(plat, px);
      // This platform is at the base of the ladder if its surface is near lad.y+h
      if (Math.abs(platY - (lad.y + lad.h)) < 20) {
        // Player must be standing on that platform
        if (Math.abs(py - platY) < 12) return lad;
      }
    }
  }
  return null;
}

// Is player currently within a ladder's climbable range?
// Match the FULL ladder height — from lad.y all the way to lad.y+h
// Exit conditions are handled explicitly in updatePlayer
function ladderContaining(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.8) continue;
    // Full range: top to base
    if (py >= lad.y - 26 && py <= lad.y + lad.h + 8) return lad;
  }
  return null;
}

// Platform is SOLID to walking player always.
// When climbing, open a gap at the ladder's x ONLY for the platform
// that the ladder BASE sits on (the one the player is climbing FROM).
// The destination platform (top of ladder) stays solid until the explicit
// top-exit snaps the player onto it.
function platSolidAt(px, plat, climbing) {
  if (!climbing) return true;
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.65) continue;
    const platYatLad = getPlatY(plat, ladCx);
    // Open gap for ANY platform the ladder passes through vertically
    // (base platform, destination platform, or any mid-platform)
    if (platYatLad >= lad.y - 10 && platYatLad <= lad.y + lad.h + 10) return false;
  }
  return true;
}

// ─────────────────────────────────────────────
//  UPDATE PLAYER
// ─────────────────────────────────────────────
function updatePlayer(dt) {
  const left   = keys['ArrowLeft']  || touch.left;
  const right  = keys['ArrowRight'] || touch.right;
  const climbU = keys['KeyA']       || touch.climbUp;
  const climbD = keys['KeyZ']       || touch.climbDown;
  const doJump = keys['Space']      || touch.jump;

  // Tick cooldown
  if (player.ladderCooldown > 0) player.ladderCooldown -= dt;
  // Block 3 — tick invulnerability timer, floored at 0
  if (player.invulnT > 0) player.invulnT = Math.max(0, player.invulnT - dt);

  // ══════════════════════════════════════════
  //  CLIMB STATE
  // ══════════════════════════════════════════
  if (player.onLadder) {
    const lad = ladderContaining(player.x, player.y);

    if (!lad) {
      player.onLadder = false;
      // fall through to walk state
    } else {
      // Clear ground state — we are on a ladder, not a platform
      player.onGround = false;

      // Lock x to ladder center
      player.x = lad.x + LADDER_W / 2;

      // Vertical movement
      if (climbU)      player.y -= CLIMB_SPD * dt;
      else if (climbD) player.y += CLIMB_SPD * dt;
      if (climbU || climbD) player.walkT += dt;

      // Jump off ladder
      if (doJump) {
        player.onLadder = false;
        player.vy = JUMP_VY;
        player.ladderCooldown = 0.3;
        return;
      }

      // ── TOP EXIT: only when player actually ascended to top ──
      // entryY check prevents immediate exit on grab from top platform
      if (player.y <= lad.y + 4 && player.y < player.ladderEntryY - 8) {
        // Find destination platform — generous x margin so edge ladders find their platform
        let snapY = lad.y;
        let bestDiff = 999;
        for (const plat of platforms) {
          if (player.x < plat.x - 16 || player.x > plat.x + plat.w + 16) continue;
          const py = getPlatY(plat, player.x);
          if (py > lad.y + 6) continue; // must be at or above ladder top
          const diff = Math.abs(py - lad.y);
          if (diff < bestDiff) { bestDiff = diff; snapY = py; }
        }
        player.y = snapY;
        player.vy = 0;
        player.onLadder = false;
        player.onGround = true;
        player.ladderCooldown = 0.5;
        return;
      }

      // ── BOTTOM EXIT: only when player actually descended to base ──
      // entryY check prevents immediate exit on grab from base platform
      if (player.y >= lad.y + lad.h - 2 && player.y > player.ladderEntryY + 8) {
        // Snap to the platform below
        let snapY = lad.y + lad.h;
        for (const plat of platforms) {
          if (player.x < plat.x - 4 || player.x > plat.x + plat.w + 4) continue;
          const py = getPlatY(plat, player.x);
          if (Math.abs(py - (lad.y + lad.h)) < 15) { snapY = py; break; }
        }
        player.y = snapY;
        player.vy = 0;
        player.onLadder = false;
        player.onGround = true;
        player.ladderCooldown = 0.2;
        return;
      }

      return; // stay in climb state
    }
  }

  // ══════════════════════════════════════════
  //  WALK STATE
  // ══════════════════════════════════════════

  // Horizontal movement
  if (left)       { player.vx = -WALK_SPD; player.facing = -1; }
  else if (right) { player.vx =  WALK_SPD; player.facing =  1; }
  else            { player.vx = 0; }

  // Grab ladder going UP — A pressed at base
  if (climbU && player.ladderCooldown <= 0) {
    const lad = ladderAtBase(player.x, player.y);
    if (lad) {
      player.onLadder = true;
      player.ladderEntryY = player.y;
      player.x = lad.x + LADDER_W / 2;
      player.vx = 0;
      player.vy = 0;
      return;
    }
  }

  // Grab ladder going DOWN — Z pressed at top of ladder
  if (climbD && player.ladderCooldown <= 0) {
    const lad = ladderAtTop(player.x, player.y);
    if (lad) {
      player.onLadder = true;
      player.ladderEntryY = player.y;
      player.x = lad.x + LADDER_W / 2;
      player.vx = 0;
      player.vy = 0;
      return;
    }
  }

  // Jump
  if (doJump && player.onGround) {
    player.vy = JUMP_VY;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY * dt;
  player.vy = Math.min(player.vy, 900); // terminal velocity

  // Integrate position
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // ── PLATFORM COLLISION ──────────────────────
  // Platforms are SOLID to walking player.
  // Gap only opens at ladder x when player.onLadder.
  player.onGround = false;
  for (const plat of platforms) {
    // Horizontal bounds check
    if (player.x < plat.x - 2 || player.x > plat.x + plat.w + 2) continue;

    const platY = getPlatY(plat, player.x);
    const prevY = player.y - player.vy * dt;

    // Only collide when moving downward (or standing still)
    if (player.vy < 0) continue;

    // Player must have been ABOVE platform last frame
    if (prevY > platY + 1) continue;  // was below — skip (already passed through)

    // Player must have reached or crossed platform surface this frame
    if (player.y < platY - 1) continue;  // hasn't reached yet

    // Is platform solid here?
    if (!platSolidAt(player.x, plat, player.onLadder)) continue;

    // LAND
    player.y = platY;
    player.vy = 0;
    player.onGround = true;
    break;
  }

  // Screen bounds
  player.x = Math.max(8, Math.min(W - 8, player.x));

  // Ceiling
  if (player.y < 40) { player.y = 40; player.vy = 0; }

  // Fell off bottom — respawn
  if (player.y > H + 50) {
    player.x = FLOOR.x + 60;
    player.y = FLOOR.y;
    player.vy = 0;
    player.onGround = true;
    player.ladderCooldown = 0;
  }

  if (player.vx !== 0 && player.onGround) player.walkT += dt;
}

// ─────────────────────────────────────────────
//  BLOCK 1 — CONSTITUTION CAPSULE ROLLING ENEMY
// ─────────────────────────────────────────────
// DTJ at top throws capsules. They roll downhill on tilted platforms,
// fall off edges to the platform below, and have a chance to drop down
// any ladder they cross. AABB hit on DNC triggers hit() (stub until Block 3).
const capsules = [];
let capsuleSpawnT = 0;
// Block 2.5 — variable spawn interval (2.5–4.5s), recomputed per spawn
let capsuleSpawnInterval = 2.5 + Math.random() * 2.0;
const CAPSULE_R = 18;                              // Block 2.5 — bumped from 12
const CAPSULE_ROLL_SPD = 75;
const CAPSULE_GRAV = 1100;
const CAPSULE_LADDER_DROP_CHANCE = 0.65;           // Block 2.5 — bumped from 0.5
// C2 v2 — capsules have NO lifeTimer. They persist until off-screen-left exit (after rolling off
// FLOOR's left edge) or until a helper / Pelosi destroys them. The previous CAPSULE_LIFE+30s
// backstop and the 40%-on-expiry Burning Briefcase spawn are both deleted here. Burning Briefcase
// was removed from design April 30 2026.
const MAX_CAPSULES = 8;
// G4 — initial throw direction. -1 = leftward (current Level 1), +1 = rightward.
// Used to derive (a) capsule spawn vx sign and (b) the dtj_throw render flip — keeping them
// in lockstep so changing one constant flips both. After spawn, capsule vx still snaps to platform
// tilt while rolling; this only controls the initial throw and the render mirror.
const CAPSULE_THROW_DIR = -1;

// C3 — DTJ throw animation state machine. On capsule spawn timer fire (and only if IDLE),
// DTJ walks RIGHT to BARREL_X (0.4s, dtj_walk/dtj_walk2 cycle), throws (0.3s, dtj_throw mirrored),
// walks back LEFT to DTJ_GAMEPLAY_X (0.3s, walk-cycle mirrored), returns to IDLE. Capsule spawns
// at the START of the THROW phase so its origin is BARREL_X. Static barrel decoration never moves.
// If the spawn timer fires during anim, the new throw kicks off as soon as state returns to IDLE
// (condition gate below handles this naturally — no separate queue var needed).
const DTJ_WALK_TO_DURATION   = 0.4;
const DTJ_THROW_DURATION     = 0.3;
const DTJ_WALK_BACK_DURATION = 0.3;
let dtjAnimState = 'IDLE';                  // 'IDLE' | 'WALK_TO_BARREL' | 'THROW' | 'WALK_BACK'
let dtjAnimT     = 0;
let dtjAnimX     = DTJ_GAMEPLAY_X;          // current x during the animation

function spawnCapsule() {
  // C2 v2 — capsule entity has no lifeTimer. Cap visible count via MAX_CAPSULES.
  if (capsules.length >= MAX_CAPSULES) return;
  capsules.push({
    x: BARREL_X,                                // spawns from the static barrel decoration
    y: TOP.y - CAPSULE_R,                       // sitting on TOP platform
    vx: CAPSULE_THROW_DIR * CAPSULE_ROLL_SPD,   // G4 — sign derived from CAPSULE_THROW_DIR
    vy: 0,
    rolling: true,
    onPlat: TOP,
    rot: 0,
  });
}

function updateCapsules(dt) {
  // C3 — drive DTJ throw animation. State transitions handle their own x interpolation and the
  // capsule entity spawn (at the start of the THROW phase).
  capsuleSpawnT += dt;
  if (dtjAnimState === 'IDLE') {
    if (capsuleSpawnT >= capsuleSpawnInterval) {
      capsuleSpawnT = 0;
      capsuleSpawnInterval = 2.5 + Math.random() * 2.0;
      dtjAnimState = 'WALK_TO_BARREL';
      dtjAnimT = 0;
      dtjAnimX = DTJ_GAMEPLAY_X;
    }
  } else {
    dtjAnimT += dt;
    if (dtjAnimState === 'WALK_TO_BARREL') {
      const t = Math.min(dtjAnimT / DTJ_WALK_TO_DURATION, 1);
      dtjAnimX = DTJ_GAMEPLAY_X + (BARREL_X - DTJ_GAMEPLAY_X) * t;
      if (t >= 1) {
        dtjAnimX = BARREL_X;
        dtjAnimState = 'THROW';
        dtjAnimT = 0;
        spawnCapsule();                                       // capsule pops out at start of THROW
      }
    } else if (dtjAnimState === 'THROW') {
      if (dtjAnimT >= DTJ_THROW_DURATION) {
        dtjAnimState = 'WALK_BACK';
        dtjAnimT = 0;
      }
    } else if (dtjAnimState === 'WALK_BACK') {
      const t = Math.min(dtjAnimT / DTJ_WALK_BACK_DURATION, 1);
      dtjAnimX = BARREL_X + (DTJ_GAMEPLAY_X - BARREL_X) * t;
      if (t >= 1) {
        dtjAnimX = DTJ_GAMEPLAY_X;
        dtjAnimState = 'IDLE';
        dtjAnimT = 0;
        // If the spawn timer is already past threshold (queued during anim), the next loop will
        // re-fire from the IDLE branch above — no explicit queue var needed.
      }
    }
  }

  for (let i = capsules.length - 1; i >= 0; i--) {
    const c = capsules[i];

    if (c.rolling && c.onPlat) {
      // Snap to downhill direction (DK rule). Flat platforms keep momentum.
      if (c.onPlat.tilt >  0.1) c.vx =  CAPSULE_ROLL_SPD;
      else if (c.onPlat.tilt < -0.1) c.vx = -CAPSULE_ROLL_SPD;

      const prevX = c.x;
      c.x += c.vx * dt;
      c.y = getPlatY(c.onPlat, c.x) - CAPSULE_R;
      c.rot += c.vx * dt * 0.05;

      // Ladder drop check — capsule must be on the ladder's BASE platform
      let dropped = false;
      for (const lad of ladders) {
        const ladCx = lad.x + LADDER_W / 2;
        const platYatLad = getPlatY(c.onPlat, ladCx);
        if (Math.abs(platYatLad - (lad.y + lad.h)) > 20) continue;
        const crossed = (prevX < ladCx && c.x >= ladCx) ||
                        (prevX > ladCx && c.x <= ladCx);
        if (crossed && Math.random() < CAPSULE_LADDER_DROP_CHANCE) {
          c.rolling = false;
          c.onPlat = null;
          c.x = ladCx;
          c.vx = 0;
          c.vy = 30;
          dropped = true;
          break;
        }
      }

      // Off the platform edge → start falling
      if (!dropped && (c.x < c.onPlat.x - 4 || c.x > c.onPlat.x + c.onPlat.w + 4)) {
        c.rolling = false;
        c.onPlat = null;
        c.vy = 0;
      }
    } else {
      // Falling
      c.vy = Math.min(c.vy + CAPSULE_GRAV * dt, 900);
      const prevY = c.y;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.rot += 0.18;

      for (const plat of platforms) {
        if (c.x < plat.x - 4 || c.x > plat.x + plat.w + 4) continue;
        const surfaceTarget = getPlatY(plat, c.x) - CAPSULE_R;
        if (prevY > surfaceTarget + 1) continue;   // was already below this plat
        if (c.y < surfaceTarget) continue;          // hasn't reached
        c.y = surfaceTarget;
        c.vy = 0;
        c.rolling = true;
        c.onPlat = plat;
        if (plat.tilt >  0.1) c.vx =  CAPSULE_ROLL_SPD;
        else if (plat.tilt < -0.1) c.vx = -CAPSULE_ROLL_SPD;
        else c.vx = c.vx >= 0 ? CAPSULE_ROLL_SPD : -CAPSULE_ROLL_SPD;
        break;
      }
    }

    // C2 v2 — only off-screen-left exit + off-bottom backstop destroy a capsule. Lifetime / Burning
    // Briefcase spawn-on-expire are deleted. Helper kill + Pelosi grab handle their own splice.
    if (c.x < -CAPSULE_R * 2 || c.y > H + 30) { capsules.splice(i, 1); continue; }

    // AABB collision with DNC (player.y is the foot).
    // G3 — capsule travel rule: hitting the player decrements lives/grants i-frames but does NOT
    // despawn the capsule. Capsule keeps cascading; only helper-kill, Pelosi-grab, and off-screen
    // exit can remove it. The 1s invulnerability timer prevents double-hit damage, and the player
    // respawns at FLOOR.x+60 — by the time invuln expires the capsule has moved on.
    if (
      c.x + CAPSULE_R > player.x - 10 &&
      c.x - CAPSULE_R < player.x + 10 &&
      c.y + CAPSULE_R > player.y - 32 &&
      c.y - CAPSULE_R < player.y - 4
    ) {
      hit('capsule');                                     // decrement lives + i-frames; no splice
    }
  }
}

// Block 3 — lives / invulnerability / respawn.
// Block 11 will replace the GAME_OVER console.log with the real state machine.
function hit(source) {
  if (player.invulnT > 0) return;          // i-frames active, ignore
  player.lives -= 1;
  player.invulnT = 1.0;                    // 1s of invulnerability after a hit
  if (typeof console !== 'undefined') console.log('HIT by', source, '— lives:', player.lives);
  if (player.lives <= 0) {
    if (typeof console !== 'undefined') console.log('GAME OVER');
    return;                                // Block 11 will trigger state transition
  }
  // Respawn on the floor in walk state
  player.x = FLOOR.x + 60;
  player.y = FLOOR.y - 1;
  player.vx = 0;
  player.vy = 0;
  player.onLadder = false;
  player.onGround = true;
  player.ladderCooldown = 0;
  player.ladderEntryY = 0;
}

function drawCapsules() {
  for (const c of capsules) {
    // Block 2.5 — always barrel_endview (rolling/falling distinction dropped)
    drawSprite('barrel_endview', c.x, c.y + CAPSULE_R, CAPSULE_R * 2, c.vx < 0, 1.0);
  }
}

// ─────────────────────────────────────────────
//  C2 v2 — Burning Briefcase entity DELETED.
//  The patrolling-enemy briefcase, its constants, spawn/update/draw functions, and the 40%
//  spawn-on-capsule-expire trigger were all removed April 30 2026 per design revision.
//  The briefcase PICKUP (separate entity, defined below — bobs above a platform, +250 score
//  on collect, triggers helper wave) is unaffected.
// ─────────────────────────────────────────────
//  BLOCK D — BRIEFCASE PICKUP (collectible, distinct from briefcase enemy)
// ─────────────────────────────────────────────
// First spawn: above P4 (~40px above surface — must jump to grab).
// On collect: +250 score, multiplier +0.6 (cap 3.0, 5s), trigger helper, respawn after 8–12s
// on a random middle platform (P1–P4, never TOP or FLOOR).
// Max 1 visible. Renders briefcase.JPG at 3x the patrol-briefcase size.
const PICKUP_SIZE          = 36;          // G6 — 1.5x base sprite size (was 72 in Block D, halved in G6)
const PICKUP_HOVER_PX      = 40;          // height above platform surface
const BRIEFCASE_SCORE      = 250;
const BRIEFCASE_RESPAWN_MIN = 8.0;
const BRIEFCASE_RESPAWN_MAX = 12.0;
const MULT_ADD             = 0.6;
const MULT_MAX             = 3.0;
const MULT_DURATION        = 5.0;
// Player score + multiplier state (Block 9 will extend with per-second + capsule-clear bonuses).
let playerScore = 0;
let multiplier = 1.0;
let multiplierT = 0;       // seconds remaining at current boosted multiplier; 0 → multiplier resets to 1.0
const pickup = { active: false, x: 0, baseY: 0, y: 0, bobPhase: 0 };
let pickupSpawnTimer = 0;  // counts up while !active; spawns next when >= pickupRespawnDelay
let pickupRespawnDelay = 0;

// Middle platforms (excludes TOP at index 5 and FLOOR at index 0)
const MIDDLE_PLATFORM_INDICES = [1, 2, 3, 4];

function spawnPickupOnPlatform(plat, fixedX) {
  // C4 — pickup floats just below the underside of the NEXT platform up. Top of briefcase sits
  // 4px below platAbove.y + PLAT_H. baseY is the foot position (footFrac=1.0), so baseY equals
  // platAbove.y + PLAT_H + 4 + PICKUP_SIZE. Player must make a maximum jump from the host
  // platform to reach the bottom of the bob. platforms[idx+1] is the platform above idx.
  const margin = 28;
  const px = (typeof fixedX === 'number')
    ? fixedX
    : plat.x + margin + Math.random() * (plat.w - 2 * margin);
  pickup.x = px;
  const idx = platforms.indexOf(plat);
  const platAbove = (idx >= 0 && idx + 1 < platforms.length) ? platforms[idx + 1] : null;
  if (platAbove) {
    pickup.baseY = platAbove.y + PLAT_H + 4 + PICKUP_SIZE;
  } else {
    // Defensive fallback (no platform above) — shouldn't trigger for MIDDLE_PLATFORM_INDICES.
    pickup.baseY = getPlatY(plat, px) - PICKUP_HOVER_PX;
  }
  pickup.y = pickup.baseY;
  pickup.bobPhase = 0;
  pickup.active = true;
}

function spawnFirstPickup() {
  // First pickup always above P4 (one level under TOP), centered. Reuses spawnPickupOnPlatform
  // so the platform-above lookup logic (TOP) lives in one place.
  const p4 = platforms[4];
  spawnPickupOnPlatform(p4, p4.x + p4.w / 2);
}

function updatePickup(dt) {
  // Multiplier decay
  if (multiplierT > 0) {
    multiplierT = Math.max(0, multiplierT - dt);
    if (multiplierT === 0) multiplier = 1.0;
  }

  if (!pickup.active) {
    pickupSpawnTimer += dt;
    if (pickupSpawnTimer >= pickupRespawnDelay) {
      const idx = MIDDLE_PLATFORM_INDICES[Math.floor(Math.random() * MIDDLE_PLATFORM_INDICES.length)];
      spawnPickupOnPlatform(platforms[idx]);
      pickupSpawnTimer = 0;
    }
    return;
  }

  // Bob — C4: oscillate from baseY (closest to platform above, no overlap) to baseY+8 (lower).
  // Always >= baseY so the bob never pushes the briefcase INTO the platform above.
  pickup.bobPhase += dt * 2;
  pickup.y = pickup.baseY + (Math.sin(pickup.bobPhase) * 0.5 + 0.5) * 8;

  // AABB collision with player. Hitbox derived from PICKUP_SIZE so it scales with the sprite (G6).
  // Pickup body: x ± (PICKUP_SIZE*0.25), y in [py-PICKUP_SIZE, py] (footFrac=1.0).
  // Player body: x±10, y in [py-32, py-4]. C4: pickup is now at platAbove-underside+4 — requires
  // a maximum jump from the host platform to reach the bottom of the bob.
  const halfW = PICKUP_SIZE * 0.25;
  const overlapX = (pickup.x + halfW > player.x - 10) && (pickup.x - halfW < player.x + 10);
  const overlapY = (pickup.y > player.y - 32) && (pickup.y - PICKUP_SIZE < player.y - 4);
  if (overlapX && overlapY) {
    // Collect
    playerScore += BRIEFCASE_SCORE;
    multiplier = Math.min(multiplier + MULT_ADD, MULT_MAX);
    multiplierT = MULT_DURATION;
    triggerHelperSpawn('briefcase');
    pickup.active = false;
    pickupSpawnTimer = 0;
    pickupRespawnDelay = BRIEFCASE_RESPAWN_MIN + Math.random() * (BRIEFCASE_RESPAWN_MAX - BRIEFCASE_RESPAWN_MIN);
  }
}

function drawPickup() {
  if (!pickup.active) return;
  drawSprite('briefcase', pickup.x, pickup.y, PICKUP_SIZE, false, 1.0);
}

// ─────────────────────────────────────────────
//  BLOCK E — HELPER SYSTEM v1 (Antifa + Zombie Voter only)
// ─────────────────────────────────────────────
// Spawned by briefcase pickup. Both helpers destroy capsules on contact and never hurt the player.
// Antifa: 5–10 per wave, spawn on FLOOR, walk along platforms toward the nearest up-ladder, climb,
//   repeat until they hit TOP or the 25s safety lifeTimer expires. (G5 — was: float upward
//   ghosting through platforms, which was wrong per Brian's F-deploy feedback.)
// Zombie Voter: 1–2 per wave, spawn on random middle platform, slow patrol, killed by any capsule
//   contact. Behavior unchanged from Block E.
// Sprites use the cached PNG canvases (G1 replacement).
const helpers = [];
const MAX_HELPERS    = 24;
const ANTIFA_SIZE    = 64;       // F6 — 2x of original 32
const ZOMBIE_SIZE    = 72;       // F6 — 2x of original 36
const ANTIFA_WALK_SPD  = 60;     // G5 — Notion spec
const ANTIFA_CLIMB_SPD = 90;     // G5 — Notion spec
const ZOMBIE_SPD     = 40;
const HELPER_LIFE    = 25.0;     // safety auto-despawn
const ZOMBIE_SPRITES = ['zombie_winemom', 'zombie_pinkhair', 'zombie_glasses', 'zombie_dad'];

// G5 — ladder/platform topology helpers. Reuses getPlatY (no duplicated geometry math).
function getLadderBasePlat(lad) {
  // Platform whose surface sits at the ladder's base (lad.y + lad.h). Returns null if none.
  const ladCx = lad.x + LADDER_W / 2;
  for (const plat of platforms) {
    if (ladCx < plat.x - 2 || ladCx > plat.x + plat.w + 2) continue;
    const platY = getPlatY(plat, ladCx);
    if (Math.abs(platY - (lad.y + lad.h)) < 20) return plat;
  }
  return null;
}
function getLadderTopPlat(lad) {
  // Platform whose surface is at or just above the ladder's top (lad.y). Returns null if none.
  // Uses the same x-margin (16) and tolerance window the player's top-exit snap uses.
  const ladCx = lad.x + LADDER_W / 2;
  for (const plat of platforms) {
    if (ladCx < plat.x - 16 || ladCx > plat.x + plat.w + 16) continue;
    const platY = getPlatY(plat, ladCx);
    if (platY > lad.y + 6) continue;        // platform must be at or above ladder top
    if (platY < lad.y - 25) continue;       // not too far above
    return plat;
  }
  return null;
}
function findNearestUpLadder(plat, fromX) {
  let nearest = null, nearestDist = Infinity;
  for (const lad of ladders) {
    if (getLadderBasePlat(lad) !== plat) continue;     // ladder must rise FROM this platform
    const ladCx = lad.x + LADDER_W / 2;
    const d = Math.abs(ladCx - fromX);
    if (d < nearestDist) { nearestDist = d; nearest = lad; }
  }
  return nearest;
}

function spawnAntifaWave() {
  const n = 5 + Math.floor(Math.random() * 6);   // 5–10
  for (let i = 0; i < n; i++) {
    if (helpers.length >= MAX_HELPERS) break;
    const x = FLOOR.x + 20 + Math.random() * (FLOOR.w - 40);
    helpers.push({
      type: 'ANTIFA',
      state: 'WALK',                             // G5 — WALK | CLIMB
      x: x,
      y: FLOOR.y,                                // foot at floor surface
      vx: 0,
      vy: 0,
      w: ANTIFA_SIZE * 0.7,
      h: ANTIFA_SIZE,
      sprite: 'antifa',
      plat: FLOOR,                               // current platform while walking
      targetLad: null,                           // ladder we're walking toward
      currentLad: null,                          // ladder we're currently climbing
      lifeTimer: HELPER_LIFE,
    });
  }
}

function spawnZombieWave() {
  const n = 1 + Math.floor(Math.random() * 2);   // 1–2
  for (let i = 0; i < n; i++) {
    if (helpers.length >= MAX_HELPERS) break;
    const idx = MIDDLE_PLATFORM_INDICES[Math.floor(Math.random() * MIDDLE_PLATFORM_INDICES.length)];
    const plat = platforms[idx];
    const x = plat.x + 20 + Math.random() * (plat.w - 40);
    const sprite = ZOMBIE_SPRITES[Math.floor(Math.random() * ZOMBIE_SPRITES.length)];
    helpers.push({
      type: 'ZOMBIE',
      x: x,
      y: getPlatY(plat, x),
      vx: Math.random() < 0.5 ? -ZOMBIE_SPD : ZOMBIE_SPD,
      vy: 0,
      w: ZOMBIE_SIZE * 0.7,
      h: ZOMBIE_SIZE,
      sprite: sprite,
      plat: plat,
      lifeTimer: HELPER_LIFE,
    });
  }
}

function updateHelpers(dt) {
  for (let i = helpers.length - 1; i >= 0; i--) {
    const h = helpers[i];
    h.lifeTimer -= dt;
    if (h.lifeTimer <= 0) { helpers.splice(i, 1); continue; }

    if (h.type === 'ANTIFA') {
      // G5 — walk current platform toward nearest up-ladder, climb it, repeat.
      if (h.state === 'WALK') {
        // Refresh target ladder if we don't have one or our platform changed under us.
        if (!h.targetLad || getLadderBasePlat(h.targetLad) !== h.plat) {
          h.targetLad = findNearestUpLadder(h.plat, h.x);
        }
        if (h.targetLad) {
          const ladCx = h.targetLad.x + LADDER_W / 2;
          const dx = ladCx - h.x;
          if (Math.abs(dx) <= ANTIFA_WALK_SPD * dt) {
            // Arrived at ladder base — switch to CLIMB
            h.x = ladCx;
            h.state = 'CLIMB';
            h.currentLad = h.targetLad;
            h.targetLad = null;
            h.vx = 0;
          } else {
            h.vx = Math.sign(dx) * ANTIFA_WALK_SPD;
            h.x += h.vx * dt;
          }
        } else {
          // No up-ladder from this platform (e.g. they reached TOP). Stand idle until despawn.
          h.vx = 0;
        }
        // Snap to platform surface (handles tilt)
        if (h.plat) h.y = getPlatY(h.plat, h.x);
      } else if (h.state === 'CLIMB') {
        h.y -= ANTIFA_CLIMB_SPD * dt;
        const lad = h.currentLad;
        if (h.y <= lad.y + 4) {
          // Reached top — snap to destination platform surface, return to WALK
          const topPlat = getLadderTopPlat(lad);
          if (topPlat) {
            h.plat = topPlat;
            h.y = getPlatY(topPlat, h.x);
          } else {
            h.y = lad.y;                                 // defensive — keep them on the ladder line
          }
          h.state = 'WALK';
          h.currentLad = null;
          h.targetLad = null;
        }
      }
    } else if (h.type === 'ZOMBIE') {
      // Slow horizontal patrol on platform; reverse at edges (6px buffer)
      h.x += h.vx * dt;
      h.y = getPlatY(h.plat, h.x);
      if (h.x < h.plat.x + 6) {
        h.x = h.plat.x + 6;
        h.vx = Math.abs(h.vx);
      } else if (h.x > h.plat.x + h.plat.w - 6) {
        h.x = h.plat.x + h.plat.w - 6;
        h.vx = -Math.abs(h.vx);
      }
    }

    // Helper vs capsule: destroy capsule on overlap. Zombie dies in the encounter; Antifa survives.
    const halfW = h.w / 2;
    let helperKilled = false;
    for (let ci = capsules.length - 1; ci >= 0; ci--) {
      const c = capsules[ci];
      // Capsule center ± CAPSULE_R vs helper body x±halfW, y in [h.y - h.h, h.y]
      const overlapX = (c.x + CAPSULE_R > h.x - halfW) && (c.x - CAPSULE_R < h.x + halfW);
      const overlapY = (c.y + CAPSULE_R > h.y - h.h) && (c.y - CAPSULE_R < h.y);
      if (overlapX && overlapY) {
        capsules.splice(ci, 1);
        if (h.type === 'ZOMBIE') { helperKilled = true; break; }
      }
    }
    if (helperKilled) helpers.splice(i, 1);
  }
}

function drawHelpers() {
  for (const h of helpers) {
    drawSprite(h.sprite, h.x, h.y, h.h, h.vx < 0, 1.0);
  }
}

// Block E — populated. Random pick: Antifa wave or Zombie Voter wave on each briefcase collect.
function triggerHelperSpawn(reason) {
  if (Math.random() < 0.5) spawnAntifaWave();
  else                     spawnZombieWave();
}

// ─────────────────────────────────────────────
//  G2 — NANCY PELOSI CAMEO (FLOOR walker, per April 30 2026 Notion revision)
// ─────────────────────────────────────────────
// Independent 30–45s timer. On fire: spawn at right screen edge on FLOOR, walk LEFT at 50 px/s.
// If she walks within ~30px of a capsule on FLOOR → GRAB → SLAM (glass shatter particles) →
// TEAR (pelosi_idle → pelosi_tear; two paper pieces fly off in arcs) → award PELOSI_BONUS (+500)
// → turn around, walk back RIGHT, despawn off the right edge. If she reaches x≈60 (left limit)
// without grabbing: SHRUG (0.4s, no sprite swap, small arm-up bounce via y-bob) → walk back right,
// no points. No collision with player at any phase.
//
// Phase machine: IDLE → WALKING_LEFT → (GRAB → SLAM → TEAR | SHRUG) → WALKING_RIGHT → IDLE
const PELOSI_HEIGHT           = 80;
const PELOSI_WALK_SPD         = 50;
const PELOSI_GRAB_RANGE_X     = 30;
const PELOSI_GRAB_DURATION    = 0.4;
const PELOSI_SLAM_DURATION    = 0.3;
const PELOSI_TEAR_DURATION    = 0.6;
const PELOSI_SHRUG_DURATION   = 0.4;
const PELOSI_LEFT_LIMIT       = 240;       // C1 — halfway across FLOOR (W/2). Was 60.
const PELOSI_INTERVAL_MIN     = 30.0;
const PELOSI_INTERVAL_MAX     = 45.0;
const PELOSI_BONUS            = 500;
const PELOSI_FLASH_LIFETIME   = 1.5;
const PELOSI_TORN_LIFETIME    = 1.0;

const pelosi = {
  active: false,
  phase: 'IDLE',
  phaseT: 0,
  timer: PELOSI_INTERVAL_MIN + Math.random() * (PELOSI_INTERVAL_MAX - PELOSI_INTERVAL_MIN),
  x: 0, y: 0,
  facing: -1,                                                     // -1 = facing left, +1 = facing right
  targetCapsule: null,
};
const pelosiFlash = { active: false, t: 0, x: 0, y: 0 };
const tornPieces = [];                                            // paper shards flying off after a tear

function findFloorCapsuleNearPelosi() {
  // Capsule must be on FLOOR AND within PELOSI_GRAB_RANGE_X of pelosi.x.
  for (const c of capsules) {
    if (c.onPlat !== FLOOR) continue;
    if (Math.abs(c.x - pelosi.x) < PELOSI_GRAB_RANGE_X) return c;
  }
  return null;
}

function spawnPelosiGlassShatter(x, y) {
  // White-blue glass shard burst — reuses the existing particles[] system.
  const cols = ['#ddffff', '#aaeeff', '#ffffff', '#88ccff', '#ccccff'];
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 110;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 60,                                 // slight upward bias
      life: 1,
      decay: 1.1 + Math.random() * 0.5,
      r: 2 + Math.random() * 3,
      color: cols[Math.floor(Math.random() * cols.length)],
    });
  }
}

function spawnPelosi() {
  pelosi.active = true;
  pelosi.phase = 'WALKING_LEFT';
  pelosi.phaseT = 0;
  pelosi.x = W + 20;                                              // start just off-screen right
  pelosi.y = FLOOR.y;                                             // foot at floor surface
  pelosi.facing = -1;
  pelosi.targetCapsule = null;
}

function updatePelosi(dt) {
  // Bonus flash + torn pieces tick regardless of pelosi.active so they finish their animation
  // even if Pelosi has already despawned.
  if (pelosiFlash.active) {
    pelosiFlash.t += dt;
    if (pelosiFlash.t >= PELOSI_FLASH_LIFETIME) pelosiFlash.active = false;
  }
  for (let i = tornPieces.length - 1; i >= 0; i--) {
    const t = tornPieces[i];
    t.t   += dt;
    t.x   += t.vx * dt;
    t.y   += t.vy * dt;
    t.vy  += 240 * dt;                                            // gravity
    t.rot += t.rotV * dt;
    if (t.t > PELOSI_TORN_LIFETIME || t.x < -50 || t.x > W + 50 || t.y > H + 50) {
      tornPieces.splice(i, 1);
    }
  }

  if (!pelosi.active) {
    pelosi.timer -= dt;
    if (pelosi.timer <= 0) {
      spawnPelosi();
      pelosi.timer = PELOSI_INTERVAL_MIN + Math.random() * (PELOSI_INTERVAL_MAX - PELOSI_INTERVAL_MIN);
    }
    return;
  }

  pelosi.phaseT += dt;
  switch (pelosi.phase) {
    case 'WALKING_LEFT': {
      pelosi.x -= PELOSI_WALK_SPD * dt;
      pelosi.facing = -1;
      const cap = findFloorCapsuleNearPelosi();
      if (cap) {
        pelosi.targetCapsule = cap;
        pelosi.phase = 'GRAB';
        pelosi.phaseT = 0;
      } else if (pelosi.x <= PELOSI_LEFT_LIMIT) {
        pelosi.x = PELOSI_LEFT_LIMIT;
        pelosi.phase = 'SHRUG';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'GRAB': {
      if (pelosi.phaseT >= PELOSI_GRAB_DURATION) {
        // Mid-flight despawn permitted by capsule travel rule for Pelosi only.
        if (pelosi.targetCapsule) {
          const ci = capsules.indexOf(pelosi.targetCapsule);
          if (ci >= 0) capsules.splice(ci, 1);
        }
        spawnPelosiGlassShatter(pelosi.x, pelosi.y - PELOSI_HEIGHT * 0.55);
        pelosi.phase = 'SLAM';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'SLAM': {
      if (pelosi.phaseT >= PELOSI_SLAM_DURATION) {
        pelosi.phase = 'TEAR';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'TEAR': {
      if (pelosi.phaseT >= PELOSI_TEAR_DURATION) {
        // Spawn two paper pieces flying off in opposite arcs (one upper-left, one upper-right).
        const baseY = pelosi.y - PELOSI_HEIGHT * 0.55;
        tornPieces.push({ x: pelosi.x - 6, y: baseY, vx: -180, vy: -240, rot: 0, rotV:  6, t: 0 });
        tornPieces.push({ x: pelosi.x + 6, y: baseY, vx:  180, vy: -260, rot: 0, rotV: -6, t: 0 });
        playerScore += PELOSI_BONUS;
        pelosiFlash.active = true;
        pelosiFlash.t = 0;
        pelosiFlash.x = pelosi.x;
        pelosiFlash.y = pelosi.y - PELOSI_HEIGHT - 10;
        pelosi.phase = 'WALKING_RIGHT';
        pelosi.phaseT = 0;
        pelosi.facing = 1;
      }
      break;
    }
    case 'SHRUG': {
      // Small arm-up bounce — cosmetic y-bob during shrug since we don't have a separate shrug sprite.
      if (pelosi.phaseT >= PELOSI_SHRUG_DURATION) {
        pelosi.phase = 'WALKING_RIGHT';
        pelosi.phaseT = 0;
        pelosi.facing = 1;
      }
      break;
    }
    case 'WALKING_RIGHT': {
      pelosi.x += PELOSI_WALK_SPD * dt;
      pelosi.facing = 1;
      if (pelosi.x > W + 20) {
        pelosi.active = false;
        pelosi.phase = 'IDLE';
        pelosi.phaseT = 0;
        pelosi.targetCapsule = null;
      }
      break;
    }
  }
}

function drawPelosi() {
  if (pelosi.active) {
    const sprite = (pelosi.phase === 'TEAR') ? 'pelosi_tear' : 'pelosi_idle';
    // Cosmetic shrug-bounce: small upward bob during SHRUG phase (no sprite swap available).
    let y = pelosi.y;
    if (pelosi.phase === 'SHRUG') {
      const t = pelosi.phaseT / PELOSI_SHRUG_DURATION;
      y -= Math.sin(t * Math.PI) * 6;                             // half-sine bob, peak ~6px up
    }
    // facing < 0 (walking left) → flip=true so the right-facing default sprite mirrors to face left.
    drawSprite(sprite, pelosi.x, y, PELOSI_HEIGHT, pelosi.facing < 0, 1.0);
  }
  // Torn paper pieces
  for (const t of tornPieces) {
    const a = Math.max(0, 1 - t.t / PELOSI_TORN_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rot);
    ctx.fillStyle = '#f8f4d8';
    ctx.fillRect(-7, -10, 14, 20);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -10, 14, 20);
    // ink lines
    ctx.fillStyle = '#222';
    ctx.fillRect(-5, -7, 10, 1);
    ctx.fillRect(-5, -3, 10, 1);
    ctx.fillRect(-5,  1, 10, 1);
    ctx.restore();
  }
  // Bonus flash floats up
  if (pelosiFlash.active) {
    const a = 1 - (pelosiFlash.t / PELOSI_FLASH_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('+' + PELOSI_BONUS, pelosiFlash.x, pelosiFlash.y - pelosiFlash.t * 30);
    ctx.restore();
  }
}

//  BRICK TUMBLE  (shatter transition)
// ─────────────────────────────────────────────
let bricks = [];
let shakeAmt = 0;

function initBricks() {
  bricks = [];
  // Bricks cascade FROM DTJ's feet (TOP platform) DOWN through each platform
  // Each platform level = one cascade wave, top to bottom
  // This makes the platforms look like ruins of the building structure

  const platLevels = [
    TOP,           // wave 0 — starts at DTJ's feet
    platforms[4],  // wave 1
    platforms[3],  // wave 2
    platforms[2],  // wave 3
    platforms[1],  // wave 4
    platforms[0],  // wave 5 — floor
  ];

  platLevels.forEach((plat, wave) => {
    const bw = 38, bh = 16;
    const cols = Math.floor(plat.w / bw) + 2;
    for (let col = 0; col < cols; col++) {
      const localX = col * bw - 4;
      const bx = plat.x + localX;
      // Tilt-adjusted y at this x position
      const mid = plat.x + plat.w / 2;
      const rad = plat.tilt * Math.PI / 180;
      const by = plat.y + Math.tan(rad) * (bx - mid);

      bricks.push({
        x: bx,
        startY: by,
        y: by,
        w: bw - 2, h: bh - 2,
        // Cascade outward from center — inner bricks fall first
        vx: (col - cols/2) * 12 + (Math.random()-0.5) * 40,
        vy: 0,
        rot: 0,
        rotV: (Math.random()-0.5) * 6,
        // Delay cascades: wave controls which platform, col controls inside-out order
        // Inner columns (closer to center) go first within each wave
        delay: wave * 0.25 + Math.abs(col - cols/2) * 0.03 + Math.random()*0.05,
        active: false,
        wave,
        color: `hsl(${35+wave*8},${22+Math.random()*18}%,${42+Math.random()*18}%)`
      });
    }
  });
}

function drawEscalatorStructure(animT) {
  const dx = ESC_X2 - ESC_X1, dy = ESC_Y2 - ESC_Y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(ESC_X1, ESC_Y1);
  ctx.rotate(ang);

  // Glass tube / enclosure — the character is hidden inside this
  ctx.fillStyle = 'rgba(180,220,255,0.12)';

  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, -26); ctx.lineTo(len, -26); ctx.stroke();

  // Gold handrail bottom
  ctx.strokeStyle = '#b8960c';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 18); ctx.lineTo(len, 18); ctx.stroke();

  // Moving steps inside
  const stepSpacing = 28;
  const scrollOffset = (animT * 60) % stepSpacing;
  ctx.strokeStyle = 'rgba(212,175,55,0.7)';

  for (let sx = -scrollOffset; sx < len + 10; sx += stepSpacing) {

    ctx.beginPath(); ctx.moveTo(sx + 16, -20); ctx.lineTo(sx + 16, -4); ctx.stroke();

  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(-12, -40, 12, 80);

  // Gold trim strips
  ctx.fillStyle = '#d4af37';

  // Base platform at bottom entry
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(ESC_X1 - 20, ESC_Y1 - 4, 50, 8);

  ctx.fillRect(ESC_X2 - 20, ESC_Y2 - 4, 50, 8);
}

// ─────────────────────────────────────────────
//  PLATFORM DRAWING
// ─────────────────────────────────────────────
function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h/2);
  ctx.rotate(p.tilt * Math.PI / 180);
  const hw = p.w/2, hh = p.h/2;
  // Shadow
  ctx.fillStyle = '#6b5220';
  ctx.fillRect(-hw+3, -hh+4, p.w, p.h);
  // Body
  const pg = ctx.createLinearGradient(0,-hh,0,hh);
  pg.addColorStop(0,'#e8c46a'); pg.addColorStop(0.3,'#c8a44a'); pg.addColorStop(1,'#9a7830');
  ctx.fillStyle = pg;
  ctx.fillRect(-hw,-hh,p.w,p.h);
  // Rivet bolts
  ctx.fillStyle = '#6b5220';
  for (let rx = -hw+14; rx < hw-14; rx += 38) {
    ctx.beginPath(); ctx.arc(rx, 0, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8a44a';
    ctx.beginPath(); ctx.arc(rx-0.5,-0.5,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b5220';
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  LADDER DRAWING
// ─────────────────────────────────────────────
function drawLadder(l) {
  const {x, y, h} = l;
  // Rails
  const lg = ctx.createLinearGradient(x,0,x+LADDER_W,0);
  lg.addColorStop(0,'#c8a800'); lg.addColorStop(0.5,'#f0d020'); lg.addColorStop(1,'#c8a800');
  ctx.fillStyle = lg;
  ctx.fillRect(x, y, 4, h);
  ctx.fillRect(x+LADDER_W-4, y, 4, h);
  // Rungs
  for (let ry = y+8; ry < y+h-4; ry+=16) {
    ctx.fillStyle = '#a08800';
    ctx.fillRect(x+4, ry, LADDER_W-8, 5);
    ctx.fillStyle = '#d4b000';
    ctx.fillRect(x+4, ry, LADDER_W-8, 2);
  }
}

// ─────────────────────────────────────────────
//  TV (small, on top platform)
// ─────────────────────────────────────────────
function drawTV(x, y, label, t) {
  const w=36, h=30;
  // Stand
  ctx.fillStyle='#222244';
  ctx.fillRect(x+w/2-3,y+h,6,7);
  ctx.fillRect(x+w/2-8,y+h+6,16,3);
  // Case
  ctx.fillStyle='#1a1a3a';
  ctx.strokeStyle='#4444aa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill(); ctx.stroke();
  // Bezel
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.fill();
  // Screen
  ctx.save();
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.clip();
  ctx.fillStyle = label==='CNN' ? '#0d0808' : '#08080d';
  ctx.fillRect(x+3,y+3,w-6,h-9);
  // Scan band
  const sb = ((t*25)%(h-9))+y+3;
  ctx.fillStyle = label==='CNN' ? 'rgba(255,50,50,0.15)':'rgba(50,100,255,0.15)';
  ctx.fillRect(x+3,sb,w-6,5);
  // Static noise
  for(let ni=0;ni<6;ni++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.06})`;
    ctx.fillRect(x+3+Math.random()*(w-6), y+3+Math.random()*(h-9), Math.random()*8+2, 1);
  }
  // Tiny text
  ctx.fillStyle = label==='CNN'?'#ff4444':'#4488ff';
  ctx.font='4px monospace'; ctx.textAlign='left';
  ctx.fillText('BREAKING',x+4,y+10);
  ctx.fillStyle='#aaa'; ctx.fillText('LIVE',x+4,y+15);
  // Scan lines overlay
  for(let sl=y+3;sl<y+h-6;sl+=2){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(x+3,sl,w-6,1);
  }
  ctx.restore();
  // Power LED
  ctx.fillStyle=label==='CNN'?'#ff2200':'#0055ff';
  ctx.beginPath(); ctx.arc(x+w-6,y+h-5,2,0,Math.PI*2); ctx.fill();
  // Label
  ctx.fillStyle=label==='CNN'?'#cc0000':'#0033bb';
  ctx.fillRect(x+3,y+h-8,w-6,7);
  ctx.fillStyle='#fff'; ctx.font='bold 5px monospace'; ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h-3);
}

// ─────────────────────────────────────────────
//  TICKER
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
//  TOUCH CONTROL BOXES
// ─────────────────────────────────────────────
const BW = 90, BH = 75;
const boxLeft  = { x: 0,      y: H-BH,       w: BW,   h: BH, action:'left'  };
const boxRight = { x: BW,     y: H-BH,       w: BW,   h: BH, action:'right' };
const boxJump  = { x: 0,      y: H-BH*2,     w: BW*2, h: BH, action:'jump'  };
const boxUp    = { x: W-BW, y: H*0.45,      w: BW, h: BH, action:'up'    };
const boxDown  = { x: W-BW, y: H*0.45+BH,   w: BW, h: BH, action:'down'  };
const boxJump2 = { x: W-BW, y: H*0.45-BH,   w: BW, h: BH, action:'jump'  };
const boxJump3 = { x: W-BW, y: H*0.45+BH*2, w: BW, h: BH, action:'jump'  };
const allBoxes = [boxLeft, boxRight, boxJump, boxJump2, boxJump3, boxUp, boxDown];

function getBoxAt(tx, ty) {
  for (const b of allBoxes) {
    if (tx>=b.x && tx<=b.x+b.w && ty>=b.y && ty<=b.y+b.h) return b;
  }
  return null;
}

function applyTouchState() {
  touch.left=touch.right=touch.climbUp=touch.climbDown=false;
  for (const id in activeTouches) {
    const a = activeTouches[id].action;
    if (a==='left')  touch.left=true;
    if (a==='right') touch.right=true;
    if (a==='up')    touch.climbUp=true;
    if (a==='down')  touch.climbDown=true;
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (state !== 'GAMEPLAY') { skipToGame(); return; }
  canvas.setPointerCapture(e.pointerId);
  const r=canvas.getBoundingClientRect();
  const tx=(e.clientX-r.left)/scale, ty=(e.clientY-r.top)/scale;
  const b=getBoxAt(tx,ty);
  activeTouches[e.pointerId]={action:b?b.action:null,box:b};
  if (b&&b.action==='jump') { touch.jump=true; setTimeout(()=>{touch.jump=false;},120); }
  applyTouchState();
});
canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!(e.pointerId in activeTouches)) return;
  const r=canvas.getBoundingClientRect();
  const tx=(e.clientX-r.left)/scale, ty=(e.clientY-r.top)/scale;
  const b=getBoxAt(tx,ty);
  const prev=activeTouches[e.pointerId];
  if (b&&b.action==='jump'&&prev.action!=='jump') { touch.jump=true; setTimeout(()=>{touch.jump=false;},120); }
  activeTouches[e.pointerId]={action:b?b.action:null,box:b};
  applyTouchState();
});
canvas.addEventListener('pointerup',     e=>{delete activeTouches[e.pointerId]; applyTouchState();});
canvas.addEventListener('pointercancel', e=>{delete activeTouches[e.pointerId]; applyTouchState();});

// iOS Safari fallback — touch events in case pointer events don't fire
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if (state !== 'GAMEPLAY') { skipToGame(); return; }
  for (const t of e.changedTouches) {
    const r=canvas.getBoundingClientRect();

// Block 3 — canvas-path heart. cx,cy is the visual center; size is full width.
function drawHeart(cx, cy, size, filled) {
  const s = size;
  ctx.beginPath();
  // Two-circle top + V-bottom heart, centered at (cx, cy)
  const topY = cy - s * 0.10;
  const lobeR = s * 0.28;
  ctx.moveTo(cx, cy + s * 0.42);
  ctx.bezierCurveTo(cx - s * 0.55, cy + s * 0.05,  cx - s * 0.55, cy - s * 0.40,  cx - lobeR, cy - s * 0.40);
  ctx.bezierCurveTo(cx - s * 0.10, cy - s * 0.40,  cx,            topY,           cx,         cy - s * 0.05);
  ctx.bezierCurveTo(cx,            topY,           cx + s * 0.10, cy - s * 0.40,  cx + lobeR, cy - s * 0.40);
  ctx.bezierCurveTo(cx + s * 0.55, cy - s * 0.40,  cx + s * 0.55, cy + s * 0.05,  cx,         cy + s * 0.42);
  ctx.closePath();
  if (filled) {
    ctx.fillStyle = '#ff4444';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#992222';
    ctx.stroke();
  } else {
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = '#883333';
    ctx.stroke();
  }
}

function drawHUD() {
  ctx.fillStyle='rgba(0,0,10,0.88)'; ctx.fillRect(0,0,W,30);
  // Block 3 — three hearts: filled = remaining, outlined = lost
  const heartSize = 14, heartGap = 4, startX = 8 + heartSize / 2, heartY = 15;
  for (let i = 0; i < 3; i++) {
    drawHeart(startX + i * (heartSize + heartGap), heartY, heartSize, i < player.lives);
  }
  ctx.fillStyle='#ffffff'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
  ctx.fillText('DNC vs DJT', W/2, 21);
  ctx.fillStyle='#ffcc00'; ctx.textAlign='right';
  // Block D — real score + multiplier badge (only visible while boosted)
  ctx.fillText('SCORE: ' + playerScore, W-8, 21);
  if (multiplier > 1.0) {
    ctx.fillStyle = 'rgba(0,30,15,0.85)';
    ctx.fillRect(W-58, 30, 58, 16);
    ctx.fillStyle = '#44ff88';

  }
}

  drawSprite('barrel_upright', BARREL_X, TOP.y, CAPSULE_R * 4, false, 1.0);

// ─────────────────────────────────────────────

let lastT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts; totalT += dt; stateT += dt;

  // Ticker scroll
  tickX -= 70*dt;
  if (tickX < -(ctx.measureText(TICKER).width||1200)) tickX = W;

  // Star twinkle
  stars.forEach(s=>{ s.a+=((Math.random()-0.5)*0.025); s.a=Math.max(0.1,Math.min(1,s.a)); });

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.life-=p.decay*dt;
  });
  particles=particles.filter(p=>p.life>0);

  // Shake decay
  if (shakeAmt>0) shakeAmt=Math.max(0,shakeAmt-18*dt);

  // State transitions
  switch(state) {
    case 'INTRO_BLACK':
      if(stateT>1.4){state='INTRO_TITLE';stateT=0;} break;

    case 'INTRO_TITLE':
      if(stateT>2.8){state='INTRO_ESCALATOR';stateT=0;esc={x:W+60,y:H-110,phase:'walk',t:0,progress:0,armSwing:0};} break;

    case 'INTRO_ESCALATOR':
      esc.t+=dt; esc.armSwing=totalT;
      if(esc.phase==='walk'){
        esc.x-=90*dt; // walk left toward escalator entry
        if(esc.x<=ESC_X1+10){esc.phase='rise';esc.progress=0;}
      } else {
        esc.progress=Math.min(esc.progress+dt/3.5,1); // 3.5s ride
        // interpolate along escalator line
        esc.x=ESC_X1+(ESC_X2-ESC_X1)*esc.progress;
        esc.y=ESC_Y1+(ESC_Y2-ESC_Y1)*esc.progress;
        if(esc.progress>=1&&stateT>5.5){
          state='INTRO_STAIRS'; stateT=0;
          stairsPhase='walk'; stairsX=-60; stairsY=H-110; stairsT=0;
        }
      }
      break;

    case 'INTRO_STAIRS':
      stairsT+=dt;
      if(stairsPhase==='walk'){
        stairsX+=110*dt;
        // Zoom in during walk: 0→2.5s ease from establishing shot to final zoom
        const zp = Math.min(stairsT / 2.5, 1);
        const ze = zp * zp * (3 - 2 * zp); // smoothstep easing
        zoomS  = ZOOM_S_START  + (ZOOM_S_END  - ZOOM_S_START)  * ze;
        zoomOx = ZOOM_OX_START + (ZOOM_OX_END - ZOOM_OX_START) * ze;
        zoomOy = ZOOM_OY_START + (ZOOM_OY_END - ZOOM_OY_START) * ze;
        if(stairsX>=STAIR_MID_X-10){stairsPhase='climb';}
      } else if(stairsPhase==='climb'){
        // Walk up the stairs — 11 steps, each ~17px rise
        const climbDur=3.0;
        const prog=Math.min(stairsT/climbDur,1); // stairsT resets at phase change
        // stairs go from bottom step (y≈794) up to top step (y≈607)
        stairsX=STAIR_MID_X+(prog*0)  ; // stays roughly centered
        stairsY=794 - prog*(794 - STAIR_TOP_Y);
        if(prog>=1){stairsPhase='top'; stairsT=0;}
      } else if(stairsPhase==='top') {
        // Block C — walk from stair center to gameplay position (DTJ_GAMEPLAY_X=320),
        // bidirectional in case future layouts put DTJ left or right of STAIR_MID_X.
        const targetX = DTJ_GAMEPLAY_X;
        const walkSpeed = 80;        // px per second
        stairsY = TOP.y;
        const dx = targetX - stairsX;
        if (Math.abs(dx) > walkSpeed * dt) {
          stairsX += Math.sign(dx) * walkSpeed * dt;
        } else {
          // Reached target — hold briefly then transition
          stairsX = targetX;
          if (stairsT > 1.2) {       // 1.2s at top before taunt
            state='INTRO_TAUNT'; stateT=0; tauntArm=0; tauntBubble=0;
          }
        }
      }
      break;

    case 'INTRO_TAUNT':

      // Phase 2 (2.5s+): DTJ raises arms, yells FAKE NEWS
      if(stateT < 2.5) {
        tauntArm = 0;
        tauntBubble = 0;
      } else {
        tauntArm = Math.min((stateT-2.5)/0.9, 1);
        tauntBubble = stateT > 3.2 ? Math.min((stateT-3.2)/0.5, 1) : 0;
      }
      if(stateT > 6.0){
        state='INTRO_SHATTER';stateT=0;shatterT=0;rampReveal=0;buildingFade=1;
        initBricks();
        boom(W/2,300,36,true);
        shakeAmt=14;
      }
      break;

    case 'INTRO_SHATTER':
      shatterT+=dt;
      // Building fades out
      buildingFade=Math.max(1-shatterT*1.2,0);

      bricks.forEach(b=>{
        if(shatterT>b.delay){
          b.active=true;
          b.vy+=400*dt;
          b.y+=b.vy*dt;
          b.x+=b.vx*dt;
          b.rot+=b.rotV*dt;
          if(!b.exploded && b.y>b.startY+30){
            b.exploded=true;
            boom(b.x+b.w/2, b.y+b.h/2, 2);
          }

      // Shake on first hit
      if(shatterT>0.5&&shatterT<0.55){ shakeAmt=10; boom(W/2,500,28,true); }
      if(shatterT>1.2&&shatterT<1.25){ shakeAmt=8; }
      if(shatterT>3.5){ state='GAMEPLAY'; stateT=0; particles=[]; bricks=[]; capsules.length=0; capsuleSpawnT=0; capsuleSpawnInterval=2.5+Math.random()*2.0; dtjAnimState='IDLE'; dtjAnimT=0; dtjAnimX=DTJ_GAMEPLAY_X; helpers.length=0; player.lives=3; player.invulnT=0; playerScore=0; multiplier=1.0; multiplierT=0; pickupSpawnTimer=0; pickupRespawnDelay=0; pickup.active=false; spawnFirstPickup(); pelosi.active=false; pelosi.phase='IDLE'; pelosi.phaseT=0; pelosi.timer=PELOSI_INTERVAL_MIN+Math.random()*(PELOSI_INTERVAL_MAX-PELOSI_INTERVAL_MIN); pelosi.facing=-1; pelosi.targetCapsule=null; pelosiFlash.active=false; tornPieces.length=0; }
      break;
  }

  // ── RENDER ───────────────────────────────
  ctx.clearRect(0,0,W,H);

  switch(state) {

    case 'INTRO_BLACK': {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      const a=Math.min(stateT/0.9,1);
      ctx.globalAlpha=a;
      ctx.fillStyle='#cc0000'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText('● INSERT QUARTER ●',W/2,H/2);
      ctx.globalAlpha=1;

    }

    case 'INTRO_TITLE': {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);

      ctx.shadowBlur=0;
      ctx.fillStyle='#ffcc00'; ctx.font='bold 22px monospace';
      ctx.fillText('vs.',W/2,H/2-28);
      ctx.shadowColor='#4466ff'; ctx.shadowBlur=20;
      ctx.fillStyle='#ffffff'; ctx.font='bold 44px monospace';
      ctx.fillText('DJT',W/2,H/2+24);
      ctx.shadowBlur=0;
      ctx.fillStyle='#888'; ctx.font='10px monospace';
      ctx.fillText('CLIMB THE TOWER OF POWER',W/2,H/2+62);
      ctx.fillStyle='#333'; ctx.font='9px monospace';
      ctx.fillText('© SATIRE ENTERTAINMENT  ★  ALL FICTIONAL',W/2,H-28);
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='10px monospace';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-10);
      break;
    }

    case 'INTRO_ESCALATOR': {
      drawNightCity();

      // Draw escalator FIRST (back layer)
      drawEscalatorStructure(esc.t);

      // Character — hidden inside escalator glass during 'rise'
      if(esc.phase==='walk'){
        // Walking toward escalator from right — fully visible
        // DTJ walking in escalator — use walk sprite, flip to face left
        // Djt_walk2 already faces left — no flip needed
        const escWalkFrame = Math.floor(esc.armSwing * 3) % 2 === 0 ? 'dtj_walk2' : 'dtj_walk';

      ctx.globalAlpha = tvAlpha;
      drawTV(tauntSY - 80, tauntSY - 100, 'CNN', totalT);
      drawTV(tauntSY + 40, tauntSY - 100, 'MSNBC', totalT);
      ctx.globalAlpha = 1;
      if(stateT < 2.5) {
        const phrases = ['RUSSIA HOAX!', 'INSURRECTION!', 'THREAT TO DEMOCRACY!'];
        const pi = Math.floor(stateT * 1.2) % phrases.length;
        const pa = Math.sin(stateT * 3) * 0.5 + 0.5;
        ctx.globalAlpha = pa;
        ctx.fillStyle = '#ff4444'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        ctx.fillText(phrases[pi], stairsX - 40, tauntSY - 130 - (stateT % 0.8) * 20);
        ctx.globalAlpha = 1;
      }
      // Taunt — phase 1: idle, phase 2: djt6 arm raise
      const tauntSprite = stateT >= 2.5 ? 'djt6' : 'dtj_idle';
      drawSprite(tauntSprite, stairsX, stairsY, 110);
      if(tauntBubble>0.05) drawBubble(stairsX+30, stairsY-80, 'FAKE NEWS!', tauntBubble);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-12);
      break;
    }

    case 'INTRO_SHATTER': {
      // Fading building behind — keep final zoom
      if(buildingFade>0){
        ctx.save();
        ctx.translate(ZOOM_OX_END, ZOOM_OY_END);
        ctx.scale(ZOOM_S_END, ZOOM_S_END);
        drawLincolnBuilding(buildingFade);
        ctx.restore();
      }

      // Gameplay grid phasing in
      if(rampReveal>0){
        ctx.globalAlpha=rampReveal;
        drawGameplay(false);
        ctx.globalAlpha=1;
      }

      // Bricks tumbling
      const shakeX=(Math.random()-0.5)*shakeAmt;
      const shakeY=(Math.random()-0.5)*shakeAmt;
      ctx.save(); ctx.translate(shakeX,shakeY);
      bricks.forEach(b=>{
        if(!b.active) return;
        ctx.save();
        ctx.translate(b.x+b.w/2, b.y+b.h/2);
        ctx.rotate(b.rot);
        ctx.fillStyle=b.color;
        ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
        // Mortar line
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
        ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.fillRect(-b.w/2,-b.h/2,b.w,3);
        ctx.restore();
      });
      ctx.restore();

      // DTJ stays at his platform position during shatter
      if(buildingFade > 0 || rampReveal < 1) {
        ctx.globalAlpha = Math.max(buildingFade, rampReveal);
        drawSprite('dtj_idle', DTJ_GAMEPLAY_X, TOP.y, 110);
        ctx.globalAlpha = 1;
      }

      // Particles
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;

      // Screen flash on big impacts
      if(shatterT<0.12){
        ctx.fillStyle=`rgba(255,255,255,${(0.12-shatterT)/0.12*0.7})`;
        ctx.fillRect(0,0,W,H);
      }
      if(shatterT>0.5&&shatterT<0.62){
        ctx.fillStyle=`rgba(255,180,0,${(0.62-shatterT)/0.12*0.5})`;
        ctx.fillRect(0,0,W,H);
      }
      break;
    }

    case 'GAMEPLAY': {
      updatePlayer(dt);
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      drawGameplay(shakeAmt>0);
      // Particles leftover
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      // Press to start
      if(stateT<4){
        const ba=Math.sin(stateT*4)>0;
        if(ba){
          ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H/2-55,W,75);
          ctx.fillStyle='#ffcc00'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
          ctx.fillText('PRESS ANY KEY TO PLAY',W/2,H/2-16);
          ctx.fillStyle='#aaa'; ctx.font='11px monospace';
          ctx.fillText('← → MOVE   SPACE JUMP   A=UP  Z=DOWN',W/2,H/2+14);
        }
      }
      break;
    }
  }
}

requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
