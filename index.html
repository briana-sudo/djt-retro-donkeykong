const PICKUP_SIZE          = 36;          // G6 — 1.5x base sprite size (was 72 in Block D, halved in G6)
const PICKUP_HOVER_PX      = 40;          // height above platform surface
// H2 — full scoring constants per Notion locked table.
// P-DIFFICULTY-1: SCORE_PER_SECOND removed (per-second survival scoring deleted entirely).
// const SCORE_PER_SECOND   = 10;         // survival, multiplied by multiplier
const CAPSULE_CLEAR_SCORE   = 100;        // capsule passes player x without colliding ("jumped over")
const HELPER_KILL_SCORE     = 150;        // Antifa or Zombie destroys a capsule
const BRIEFCASE_SCORE       = 250;        // briefcase pickup collected
const PLATFORM_REACH_BONUS  = 500;        // first time per life on each platform (excluding spawn FLOOR)
const TIME_BONUS_PER_SECOND = 20;         // P-DIFFICULTY-1: bumped 10→20 to compensate for survival removal
const TARGET_TIME           = 120;        // seconds; tune later

// P-DIFFICULTY-1 — level state + 10-level difficulty parameter table.
// currentLevel: 1 fresh game; resetForLevelTransition increments, resetForGameOver = 1.
// DK-GATE-PHASE-2 cleanup: firstCapsuleDropped, ladderTime, forceNextDropAtLadder
// all REMOVED — all four legacy drop-bias behaviors and dead state deleted in
// favor of shouldDropDownLadder() which carries no module-level state of its own.
let currentLevel        = 1;
// P-DIFFICULTY-1-FIX BUG 8: 3s level-start movement lock. Set to 3.0 in
// _resetEntitiesAndPerLevel; ticked down + early-returns updatePlayer while > 0.
// First capsule fires immediately (capsuleSpawnT primed in same helper) so by
// the time the lock releases, the capsule has cascaded down toward the player.
let levelStartLockT     = 0;
// DK-CLIMBER-TIMER: continuous-ladder-time accumulator. Ticks per dt while
// player.onLadder; resets to 0 the moment they leave. Read in
// shouldDropDownLadder()'s Step 0 (DK-CLIMBER-PROTECT): when climberCampT
// reaches CLIMBER_CAMP_SEC (20s), the 16px climber-protection lapses for
// THIS player and all ladders go hostile until the player gets off and
// back on. Forces forward motion. Per-player not per-ladder by design.
let climberCampT        = 0;
// DK-DIAGONAL-THROW: counts every spawnCapsule call that successfully pushes
// (incremented after MAX_CAPSULES bail). throwCounter === 1 → first throw of
// the level → ALWAYS diagonal. Subsequent throws: every getDiagonalEveryN(level)
// throws are diagonal. Reset to 0 on level transition / game over / skipToGame
// so each level's first throw fires diagonal.
let throwCounter        = 0;
// DK-DIFFICULTY-RAMP: in-level timer + effective dkDifficulty per arcade DK
// (Don Hodges Z80 disasm, memory location #6380). dkDifficultyEffective starts
// at min(currentLevel, 5) on level entry / respawn / game-over / skipToGame,
// and bumps by 1 every DK_DIFFICULTY_RAMP_INTERVAL (33s) of in-level survival,
// capped at 5. Read by shouldDropDownLadder() Step 2 via call-site override
// of getLevelParams().dkDifficulty so the table value stays a fresh-life base.
const DK_DIFFICULTY_RAMP_INTERVAL = 33.0;   // seconds per ramp bump
let levelTime               = 0;
let dkDifficultyEffective   = 1;             // recomputed at every reset; init defensive

// 10-level parameter table. Index = currentLevel - 1 (clamped to 9 for L11+ which
// reuses L10 row; winBonus extends linearly via getLevelParams).
// Columns: capsuleSpeedMult, spawnIntervalAvg, spawnVariance, fastDropOn,
//          ladderDropChance, pelosiInterval, antifaWaveSize, winBonus,
//          dkDifficulty
// P-DIFFICULTY-1-FIX BUG 11: ladderDropChance ([4] column) curve was revised per Brian
// field test. DK-GATE-PHASE-2: ladderDropChance is now UNUSED (shouldDropDownLadder
// uses dkDifficulty exclusively). Column kept at 0.00 as legacy placeholder; safe to
// remove in a future cleanup commit. antiCampSec column REMOVED in Phase 2 (was
// column [5]; subsequent columns shifted left by one index).
//
// DK-GATE-PHASE-1+2: dkDifficulty (now column [8] post-antiCampSec removal) drives
// the arcade-faithful drop routine per Don Hodges' Z80 disassembly of original DK
// arcade ROM (addresses $2178-$219E). Step-2 pass rates per ROM formula
// `threshold = floor(diff/2) + 1`, drop if roll<threshold over roll∈{0,1,2}:
//   diff=1 → 33% pass, diff=2-3 → 67% pass, diff=4-5 → 100% pass.
// Adjacent-value adjustments (2→3, 4→5) are NO-OPS by design — three plateaus
// matches the ROM's coarse curve.
//
// DK-GATE-PHASE-3: dkDifficulty starting values revised to match arcade DK
// exactly per Don Hodges Z80 disasm: "this difficulty level starts out as the
// same as the level number, up to a maximum of 5." So L1=1, L2=2, L3=3, L4=4,
// L5+=5. Combined with DK-DIFFICULTY-RAMP's 33s in-level bumps, every level
// reaches difficulty 5 within 132 seconds. Earlier levels start gentler than
// the prior phase-1 curve (which used three plateaus 1/2/3/4/5 spread across
// L1-L9-L10 pairs) — gives players a real ramp-in.
//
// DK-GATE-PHASE-3 (capsuleSpeedMult plateau): per Donkey Blog
// (http://donkeykongblog.blogspot.com/2012/11/understanding-pace.html):
// "Beginning at Level 5, the game reaches a plateau in its internal difficulty
// setting, which controls factors such as the number of points available on
// the bonus timer, the speed and quantity of obstacles, and the character of
// 'wild' barrels. It remains at that plateau all the way through Level 21."
// New curve: L1=1.00, L2=1.15, L3=1.30, L4=1.45, L5=1.60, L6-L10=1.60 (held).
// Same L1 floor + same ceiling as prior linear curve, sharper L1→L5 ramp,
// plateau from L5 onward. The Math.min(currentLevel,10) clamp at line ~3907
// ensures L11+ also reads L10's value (1.60) — defensive even though L5-L10
// are equal.
const DIFFICULTY_TABLE = [
  [1.00, 2.5, 0.30, true, 0.00, 25, 1, 2000, 1],   // L1   speed=1.00  dkDiff=1 (33%)
  [1.15, 2.3, 0.28, true, 0.00, 23, 1, 2400, 2],   // L2   speed=1.15  dkDiff=2 (67%)
  [1.30, 2.1, 0.25, true, 0.00, 21, 1, 2800, 3],   // L3   speed=1.30  dkDiff=3 (67% — same as 2)
  [1.45, 1.9, 0.23, true, 0.00, 19, 2, 3200, 4],   // L4   speed=1.45  dkDiff=4 (100%)
  [1.60, 1.7, 0.21, true, 0.00, 18, 2, 3600, 5],   // L5   speed=1.60  dkDiff=5 (100% — plateau begins)
  [1.60, 1.6, 0.20, true, 0.00, 16, 2, 4000, 5],   // L6   speed=1.60  dkDiff=5 (plateau)
  [1.60, 1.4, 0.18, true, 0.00, 15, 3, 4400, 5],   // L7   speed=1.60  dkDiff=5 (plateau)
  [1.60, 1.3, 0.17, true, 0.00, 14, 3, 4800, 5],   // L8   speed=1.60  dkDiff=5 (plateau)
  [1.60, 1.2, 0.16, true, 0.00, 13, 3, 5200, 5],   // L9   speed=1.60  dkDiff=5 (plateau)
  [1.60, 1.0, 0.15, true, 0.00, 12, 3, 6000, 5],   // L10  speed=1.60  dkDiff=5 (plateau)
];

function getLevelParams() {
  const idx = Math.min(currentLevel, 10) - 1;
  const row = DIFFICULTY_TABLE[idx];
  return {
    capsuleSpeedMult:  row[0],
    spawnIntervalAvg:  row[1],
    spawnVariance:     row[2],
    fastDropOn:        row[3],
    ladderDropChance:  row[4],
    pelosiInterval:    row[5],
    antifaWaveSize:    row[6],
    winBonus:          currentLevel <= 10 ? row[7] : 6000 + (currentLevel - 10) * 400,
    dkDifficulty:      row[8],
  };
}
const BRIEFCASE_RESPAWN_MIN = 8.0;
const BRIEFCASE_RESPAWN_MAX = 12.0;
const MULT_BASE            = 1.0;
const MULT_ADD             = 0.6;
const MULT_MAX             = 3.0;
const MULT_DURATION        = 5.0;
const MULT_DECAY_RATE      = 0.6;         // per second after timer expires
// Player score + multiplier state.
let playerScore = 0;
let multiplier = MULT_BASE;
let multiplierT = 0;       // seconds remaining at current boosted multiplier; 0 → multiplier decays
let levelStartTime = 0;    // totalT when GAMEPLAY entered; used for time-bonus on win
// I5 — per-category stats tally for the cutscene score breakdown. survivalScore tracks the actual
// multiplier-applied survival points (so the breakdown's Survival line matches reality). The
// counts (clearedCount, helperKillCount, briefcaseCount, platformCount, pelosiCount) are event
// counts shown × base score in the breakdown — the multiplier-adjusted contribution lives in
// playerScore (TOTAL line). winBonus and timeBonus are flat amounts captured at triggerWin.
const stats = {
  survivalScore:    0,
  clearedCount:     0,
  helperKillCount:  0,
  briefcaseCount:   0,
  platformCount:    0,
  pelosiCount:      0,
  timeBonus:        0,
  winBonus:         0,
};
function resetStats() {
  // P-DIFFICULTY-1: stats.survivalScore field removed from active scoring; left
  // initialized to 0 for backwards-compat in case any debug/save path reads it.
  stats.survivalScore = 0;
  stats.clearedCount = 0;
  stats.helperKillCount = 0;
  stats.briefcaseCount = 0;
  stats.platformCount = 0;
  stats.pelosiCount = 0;
  stats.timeBonus = 0;
  stats.winBonus = 0;
}
const pickup = { active: false, x: 0, baseY: 0, y: 0, bobPhase: 0 };
let pickupSpawnTimer = 0;  // counts up while !active; spawns next when >= pickupRespawnDelay
let pickupRespawnDelay = 0;
// H2 — score-float entities. Small "+N" text that floats up and fades out near each scoring event.
const scoreFloats = [];
const SCORE_FLOAT_LIFETIME = 0.7;
function addScoreFloat(x, y, text, color) {
  scoreFloats.push({ x: x, y: y, text: text, color: color || '#ffeb70', t: 0 });
}
// H2 — helper that bumps score, optionally with multiplier, and spawns a score-float.
function addScore(amount, useMult, x, y, color) {
  const pts = useMult ? Math.round(amount * multiplier) : Math.round(amount);
  playerScore += pts;
  if (typeof x === 'number' && typeof y === 'number') {
    addScoreFloat(x, y, '+' + pts, color);
  }
  return pts;
}

// Middle platforms (excludes TOP at index 5 and FLOOR at index 0)
const MIDDLE_PLATFORM_INDICES = [1, 2, 3, 4];

function spawnPickupOnPlatform(plat, fixedX) {
  // C4 — pickup floats just below the underside of the NEXT platform up. Top of briefcase sits
  // 4px below platAbove.y + PLAT_H. baseY is the foot position (footFrac=1.0), so baseY equals
  // platAbove.y + PLAT_H + 4 + PICKUP_SIZE. Player must make a maximum jump from the host
  // platform to reach the bottom of the bob. platforms[idx+1] is the platform above idx.
  const margin = 28;
  const px = (typeof fixedX === 'number')
    ? fixedX
    : plat.x + margin + Math.random() * (plat.w - 2 * margin);
  pickup.x = px;
  const idx = platforms.indexOf(plat);
  const platAbove = (idx >= 0 && idx + 1 < platforms.length) ? platforms[idx + 1] : null;
  if (platAbove) {
    pickup.baseY = platAbove.y + PLAT_H + 4 + PICKUP_SIZE;
  } else {
    // Defensive fallback (no platform above) — shouldn't trigger for MIDDLE_PLATFORM_INDICES.
    pickup.baseY = getPlatY(plat, px) - PICKUP_HOVER_PX;
  }
  pickup.y = pickup.baseY;
  pickup.bobPhase = 0;
  pickup.active = true;
  playSfx_briefcaseAppear();                                     // N — shimmer when briefcase appears
}

function spawnFirstPickup() {
  // First pickup always above P4 (one level under TOP), centered. Reuses spawnPickupOnPlatform
  // so the platform-above lookup logic (TOP) lives in one place.
  const p4 = platforms[4];
  spawnPickupOnPlatform(p4, p4.x + p4.w / 2);
}

function updatePickup(dt) {
  // Multiplier decay — H2: smooth ramp instead of snap.
  // While timer > 0: multiplier holds at boosted value.
  // After timer expires: multiplier eases back to MULT_BASE at MULT_DECAY_RATE per second
  // (e.g. from 3.0 → 1.0 takes ~3.3s).
  if (multiplierT > 0) {
    multiplierT = Math.max(0, multiplierT - dt);
  } else if (multiplier > MULT_BASE) {
    multiplier = Math.max(MULT_BASE, multiplier - MULT_DECAY_RATE * dt);
  }

  if (!pickup.active) {
    pickupSpawnTimer += dt;
    if (pickupSpawnTimer >= pickupRespawnDelay) {
      const idx = MIDDLE_PLATFORM_INDICES[Math.floor(Math.random() * MIDDLE_PLATFORM_INDICES.length)];
      spawnPickupOnPlatform(platforms[idx]);
      pickupSpawnTimer = 0;
    }
    return;
  }

  // Bob — C4: oscillate from baseY (closest to platform above, no overlap) to baseY+8 (lower).
  // Always >= baseY so the bob never pushes the briefcase INTO the platform above.
  pickup.bobPhase += dt * 2;
  pickup.y = pickup.baseY + (Math.sin(pickup.bobPhase) * 0.5 + 0.5) * 8;

  // AABB collision with player. Hitbox derived from PICKUP_SIZE so it scales with the sprite (G6).
  // Pickup body: x ± (PICKUP_SIZE*0.25), y in [py-PICKUP_SIZE, py] (footFrac=1.0).
  // Player body: x±10, y in [py-32, py-4]. C4: pickup is now at platAbove-underside+4 — requires
  // a maximum jump from the host platform to reach the bottom of the bob.
  const halfW = PICKUP_SIZE * 0.25;
  const overlapX = (pickup.x + halfW > player.x - 10) && (pickup.x - halfW < player.x + 10);
  const overlapY = (pickup.y > player.y - 32) && (pickup.y - PICKUP_SIZE < player.y - 4);
  if (overlapX && overlapY) {
    // Collect — H2: BRIEFCASE_SCORE × current multiplier, then bump multiplier and reset its timer.
    stats.briefcaseCount++;
    addScore(BRIEFCASE_SCORE, true, pickup.x, pickup.y - 20, '#88ff88');
    multiplier = Math.min(multiplier + MULT_ADD, MULT_MAX);
    multiplierT = MULT_DURATION;
    playSfx_briefcasePickup();                                  // N — powerup chime on collect
    // SFX-PACK — real briefcase chime mp3 layered on top of the synth arpeggio.
    if (typeof GAME_SFX !== 'undefined' && GAME_SFX.briefcase_pickup) GAME_SFX.briefcase_pickup.play();
    triggerHelperSpawn('briefcase');
    pickup.active = false;
    pickupSpawnTimer = 0;
    pickupRespawnDelay = BRIEFCASE_RESPAWN_MIN + Math.random() * (BRIEFCASE_RESPAWN_MAX - BRIEFCASE_RESPAWN_MIN);
  }
}

function drawPickup() {
  if (!pickup.active) return;
  drawSprite('briefcase', pickup.x, pickup.y, PICKUP_SIZE, false, 1.0);
}

// ─────────────────────────────────────────────
//  BLOCK E — HELPER SYSTEM v1 (Antifa + Zombie Voter only)
// ─────────────────────────────────────────────
// Spawned by briefcase pickup. Both helpers destroy capsules on contact and never hurt the player.
// Antifa: 5–10 per wave, spawn on FLOOR, walk along platforms toward the nearest up-ladder, climb,
//   repeat until they hit TOP or the 25s safety lifeTimer expires. (G5 — was: float upward
//   ghosting through platforms, which was wrong per Brian's F-deploy feedback.)
// Zombie Voter: 1–2 per wave, spawn on random middle platform, slow patrol, killed by any capsule
//   contact. Behavior unchanged from Block E.
// Sprites use the cached PNG canvases (G1 replacement).
const helpers = [];
const MAX_HELPERS    = 24;
const ANTIFA_SIZE    = 64;       // F6 — 2x of original 32
const ZOMBIE_SIZE    = 72;       // F6 — 2x of original 36
const ANTIFA_WALK_SPD  = 60;     // G5 — Notion spec
const ANTIFA_CLIMB_SPD = 90;     // G5 — Notion spec
const ZOMBIE_SPD     = 40;
const HELPER_LIFE    = 25.0;     // safety auto-despawn
const ZOMBIE_SPRITES = ['zombie_winemom', 'zombie_pinkhair', 'zombie_glasses', 'zombie_dad'];

// G5 — ladder/platform topology helpers. Reuses getPlatY (no duplicated geometry math).
function getLadderBasePlat(lad) {
  // Platform whose surface sits at the ladder's base (lad.y + lad.h). Returns null if none.
  const ladCx = lad.x + LADDER_W / 2;
  for (const plat of platforms) {
    if (ladCx < plat.x - 2 || ladCx > plat.x + plat.w + 2) continue;
    const platY = getPlatY(plat, ladCx);
    if (Math.abs(platY - (lad.y + lad.h)) < 20) return plat;
  }
  return null;
}
function getLadderTopPlat(lad) {
  // Platform whose surface is at or just above the ladder's top (lad.y). Returns null if none.
  // Uses the same x-margin (16) and tolerance window the player's top-exit snap uses.
  const ladCx = lad.x + LADDER_W / 2;
  for (const plat of platforms) {
    if (ladCx < plat.x - 16 || ladCx > plat.x + plat.w + 16) continue;
    const platY = getPlatY(plat, ladCx);
    if (platY > lad.y + 6) continue;        // platform must be at or above ladder top
    if (platY < lad.y - 25) continue;       // not too far above
    return plat;
  }
  return null;
}
function findNearestUpLadder(plat, fromX) {
  let nearest = null, nearestDist = Infinity;
  for (const lad of ladders) {
    if (getLadderBasePlat(lad) !== plat) continue;     // ladder must rise FROM this platform
    const ladCx = lad.x + LADDER_W / 2;
    const d = Math.abs(ladCx - fromX);
    if (d < nearestDist) { nearestDist = d; nearest = lad; }
  }
  return nearest;
}

function spawnAntifaWave() {
  // P-DIFFICULTY-1: per-level multiplier on base 5-10 wave size. L1 mult=1 keeps
  // current 5-10 default; L4-6 mult=2 → 10-20; L7+ mult=3 → 15-30.
  const _waveMult = getLevelParams().antifaWaveSize;
  const n = (5 + Math.floor(Math.random() * 6)) * _waveMult;
  // N-FIX-7 — Macho Man kick is now state-driven. computeDesiredMusic counts ANTIFA helpers
  // each frame and returns MACHO_MAN if any are present; the next tickBGM transitions in.
  // No explicit start/stop call needed here.
  for (let i = 0; i < n; i++) {
    if (helpers.length >= MAX_HELPERS) break;
    const x = FLOOR.x + 20 + Math.random() * (FLOOR.w - 40);
    helpers.push({
      type: 'ANTIFA',
      state: 'WALK',                             // G5 — WALK | CLIMB
      x: x,
      y: FLOOR.y,                                // foot at floor surface
      vx: 0,
      vy: 0,
      w: ANTIFA_SIZE * 0.7,
      h: ANTIFA_SIZE,
      sprite: 'antifa',
      plat: FLOOR,                               // current platform while walking
      targetLad: null,                           // ladder we're walking toward
      currentLad: null,                          // ladder we're currently climbing
      lifeTimer: HELPER_LIFE,
    });
  }
}

function spawnZombieWave() {
  const n = 1 + Math.floor(Math.random() * 2);   // 1–2
  for (let i = 0; i < n; i++) {
    if (helpers.length >= MAX_HELPERS) break;
    const idx = MIDDLE_PLATFORM_INDICES[Math.floor(Math.random() * MIDDLE_PLATFORM_INDICES.length)];
    const plat = platforms[idx];
    const x = plat.x + 20 + Math.random() * (plat.w - 40);
    const sprite = ZOMBIE_SPRITES[Math.floor(Math.random() * ZOMBIE_SPRITES.length)];
    helpers.push({
      type: 'ZOMBIE',
      x: x,
      y: getPlatY(plat, x),
      vx: Math.random() < 0.5 ? -ZOMBIE_SPD : ZOMBIE_SPD,
      vy: 0,
      w: ZOMBIE_SIZE * 0.7,
      h: ZOMBIE_SIZE,
      sprite: sprite,
      plat: plat,
      lifeTimer: HELPER_LIFE,
    });
  }
}

function updateHelpers(dt) {
  for (let i = helpers.length - 1; i >= 0; i--) {
    const h = helpers[i];
    h.lifeTimer -= dt;
    if (h.lifeTimer <= 0) { helpers.splice(i, 1); continue; }

    if (h.type === 'ANTIFA') {
      // K — Antifa RAGDOLL state: thrown by Secret Service. Mirrors player DEATH_REACTION
      // physics. h.ragdollPhase: 'phase1' (spin) | 'phase2' (burst, ~0.4s, debris IS visual).
      // L — Q9 fix: PASS THROUGH P1-P4 during phase 1 (no platform-collision check). Only the
      // FLOOR triggers landing. Antifa get the full-height fall before splat — much funnier
      // than mid-air landings on intermediate platforms. Off-screen-bottom + 0.8s timeout
      // safeties retained.
      if (h.state === 'RAGDOLL') {
        h.ragdollT += dt;
        if (h.ragdollPhase === 'phase1') {
          const prevY = h.y;
          h.x += h.deathVx * dt;
          h.y += h.deathVy * dt;
          h.deathVy += GRAVITY * dt;
          h.deathRotation += 720 * dt;
          // L — FLOOR-only landing detection (replaces K's any-platform check). Crossing
          // FLOOR.y while traveling downward triggers phase 2.
          let landed = false;
          if (h.deathVy > 0 && prevY <= FLOOR.y && h.y >= FLOOR.y) {
            landed = true;
          }
          const fellThrough = h.y > FLOOR.y + DEATH_BURST_FALL_TRIGGER;
          const cappedOut   = h.ragdollT >= DEATH_PHASE1_MAX_DURATION;
          if (landed || fellThrough || cappedOut) {
            h.ragdollPhase = 'phase2';
            h.ragdollPhaseT = 0;
            spawnRagdollBurst(h.x, h.y - h.h * 0.5, DEATH_DEBRIS_COUNT);
            playSfx_antifaSplat();                            // N — splat on Antifa landing
          }
        } else {
          // phase2 — Antifa sprite suppressed in drawHelpers; debris IS the visual. After
          // RAGDOLL_DEBRIS_LIFE seconds, the entity itself despawns (debris drains in main loop).
          h.ragdollPhaseT += dt;
          if (h.ragdollPhaseT >= RAGDOLL_DEBRIS_LIFE) {
            helpers.splice(i, 1);
            continue;
          }
        }
        continue;                                        // skip normal AI + capsule overlap below
      }
      // K — Antifa being held by SS in GRAB phase: SS controls position; skip AI.
      if (h.grabbed) continue;
      // G5 — walk current platform toward nearest up-ladder, climb it, repeat.
      if (h.state === 'WALK') {
        // Refresh target ladder if we don't have one or our platform changed under us.
        if (!h.targetLad || getLadderBasePlat(h.targetLad) !== h.plat) {
          h.targetLad = findNearestUpLadder(h.plat, h.x);
        }
        if (h.targetLad) {
          const ladCx = h.targetLad.x + LADDER_W / 2;
          const dx = ladCx - h.x;
          if (Math.abs(dx) <= ANTIFA_WALK_SPD * dt) {
            // Arrived at ladder base — switch to CLIMB
            h.x = ladCx;
            h.state = 'CLIMB';
            h.currentLad = h.targetLad;
            h.targetLad = null;
            h.vx = 0;
          } else {
            h.vx = Math.sign(dx) * ANTIFA_WALK_SPD;
            h.x += h.vx * dt;
          }
        } else {
          // No up-ladder from this platform (e.g. they reached TOP). Stand idle until despawn.
          h.vx = 0;
        }
        // Snap to platform surface (handles tilt)
        if (h.plat) h.y = getPlatY(h.plat, h.x);
      } else if (h.state === 'CLIMB') {
        h.y -= ANTIFA_CLIMB_SPD * dt;
        const lad = h.currentLad;
        if (h.y <= lad.y + 4) {
          // Reached top — snap to destination platform surface, return to WALK
          const topPlat = getLadderTopPlat(lad);
          if (topPlat) {
            h.plat = topPlat;
            h.y = getPlatY(topPlat, h.x);
          } else {
            h.y = lad.y;                                 // defensive — keep them on the ladder line
          }
          h.state = 'WALK';
          h.currentLad = null;
          h.targetLad = null;
        }
      }
    } else if (h.type === 'ZOMBIE') {
      // Slow horizontal patrol on platform; reverse at edges (6px buffer)
      h.x += h.vx * dt;
      h.y = getPlatY(h.plat, h.x);
      if (h.x < h.plat.x + 6) {
        h.x = h.plat.x + 6;
        h.vx = Math.abs(h.vx);
      } else if (h.x > h.plat.x + h.plat.w - 6) {
        h.x = h.plat.x + h.plat.w - 6;
        h.vx = -Math.abs(h.vx);
      }
    }

    // Helper vs capsule: destroy capsule on overlap. Zombie dies in the encounter; Antifa survives.
    // J — skip carried capsules so helpers can't yank a capsule out of Pelosi's hand mid-walk.
    // K — ragdolling/grabbed Antifa skip the loop above (continue), so they don't reach this block.
    const halfW = h.w / 2;
    let helperKilled = false;
    for (let ci = capsules.length - 1; ci >= 0; ci--) {
      const c = capsules[ci];
      if (c.carried) continue;
      // Capsule center ± CAPSULE_R vs helper body x±halfW, y in [h.y - h.h, h.y]
      const overlapX = (c.x + CAPSULE_R > h.x - halfW) && (c.x - CAPSULE_R < h.x + halfW);
      const overlapY = (c.y + CAPSULE_R > h.y - h.h) && (c.y - CAPSULE_R < h.y);
      if (overlapX && overlapY) {
        // H2 — helper destroys capsule → +150 × multiplier
        stats.helperKillCount++;
        addScore(HELPER_KILL_SCORE, true, c.x, c.y - 20, '#ff88ff');
        capsules.splice(ci, 1);
        // playSfx_helperKill();                                  // N — pop on helper kill
        // SFX-PACK-FIX: synth stripped, mp3 owns this moment per Brian field test
        // SFX-PACK — real glass-shatter mp3 for capsule destruction (Antifa/Zombie kills capsule).
        // CAPSULE-DIAG — log Howl state + global mute at the moment .play() fires so Brian's
        // field-test DUMP LOGS reveals whether the mp3 is loaded + audible at runtime.
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.capsule_destruction) {
          console.log('[CAPSULE-DIAG] play() at helper-kill (line 3558)', {
            howlState:    GAME_SFX.capsule_destruction.state(),    // 'unloaded' | 'loading' | 'loaded'
            howlVolume:   GAME_SFX.capsule_destruction.volume(),
            globalMute:   (typeof Howler !== 'undefined') ? Howler._muted : 'no-howler',
            globalVolume: (typeof Howler !== 'undefined') ? Howler.volume() : 'no-howler',
            ctxState:     (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx.state : 'no-ctx',
          });
          GAME_SFX.capsule_destruction.play();
        }
        if (h.type === 'ZOMBIE') { helperKilled = true; break; }
      }
    }
    // P-ENEMY-1: helper vs MAGA hat — BOTH die on overlap (different from
    // helper-vs-capsule rule where Antifa survives). Antifa AND Zombie both
    // destroy the hat AND themselves. Per spec: hats are dispatchable threats,
    // mutually-destructive contact mirrors a "thrown helper takes out the hat
    // and goes with it" beat. Iterates backward so splice is index-safe.
    if (!helperKilled) {
      for (let hi = hats.length - 1; hi >= 0; hi--) {
        const hat = hats[hi];
        const _hOverlapX = (hat.x + HAT_AABB_W / 2 > h.x - halfW) &&
                          (hat.x - HAT_AABB_W / 2 < h.x + halfW);
        const _hOverlapY = (hat.y + HAT_AABB_H / 2 > h.y - h.h) &&
                          (hat.y - HAT_AABB_H / 2 < h.y);
        if (_hOverlapX && _hOverlapY) {
          console.log('[HAT-KILL]', {
            killer: (h.type === 'ZOMBIE') ? 'zombie_voter' : 'antifa',
            level:  currentLevel,
            hatX:   Math.round(hat.x),
            hatY:   Math.round(hat.y),
          });
          // P-WEAPON-1: helper-vs-hat kill plays the same comedic SFX as
          // player-badge-vs-hat kills (Brian's call — unified audio for
          // hat destruction regardless of source).
          if (typeof GAME_SFX !== 'undefined' && GAME_SFX.player_death_scream) {
            GAME_SFX.player_death_scream.play();
          }
          hats.splice(hi, 1);
          helperKilled = true;                                        // both helper types die
          break;
        }
      }
    }
    if (helperKilled) helpers.splice(i, 1);
  }
  // N-FIX-7 — wave-end detection moved INTO the music state machine (computeDesiredMusic
  // counts ANTIFA helpers each frame). Removing the explicit stopMachoMan call here was the
  // BUG 3 spam fix — the state machine handles it idempotently from tickBGM.
}

function drawHelpers() {
  for (const h of helpers) {
    // K — Antifa RAGDOLL render path:
    //   phase1: rotated sprite about body center (deathRotation accumulates at 720°/s)
    //   phase2: suppressed entirely (debris IS the visual; rendered globally elsewhere)
    if (h.type === 'ANTIFA' && h.state === 'RAGDOLL') {
      if (h.ragdollPhase === 'phase2') continue;
      ctx.save();
      ctx.translate(h.x, h.y - h.h * 0.5);
      ctx.rotate(h.deathRotation * Math.PI / 180);
      drawSprite(h.sprite, 0, h.h * 0.5, h.h, false, 1.0);
      ctx.restore();
      continue;
    }
    drawSprite(h.sprite, h.x, h.y, h.h, h.vx < 0, 1.0);
  }
}

// K — Secret Service activate/update/draw. Spawns 3 stationary units when an Antifa starts
// climbing ladder[5]. Grab-and-throw any Antifa exiting onto TOP near ladder[5]. Fade out 0.5s
// after the last Antifa entity despawns. ZERO interaction with player or capsules — never appears
// in any AABB check against either. ZERO score awarded for throws (decorative gag only).
function activateSS() {
  const lad5 = ladders[SS_TARGET_LADDER_IX];
  ss.active = true;
  ss.fadeAlpha = 1;
  ss.fadeOutTimer = 0;
  ss.units[0].x = DTJ_GAMEPLAY_X + 60;                   // bodyguard next to DTJ
  ss.units[0].y = TOP.y;
  ss.units[1].x = lad5.x - 30;                           // left flank
  ss.units[1].y = TOP.y;
  ss.units[2].x = lad5.x + LADDER_W + 30;                // right flank
  ss.units[2].y = TOP.y;
  for (const u of ss.units) { u.state = 'IDLE'; u.stateT = 0; u.targetAntifa = null; }
  if (typeof console !== 'undefined') console.log('SS ACTIVATED at t=' + totalT.toFixed(2));
}

function updateSS(dt) {
  // Activation scan: any Antifa currently climbing ladder[5] AND ss not yet active.
  if (!ss.active) {
    const lad5 = ladders[SS_TARGET_LADDER_IX];
    for (const h of helpers) {
      if (h.type === 'ANTIFA' && h.state === 'CLIMB' && h.currentLad === lad5) {
        activateSS();
        break;
      }
    }
  }
  if (!ss.active && ss.fadeAlpha <= 0) return;

  // Throw-trigger scan: any ungrabbed non-ragdoll Antifa whose plat is TOP and whose x is within
  // SS_GRAB_X_RANGE of ladder[5] cx → assign to nearest IDLE flank unit, transition to GRAB.
  if (ss.active) {
    const lad5    = ladders[SS_TARGET_LADDER_IX];
    const lad5Cx  = lad5.x + LADDER_W / 2;
    const ssLeft  = ss.units[1];
    const ssRight = ss.units[2];
    for (const h of helpers) {
      if (h.type !== 'ANTIFA') continue;
      if (h.state !== 'WALK') continue;
      if (h.grabbed) continue;
      if (h.plat !== TOP) continue;
      if (Math.abs(h.x - lad5Cx) > SS_GRAB_X_RANGE) continue;
      // Pick nearest IDLE flank.
      const leftIdle  = ssLeft.state  === 'IDLE';
      const rightIdle = ssRight.state === 'IDLE';
      if (!leftIdle && !rightIdle) continue;
      let chosen;
      if      (!leftIdle)  chosen = ssRight;
      else if (!rightIdle) chosen = ssLeft;
      else chosen = (Math.abs(ssLeft.x - h.x) <= Math.abs(ssRight.x - h.x)) ? ssLeft : ssRight;
      chosen.state = 'GRAB';
      chosen.stateT = 0;
      chosen.targetAntifa = h;
      h.grabbed = true;
    }
  }

  // Per-unit tick.
  for (const u of ss.units) {
    if (u.state === 'GRAB') {
      u.stateT += dt;
      if (u.targetAntifa) {
        u.targetAntifa.x = u.x;
        u.targetAntifa.y = u.y - SS_HEIGHT * 0.5;        // pin to hand
      }
      if (u.stateT >= SS_GRAB_DURATION) {
        // THROW — launch antifa into RAGDOLL state. ZERO score per spec (decorative only).
        const a = u.targetAntifa;
        if (a) {
          a.state          = 'RAGDOLL';
          a.ragdollPhase   = 'phase1';
          a.ragdollT       = 0;
          a.ragdollPhaseT  = 0;
          a.deathVx        = (Math.random() < 0.5 ? -1 : 1) * SS_THROW_VX_MAG;
          a.deathVy        = SS_THROW_VY;
          a.deathRotation  = 0;
          a.grabbed        = false;
          playSfx_antifaThrown();                              // N — yeet whoosh on throw
        }
        u.state = 'IDLE';
        u.stateT = 0;
        u.targetAntifa = null;
      }
    }
  }

  // Deactivation: count active Antifa entities (including ragdolling ones — they still occupy
  // helpers[]). When the last one is gone, start the 0.5s fade.
  let antifaCount = 0;
  for (const h of helpers) if (h.type === 'ANTIFA') antifaCount++;
  if (ss.active && antifaCount === 0 && ss.fadeOutTimer === 0) {
    ss.fadeOutTimer = SS_FADE_DURATION;
  }
  if (ss.fadeOutTimer > 0) {
    ss.fadeOutTimer -= dt;
    ss.fadeAlpha = Math.max(0, ss.fadeOutTimer / SS_FADE_DURATION);
    if (ss.fadeOutTimer <= 0) {
      ss.active       = false;
      ss.fadeAlpha    = 0;
      ss.fadeOutTimer = 0;
      for (const u of ss.units) { u.state = 'IDLE'; u.stateT = 0; u.targetAntifa = null; }
    }
  }
}

function drawSS() {
  if (!ss.active && ss.fadeAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = ss.fadeAlpha;
  for (const u of ss.units) {
    drawSprite('secret_service', u.x, u.y, SS_HEIGHT, false, 1.0);
  }
  ctx.restore();
}

// Block E — populated. Random pick: Antifa wave or Zombie Voter wave on each briefcase collect.
function triggerHelperSpawn(reason) {
  if (Math.random() < 0.5) {
    spawnAntifaWave();
    fireAntifaSpawnTaunt();                                       // M — contextual 'RADICAL LEFT MOB!' taunt
    playSfx_antifaSpawn();                                        // N — alarm sting on Antifa wave
  } else {
    spawnZombieWave();
  }
}

// ─────────────────────────────────────────────
//  G2 — NANCY PELOSI CAMEO (FLOOR walker, per April 30 2026 Notion revision)
// ─────────────────────────────────────────────
// Independent 30–45s timer. On fire: spawn at right screen edge on FLOOR, walk LEFT at 50 px/s.
// If she walks within ~30px of a capsule on FLOOR → GRAB → SLAM (glass shatter particles) →
// TEAR (pelosi_idle → pelosi_tear; two paper pieces fly off in arcs) → award PELOSI_BONUS (+500)
// → turn around, walk back RIGHT, despawn off the right edge. If she reaches x≈60 (left limit)
// without grabbing: SHRUG (0.4s, no sprite swap, small arm-up bounce via y-bob) → walk back right,
// no points. No collision with player at any phase.
//
// Phase machine (J — added CARRY_TO_ANCHOR between GRAB and SLAM):
//   IDLE → WALKING_LEFT → (GRAB → CARRY_TO_ANCHOR → SLAM → TEAR | SHRUG) → WALKING_RIGHT → IDLE
const PELOSI_HEIGHT           = 80;
const PELOSI_WALK_SPD         = 50;
const PELOSI_GRAB_RANGE_X     = 30;
const PELOSI_GRAB_DURATION    = 0.4;
const PELOSI_SLAM_DURATION    = 0.3;
const PELOSI_TEAR_DURATION    = 0.6;
const PELOSI_SHRUG_DURATION   = 0.4;
const PELOSI_LEFT_LIMIT       = 240;       // C1 — halfway across FLOOR (W/2). Was 60.
// J — smash anchor. After GRAB, Pelosi walks the capsule to this x before SLAM so the smash
// always plays in full view, never half-off-canvas. Same value as PELOSI_LEFT_LIMIT (canvas
// center) — kept as a separate constant since it expresses a different intent.
const PELOSI_SMASH_X          = 240;
const PELOSI_ANCHOR_TOLERANCE = 4;         // px — Pelosi snaps to PELOSI_SMASH_X within this
// P-DIFFICULTY-1: now per-level via getLevelParams().pelosiInterval (used at line ~3879 spawn re-seed).
// const PELOSI_INTERVAL_MIN     = 30.0;
// const PELOSI_INTERVAL_MAX     = 45.0;
const PELOSI_BONUS            = 500;
const PELOSI_FLASH_LIFETIME   = 1.5;
const PELOSI_TORN_LIFETIME    = 1.0;

const pelosi = {
  active: false,
  phase: 'IDLE',
  phaseT: 0,
  // P-DIFFICULTY-1: initial pelosi.timer set later (PELOSI_INTERVAL_*  hardcoded
  // path replaced by getLevelParams.pelosiInterval at reset/respawn sites). Init
  // value here is just a non-zero placeholder; actual value re-seeded in
  // resetForRespawn (line ~2820) before first use.
  timer: 30,
  x: 0, y: 0,
  facing: -1,                                                     // -1 = facing left, +1 = facing right
  targetCapsule: null,
};
const pelosiFlash = { active: false, t: 0, x: 0, y: 0 };
const tornPieces = [];                                            // paper shards flying off after a tear

function findFloorCapsuleNearPelosi() {
  // Capsule must be on FLOOR AND within PELOSI_GRAB_RANGE_X of pelosi.x.
  for (const c of capsules) {
    if (c.onPlat !== FLOOR) continue;
    if (Math.abs(c.x - pelosi.x) < PELOSI_GRAB_RANGE_X) return c;
  }
  return null;
}

function spawnPelosiGlassShatter(x, y) {
  // White-blue glass shard burst — reuses the existing particles[] system.
  const cols = ['#ddffff', '#aaeeff', '#ffffff', '#88ccff', '#ccccff'];
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 110;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 60,                                 // slight upward bias
      life: 1,
      decay: 1.1 + Math.random() * 0.5,
      r: 2 + Math.random() * 3,
      color: cols[Math.floor(Math.random() * cols.length)],
    });
  }
}

function spawnPelosi() {
  pelosi.active = true;
  pelosi.phase = 'WALKING_LEFT';
  pelosi.phaseT = 0;
  pelosi.x = W + 20;                                              // start just off-screen right
  pelosi.y = FLOOR.y;                                             // foot at floor surface
  pelosi.facing = -1;
  pelosi.targetCapsule = null;
}

function updatePelosi(dt) {
  // Bonus flash + torn pieces tick regardless of pelosi.active so they finish their animation
  // even if Pelosi has already despawned.
  if (pelosiFlash.active) {
    pelosiFlash.t += dt;
    if (pelosiFlash.t >= PELOSI_FLASH_LIFETIME) pelosiFlash.active = false;
  }
  for (let i = tornPieces.length - 1; i >= 0; i--) {
    const t = tornPieces[i];
    t.t   += dt;
    t.x   += t.vx * dt;
    t.y   += t.vy * dt;
    t.vy  += 240 * dt;                                            // gravity
    t.rot += t.rotV * dt;
    if (t.t > PELOSI_TORN_LIFETIME || t.x < -50 || t.x > W + 50 || t.y > H + 50) {
      tornPieces.splice(i, 1);
    }
  }

  if (!pelosi.active) {
    pelosi.timer -= dt;
    if (pelosi.timer <= 0) {
      spawnPelosi();
      // P-DIFFICULTY-1: per-level pelosi interval with ±20% variance.
      const _pp = getLevelParams().pelosiInterval;
      pelosi.timer = _pp * 0.8 + Math.random() * _pp * 0.4;
    }
    return;
  }

  pelosi.phaseT += dt;
  switch (pelosi.phase) {
    case 'WALKING_LEFT': {
      pelosi.x -= PELOSI_WALK_SPD * dt;
      pelosi.facing = -1;
      const cap = findFloorCapsuleNearPelosi();
      if (cap) {
        pelosi.targetCapsule = cap;
        pelosi.phase = 'GRAB';
        pelosi.phaseT = 0;
      } else if (pelosi.x <= PELOSI_LEFT_LIMIT) {
        pelosi.x = PELOSI_LEFT_LIMIT;
        pelosi.phase = 'SHRUG';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'GRAB': {
      if (pelosi.phaseT >= PELOSI_GRAB_DURATION) {
        // J — capsule is captured but NOT destroyed yet. Pelosi will carry it to PELOSI_SMASH_X
        // before slamming. Setting `carried = true` makes updateCapsules skip the carried capsule
        // entirely (no roll, no fall, no player-collision, no off-screen despawn). vx=0 is
        // belt-and-suspenders — even if updateCapsules ran for one frame before the flag was
        // checked, vx=0 prevents motion.
        if (pelosi.targetCapsule) {
          pelosi.targetCapsule.carried = true;
          pelosi.targetCapsule.vx = 0;
        }
        pelosi.phase = 'CARRY_TO_ANCHOR';
        pelosi.phaseT = 0;
      }
      break;
    }

    // J — CARRY_TO_ANCHOR: walk Pelosi (and the carried capsule) to PELOSI_SMASH_X before the
    // SLAM/TEAR sequence plays. Direction depends on which side of the anchor she's on. On
    // arrival, splice the capsule + spawn the glass shatter (work that was previously in GRAB
    // end), then transition to SLAM. Defensive: if the carried capsule has somehow been removed
    // (shouldn't happen — carried=true skips all despawn paths), fall through to SHRUG and exit.
    case 'CARRY_TO_ANCHOR': {
      const carriedAlive = pelosi.targetCapsule && capsules.indexOf(pelosi.targetCapsule) >= 0;
      if (!carriedAlive) {
        // CAPSULE-DIAG — Pelosi lost her carried capsule before reaching anchor.
        // If this fires during Brian's "destroy a capsule" field test, the smash
        // never happens — capsule already gone, .play() at line ~3918 unreachable.
        console.log('[CAPSULE-DIAG] Pelosi CARRY_TO_ANCHOR -> SHRUG (carried capsule lost)', {
          targetCapsule: !!pelosi.targetCapsule,
          inCapsulesArray: pelosi.targetCapsule ? (capsules.indexOf(pelosi.targetCapsule) >= 0) : false,
        });
        pelosi.targetCapsule = null;
        pelosi.phase = 'SHRUG';
        pelosi.phaseT = 0;
        break;
      }
      const dx = PELOSI_SMASH_X - pelosi.x;
      if (Math.abs(dx) <= PELOSI_ANCHOR_TOLERANCE) {
        // CAPSULE-DIAG — Pelosi reached anchor; about to splice capsule + fire mp3.
        // This is a one-shot per Pelosi-smash sequence (state transitions to SLAM
        // at end of block, so the if-arrived doesn't re-fire next frame).
        console.log('[CAPSULE-DIAG] Pelosi reached anchor, splicing capsule', {
          pelosiX:        pelosi.x,
          smashX:         PELOSI_SMASH_X,
          targetCapsule:  !!pelosi.targetCapsule,
          capsuleIdx:     pelosi.targetCapsule ? capsules.indexOf(pelosi.targetCapsule) : -1,
          gameSfxDefined: (typeof GAME_SFX !== 'undefined'),
          capsDestrExists: (typeof GAME_SFX !== 'undefined' && !!GAME_SFX.capsule_destruction),
        });
        // Arrived. Snap to anchor, splice capsule, spawn shatter, transition to SLAM.
        pelosi.x = PELOSI_SMASH_X;
        const ci = capsules.indexOf(pelosi.targetCapsule);
        if (ci >= 0) capsules.splice(ci, 1);
        spawnPelosiGlassShatter(pelosi.x, pelosi.y - PELOSI_HEIGHT * 0.55);
        // playSfx_pelosiSlam();                                  // N — glass shatter on slam
        // SFX-PACK-FIX-V2: synth stripped, mp3 unified with helper-kill path per Brian field test.
        // Both capsule-destruction events (helper-kill at line 3554, Pelosi-smash here) now
        // share the same sfx_capsule_destruction.mp3 sound so audio behavior is consistent.
        // CAPSULE-DIAG — Pelosi-smash variant of the helper-kill diagnostic above. If only
        // ONE of these two prefixes shows in DUMP LOGS during a capsule-destroy field test,
        // we know which trigger path the player is exercising vs which is silent.
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.capsule_destruction) {
          console.log('[CAPSULE-DIAG] play() at Pelosi-smash (line 3882)', {
            howlState:    GAME_SFX.capsule_destruction.state(),
            howlVolume:   GAME_SFX.capsule_destruction.volume(),
            globalMute:   (typeof Howler !== 'undefined') ? Howler._muted : 'no-howler',
            globalVolume: (typeof Howler !== 'undefined') ? Howler.volume() : 'no-howler',
            ctxState:     (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx.state : 'no-ctx',
          });
          const playId = GAME_SFX.capsule_destruction.play();
          // CAPSULE-DIAG — log the sound ID + Howl polyphony state immediately AFTER
          // .play() returns. If playId is undefined, Howler refused (suspended ctx,
          // mute, etc.). If playId is a number but no audible sound, Howler queued the
          // sound but something downstream (concurrent voice limit, mid-fire stop) is
          // killing it before audio output. Helper-kill at line ~3580 doesn't have this
          // post-call log because Brian confirmed it works — only Pelosi-smash needs it.
          console.log('[CAPSULE-DIAG] post-play() at Pelosi-smash', {
            playId:           playId,
            playingNow:       GAME_SFX.capsule_destruction.playing(),
            durationReported: GAME_SFX.capsule_destruction.duration(),
          });
        }
        // CAPSULE-DIAG — confirm we exited the if-guard cleanly and reached the SLAM
        // transition. If this fires but post-play() above didn't, the .play() call
        // itself threw silently (would also surface in browser console as Howler error).
        console.log('[CAPSULE-DIAG] Pelosi -> SLAM phase transition', {
          phaseT: pelosi.phaseT,
        });
        pelosi.phase = 'SLAM';
        pelosi.phaseT = 0;
        break;
      }
      // Walk toward anchor; facing follows movement direction.
      if (dx > 0) {
        pelosi.x += PELOSI_WALK_SPD * dt;
        pelosi.facing = 1;
      } else {
        pelosi.x -= PELOSI_WALK_SPD * dt;
        pelosi.facing = -1;
      }
      // Drag the capsule with her at hand height. Capsule is rendered separately by drawCapsules
      // (which iterates capsules[]); we just keep its position pinned to Pelosi's hand each frame.
      pelosi.targetCapsule.x = pelosi.x;
      pelosi.targetCapsule.y = pelosi.y - PELOSI_HEIGHT * 0.5;
      break;
    }

    case 'SLAM': {
      if (pelosi.phaseT >= PELOSI_SLAM_DURATION) {
        pelosi.phase = 'TEAR';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'TEAR': {
      if (pelosi.phaseT >= PELOSI_TEAR_DURATION) {
        // SFX-PACK-FIX-V2 — capture position + base-y BEFORE the state transition + 800ms
        // delay below; pelosi.x will have shifted during the WALKING_RIGHT walk by the
        // time the setTimeout fires.
        const px = pelosi.x;
        const baseY = pelosi.y - PELOSI_HEIGHT * 0.55;
        const flashY = pelosi.y - PELOSI_HEIGHT - 10;
        const scoreY = pelosi.y - PELOSI_HEIGHT;

        // SFX-PACK-FIX-V2 — STATE TRANSITION FIRES IMMEDIATELY to prevent re-entry. The
        // if-block above runs every frame while pelosi.phase === 'TEAR' && phaseT >= dur,
        // so without this immediate phase change, the 800ms setTimeout below would be
        // queued 48+ times (60fps × 0.8s) before the phase change took effect.
        pelosi.phase = 'WALKING_RIGHT';
        pelosi.phaseT = 0;
        pelosi.facing = 1;

        // SFX-PACK-FIX-V2 — pause 800ms after the unified capsule-shatter mp3 from the
        // SLAM-entry block above (line ~3878) before the tear sprite + audio + score
        // flash all land together. Lets the shatter audio (~0.7s) clear before the tear
        // event takes over per Brian field test.
        setTimeout(() => {
          // Spawn two paper pieces flying off in opposite arcs (upper-left + upper-right).
          tornPieces.push({ x: px - 6, y: baseY, vx: -180, vy: -240, rot: 0, rotV:  6, t: 0 });
          tornPieces.push({ x: px + 6, y: baseY, vx:  180, vy: -260, rot: 0, rotV: -6, t: 0 });
          playSfx_pelosiTear();                                  // N — paper rip + low rumble (synth)
          // SFX-PACK — real paper-rip mp3 layered with the synth tear.
          if (typeof GAME_SFX !== 'undefined' && GAME_SFX.pelosi_tear) GAME_SFX.pelosi_tear.play();
          // H2 — Pelosi tear → +500 × multiplier (was flat 500). pelosiFlash overlay shown.
          stats.pelosiCount++;
          addScore(PELOSI_BONUS, true, px, scoreY, '#ffcc00');
          pelosiFlash.active = true;
          pelosiFlash.t = 0;
          pelosiFlash.x = px;
          pelosiFlash.y = flashY;
        }, 800);
      }
      break;
    }
    case 'SHRUG': {
      // Small arm-up bounce — cosmetic y-bob during shrug since we don't have a separate shrug sprite.
      if (pelosi.phaseT >= PELOSI_SHRUG_DURATION) {
        pelosi.phase = 'WALKING_RIGHT';
        pelosi.phaseT = 0;
        pelosi.facing = 1;
      }
      break;
    }
    case 'WALKING_RIGHT': {
      pelosi.x += PELOSI_WALK_SPD * dt;
      pelosi.facing = 1;
      if (pelosi.x > W + 20) {
        pelosi.active = false;
        pelosi.phase = 'IDLE';
        pelosi.phaseT = 0;
        pelosi.targetCapsule = null;
      }
      break;
    }
  }
}

function drawPelosi() {
  if (pelosi.active) {
    const sprite = (pelosi.phase === 'TEAR') ? 'pelosi_tear' : 'pelosi_idle';
    // Cosmetic shrug-bounce: small upward bob during SHRUG phase (no sprite swap available).
    let y = pelosi.y;
    if (pelosi.phase === 'SHRUG') {
      const t = pelosi.phaseT / PELOSI_SHRUG_DURATION;
      y -= Math.sin(t * Math.PI) * 6;                             // half-sine bob, peak ~6px up
    }
    // facing < 0 (walking left) → flip=true so the right-facing default sprite mirrors to face left.
    drawSprite(sprite, pelosi.x, y, PELOSI_HEIGHT, pelosi.facing < 0, 1.0);
  }
  // Torn paper pieces
  for (const t of tornPieces) {
    const a = Math.max(0, 1 - t.t / PELOSI_TORN_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rot);
    ctx.fillStyle = '#f8f4d8';
    ctx.fillRect(-7, -10, 14, 20);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -10, 14, 20);
    // ink lines
    ctx.fillStyle = '#222';
    ctx.fillRect(-5, -7, 10, 1);
    ctx.fillRect(-5, -3, 10, 1);
    ctx.fillRect(-5,  1, 10, 1);
    ctx.restore();
  }
  // Bonus flash floats up
  if (pelosiFlash.active) {
    const a = 1 - (pelosiFlash.t / PELOSI_FLASH_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('+' + PELOSI_BONUS, pelosiFlash.x, pelosiFlash.y - pelosiFlash.t * 30);
    ctx.restore();
  }
}

const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * W, y: Math.random() * H * 0.7,
  r: Math.random() * 1.6 + 0.2, a: Math.random()
}));

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
let particles = [];
function boom(x, y, n = 30, big = false) {
  const cols = ['#ff6600','#ffcc00','#ff3300','#ffffff','#ff8800'];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = (big ? 220 : 130) + Math.random() * 100;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - (big?60:0),
      life: 1, decay: 0.7 + Math.random() * 0.5,
      r: (big ? 7 : 3) + Math.random() * 4,
      color: cols[Math.floor(Math.random() * cols.length)] });
  }

// ─────────────────────────────────────────────
//  BRICK TUMBLE  (shatter transition)
// ─────────────────────────────────────────────
let bricks = [];
let shakeAmt = 0;

function initBricks() {
  bricks = [];
  // Bricks cascade FROM DTJ's feet (TOP platform) DOWN through each platform
  // Each platform level = one cascade wave, top to bottom
  // This makes the platforms look like ruins of the building structure

  const platLevels = [
    TOP,           // wave 0 — starts at DTJ's feet
    platforms[4],  // wave 1
    platforms[3],  // wave 2
    platforms[2],  // wave 3
    platforms[1],  // wave 4
    platforms[0],  // wave 5 — floor
  ];

  platLevels.forEach((plat, wave) => {
    const bw = 38, bh = 16;
    const cols = Math.floor(plat.w / bw) + 2;
    for (let col = 0; col < cols; col++) {
      const localX = col * bw - 4;
      const bx = plat.x + localX;
      // Tilt-adjusted y at this x position
      const mid = plat.x + plat.w / 2;
      const rad = plat.tilt * Math.PI / 180;
      const by = plat.y + Math.tan(rad) * (bx - mid);

      bricks.push({
        x: bx,
        startY: by,
        y: by,
        w: bw - 2, h: bh - 2,
        // Cascade outward from center — inner bricks fall first
        vx: (col - cols/2) * 12 + (Math.random()-0.5) * 40,
        vy: 0,
        rot: 0,
        rotV: (Math.random()-0.5) * 6,
        // Delay cascades: wave controls which platform, col controls inside-out order
        // Inner columns (closer to center) go first within each wave
        delay: wave * 0.25 + Math.abs(col - cols/2) * 0.03 + Math.random()*0.05,
        active: false,
        wave,
        color: `hsl(${35+wave*8},${22+Math.random()*18}%,${42+Math.random()*18}%)`
      });
    }
  });
}

const ESC_X1 = 80, ESC_Y1 = H - 90;   // bottom entry
const ESC_X2 = 260, ESC_Y2 = 200;     // top exit

function drawEscalatorStructure(animT) {
  const dx = ESC_X2 - ESC_X1, dy = ESC_Y2 - ESC_Y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(ESC_X1, ESC_Y1);
  ctx.rotate(ang);

  // Glass tube / enclosure — the character is hidden inside this
  ctx.fillStyle = 'rgba(180,220,255,0.12)';
  ctx.strokeStyle = 'rgba(180,220,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-10, -38, len + 20, 60, 6);
  ctx.fill(); ctx.stroke();

  // Gold handrail top
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, -26); ctx.lineTo(len, -26); ctx.stroke();

  // Gold handrail bottom
  ctx.strokeStyle = '#b8960c';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 18); ctx.lineTo(len, 18); ctx.stroke();

  // Moving steps inside
  const stepSpacing = 28;
  const scrollOffset = (animT * 60) % stepSpacing;
  ctx.strokeStyle = 'rgba(212,175,55,0.7)';
  ctx.lineWidth = 2;
  for (let sx = -scrollOffset; sx < len + 10; sx += stepSpacing) {
    ctx.beginPath(); ctx.moveTo(sx, -20); ctx.lineTo(sx + 16, -20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx + 16, -20); ctx.lineTo(sx + 16, -4); ctx.stroke();
  }

  // Side frame / structural
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(-12, -40, 12, 80);
  ctx.fillRect(len, -40, 12, 80);

  // Gold trim strips
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(0, -40, len, 4);
  ctx.fillRect(0, 36, len, 4);

  ctx.restore();

  // Base platform at bottom entry
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(ESC_X1 - 20, ESC_Y1 - 4, 50, 8);
  // Top landing platform
  ctx.fillRect(ESC_X2 - 20, ESC_Y2 - 4, 50, 8);
}

function drawLincolnBuilding(alpha) {
  ctx.save();

    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });

  // Reflection pool / reflecting pool in front
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(40, 680, 400, 60);
  const rg = ctx.createLinearGradient(0, 680, 0, 740);
  rg.addColorStop(0, 'rgba(180,180,220,0.08)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(40, 680, 400, 60);

  // Building layout: 3/8 building (top), 5/8 stairs (bottom)
  // H=854: building occupies y=40..320 (280px), stairs y=320..794 (474px, 15 steps)
  const BX = 20, BW = 440;
  const BLDG_TOP = 40;      // pediment peak
  const BLDG_BASE = 320;    // top of stairs / base of columns
  const STAIR_BOT = 794;    // bottom of stairs = ground
  const N_STEPS = 15;
  const STEP_H = Math.floor((STAIR_BOT - BLDG_BASE) / N_STEPS); // ~31px each

  // Pediment (triangular top)
  ctx.fillStyle = '#d8d8c8';
  ctx.beginPath();
  ctx.moveTo(BX, BLDG_BASE - 160); ctx.lineTo(BX + BW/2, BLDG_TOP);
  ctx.lineTo(BX + BW, BLDG_BASE - 160);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#aaa898'; ctx.lineWidth = 1; ctx.stroke();

  // Entablature band
  ctx.fillStyle = '#e2e2d2';
  ctx.fillRect(BX, BLDG_BASE - 160, BW, 26);

  // Frieze text
  ctx.fillStyle = '#888878';
  ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('LINCOLN MEMORIAL  ★  (THIS IS A PARODY)', W/2, BLDG_BASE - 140);

  // Columns — 12 fluted
  const COL_TOP = BLDG_BASE - 134;
  const COL_BOT = BLDG_BASE - 8;
  for (let i = 0; i < 12; i++) {
    const cx = BX + 18 + i * 34;
    const cg = ctx.createLinearGradient(cx, 0, cx + 20, 0);
    cg.addColorStop(0, '#c8c8b8'); cg.addColorStop(0.3, '#e4e4d4');
    cg.addColorStop(0.7, '#d8d8c8'); cg.addColorStop(1, '#b8b8a8');
    ctx.fillStyle = cg;
    ctx.fillRect(cx, COL_TOP, 20, COL_BOT - COL_TOP);
    ctx.fillStyle = '#e8e8d8'; ctx.fillRect(cx-2, COL_TOP-4, 24, 8);
    ctx.fillStyle = '#d0d0c0'; ctx.fillRect(cx-2, COL_BOT-2, 24, 8);
  }

  // Stylobate
  ctx.fillStyle = '#d8d8c8';
  ctx.fillRect(BX - 6, BLDG_BASE - 10, BW + 12, 12);

  // Steps — 15 steps filling the bottom 5/8
  for (let s = 0; s < N_STEPS; s++) {
    const sx = BX - s * 6, sw = BW + s * 12;
    const sy = BLDG_BASE + s * STEP_H;
    const stepG = ctx.createLinearGradient(0, sy, 0, sy + STEP_H);
    stepG.addColorStop(0, '#e0e0d0'); stepG.addColorStop(1, '#c8c8b8');
    ctx.fillStyle = stepG;
    ctx.fillRect(sx, sy, sw, STEP_H);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(sx, sy + STEP_H - 4, sw, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(sx, sy, sw, 3);
  }

  // Ground
  ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, STAIR_BOT, W, 60);
  ctx.fillStyle = '#0d220d'; ctx.fillRect(0, STAIR_BOT, W, 8);

  ctx.restore();
}

// ─────────────────────────────────────────────

function drawDonkey(x, y, sc = 1, flip = false, walking = false, walkT = 0) {
  ctx.save();
  ctx.translate(x, y - 24 * sc);  // feet (y=24 local) land at y
  if (flip) ctx.scale(-1, 1);

  const legSwing = walking ? Math.sin(walkT * 9) * 14 : 0;
  const bob = walking ? Math.abs(Math.sin(walkT * 9)) * -2 : 0;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ell(0, 2, 14, 4, 0, 0, Math.PI*2); ctx.fill();

  // ── Legs ──────────────────────────────────
  ctx.fillStyle = '#1a2060';
  // Left
  ctx.save(); ctx.translate(-7, bob);
  ctx.rotate(legSwing * Math.PI/180);
  ctx.beginPath(); ctx.roundRect(-5,0,10,22,[0,0,4,4]); ctx.fill();
  // Pinstripe
  ctx.strokeStyle = 'rgba(100,120,200,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-2,2); ctx.lineTo(-2,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1,2);  ctx.lineTo(1,20);  ctx.stroke();
  ctx.restore();
  // Right
  ctx.save(); ctx.translate(7, bob);
  ctx.rotate(-legSwing * Math.PI/180);
  ctx.beginPath(); ctx.roundRect(-5,0,10,22,[0,0,4,4]); ctx.fill();
  ctx.strokeStyle = 'rgba(100,120,200,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-2,2); ctx.lineTo(-2,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1,2);  ctx.lineTo(1,20);  ctx.stroke();
  ctx.restore();

  // Shoes — brown boots
  ctx.fillStyle = '#5c3820';
  ctx.beginPath(); ell(-7, 24, 8, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ell(7, 24, 8, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#7a4e30';
  ctx.beginPath(); ell(-7, 22, 5, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ell(7, 22, 5, 3, 0, 0, Math.PI*2); ctx.fill();

  // ── Body ──────────────────────────────────
  ctx.save(); ctx.translate(0, bob);

  // Pinstripe suit jacket — dark navy-blue

  ctx.beginPath(); ctx.moveTo( 15,-30); ctx.lineTo(0,-18); ctx.lineTo( 15,-8); ctx.closePath(); ctx.fill();

  // Cream shirt
  ctx.fillStyle = '#f0ead0';
  ctx.beginPath(); ctx.moveTo(-5,-30); ctx.lineTo(5,-30); ctx.lineTo(6,4); ctx.lineTo(-6,4); ctx.closePath(); ctx.fill();

  // Red tie
  ctx.fillStyle = '#cc1111';
  ctx.beginPath();
  ctx.moveTo(-3,-28); ctx.lineTo(3,-28);
  ctx.lineTo(4,-6); ctx.lineTo(0,4); ctx.lineTo(-4,-6);

  ctx.fillStyle = '#aa0000';
  ctx.beginPath(); ell(0, -26, 3, 2, [0, 0, Math.PI*2]); ctx.fill();

  // Button
  ctx.fillStyle = '#c8a44a';
  ctx.beginPath(); ctx.arc(0,-2,2,0,Math.PI*2); ctx.fill();

  // Tail
  ctx.strokeStyle = '#1a2060'; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(14,-6); ctx.quadraticCurveTo(24,-12,20,-22); ctx.stroke();
  ctx.fillStyle = '#111830';
  ctx.beginPath(); ell(20, -23, 4, 5, -0.4, 0, Math.PI*2); ctx.fill();

  // Arms
  const armSwing = walking ? Math.sin(walkT * 9 + Math.PI) * 0.3 : 0;
  // Left arm (hand in pocket-ish, or swinging)

  ctx.beginPath(); ctx.roundRect(-4,14,8,5,[2]); ctx.fill();

  ctx.beginPath(); ctx.roundRect(-5,-38,10,10,[3]); ctx.fill();

  hg.addColorStop(0,'#6677bb'); hg.addColorStop(1,'#4455aa');

  ctx.beginPath(); ell(0, -50, 17, 18, 0, 0, Math.PI*2); ctx.fill();

  // Long upright ears

  ctx.beginPath(); ell(12, -70, 5, 14, 0.15, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#cc8888';

  // Muzzle — pink
  ctx.fillStyle = '#e8aaaa';
  ctx.beginPath(); ell(2, -40, 11, 9, 0.1, 0, Math.PI*2); ctx.fill();
  // Muzzle shading
  ctx.fillStyle = '#d09090';
  ctx.beginPath(); ell(2, -38, 8, 5, 0.1, 0, Math.PI*2); ctx.fill();
  // Nostrils

  ctx.beginPath(); ell(-2, -38, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ell(6, -38, 2.5, 2, 0, 0, Math.PI*2); ctx.fill();

  // Eyes — half-lidded cool expression (like the reference)
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ell(-6, -52, 4.5, 4, 0, 0, Math.PI*2); ctx.fill();

  ctx.fillStyle = '#000';

  ctx.beginPath(); ell(-6, -55, 4.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ell(6, -55, 4.5, 2.5, 0, 0, Math.PI*2); ctx.fill();
  // Eye shine
  ctx.fillStyle = '#ffffff99';
  ctx.beginPath(); ctx.arc(-5,-52,1,0,Math.PI*2); ctx.fill();

  ctx.restore();

// ─────────────────────────────────────────────
//  PLATFORM DRAWING
// ─────────────────────────────────────────────
function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h/2);
  ctx.rotate(p.tilt * Math.PI / 180);
  const hw = p.w/2, hh = p.h/2;
  // Shadow
  ctx.fillStyle = '#6b5220';
  ctx.fillRect(-hw+3, -hh+4, p.w, p.h);
  // Body
  const pg = ctx.createLinearGradient(0,-hh,0,hh);
  pg.addColorStop(0,'#e8c46a'); pg.addColorStop(0.3,'#c8a44a'); pg.addColorStop(1,'#9a7830');
  ctx.fillStyle = pg;
  ctx.fillRect(-hw,-hh,p.w,p.h);
  // Rivet bolts
  ctx.fillStyle = '#6b5220';
  for (let rx = -hw+14; rx < hw-14; rx += 38) {
    ctx.beginPath(); ctx.arc(rx, 0, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8a44a';
    ctx.beginPath(); ctx.arc(rx-0.5,-0.5,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b5220';
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  LADDER DRAWING
// ─────────────────────────────────────────────
function drawLadder(l) {
  const {x, y, h} = l;
  // Rails
  const lg = ctx.createLinearGradient(x,0,x+LADDER_W,0);
  lg.addColorStop(0,'#c8a800'); lg.addColorStop(0.5,'#f0d020'); lg.addColorStop(1,'#c8a800');
  ctx.fillStyle = lg;
  ctx.fillRect(x, y, 4, h);
  ctx.fillRect(x+LADDER_W-4, y, 4, h);
  // Rungs
  for (let ry = y+8; ry < y+h-4; ry+=16) {
    ctx.fillStyle = '#a08800';
    ctx.fillRect(x+4, ry, LADDER_W-8, 5);
    ctx.fillStyle = '#d4b000';
    ctx.fillRect(x+4, ry, LADDER_W-8, 2);
  }
}

// ─────────────────────────────────────────────
//  TV (small, on top platform)
// ─────────────────────────────────────────────
function drawTV(x, y, label, t) {
  const w=36, h=30;
  // Stand
  ctx.fillStyle='#222244';
  ctx.fillRect(x+w/2-3,y+h,6,7);
  ctx.fillRect(x+w/2-8,y+h+6,16,3);
  // Case
  ctx.fillStyle='#1a1a3a';
  ctx.strokeStyle='#4444aa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill(); ctx.stroke();
  // Bezel
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.fill();
  // Screen
  ctx.save();
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.clip();
  ctx.fillStyle = label==='CNN' ? '#0d0808' : '#08080d';
  ctx.fillRect(x+3,y+3,w-6,h-9);
  // Scan band
  const sb = ((t*25)%(h-9))+y+3;
  ctx.fillStyle = label==='CNN' ? 'rgba(255,50,50,0.15)':'rgba(50,100,255,0.15)';
  ctx.fillRect(x+3,sb,w-6,5);
  // Static noise
  for(let ni=0;ni<6;ni++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.06})`;
    ctx.fillRect(x+3+Math.random()*(w-6), y+3+Math.random()*(h-9), Math.random()*8+2, 1);
  }
  // Tiny text
  ctx.fillStyle = label==='CNN'?'#ff4444':'#4488ff';
  ctx.font='4px monospace'; ctx.textAlign='left';
  ctx.fillText('BREAKING',x+4,y+10);
  ctx.fillStyle='#aaa'; ctx.fillText('LIVE',x+4,y+15);
  // Scan lines overlay
  for(let sl=y+3;sl<y+h-6;sl+=2){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(x+3,sl,w-6,1);
  }
  ctx.restore();
  // Power LED
  ctx.fillStyle=label==='CNN'?'#ff2200':'#0055ff';
  ctx.beginPath(); ctx.arc(x+w-6,y+h-5,2,0,Math.PI*2); ctx.fill();
  // Label
  ctx.fillStyle=label==='CNN'?'#cc0000':'#0033bb';
  ctx.fillRect(x+3,y+h-8,w-6,7);
  ctx.fillStyle='#fff'; ctx.font='bold 5px monospace'; ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h-3);
}

// ─────────────────────────────────────────────
//  TICKER
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
//  TOUCH CONTROL BOXES
// ─────────────────────────────────────────────
const BW = 90, BH = 75;
const boxLeft  = { x: 0,      y: H-BH,       w: BW,   h: BH, action:'left'  };
const boxRight = { x: BW,     y: H-BH,       w: BW,   h: BH, action:'right' };
const boxJump  = { x: 0,      y: H-BH*2,     w: BW*2, h: BH, action:'jump'  };
const boxUp    = { x: W-BW, y: H*0.45,      w: BW, h: BH, action:'up'    };
const boxDown  = { x: W-BW, y: H*0.45+BH,   w: BW, h: BH, action:'down'  };
const boxJump2 = { x: W-BW, y: H*0.45-BH,   w: BW, h: BH, action:'jump'  };
const boxJump3 = { x: W-BW, y: H*0.45+BH*2, w: BW, h: BH, action:'jump'  };
const allBoxes = [boxLeft, boxRight, boxJump, boxJump2, boxJump3, boxUp, boxDown];

function getBoxAt(tx, ty) {
  for (const b of allBoxes) {
    if (tx>=b.x && tx<=b.x+b.w && ty>=b.y && ty<=b.y+b.h) return b;
  }
  return null;
}

function applyTouchState() {
  touch.left=touch.right=touch.climbUp=touch.climbDown=false;
  for (const id in activeTouches) {
    const a = activeTouches[id].action;
    if (a==='left')  touch.left=true;
    if (a==='right') touch.right=true;
    if (a==='up')    touch.climbUp=true;
    if (a==='down')  touch.climbDown=true;
  }
}

// PAUSE-MOBILE-TOUCHSTART-ONLY — proper handler separation: mobile = touchstart only,
// PC = pointerdown only. Replaces the brittle PAUSE-DOUBLE-FIRE-FIX 500ms time-based
// suppression (which still race-condition'd on slower iOS taps where the synthesized
// pointerdown landed AFTER the suppression window expired). With a hard IS_MOBILE early-
// return at the top of pointerdown, there is exactly ONE handler firing per tap on each
// platform — no time windows, no race conditions, no synthesized-event bookkeeping.
//
// Safe for d-pad input: pointermove/pointerup keys are only mutated against pointerIds
// that pointerdown registered. With pointerdown gated off on mobile, those pointerIds
// never enter activeTouches, so the move/up handlers no-op cleanly. Touchstart manages
// its own d-pad keys under 't' + identifier prefix, fully independent of pointer IDs.
canvas.addEventListener('pointerdown', e => {
  if (IS_MOBILE) return;                                         // PAUSE-MOBILE-TOUCHSTART-ONLY — touchstart owns mobile input
  e.preventDefault();
  ensureAudioContext();                                          // L — first-input audio gate (mobile primary path)
  // N — speaker + pause icon hit-test (canvas-pixel coords). Icons render top-right; tap-zones
  // checked BEFORE state routing so the toggles work in any state where the icons are visible
  // (audio: any state; pause: only in pausable states, but the icon is rendered then).
  {
    const rN = canvas.getBoundingClientRect();
    const txN = (e.clientX - rN.left) / scale, tyN = (e.clientY - rN.top) / scale;
    // PAUSE-DIAG — log every pointerdown that reaches the icon hit-test block. Includes
    // canvas-pixel coords + IS_MOBILE + the live PAUSE_HIT_BOX dimensions for math sanity.
    console.log('[PAUSE-DIAG] pointerdown-fired', {
      x: txN.toFixed(1), y: tyN.toFixed(1), isMobile: IS_MOBILE, state: state,
      pauseHitBox: { x: PAUSE_HIT_BOX.x, y: PAUSE_HIT_BOX.y, w: PAUSE_HIT_BOX.w, h: PAUSE_HIT_BOX.h },
    });
    // AUDIO-3-LOG-DUMP — DUMP LOGS button hit-test. Only active when the button is rendered
    // (gameplay/game-over/CUTSCENE_BETWEEN). Opens DOM modal; does NOT advance game state.
    if (dumpBtnVisible() && pointInIconBox(txN, tyN, DUMP_BTN_BOX)) { showDumpLogModal(); return; }
    // MOBILE-HIT-TEST-FIX — use 50×50 SPEAKER_HIT_BOX/PAUSE_HIT_BOX (finger-friendly), not the
    // 22×22 visual SPEAKER_BOX/PAUSE_BOX. Visual icons render unchanged at the smaller rect.
    // MOBILE-PAUSE-ONLY — speaker hit-test gated off on mobile (button hidden; tap is inert).
    if (!IS_MOBILE && pointInIconBox(txN, tyN, SPEAKER_HIT_BOX)) { toggleAudio(); return; }
    if (pointInIconBox(txN, tyN, PAUSE_HIT_BOX)) {
      // PAUSE-DIAG — confirm the hit-test actually matched (not just "tap landed on canvas").
      console.log('[PAUSE-DIAG] pointerdown-pause-hit', { state: state });
      togglePause();
      return;
    }
    // AUDIO-3e-MUSIC-BUTTON — TAP TO START MUSIC hit-test. Only active during INTRO_BLACK
    // before audio is unlocked. Sets the flag and returns early so the game does NOT advance.
    // ensureAudioContext above already fired (creates audioContext, calls Howler.ctx.resume,
    // schedules iOS warm-up blips). The user's next tap (TAP TO START GAME) advances state.
    if (state === 'INTRO_BLACK' && !audioUnlocked && pointInIconBox(txN, tyN, MUSIC_BTN_BOX)) {
      audioUnlocked = true;
      return;
    }
  }
  // N — PAUSED eats canvas taps (icon taps already handled above).
  if (state === 'PAUSED') return;
  // I1 — cutscene tap routes through cutsceneAdvance (per-state advance rules).
  // WIN_FREEZE / CUTSCENE_FADE_IN eat input; intro states skipToGame; GAMEPLAY = normal.
  // J — DEATH_REACTION eats input. GAME_OVER tap = restartFromGameOver (full reset).
  // K — INITIALS_ENTRY routes tap through handleInitialsTap before any restart logic.
  if (state === 'WIN_FREEZE' || state === 'CUTSCENE_FADE_IN' || state === 'DEATH_REACTION' || state === 'GAMEOVER_PENDING') return;
  if (state === 'GAME_OVER' && initialsEntryActive) {
    const r2=canvas.getBoundingClientRect();
    const tx2=(e.clientX-r2.left)/scale, ty2=(e.clientY-r2.top)/scale;
    handleInitialsTap(tx2, ty2);
    return;
  }
  if (state === 'GAME_OVER') { restartFromGameOver(); return; }
  if (state.indexOf('CUTSCENE_') === 0) { cutsceneAdvance(); return; }
  if (state === 'INTRO_BLACK') return;                     // N-FIX-5 BUG 2 — prime audio only, don't skip intro
  if (state !== 'GAMEPLAY') { skipToGame(); return; }
  // PC-HIDE-DPAD-JUMP — d-pad/jump hit-test gated to mobile. Belt-and-suspenders:
  // pointerdown also early-returns on mobile (PAUSE-MOBILE-TOUCHSTART-ONLY at line 4818),
  // so this branch is currently unreachable from either platform — but the explicit
  // IS_MOBILE wrap documents intent and survives any future change to the early-return.
  if (IS_MOBILE) {
    canvas.setPointerCapture(e.pointerId);
    const r=canvas.getBoundingClientRect();
    const tx=(e.clientX-r.left)/scale, ty=(e.clientY-r.top)/scale;
    const b=getBoxAt(tx,ty);
    activeTouches[e.pointerId]={action:b?b.action:null,box:b};
    if (b&&b.action==='jump') { touch.jump=true; setTimeout(()=>{touch.jump=false;},120); }
    applyTouchState();
  }
  selfHealBgm();   // AUDIO-3-MUSIC-UX — heal silent BGM on gameplay touch (R2/R3/R4 residuals); fires on PC click too
});
canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!(e.pointerId in activeTouches)) return;
  // PC-HIDE-DPAD-JUMP — d-pad drag-tracking gated to mobile. On PC, activeTouches won't
  // contain the pointerId anyway (pointerdown's d-pad block is also gated), but the
  // explicit gate makes the intent obvious.
  if (IS_MOBILE) {
    const r=canvas.getBoundingClientRect();
    const tx=(e.clientX-r.left)/scale, ty=(e.clientY-r.top)/scale;
    const b=getBoxAt(tx,ty);
    const prev=activeTouches[e.pointerId];
    if (b&&b.action==='jump'&&prev.action!=='jump') { touch.jump=true; setTimeout(()=>{touch.jump=false;},120); }
    activeTouches[e.pointerId]={action:b?b.action:null,box:b};
    applyTouchState();
  }
});
canvas.addEventListener('pointerup',     e=>{delete activeTouches[e.pointerId]; applyTouchState(); endInitialsArrowHold(); /* K-FIX-5 — release initials arrow hold */});
canvas.addEventListener('pointercancel', e=>{delete activeTouches[e.pointerId]; applyTouchState(); endInitialsArrowHold();});

// iOS Safari fallback — touch events in case pointer events don't fire
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();   // K-FIX-2 — Listener registered with {passive:false} below to honor
                        // preventDefault, which suppresses iOS's default touch behaviors
                        // (scroll, text selection) on the canvas. PAUSE-MOBILE-TOUCHSTART-
                        // ONLY (replaces PAUSE-DOUBLE-FIRE-FIX): no longer the suppressor of
                        // synthesized pointerdown — that's now handled by an unconditional
                        // IS_MOBILE early-return at the top of the pointerdown handler.
  ensureAudioContext(); // L — first-input audio gate (iOS Safari fallback path)
  // N — speaker + pause icon hit-test before state routing.
  {
    const r0 = canvas.getBoundingClientRect();
    const t0N = e.changedTouches[0];
    if (t0N) {
      const txN = (t0N.clientX - r0.left) / scale, tyN = (t0N.clientY - r0.top) / scale;

      });
      // AUDIO-3-LOG-DUMP — DUMP LOGS button (iOS touch path).
      if (dumpBtnVisible() && pointInIconBox(txN, tyN, DUMP_BTN_BOX)) { showDumpLogModal(); return; }
      // MOBILE-HIT-TEST-FIX — 50×50 hit-rects on iOS touch path too.
      // MOBILE-PAUSE-ONLY — speaker hit-test gated off on mobile (iOS path).

      // is where Howler's auto-unlock is finickiest.

  // WIN_FREEZE / CUTSCENE_FADE_IN eat input; intro states skipToGame; GAMEPLAY = normal.
  // J — DEATH_REACTION eats input. GAME_OVER tap = restartFromGameOver (full reset).
  // K — INITIALS_ENTRY routes tap through handleInitialsTap.
  if (state === 'WIN_FREEZE' || state === 'CUTSCENE_FADE_IN' || state === 'DEATH_REACTION' || state === 'GAMEOVER_PENDING') return;

  // touch on the now-invisible zones.
  if (IS_MOBILE) {

canvas.addEventListener('touchend', e=>{
  e.preventDefault();

  applyTouchState();
  endInitialsArrowHold();                    // K-FIX-5 — release initials arrow hold on lift
},{passive:false});
canvas.addEventListener('touchcancel', e=>{

  // release any held arrow so the cycle stops repeating.
  endInitialsArrowHold();
  applyTouchState();
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  // PC-HIDE-DPAD-JUMP — d-pad/jump touchmove drag-tracking gated to mobile.
  if (IS_MOBILE) {
    for (const t of e.changedTouches) {
      const r=canvas.getBoundingClientRect();
      const tx=(t.clientX-r.left)/scale, ty=(t.clientY-r.top)/scale;
      const b=getBoxAt(tx,ty);
      const prev=activeTouches['t'+t.identifier];
      if (b&&b.action==='jump'&&(!prev||prev.action!=='jump')){touch.jump=true;setTimeout(()=>{touch.jump=false;},120);}
      activeTouches['t'+t.identifier]={action:b?b.action:null,box:b};

function drawDpad() {
  if (state!=='GAMEPLAY') return;
  ctx.save();
  // MOBILE-LABELS — replaced 'JUMP' word + filled triangles with single-letter
  // 'J' + Unicode arrow chars per Brian field test. All 7 buttons now use big:true
  // (28px) so the single-letter J is readable on the wide jump button (180px wide).
  // Visual treatment (alpha, color, font, position) unchanged from prior F2 spec.
  const defs=[
    {b:boxJump,  icon:'J',   big:true},
    {b:boxJump2, icon:'J',   big:true},
    {b:boxJump3, icon:'J',   big:true},
    {b:boxLeft,  icon:'←',   big:true},
    {b:boxRight, icon:'→',   big:true},
    {b:boxUp,    icon:'↑',   big:true},
    {b:boxDown,  icon:'↓',   big:true},
  ];
  for (const {b,icon,big} of defs) {
    const active=Object.values(activeTouches).some(t=>t.box===b);
    // F2 — button rectangles barely visible by default. Idle fill 0.10→0.08, idle stroke 0.2→0.15.
    // Active state still ~2× idle so a tap still gives a visible feedback flash.
    ctx.fillStyle=active?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(b.x+2,b.y+2,b.w-4,b.h-4,10); ctx.fill();
    ctx.strokeStyle=active?'rgba(255,255,255,0.30)':'rgba(255,255,255,0.15)';
    ctx.lineWidth=1.5; ctx.stroke();
    // F2 — icon labels unchanged per spec (text colors and font kept exactly as before).
    ctx.fillStyle=active?'#fff':'rgba(255,255,255,0.55)';
    ctx.font=big?'bold 28px monospace':'bold 16px monospace';
    ctx.textAlign='center';
    ctx.fillText(icon, b.x+b.w/2, b.y+b.h/2+(big?10:6));   // MOBILE-LABELS-FIX: parens added — JS operator precedence (+ binds tighter than ?:) made the unparenthesized form parse as `(b.y+b.h/2+big) ? 10 : 6`, always returning 10. Every icon rendered at y=10 (behind the news ticker at y=0-18) since the F2 commit that first added the labels.
  }
  ctx.restore();
}

// Block 3 — canvas-path heart. cx,cy is the visual center; size is full width.
function drawHeart(cx, cy, size, filled) {
  const s = size;
  ctx.beginPath();
  // Two-circle top + V-bottom heart, centered at (cx, cy)
  const topY = cy - s * 0.10;
  const lobeR = s * 0.28;
  ctx.moveTo(cx, cy + s * 0.42);
  ctx.bezierCurveTo(cx - s * 0.55, cy + s * 0.05,  cx - s * 0.55, cy - s * 0.40,  cx - lobeR, cy - s * 0.40);
  ctx.bezierCurveTo(cx - s * 0.10, cy - s * 0.40,  cx,            topY,           cx,         cy - s * 0.05);
  ctx.bezierCurveTo(cx,            topY,           cx + s * 0.10, cy - s * 0.40,  cx + lobeR, cy - s * 0.40);
  ctx.bezierCurveTo(cx + s * 0.55, cy - s * 0.40,  cx + s * 0.55, cy + s * 0.05,  cx,         cy + s * 0.42);
  ctx.closePath();
  if (filled) {
    ctx.fillStyle = '#ff4444';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#992222';
    ctx.stroke();
  } else {
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = '#883333';
    ctx.stroke();
  }
}

//  I2 — CUTSCENE BACKGROUNDS
