// rnc_stage backdrop. The PNG is 960×541 (16:9-ish). Game canvas is 480×854 portrait.
// We scale the stage to canvas WIDTH (480 wide → 270.5 tall) and letterbox solid black above
// and below. STAGE_FLOOR_Y is the canvas y where sprites' feet should sit on the gold-star
// carpet floor (per spec — close to the lower-third of the scaled stage band).
const STAGE_CANVAS_TOP   = 292;
const STAGE_FLOOR_Y      = 540;
const STAGE_LEFT_BOUND   = 0;
const STAGE_RIGHT_BOUND  = W;

function drawRncStage() {
  // Black backdrop (letterbox bars above/below the stage band)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const cached = spriteCache['rnc_stage'];
  if (!cached) return;                                    // sprite not loaded yet — keep the bars
  const stageH = W * (cached.height / cached.width);      // preserve aspect at canvas width
  ctx.drawImage(cached, 0, STAGE_CANVAS_TOP, W, stageH);
}

// I-EAGLE-REWRITE — drawDtjCarried (rotated -45° runtime composite) removed. The carry now uses
// a pre-composed eagle_carry.png drawn via plain drawSprite — no rotation, no per-frame compose.

// Procedural sky for CUTSCENE_BETWEEN. Vertical gradient + 3–5 drifting cloud blobs.
// Cloud state initialized lazily on first draw and re-seeded any time the cutscene re-enters.
const CUTSCENE_CLOUDS = [];

// I-EAGLE-REWRITE — replaces I4's cutsceneEagle + I-CORR-4's carriedActive/drawDtjCarried.
// PHASE3 is now a 4-step DTJ pose sequence ending in a HARD CUT to a pre-composed eagle_carry
// PNG (eagle gripping DTJ as one sprite). No runtime compositing, no rotation, no fade.
// dtjStageMode  : which individual DTJ sprite renders on stage (mutually exclusive with comboActive)
//   'IDLE'      — dtj_idle, faces forward (PHASE1 + PHASE3 step1)
//   'WALK'      — dtj_walk, side-profile facing left (PHASE3 step2 — turn)
//   'SURPRISED' — dtj_surprised, mouth open looking up (PHASE3 step3)
//   'NONE'      — no individual DTJ sprite at all (PHASE3 step4 + BETWEEN + SCORE)
// comboActive  : when true, render the combined eagle_carry PNG at (combo.x, combo.y).
// combo        : { x, y } — foot-anchored position of the combined sprite (drawSprite footFrac=1.0).
// CONTRACT: comboActive==true MUST imply dtjStageMode==='NONE'. Never render two DTJ-class
//           sprites in the same frame.
let dtjStageMode = 'NONE';
let comboActive  = false;
// INTRO_TAUNT-V3 — one-shot guard for crowd_usa_chant.play() at STEP3 entry of
// CUTSCENE_PHASE3. Reset to false on every PHASE3 entry (line ~6700 area) so the
// chant fires fresh on each playthrough; flipped to true after the first STEP3
// frame to prevent re-fire every frame while DTJ stays in STEP3.
let usaChantFired = false;
const combo = { x: 0, y: 0 };
const COMBO_H = 160;                                  // combined eagle_carry render height (px)
function seedCutsceneClouds() {
  CUTSCENE_CLOUDS.length = 0;
  const N = 4 + Math.floor(Math.random() * 2);            // 4 or 5 clouds
  for (let i = 0; i < N; i++) {
    CUTSCENE_CLOUDS.push({
      x: Math.random() * W,
      y: 80 + Math.random() * 380,                        // upper / middle band
      r: 28 + Math.random() * 22,                         // base blob radius
      spd: 8 + Math.random() * 8,                         // ~10 px/s leftward drift
    });
  }
}
function drawCutsceneSky(dt) {
  if (CUTSCENE_CLOUDS.length === 0) seedCutsceneClouds();
  // Vertical gradient — light blue (top) to deeper blue (bottom)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    '#9ec9ee');
  g.addColorStop(0.55, '#5ea0d2');
  g.addColorStop(1,    '#27579b');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Drift + render clouds. Each cloud is three overlapping white circles for that "puffy" look.
  for (const c of CUTSCENE_CLOUDS) {
    c.x -= c.spd * dt;
    if (c.x < -c.r * 3) c.x = W + c.r * 3;                // wrap around right edge
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.arc(c.x,             c.y,           c.r,         0, Math.PI*2);
    ctx.arc(c.x + c.r * 0.8, c.y - c.r*0.2, c.r * 0.85,  0, Math.PI*2);
    ctx.arc(c.x - c.r * 0.7, c.y - c.r*0.1, c.r * 0.75,  0, Math.PI*2);
    ctx.fill();
  }
}

// J — shared score-breakdown overlay. Reused by CUTSCENE_SCORE (level complete) and GAME_OVER
// (lives exhausted). Same fonts, same spacing, same row component. Layout-identical except for
// the header text, the total value, the prompt text, an optional high-score block + creator
// credit line at the bottom (both GAME_OVER opt-ins).
//   opts = {
//     header,        // header line, e.g. 'LEVEL 1 COMPLETE' or 'GAME OVER'
//     total,         // numeric total to display (already-final score)
//     prompt,        // pulsing prompt text, e.g. 'TAP TO CONTINUE' or 'TAP TO RESTART'
//     pulseT,        // time used for the prompt pulse (CUTSCENE_SCORE uses stateT, GAME_OVER same)
//     showHighScore, // bool — L-FIX-3: render TOP 5 list + (optional) NEW HIGH SCORE! line. The standalone HIGH SCORE summary row was removed (TOP 5 rank #1 in gold conveys the same info).
//     highScores,    // K-FIX-5 — array of {initials, score} (the top-5 leaderboard, may be empty)
//     isNewHigh,     // bool — when true, render 'NEW HIGH SCORE!' line (only used if showHighScore)
//     showCredit,    // bool — when true, render 'Created by Brian Albert' subtle line at very bottom
//   }
function drawScoreBreakdown(opts) {
  drawRncStage();
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  // Header
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(opts.header, W/2, 120);

  // Breakdown rows: label-left at x=70, value-right at x=410
  const labelX = 70, valueX = 410;
  let y = 200;
  const ROW = 38;
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = '#fff';
  function row(label, val, color) {
    ctx.fillStyle = '#cccccc';
    ctx.textAlign = 'left';
    ctx.fillText(label, labelX, y);
    ctx.fillStyle = color || '#ffeb70';
    ctx.textAlign = 'right';
    ctx.fillText('+' + val, valueX, y);
    y += ROW;
  }
  // P-DIFFICULTY-1: Survival row removed (per-second survival scoring deleted).
  // The row(...) helper auto-advances y via `y += ROW;`, so the 7 rows below shift
  // up cleanly with no manual y adjustment.
  // row('Survival:',         Math.floor(stats.survivalScore),                     '#aaffaa');
  row('Capsules cleared:', stats.clearedCount    * CAPSULE_CLEAR_SCORE,         '#aaffaa');
  row('Helper kills:',     stats.helperKillCount * HELPER_KILL_SCORE,           '#ff88ff');
  row('Briefcases:',       stats.briefcaseCount  * BRIEFCASE_SCORE,             '#88ff88');
  row('Platforms:',        stats.platformCount   * PLATFORM_REACH_BONUS,        '#88ddff');
  row('Pelosi tears:',     stats.pelosiCount     * PELOSI_BONUS,                '#ffcc00');
  row('Time bonus:',       stats.timeBonus,                                     '#ffaa55');
  // P-DIFFICULTY-1 — winBonus is now per-level via getLevelParams (set at win time
  // into stats.winBonus by the existing pipeline at line 2434). Display unchanged.
  row('WIN BONUS:',        stats.winBonus,                                      '#ffcc00');

  // Divider + total
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(labelX, y - 10); ctx.lineTo(valueX, y - 10); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('TOTAL:', labelX, y + 18);
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(opts.total).toString(), valueX, y + 22);
  y += ROW;

  // J — high-score block (GAME_OVER only). K-FIX-5 — now sources from opts.highScores array
  // (top-5 leaderboard). L-FIX-3 — DELETED the standalone "HIGH SCORE: BRI 4325" summary row
  // that used to live here. The TOP 5 list below already shows the top entry as rank #1 in
  // gold ("1. BRI 4325") with its score column right-aligned at LB_SCORE_X=360, so the summary
  // row was redundant. The summary row used valueX=410 which sat 50px right of the TOP 5 score
  // column — that mismatch was the misalignment Brian kept seeing. Removing the row eliminates
  // both the redundancy and the visual misalignment in one move. NEW HIGH SCORE! line still
  // gates on opts.isNewHigh. Leaderboard rows render below when opts.highScores has at least
  // one entry.
  if (opts.showHighScore) {
    y += 14;
    const board = opts.highScores || [];
    if (opts.isNewHigh) {
      ctx.fillStyle = '#aaffaa';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('NEW HIGH SCORE!', W/2, y + 12);
      y += 22;
    }
    // K-FIX-5 — TOP 5 leaderboard. Subheader + up to 5 rows. Format per spec:
    //   "1. BRI 5799"
    //   "2. BA  4325"  (initials are 3 chars, spaces preserved here — leaderboard is a list
    //   "3. B   2200"   context where blank slots read clearly without underscore substitution)
    // Empty leaderboard hides subheader + rows entirely.
    if (board.length > 0) {
      y += 8;
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = '#aaccff';
      ctx.textAlign = 'center';
      ctx.fillText('TOP 5', W/2, y);
      y += 16;
      // L-FIX-1 — column-aligned via THREE fillText calls per row at fixed canvas-pixel x
      // positions, NOT via padStart/padEnd string concatenation. L-FIX-2 — extracted into a
      // single shared drawLeaderboardRow inline-helper so rank #1's gold-row render is
      // STRUCTURALLY identical to rows 2-5 (only ctx.fillStyle differs). Pre-L-FIX-2 the
      // gold/white split lived inside the loop body and could drift if any future edit
      // accidentally introduced a per-rank font/align divergence; the helper makes that
      // structurally impossible.
      const LB_ROW_W       = 240;                          // visual width of leaderboard column
      const LB_LEFT        = (W - LB_ROW_W) / 2;           // = 120; centers the column
      const LB_RANK_X      = LB_LEFT + 0;                  // left edge for "1."
      const LB_INITIALS_X  = LB_LEFT + 50;                 // left edge for initials
      const LB_SCORE_X     = LB_LEFT + LB_ROW_W;           // right edge for score
      const LB_FONT        = '14px monospace';             // single font value for all 5 rows
      function drawLeaderboardRow(rank, entry, rowY) {
        // Identical layout for every rank. The ONLY per-rank difference is fillStyle (gold for
        // rank 1, white for 2-5). Font, x positions, and alignment are constants.
        ctx.font = LB_FONT;
        ctx.fillStyle = (rank === 1) ? '#ffcc00' : '#dddddd';
        ctx.textAlign = 'left';
        ctx.fillText(rank + '.', LB_RANK_X, rowY);
        ctx.textAlign = 'left';
        ctx.fillText(entry.initials, LB_INITIALS_X, rowY);
        ctx.textAlign = 'right';
        ctx.fillText(String(Math.floor(entry.score)), LB_SCORE_X, rowY);
      }
      for (let i = 0; i < board.length; i++) {
        drawLeaderboardRow(i + 1, board[i], y);
        y += 18;
      }
      ctx.textAlign = 'left';                              // restore default
    }
  }

  // Pulsing prompt. K — empty-string opt-out (used while INITIALS_ENTRY UI overlays the prompt).
  if (opts.prompt) {
    const pulse = 0.5 + 0.5 * Math.sin(opts.pulseT * 4);
    ctx.fillStyle = 'rgba(255,255,255,' + (0.35 + 0.55 * pulse).toFixed(3) + ')';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(opts.prompt, W/2, 780);
  }

  // J — creator credit (GAME_OVER only). K-FIX-3 — dark gold full-opacity (was subtle gray
  // 0.6 alpha; too faint to read against the black GAME_OVER overlay). Same font + position.
  if (opts.showCredit) {
    ctx.fillStyle = '#9a7a00';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Created by Brian Albert', W/2, 820);
  }
}

function drawHUD() {
  // F1 — HUD background fill REMOVED. Lives, title, and score render directly over the night sky.
  // J — hearts replaced with mini DNC sprites scaled down (no new asset). Block O polish revisits
  // if it reads muddy at this size. drawDonkey is foot-anchored; sc=0.3 yields ~22-25px tall.
  // Lives count is rendered left-to-right; missing lives just don't draw (no outlined slot).
  const dncSc    = 0.3;
  const dncStep  = 16;                             // x-spacing between mini-DNCs at this scale
  const dncStartX = 14;

  // around the textAlign change so the next render block doesn't inherit 'left'.

  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';

  ctx.fillText('DNC vs DJT', W/2, HUD_Y + 17);

  // J — score + high score, right-aligned. SCORE on the upper line, HI on the lower line so the
  // HUD typography matches the existing 13px monospace SCORE style without crowding the title.
  ctx.fillStyle='#ffcc00'; ctx.font='bold 13px monospace'; ctx.textAlign='right';
  ctx.fillText('SC: ' + Math.floor(playerScore), W-8, HUD_Y + 11);   // P-DIFFICULTY-1-FIX GATE 19: 'SCORE ' → 'SC: ' (saves ~16px on 480px iPhone)
  // J — HIGH SCORE display rule: blank dashes when the player has never set a score.
  // K-FIX-5 — sources the top entry from highScores (was: highScore + highScoreInitials globals).
  // Three-way display preserved from K-FIX-2/4:
  //   leaderboard empty                       → 'HI ---'
  //   top entry initials empty (after trim)   → 'HI 4325' (legacy J-save migrated as '   ')
  //   top entry initials non-empty            → 'HI BRI 4325'  (trailing spaces trimmed)
  ctx.fillStyle='#aaccff'; ctx.font='bold 11px monospace';
  let hiText;
  // P-DIFFICULTY-1-FIX GATE 19: 'HI ' → 'HI: ' for visual consistency with 'SC: '.
  if (highScores.length === 0) {
    hiText = 'HI: ---';
  } else {
    const top = highScores[0];
    const trimmed = (top.initials || '').replace(/\s+$/, '');
    if (!trimmed) hiText = 'HI: ' + Math.floor(top.score);
    else          hiText = 'HI: ' + trimmed + ' ' + Math.floor(top.score);
  }
  ctx.fillText(hiText, W-8, HUD_Y + 22);

  // Block D — multiplier badge. E2 corrected — badge placed flush BELOW the HUD bar (in the
  // gameplay area) so it stays visible while boosted regardless of bar order.
  if (multiplier > 1.0) {
    const badgeY = HUD_Y + HUD_HEIGHT;           // sits flush under the HUD bar
    ctx.fillStyle = 'rgba(0,30,15,0.85)';
    ctx.fillRect(W-58, badgeY, 58, 16);
    ctx.fillStyle = '#44ff88';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('×' + multiplier.toFixed(1), W-8, badgeY + 12);
  }
}

// ─────────────────────────────────────────────
//  SPEECH BUBBLE
// ─────────────────────────────────────────────
// Existing intro/cutscene bubble — used by INTRO_TAUNT (FAKE NEWS! over DTJ on the rooftop).
// Renders ABOVE a position with downward tail. Block L's dance bubble was originally calling
// this with y=TOP.y-110=30 which placed it BEHIND the news ticker. L-FIX-1 routes dance/taunt
// in-game bubbles through drawSideBandBubble below; this function is unchanged for INTRO_TAUNT.
function drawBubble(x, y, text, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  const pw=180, ph=48, px=x-pw/2, py=y-ph-20;
  ctx.fillStyle='#fff'; ctx.strokeStyle='#cc0000'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,8); ctx.fill(); ctx.stroke();
  // Tail
  ctx.beginPath(); ctx.moveTo(x-12,py+ph); ctx.lineTo(x,py+ph+20); ctx.lineTo(x+12,py+ph); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#cc0000'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
  ctx.fillText(text, x, py+22);
  ctx.restore();
}

// L-FIX-1 — in-game bubble for DTJ dance + (future) Block M taunt. Fixed position in the
// right-side empty band between the news ticker bottom (y=18) and the TOP platform (y=140),
// between the static barrel area and the canvas right edge. Tail points LEFT toward DTJ on TOP.
// Word-wrapped, multi-line, larger font than the HUD/ticker so the gag reads at a glance.
const SIDE_BUBBLE_X       = 300;                          // left edge
const SIDE_BUBBLE_Y       = 50;                           // top edge (below ticker @ y=18)
const SIDE_BUBBLE_W       = 170;
const SIDE_BUBBLE_H_MAX   = 90;                           // visual cap; actual height shrinks if fewer lines
const SIDE_BUBBLE_PAD     = 10;
const SIDE_BUBBLE_LINE_H  = 18;
const SIDE_BUBBLE_FONT    = 'bold 14px sans-serif';
const SIDE_BUBBLE_MAX_LINES = 3;                          // wrap cap

function wrapBubbleText(text, maxWidth) {
  ctx.font = SIDE_BUBBLE_FONT;
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    if (lines.length >= SIDE_BUBBLE_MAX_LINES) break;
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth) {
      if (current) lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current && lines.length < SIDE_BUBBLE_MAX_LINES) lines.push(current);
  return lines;
}

function drawSideBandBubble(text, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Wrap text to fit inside (width - 2*pad).
  const innerW = SIDE_BUBBLE_W - 2 * SIDE_BUBBLE_PAD;
  const lines = wrapBubbleText(text, innerW);
  const usedH = Math.min(SIDE_BUBBLE_H_MAX,
                         SIDE_BUBBLE_PAD * 2 + lines.length * SIDE_BUBBLE_LINE_H);
  const px = SIDE_BUBBLE_X;
  const py = SIDE_BUBBLE_Y;
  const pw = SIDE_BUBBLE_W;
  const ph = usedH;
  // Bubble body
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 10); ctx.fill(); ctx.stroke();
  // Tail — small triangle on LEFT edge at vertical mid-bubble, pointing LEFT toward DTJ.
  const tailY = py + ph / 2;
  ctx.beginPath();
  ctx.moveTo(px,         tailY - 8);
  ctx.lineTo(px - 14,    tailY);
  ctx.lineTo(px,         tailY + 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Text — dark red on white, centered horizontally within the bubble, stacked vertically.
  ctx.fillStyle = '#cc0000';
  ctx.font = SIDE_BUBBLE_FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  let ty = py + SIDE_BUBBLE_PAD;
  for (const line of lines) {
    ctx.fillText(line, px + pw / 2, ty);
    ty += SIDE_BUBBLE_LINE_H;
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// I-CORR-3 — caption system replaces per-character speech bubbles for ALL cutscene dialogue.
// I-CORR-4 — strip is now bottom-aligned to STAGE_CANVAS_TOP (=292) so it sits flush above the
// stage scene with no black gap. Same alignment in SCORE/BETWEEN states.
// ONE caption visible at a time. Sub-states FADE_IN → HOLD → FADE_OUT.
const captionQueue = [];
let captionCurrent = null;          // { speaker, text, holdSec }
let captionPhase = 'idle';          // 'idle' | 'fadein' | 'hold' | 'fadeout'
let captionPhaseT = 0;
const CAPTION_FADE_IN     = 0.2;
const CAPTION_FADE_OUT    = 0.3;
const CAPTION_DEFAULT_HOLD = 1.5;

// I-EAGLE-REWRITE — carriedActive removed. Replaced by dtjStageMode + comboActive (declared
// above near the cutscene state vars). Gating moved into the PHASE3 step machine.

// I-CORR-4 — dtjScale grows DTJ on stage when the "WITCH HUNT!" caption is held, easing back
// when the caption fades out. Applied to the on-stage DTJ render in PHASE1 only.
let dtjScale = 1.0;
let dtjScaleTarget = 1.0;
const DTJ_SCALE_HOLD     = 1.6;
const DTJ_SCALE_EASE_DUR = 0.15;
const DTJ_SCALE_RATE     = (DTJ_SCALE_HOLD - 1.0) / DTJ_SCALE_EASE_DUR;       // = 4.0/sec

function pushCaption(speaker, text, holdSec) {
  captionQueue.push({ speaker: speaker, text: text, holdSec: (holdSec != null ? holdSec : CAPTION_DEFAULT_HOLD) });
}

function clearCaptions() {
  captionQueue.length = 0;
  captionCurrent = null;
  captionPhase = 'idle';
  captionPhaseT = 0;
  // I-CORR-4 — drop any zoom-in-progress; stage DTJ snaps back to 1.0x next frame.
  dtjScaleTarget = 1.0;
}

// I-CORR-4 — true if the currently-held caption is the DJT "WITCH HUNT!" punchline. Used to gate
// the on-stage DTJ zoom-in.
function captionIsWitchHunt(cap) {
  return cap && cap.speaker === 'DJT' && cap.text === 'WITCH HUNT!';
}

function tickCaptions(dt) {
  if (captionPhase === 'idle') {
    if (captionQueue.length > 0) {
      captionCurrent = captionQueue.shift();
      captionPhase = 'fadein';
      captionPhaseT = 0;
      // INTRO_TAUNT-V3-FIX — fire caption-paired audio at the moment the caption
      // is popped off the queue and starts its visual fadein, NOT at pushCaption
      // time (which only enqueues — actual display is delayed until prior captions
      // complete their fadein/hold/fadeout cycle). Pushing audio at PHASE1 entry
      // (the prior wiring at lines ~6668 / 6673) caused WITCH HUNT mp3 to fire
      // ~3s before the WITCH HUNT caption actually appeared (DNC caption ran first
      // for ~3s with its own fadein/hold/fadeout). Per GLOBAL AUDIO RULE: audio
      // fires when its bubble is ON SCREEN, not when its push is queued.
      // No captionIsDnc helper exists — using inline string match for the DNC
      // caption (single use site, tactical). captionIsWitchHunt at line ~5699
      // already exists and is used for dtjScale gating; reusing it here.
      if (typeof TRUMP_AUDIO !== 'undefined' && captionIsWitchHunt(captionCurrent) && TRUMP_AUDIO['WITCH HUNT!']) {
        TRUMP_AUDIO['WITCH HUNT!'].play();
      }
      if (typeof GAME_SFX !== 'undefined' && captionCurrent.speaker === 'DNC' && captionCurrent.text === "YOU'RE FIRED, MR. PRESIDENT!" && GAME_SFX.dnc_youre_fired) {
        GAME_SFX.dnc_youre_fired.play();
      }
    }
    // I-CORR-4 — out of caption: ensure DTJ shrinks back.
    dtjScaleTarget = 1.0;
  } else {
    captionPhaseT += dt;
    if (captionPhase === 'fadein' && captionPhaseT >= CAPTION_FADE_IN) {
      captionPhase = 'hold';
      captionPhaseT = 0;
      // I-CORR-4 — entering HOLD on "WITCH HUNT!" → grow DTJ.
      if (captionIsWitchHunt(captionCurrent)) dtjScaleTarget = DTJ_SCALE_HOLD;
    } else if (captionPhase === 'hold' && captionPhaseT >= captionCurrent.holdSec) {
      captionPhase = 'fadeout';
      captionPhaseT = 0;
      // I-CORR-4 — leaving HOLD on "WITCH HUNT!" → shrink DTJ back.
      if (captionIsWitchHunt(captionCurrent)) dtjScaleTarget = 1.0;
    } else if (captionPhase === 'fadeout' && captionPhaseT >= CAPTION_FADE_OUT) {
      captionPhase = 'idle';
      captionCurrent = null;
      captionPhaseT = 0;
    }
  }

  // I-CORR-4 — ease dtjScale toward target every frame (linear @ DTJ_SCALE_RATE).
  if (dtjScale < dtjScaleTarget) dtjScale = Math.min(dtjScaleTarget, dtjScale + DTJ_SCALE_RATE * dt);
  else if (dtjScale > dtjScaleTarget) dtjScale = Math.max(dtjScaleTarget, dtjScale - DTJ_SCALE_RATE * dt);
}

function renderCutsceneCaption() {
  if (!captionCurrent) return;
  const cap = captionCurrent;
  let alpha = 1;
  if      (captionPhase === 'fadein')  alpha = Math.min(1, captionPhaseT / CAPTION_FADE_IN);
  else if (captionPhase === 'fadeout') alpha = Math.max(0, 1 - captionPhaseT / CAPTION_FADE_OUT);

  const PAD_X           = 16;
  const PAD_Y           = 8;
  const SPEAKER_FONT_PX = 12;
  const TEXT_FONT_PX    = 18;
  const LINE_HEIGHT     = 22;
  const MAX_LINES       = 3;

  // Word-wrap dialogue to canvas width minus padding.
  ctx.save();
  ctx.font = 'bold ' + TEXT_FONT_PX + 'px monospace';
  const maxTextWidth = W - 2 * PAD_X;
  const words = cap.text.split(' ');
  const lines = [];
  let cur = '';
  for (const word of words) {
    if (lines.length >= MAX_LINES) break;
    const trial = cur ? cur + ' ' + word : word;
    if (ctx.measureText(trial).width <= maxTextWidth) cur = trial;
    else { if (cur) lines.push(cur); cur = word; }
  }
  if (cur && lines.length < MAX_LINES) lines.push(cur);
  // Truncation guard: if user passes a long string AND wrap exceeds MAX_LINES, append ellipsis.
  if (lines.length === MAX_LINES) {
    let combinedLength = 0;
    for (const ln of lines) combinedLength += ln.length + 1;
    if (combinedLength < cap.text.length) lines[MAX_LINES - 1] += '…';
  }

  const stripH = PAD_Y + SPEAKER_FONT_PX + 4 + lines.length * LINE_HEIGHT + PAD_Y;
  // I-CORR-4 — bottom-align the strip to the top edge of the cutscene scene background
  // (STAGE_CANVAS_TOP=292 per Block I I2). This puts the caption flush against the top of
  // the stage with no black gap. Same y for SCORE/BETWEEN — positions consistently across phases.
  const STRIP_TOP_Y = STAGE_CANVAS_TOP - stripH;

  ctx.globalAlpha = alpha;
  // Strip background — semi-transparent black, full canvas width
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, STRIP_TOP_Y, W, stripH);
  // Top + bottom 1px gold borders
  ctx.fillStyle = 'rgba(204,153,51,0.9)';
  ctx.fillRect(0, STRIP_TOP_Y, W, 1);
  ctx.fillRect(0, STRIP_TOP_Y + stripH - 1, W, 1);

  // Speaker label (color-coded)
  let speakerColor;
  if      (cap.speaker === 'DNC') speakerColor = '#88aaff';
  else if (cap.speaker === 'DJT') speakerColor = '#ffcc00';
  else                              speakerColor = '#ffffff';
  ctx.fillStyle = speakerColor;
  ctx.font = 'bold ' + SPEAKER_FONT_PX + 'px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(cap.speaker + ':', PAD_X, STRIP_TOP_Y + PAD_Y);

  // Dialogue lines
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + TEXT_FONT_PX + 'px monospace';
  ctx.textAlign = 'center';
  let ly = STRIP_TOP_Y + PAD_Y + SPEAKER_FONT_PX + 4;
  for (const line of lines) {
    ctx.fillText(line, W / 2, ly);
    ly += LINE_HEIGHT;
  }

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ─────────────────────────────────────────────
//  GAMEPLAY LAYOUT
// ─────────────────────────────────────────────
function drawGameplay(shake) {
  const sx = shake ? (Math.random()-0.5)*shakeAmt : 0;
  const sy = shake ? (Math.random()-0.5)*shakeAmt : 0;
  ctx.save(); ctx.translate(sx, sy);

  // Sky
  const sg = ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#090918'); sg.addColorStop(1,'#12123a');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    ctx.fillStyle=`rgba(255,255,255,${s.a*0.5})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });

  // Ground
  ctx.fillStyle='#08081e'; ctx.fillRect(0,804,W,50);
  ctx.fillStyle='#0a0a28'; ctx.fillRect(0,804,W,6);

  // Platforms
  platforms.forEach(drawPlatform);
  // Ladders
  ladders.forEach(drawLadder);

  // TVs on top platform
  // F2 — CNN stack stays on left; MSNBC stack moves to right edge of TOP.
  // Layout: CNN(left) → DTJ → barrel → MSNBC(right edge).
  drawTV(TOP.x+8,            TOP.y-68, 'CNN',   totalT);
  drawTV(TOP.x+8,            TOP.y-34, 'CNN',   totalT+0.4);
  drawTV(TOP.x+TOP.w-40,     TOP.y-68, 'MSNBC', totalT);
  drawTV(TOP.x+TOP.w-40,     TOP.y-34, 'MSNBC', totalT+0.4);

  // Block 2.6 — static barrel decoration on TOP, screen-LEFT of DTJ (which is DTJ's right hand side).
  // Drawn AFTER platforms but BEFORE DTJ so DTJ overlaps it visually if they cross.
  // Decorative only — no entity, no collision. Capsules spawn FROM this position (TOP.x+50).
  // y arg is the foot/bottom edge sitting on TOP surface; footFrac=1.0 anchors the bottom there.
  // F3 — static barrel renders at 2x (CAPSULE_R*4). Rolling capsule (barrel_endview) size unchanged.
  drawSprite('barrel_upright', BARREL_X, TOP.y, CAPSULE_R * 4, false, 1.0);

  // Capsules + pickup + helpers + Pelosi (rendered behind DNC/DTJ).
  // Burning Briefcase entity deleted in C2 v2.
  drawCapsules();
  drawPickup();
  drawHats();                                                         // P-ENEMY-1: rendered between caps and helpers (mid z-order)
  drawBadges();                                                       // P-WEAPON-1: uncollected badge pickups
  drawHelpers();
  drawPelosi();
  // K — Secret Service rendered BEHIND DTJ (z-order: helpers → SS → DTJ → DNC). The 3 SS units
  // are stationary on TOP, fade in when Antifa start climbing ladder[5], fade out 0.5s after the
  // last Antifa dies. Decorative-only — never participates in any AABB check.
  drawSS();

  // D.T.J. — C3 / D1 state-driven render. dtj_throw is fired ONLY at BARREL_X (twice per throw,
  // once with no flip for COCK and once mirrored for RELEASE). dtj_idle is fired ONLY at
  // DTJ_GAMEPLAY_X. Walk frames cycle dtj_walk/dtj_walk2 every 0.1s during the two walk phases.
  //   IDLE:          dtj_idle at DTJ_GAMEPLAY_X (no flip)
  //   WALK_TO_BARREL: dtj_walk(2) cycle, x interpolates DTJ_GAMEPLAY_X → BARREL_X (no flip)
  //   THROW_COCK:    dtj_throw at BARREL_X, flip=false   (wind-up, arm pulled right)
  //   THROW_RELEASE: dtj_throw at BARREL_X, flip=true    (follow-through, arm extended left)
  //   WALK_BACK:     dtj_walk(2) cycle, x interpolates BARREL_X → DTJ_GAMEPLAY_X (flip=true)
  // L — DTJ render: dance overrides the throw-anim state machine. While dancing, DTJ is locked
  // to DTJ_GAMEPLAY_X (no walk-to-barrel motion) and the pose cycles through DTJ_DANCE_POSES.
  // The throw machine still ticks underneath (capsules continue to spawn on schedule), but the
  // render slot is owned by the dance.
  if (dtjDanceState === 'DANCING') {
    const tWithinCycle = dtjDanceT % DTJ_DANCE_CYCLE_DURATION;
    const danceSprite  = getDtjDancePose(tWithinCycle);
    drawSprite(danceSprite, DTJ_GAMEPLAY_X, TOP.y, 110, false, 1.0);
    // L — dance speech bubble (LOSER!/SAD! cycle 1, GREATEST WIN EVER! cycle 2).
    // L-FIX-1 — routed through drawSideBandBubble (right-side empty band, x=300/y=50). Block L
    // had this calling drawBubble at y=TOP.y-110=30 which placed the bubble BEHIND the news
    // ticker (ticker bottom at y=18, original bubble top at y=-38 — completely off-canvas).
    // L-FIX-1 / M — bubble render moved out of the dance-only branch; now drawn at the end of
    // drawGameplay so it renders for BOTH dance bubbles (during DANCING) and taunt bubbles
    // (during GAMEPLAY). Single render call site below before drawHUD.
  } else if (dtjAnimState === 'IDLE') {
    drawSprite('dtj_idle', DTJ_GAMEPLAY_X, TOP.y, 110, false, 1.0);
  } else if (dtjAnimState === 'THROW_COCK') {
    drawSprite('dtj_throw', dtjAnimX, TOP.y, 110, false, 1.0);
  } else if (dtjAnimState === 'THROW_RELEASE') {
    drawSprite('dtj_throw', dtjAnimX, TOP.y, 110, true, 1.0);
  } else {
    // WALK_TO_BARREL or WALK_BACK — alternate walk frames every 0.1s
    const walkSprite = (Math.floor(dtjAnimT * 10) % 2 === 0) ? 'dtj_walk' : 'dtj_walk2';
    const walkFlip   = (dtjAnimState === 'WALK_BACK');         // walk-back faces left
    drawSprite(walkSprite, dtjAnimX, TOP.y, 110, walkFlip, 1.0);
  }

  // Player character (DNC). J — death reaction overrides normal render:
  //   phase1 → render rotated about body center (deathRotation accumulates at 720°/s)
  //   phase2 → suppress player render entirely; debris IS the player visual now
  if (state === 'GAMEOVER_PENDING') {
    // L-FIX-1 — player is dead; world keeps running underneath the DTJ dance. Suppress
    // player render entirely (debris already drained by the time we enter GAMEOVER_PENDING
    // from DEATH_REACTION end).
  } else if (state === 'DEATH_REACTION' && deathPhase === 'phase2') {
    // No-op — debris draw happens in the DEATH_REACTION state case after drawGameplay.
  } else if (state === 'DEATH_REACTION' && deathPhase === 'phase1') {
    ctx.save();
    ctx.translate(player.x, player.y - 24);                // approx body center; foot 24 below
    ctx.rotate(player.deathRotation * Math.PI / 180);
    drawDonkey(0, 24, 0.65, false, false, 0);              // foot at +24 from rotation pivot
    ctx.restore();
  } else {
    const walking = player.vx !== 0 || player.onLadder;
    // Block 3 — blink during invulnerability: toggle alpha every 0.1s (5 flashes/s).
    // Method: Math.floor(invulnT * 10) % 2 chooses dim/bright frame.
    const blinkDim = player.invulnT > 0 && Math.floor(player.invulnT * 10) % 2 === 0;
    // K addendum — horizontal jitter while shakeT > 0 (set by ejectPlayerFromLadder5).
    const shakeDx = player.shakeT > 0 ? (Math.random() - 0.5) * 2 * PLAYER_SHAKE_AMPLITUDE : 0;
    if (blinkDim) { ctx.save(); ctx.globalAlpha = 0.4; }
    drawDonkey(player.x + shakeDx, player.y, 0.65, player.facing < 0, walking, player.walkT);
    if (blinkDim) ctx.restore();
    // P-WEAPON-1: render badge in player's hand while wielding (composite atop
    // player sprite). Drawn AFTER drawDonkey so it sits in front.
    drawBadgeWieldOverlay();
  }
  // P-WEAPON-1: render kill flashes (drawn AFTER player so flash sits on
  // top of any sprite at kill location).
  drawKillFlashes();

  // Block 2.5 — green $ box decorations removed (Block 4 will replace with real briefcase pickups)

  // H2 — score-float "+N" text near each scoring event. Drawn inside the gameplay zoom transform
  // so the floats stay anchored to the world position they spawned at (not the HUD).
  for (const sf of scoreFloats) {
    const a = Math.max(0, 1 - sf.t / SCORE_FLOAT_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = sf.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.strokeText(sf.text, sf.x, sf.y);
    ctx.fillText(sf.text, sf.x, sf.y);
    ctx.restore();
  }

  ctx.restore();

  // K — ragdoll debris + one-frame burst flash render on TOP of the gameplay world (under HUD).
  // Used by both player DEATH_REACTION and Antifa RAGDOLL bursts. Drains naturally as items
  // expire (life=0.4s); shared global pool, no per-entity tracking.
  renderRagdollDebrisAndFlash();

  // M — bubble render (right-side empty band) drawn AFTER all gameplay sprites + debris so it
  // sits visually on top of the world, but BEFORE drawHUD so HUD score/HI text never get
  // covered. Single render path used by both Block L dance bubbles and Block M taunt bubbles.
  if (bubble.active) drawSideBandBubble(bubble.text, getBubbleAlpha());

  drawHUD();
  drawTicker();
  // PC-HIDE-DPAD-JUMP — d-pad + jump-button visuals only render on mobile. PC users have
  // keyboard arrows / WASD / space for movement and jump, so the on-canvas controls are
  // clutter. drawDpad's loop renders boxLeft/boxRight/boxUp/boxDown AND boxJump/boxJump2/
  // boxJump3, so this single gate covers both d-pad and jump button. Touch-input hit-tests
  // are gated separately below to prevent PC clicks in the (now invisible) zones from
  // registering phantom d-pad/jump actions.
  if (IS_MOBILE) drawDpad();
  // N — icons + pause overlay drawn at outer-loop level (after the state switch) so they're
  // always on top regardless of which state's case body rendered.
}


// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
let lastT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts; totalT += dt; stateT += dt;

  // Ticker scroll
  tickX -= 70*dt;
  if (tickX < -(ctx.measureText(TICKER).width||1200)) tickX = W;

      ctx.save(); ctx.translate(shakeX,shakeY);
      bricks.forEach(b=>{
        if(!b.active) return;
        ctx.save();
        ctx.translate(b.x+b.w/2, b.y+b.h/2);
        ctx.rotate(b.rot);
        ctx.fillStyle=b.color;
        ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
        // Mortar line
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
        ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.fillRect(-b.w/2,-b.h/2,b.w,3);
        ctx.restore();
      });
      ctx.restore();

      // DTJ stays at his platform position during shatter
      if(buildingFade > 0 || rampReveal < 1) {
        ctx.globalAlpha = Math.max(buildingFade, rampReveal);
        drawSprite('dtj_idle', DTJ_GAMEPLAY_X, TOP.y, 110);
        ctx.globalAlpha = 1;
      }

      // Particles
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;

      // Screen flash on big impacts
      if(shatterT<0.12){
        ctx.fillStyle=`rgba(255,255,255,${(0.12-shatterT)/0.12*0.7})`;
        ctx.fillRect(0,0,W,H);
      }
      if(shatterT>0.5&&shatterT<0.62){
        ctx.fillStyle=`rgba(255,180,0,${(0.62-shatterT)/0.12*0.5})`;
        ctx.fillRect(0,0,W,H);
      }
      break;
    }

    case 'GAMEPLAY': {
      // P-DIFFICULTY-1: per-second survival score block removed entirely.
      // Was: const inc = SCORE_PER_SECOND * dt * multiplier; playerScore += inc;
      //      stats.survivalScore += inc;
      // Survival category in score breakdown also removed (line ~5418). Score now
      // comes purely from event-driven sources: capsule clears, helper kills,
      // briefcases, platform-reach bonuses, Pelosi tears, time bonus, win bonus.
      // DK-DIFFICULTY-RAMP: tick in-level timer + recompute effective dkDifficulty.
      // Per arcade DK: difficulty starts at min(level, 5), bumps by 1 every 33s
      // in-level, capped at 5. Logged on every change for tuning visibility.
      levelTime += dt;
      const _baseDiff = (getLevelParams().dkDifficulty || 1);
      const _newDiff  = Math.min(_baseDiff + Math.floor(levelTime / DK_DIFFICULTY_RAMP_INTERVAL), 5);
      if (_newDiff !== dkDifficultyEffective) {
        console.log('[DK-DIFFICULTY-RAMP]', {
          levelTime: levelTime.toFixed(1),
          level:     currentLevel,
          base:      _baseDiff,
          effective: _newDiff,
          prev:      dkDifficultyEffective,
        });
        dkDifficultyEffective = _newDiff;
      }
      updatePlayer(dt);
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateHats(dt);                                                 // P-ENEMY-1: ambient floating threats
      updateBadges(dt);                                               // P-WEAPON-1: pickup + wielding + kill flashes
      updateSS(dt);
      drawGameplay(shakeAmt>0);
      // Particles leftover
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      // Press to start
      if(stateT<4){
        const ba=Math.sin(stateT*4)>0;
        if(ba){
          ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H/2-55,W,75);
          ctx.fillStyle='#ffcc00'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
          ctx.fillText('PRESS ANY KEY TO PLAY',W/2,H/2-16);
          ctx.fillStyle='#aaa'; ctx.font='11px monospace';
          ctx.fillText('← → MOVE   SPACE JUMP   A=UP  Z=DOWN',W/2,H/2+14);
        }
      }
      break;
    }

    // H1 — 0.6s pause after the win trigger. Player is frozen (updatePlayer NOT called).
    // Capsules / helpers / Pelosi / pickup keep animating so the world doesn't visibly stall.
    // Capsule-kill is suppressed via the state guard inside updateCapsules. I7 — at end of
    // freeze we now hand off to the cutscene chain, not directly to a final overlay.
    case 'WIN_FREEZE': {
      winFreezeT += dt;
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);
      drawGameplay(false);
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (winFreezeT >= WIN_FREEZE_DURATION) {
        // N-FIX-7 — state-driven: CUTSCENE_FADE_IN maps to SILENT in computeDesiredMusic.
        // tickBGM transitions BGM_ROTATION → SILENT next tick (cancel ramps + 100ms fade).
        state = 'CUTSCENE_FADE_IN';
        stateT = 0;
        cutsceneT = 0;
      }
      break;
    }

    // J — DEATH_REACTION: ragdoll spin (phase1) → burst into debris (phase2). NOT a freeze —
    // capsules / helpers / Pelosi / pickup keep updating beneath so the world carries on around
    // the dying player. Capsule re-hit is blocked by the GAMEPLAY-only guard inside updateCapsules
    // + the explicit DEATH_REACTION/GAME_OVER guard in hit(). drawGameplay's player-render block
    // checks `state === 'DEATH_REACTION'` and switches to a rotated draw (phase1) or suppresses
    // the player draw entirely (phase2).
    case 'DEATH_REACTION': {
      deathReactionT += dt;
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);

      if (deathPhase === 'phase1') {
        // Ragdoll physics — separate from updatePlayer so platform collision is bypassed (player
        // tumbles through the world). Gravity matches walk-state GRAVITY=1400 for visual continuity.
        player.x += player.deathVx * dt;
        player.y += player.deathVy * dt;
        player.deathVy += GRAVITY * dt;
        player.deathRotation += 720 * dt;                 // two full rotations per second
        // Phase1 → phase2 transition: passed below FLOOR by 40px OR phase1 cap elapsed (whichever first).
        const fellThrough = player.y > FLOOR.y + DEATH_BURST_FALL_TRIGGER;
        const cappedOut   = deathReactionT >= DEATH_PHASE1_MAX_DURATION;
        if (fellThrough || cappedOut) {
          deathPhase = 'phase2';
          // K — burst spawn delegated to shared spawnRagdollBurst (also used by Antifa splat).
          spawnRagdollBurst(player.x, player.y - 24, DEATH_DEBRIS_COUNT);
          playSfx_burst();                                      // N — pop+fzzt on phase2 trigger
          // SFX-PACK — ragdoll thud on EVERY death (no lives gate per spec). Fires
          // alongside the synth burst for a layered "body-hits-ground" beat.
          if (typeof GAME_SFX !== 'undefined' && GAME_SFX.ragdoll_thud) GAME_SFX.ragdoll_thud.play();
        }
      }
      // K — debris physics ticks every frame in the main loop's tickRagdollDebris(); local
      // tick removed. Render still happens after drawGameplay so debris draws on top.

      drawGameplay(false);                                  // renders world; player handled per state inside
      // Existing particles trail
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;

      // End-of-reaction transition (lives decrement + branch).
      if (deathReactionT >= DEATH_REACTION_DURATION) {
        player.lives -= 1;
        deathReactionT = 0;
        deathPhase = 'phase1';
        if (player.lives <= 0) {
          // Capture final score for the GAME_OVER overlay total + initials-entry trigger.
          gameOverFinalScore = playerScore;
          // K-FIX-5 — highScoreNew computed now (snapshot at game-over moment). Used by
          // drawScoreBreakdown to draw the green 'NEW HIGH SCORE!' line. Insertion deferred
          // to submitInitialsEntry after the player enters their initials.
          highScoreNew = scoreMakesTop5(playerScore);
          // L-FIX-1 — was: state='GAME_OVER' immediately + trigger initials entry here.
          // Now: state='GAMEOVER_PENDING' so the DTJ dance + bubbles play in full before the
          // overlay covers them. Initials-entry trigger MOVED to the GAMEOVER_PENDING →
          // GAME_OVER transition (when dtjDanceState === 'IDLE' && !bubble.active).
          state = 'GAMEOVER_PENDING';
          stateT = 0;
          gameOverPendingT = 0;        // N-FIX-8 — dedicated PENDING timer; floor of 6.0s before GAME_OVER fires
        } else {
          // L — score PERSISTS across respawn (lives already decremented). Multiplier and
          // briefcase reset (streak loss penalty). Capsules cleared for clean restart.
          // Helpers / Pelosi / SS / pickup INTENTIONALLY LEFT IN PLACE — mid-action entities
          // continue across the respawn (funny). Platforms-reached re-seeded inside the helper.
          resetForRespawn();
          playSfx_respawn();                                   // N — ready ding on respawn
          // AUDIO-1 — BGM-restoration is fully state-driven. computeDesiredMusic returns YMCA
          // while dance is DANCING; once dance flips to IDLE, returns BGM_ROTATION for GAMEPLAY.
          state = 'GAMEPLAY';
          stateT = 0;
        }
      }
      break;
    }

    // L-FIX-1 — GAMEOVER_PENDING: wait for DTJ dance + bubble to finish before showing the
    // GAME_OVER overlay. Player is dead (drawGameplay's player-render block checks for this
    // state and suppresses the player). World keeps living: capsules/helpers/Pelosi/SS keep
    // ticking so mid-action chaos plays out underneath the dance. Transition to GAME_OVER
    // when both dtjDanceState === 'IDLE' AND !bubble.active. Initials-entry trigger
    // moved here from DEATH_REACTION end so it fires at the moment the overlay actually
    // appears (and not during the dance).
    case 'GAMEOVER_PENDING': {
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);
      drawGameplay(false);
      // N-FIX-8 — dedicated gameOverPendingT counter. Replaces N-FIX-6's `stateT >= 6.0`
      // gate to isolate the timer from any code path that resets stateT mid-PENDING.
      // Math: dance starts at hit+0.2s during DEATH_REACTION; DEATH_REACTION ends at
      // hit+1.2s = PENDING entry; dance ends at hit+0.2+(3.0*2)=6.2s = PENDING+5.0s.
      // With this 6.0s floor on gameOverPendingT, PENDING runs PENDING+6.0s = hit+7.2s,
      // giving the dance a full second of post-IDLE buffer for YMCA tail to fully decay
      // before the GAME_OVER overlay covers the dance.
      gameOverPendingT += dt;
      if (gameOverPendingT >= 9.0 && dtjDanceState === 'IDLE' && !bubble.active) {     // AUDIO-3c — gate raised 6.0 → 9.0 to match the new 9s game-over dance (3 cycles × 3.0s)
        if (highScoreNew) {
          initialsEntryActive = true;
          initialsCursor      = 0;
          initialsLetters[0]  = 'A';
          initialsLetters[1]  = 'A';
          initialsLetters[2]  = 'A';
          initialsEntryT      = 0;     // P-DIFFICULTY-1-FIX-V2 ITEM 4: zero the 15s auto-lock at entry start
          initialsConfirmedT  = 0;
          playSfx_newHighScore();                                  // N — chime ladder on new high
        }
        // N-FIX-7 — state-driven: GAME_OVER maps to SILENT in computeDesiredMusic; tickBGM
        // transitions on next frame. No explicit stopBGM call needed.
        playSfx_gameOver();                                       // N — sad horn on overlay reveal
        state = 'GAME_OVER';
        stateT = 0;
      }
      break;
    }

    // J — GAME_OVER: breakdown overlay reuses CUTSCENE_SCORE layout via drawScoreBreakdown.
    // K — when initialsEntryActive: hide the TAP TO RESTART prompt (gated via passing empty
    // prompt) and overlay the initials UI on top of the breakdown. Submitting the 3rd letter
    // sets initialsEntryActive=false and starts the 1.0s "INITIALS SAVED" confirmation, after
    // which the prompt re-appears.
    case 'GAME_OVER': {
      // P-DIFFICULTY-1-FIX — 15s auto-restart. Tick stateT-driven timer; at 15s
      // automatically call restartFromGameOver() (same path as TAP TO RESTART).
      // GATED on !initialsEntryActive — if player is entering initials, hold the
      // countdown until they finish. P-DIFFICULTY-2 will replace this destination
      // with the ATTRACT screen; for now it goes back to L1 fresh game.
      if (!initialsEntryActive && stateT >= 15.0) {
        restartFromGameOver();
        break;
      }
      const showRestartPrompt = !initialsEntryActive && initialsConfirmedT <= 0;
      drawScoreBreakdown({
        header:        'GAME OVER',
        total:         gameOverFinalScore,
        prompt:        showRestartPrompt ? 'TAP TO RESTART' : '',
        pulseT:        stateT,
        showHighScore: true,
        // K-FIX-5 — pass the leaderboard array (top-5). drawScoreBreakdown uses it to render
        // the TOP 5 list (L-FIX-3 removed the standalone HIGH SCORE summary row above it).
        // Empty array → TOP 5 hidden entirely; (optional) NEW HIGH SCORE! line still renders.
        highScores:    highScores,
        isNewHigh:     highScoreNew,
        showCredit:    true,                              // J — creator credit at very bottom
      });
      // K — initials entry UI overlays the breakdown when active. After submit, the
      // INITIALS SAVED confirmation displays for 1.0s before TAP TO RESTART re-appears.
      if (initialsEntryActive) {
        drawInitialsEntryUI();
      } else if (initialsConfirmedT > 0) {
        ctx.save();
        ctx.fillStyle = '#aaffaa';
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('INITIALS SAVED', W/2, 730);
        ctx.restore();
      }
      break;
    }

    // I1 — cutscene state machine. Each phase below renders a placeholder for now; I2..I6 will
    // populate the visuals (RNC stage bg, dialogue, eagle, score breakdown, between-levels sky).
    // Gameplay simulation is suspended in all CUTSCENE_* states (no updateCapsules etc.).

    case 'CUTSCENE_FADE_IN': {
      cutsceneT += dt;
      // Fade gameplay → black. Render frozen gameplay first, then a black quad whose alpha rises
      // from 0 → 1 over CUTSCENE_FADE_DURATION.
      drawGameplay(false);
      const a = Math.min(stateT / CUTSCENE_FADE_DURATION, 1);
      ctx.fillStyle = 'rgba(0,0,0,' + a.toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
      if (stateT >= CUTSCENE_FADE_DURATION) {
        state = 'CUTSCENE_PHASE1';
        stateT = 0;
        // I-CORR-3 — push the two PHASE1 dialogue captions on transition entry. They render in the
        // top-of-canvas strip (single visible at a time, fade-in/hold/fade-out).
        pushCaption('DNC', "YOU'RE FIRED, MR. PRESIDENT!", 1.8);
        // INTRO_TAUNT-V3-FIX: audio moved to tickCaptions for caption-display-time firing.
        // (Was: GAME_SFX.dnc_youre_fired.play() here at PHASE1 entry. Bug — DNC bubble
        // pops on frame 1 so timing accidentally aligned, but WITCH HUNT bubble waited
        // for DNC's fade cycle and audio fired ~3s too early. Both now keyed off the
        // queue-shift moment in tickCaptions instead.)
        pushCaption('DJT', 'WITCH HUNT!', 1.2);
        // INTRO_TAUNT-V3-FIX: audio moved to tickCaptions for caption-display-time firing.
        // (Was: TRUMP_AUDIO['WITCH HUNT!'].play() here at PHASE1 entry. Confirmed root
        // cause of Brian's "WITCH HUNT mp3 didn't fire" field test report — the mp3 was
        // firing, just ~3s before the WITCH HUNT bubble visually appeared.)
        // SFX-PACK — RNC stage crowd cheer. SFX-PACK-FIX: 600ms delay removed per Brian
        // field test — "the crowd needs to come on as scene opens. doesn't land with the
        // delay." Now fires immediately at PHASE1 entry alongside the DNC bubble push.
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.crowd_cheer) GAME_SFX.crowd_cheer.play();
      }
      break;
    }

    case 'CUTSCENE_PHASE1': {
      cutsceneT += dt;
      drawRncStage();

      // I3 — DNC walks from x=80 to x=200 over 2.0s (60 px/s, 120 px), then idles. drawDonkey
      // expects the y arg as the foot position; STAGE_FLOOR_Y (=540) is the gold-star carpet line.
      const DNC_START_X = 80;
      const DNC_TARGET_X = 200;
      const DNC_WALK_DUR = (DNC_TARGET_X - DNC_START_X) / 60;     // = 2.0s
      const dncProgress = Math.min(stateT, DNC_WALK_DUR) / DNC_WALK_DUR;
      const dncX = DNC_START_X + (DNC_TARGET_X - DNC_START_X) * dncProgress;
      const dncWalking = stateT < DNC_WALK_DUR;
      drawDonkey(dncX, STAGE_FLOOR_Y, 1.0, false, dncWalking, stateT);

      // DTJ idle in front of the podium (right side of stage). 80px tall per spec.
      // I-CORR-4 — height multiplied by dtjScale so DTJ pops to 1.6x during the "WITCH HUNT!"
      // caption hold (and shrinks back during fadeout). Feet stay pinned at STAGE_FLOOR_Y because
      // drawSprite footFrac=1.0 anchors the bottom of the sprite at y. Faces LEFT (toward DNC,
      // his accuser) — no flip.
      const dtjX = 320;
      drawSprite('dtj_idle', dtjX, STAGE_FLOOR_Y, 80 * dtjScale, false, 1.0);

      // I-CORR-3 — captions render in the top strip (pushed on FADE_IN→PHASE1 entry).
      renderCutsceneCaption();

      if (stateT >= CUTSCENE_PHASE1_DURATION) {
        // SFX-PACK-FIX-V2 — stop the looping crowd_cheer cleanly at PHASE1 exit so it
        // doesn't bleed into PHASE3. Placed BEFORE the state assignment so the audio
        // ends in lockstep with the scene end per Brian field test.
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.crowd_cheer) GAME_SFX.crowd_cheer.stop();
        // N-FIX-7 — state-driven: CUTSCENE_PHASE3 maps to NESSUN_DORMA in computeDesiredMusic.
        // tickBGM transitions SILENT → NESSUN_DORMA next tick (cancel ramps + 100ms fade-out
        // + 200ms fade-in to 1.0 + playNessunDorma scheduling).
        state = 'CUTSCENE_PHASE3';
        stateT = 0;
        // INTRO_TAUNT-V3 — reset USA chant guard so STEP3 entry fires the chant fresh
        // on this PHASE3 entry. Flag flips back to true on first STEP3 frame below.
        usaChantFired = false;
      }
      break;
    }

    case 'CUTSCENE_PHASE3': {
      cutsceneT += dt;
      drawRncStage();

      // DNC stays at her PHASE1 ending position, idle, watching.
      drawDonkey(200, STAGE_FLOOR_Y, 1.0, false, false, 0);

      // I-EAGLE-REWRITE — 4-step DTJ pose sequence ending in a HARD CUT to a pre-composed
      // eagle_carry sprite. No runtime compositing, no rotation, no fade. Mutual exclusion:
      // dtjStageMode === 'NONE' iff comboActive === true (verified below by render gate).
      //
      //   STEP1 IDLE       0.0–0.8s   dtj_idle facing forward (no flip)
      //   STEP2 TURN       0.8–1.4s   dtj_walk side-profile facing left
      //   STEP3 SURPRISED  1.4–2.0s   dtj_surprised mouth-open looking up
      //   STEP4 CARRIED    2.0–exit   eagle_carry combined sprite ascending + drifting left
      //
      // DTJ x stays at DTJ_STAGE_X across all steps (he turns/reacts in place). At t=2.0 the
      // hard cut places the combo at the exact same x with foot at STAGE_FLOOR_Y so the cut
      // reads in-place. Combo then ascends at 220 px/s with -30 px/s drift.
      const DTJ_STAGE_X = 320;

      if (stateT < 0.8) {
        dtjStageMode = 'IDLE';      comboActive = false;
      } else if (stateT < 1.4) {
        dtjStageMode = 'WALK';      comboActive = false;
      } else if (stateT < 2.0) {
        dtjStageMode = 'SURPRISED'; comboActive = false;
        // INTRO_TAUNT-V3 — fire USA chant ONCE at STEP3 entry (DTJ looks up,
        // anticipating the eagle hard cut at 2.0s). Per Brian's Option A: chant
        // builds tension 0.6s before the eagle visual lands. Loop:true on the
        // Howl + .stop() at PHASE3 exit (line ~6755) handles sustain.
        if (!usaChantFired) {
          if (typeof GAME_SFX !== 'undefined' && GAME_SFX.crowd_usa_chant) GAME_SFX.crowd_usa_chant.play();
          usaChantFired = true;
        }
      } else {
        // First frame of STEP4: hard cut. Lazy-init combo position + push the THANK YOU caption.
        if (!comboActive) {
          combo.x = DTJ_STAGE_X;
          combo.y = STAGE_FLOOR_Y;                       // foot anchor — combo bottom == DTJ bottom
          pushCaption('DJT', 'THANK YOU PATRIOTS!', 2.0);
          playSfx_eagleScreech();                        // N — eagle screech at hard-cut moment
          // SFX-PACK — real movie-eagle (red-tailed hawk) screech mp3 over the synth screech.
          if (typeof GAME_SFX !== 'undefined' && GAME_SFX.eagle_screech) GAME_SFX.eagle_screech.play();
        }
        dtjStageMode = 'NONE';
        comboActive  = true;
        combo.y -= 220 * dt;                              // ascend
        combo.x -=  30 * dt;                              // slight leftward drift
      }

      // RENDER GATE — mutually exclusive. Stage DTJ XOR combo, never both in one frame.
      if      (dtjStageMode === 'IDLE')      drawSprite('dtj_idle',      DTJ_STAGE_X, STAGE_FLOOR_Y, 80, false, 1.0);
      else if (dtjStageMode === 'WALK')      drawSprite('dtj_walk',      DTJ_STAGE_X, STAGE_FLOOR_Y, 80, false, 1.0);
      else if (dtjStageMode === 'SURPRISED') drawSprite('dtj_surprised', DTJ_STAGE_X, STAGE_FLOOR_Y, 80, false, 1.0);
      // dtjStageMode === 'NONE' renders no individual DTJ sprite this frame.
      if (comboActive) drawSprite('eagle_carry', combo.x, combo.y, COMBO_H, false, 1.0);

      // Phase exit: combo foot < 0 means the entire combined sprite is above the canvas top.
      if (comboActive && combo.y < 0) {
        // INTRO_TAUNT-V3 — stop the looping USA chant cleanly at PHASE3 exit so
        // it doesn't bleed into CUTSCENE_SCORE. Placed BEFORE the state assignment
        // for symmetry with the crowd_cheer.stop() at PHASE1 exit (line ~6674).
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.crowd_usa_chant) GAME_SFX.crowd_usa_chant.stop();
        state = 'CUTSCENE_SCORE';
        stateT = 0;
        comboActive  = false;                             // SCORE has no combo render
        dtjStageMode = 'NONE';
      }

      // I-CORR-3 — caption strip renders flush above the cutscene scene background.
      renderCutsceneCaption();
      break;
    }

    case 'CUTSCENE_SCORE': {
      cutsceneT += dt;
      // I5 — full score breakdown overlay. J — render delegated to shared drawScoreBreakdown
      // helper (reused by GAME_OVER). showHighScore=false → no high-score block on level-complete.
      drawScoreBreakdown({
        header:        'LEVEL ' + currentLevel + ' COMPLETE',  // P-DIFFICULTY-1-FIX BUG 2: dynamic level number
        total:         winFinalScore,
        prompt:        'TAP TO CONTINUE',
        pulseT:        stateT,
        showHighScore: false,
      });
      // I-CORR-3 — render any caption that's still fading out from PHASE3 ascent.
      renderCutsceneCaption();
      // P-DIFFICULTY-1-FIX-V2 ITEM 1: auto-advance after 4s (delegate to cutsceneAdvance
      // which runs the BETWEEN setup). Tap-to-skip works via cutsceneAdvance immediately
      // (no gate post-V2 BUG C).
      if (stateT >= 4.0) cutsceneAdvance();
      break;
    }

    case 'CUTSCENE_BETWEEN': {
      cutsceneT += dt;
      drawCutsceneSky(dt);

      // I-EAGLE-REWRITE (direction-fix addendum) — eagle_carry.png shows DTJ + eagle oriented
      // for LEFTWARD flight, so the combined sprite enters from off-screen RIGHT and travels
      // right-to-left across the sky. Speed 80 px/s, hold at t=4.5s. Spawn x is tuned so the
      // sprite lands at canvas center (W/2 = 240) cleanly, not too far left. PHASE3 ascent
      // already drifts left (-30 px/s), so combined cutscene reads consistently: eagle exits
      // upper-left in PHASE3, then a fresh pass right→left in BETWEEN.
      // Mutually exclusive: never render an individual DTJ sprite here. dtjStageMode = 'NONE'.
      if (!comboActive) {
        comboActive  = true;
        dtjStageMode = 'NONE';
        combo.x = W / 2 + 80 * 4.5;                       // = 600; lands at W/2 at t=4.5s
        combo.y = H * 0.4 + COMBO_H * 0.5;                // mid-canvas vertically
      }
      if (stateT < 4.5) combo.x -= 80 * dt;               // leftward at 80 px/s; hold from t=4.5s
      drawSprite('eagle_carry', combo.x, combo.y, COMBO_H, false, 1.0);

      // I-CORR-3 — DTJ caption rotation lives in the top-of-canvas strip. The 3 lines are
      // pushed in cutsceneAdvance (SCORE→BETWEEN). renderCutsceneCaption() draws current.

      // I6 — end card revealed at t >= 5.0s.
      // K-FIX-4 — wording updated to win-state language. Was "LEVEL 2 COMING SOON" + "TAP TO
      // RESTART". Now four lines: "LEVEL 1 COMPLETE!" hero header in gold + "LEVEL 2 COMING
      // SOON" subtitle + "TAP TO CONTINUE" action prompt + creator credit. "RESTART" wording
      // sounded like game-over language; "CONTINUE" reads as forward progress (which is what
      // K-FIX-3 made it — score and lives carry through). GAME_OVER overlay still uses
      // "TAP TO RESTART" because that IS a restart.
      // P-DIFFICULTY-1-FIX-V2 BUG 2 + 5: dropped `if (stateT >= 5.0)` reveal gate so
      // text renders immediately on BETWEEN entry. Removed "LEVEL N+1 COMING SOON"
      // line entirely (cluttered the eagle visual). Repositioned TAP/AUTO/CREDIT
      // BELOW the eagle (eagle visually spans y≈261-421; below-eagle clear space
      // y=421 to y=854). Auto-advance shortened 15s → 6s per Brian field test.
      // Line 1 — hero header (gold) at y=200, ABOVE eagle.
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('LEVEL ' + currentLevel + ' COMPLETE!', W/2, 200);
      // Line 2 — pulsing action prompt at y=600, BELOW eagle.
      const pulseB = 0.5 + 0.5 * Math.sin(stateT * 4);
      ctx.fillStyle = 'rgba(255,255,255,' + (0.35 + 0.55 * pulseB).toFixed(3) + ')';
      ctx.font = 'bold 14px monospace';
      ctx.fillText('TAP TO CONTINUE', W/2, 600);
      // Line 3 — auto-continue countdown at y=620. Window: 0-6s from BETWEEN entry.
      const secondsLeft = Math.max(0, Math.ceil(6.0 - stateT));
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.font = '11px monospace';
      ctx.fillText('(AUTO-CONTINUE IN ' + secondsLeft + ')', W/2, 620);
      // Line 4 — credit at y=830 (canvas bottom).
      ctx.fillStyle = '#9a7a00';
      ctx.font = '10px monospace';
      ctx.fillText('Created by Brian Albert', W/2, 830);
      // Auto-continue trigger at 6s.
      if (stateT >= 6.0) {
        resetForLevelTransition();
        break;
      }

      // I-CORR-3 — caption strip flush above sky horizon.
      renderCutsceneCaption();
      break;
    }
  }

  // N — PAUSED case is its own state; render gameplay underneath frozen + overlay on top.
  if (state === 'PAUSED') {
    // Draw last-known gameplay frame underneath the dim overlay. drawGameplay's update calls
    // are skipped because we're not in GAMEPLAY case, but the world entities are stationary
    // (they don't tick during PAUSED), so re-rendering the static scene is correct.
    drawGameplay(false);
    drawPauseOverlay();
  }
  // N — global icons render OUTSIDE the state switch so they're always visible (audio always
  // togglable; pause icon visible during GAMEPLAY + PAUSED only — gated inside drawPauseIcon
  // call here via state check). Drawn LAST so they sit on top of overlays.
  drawAudioIcon();
  if (isPausableState() || state === 'PAUSED') drawPauseIcon();
  drawDumpLogsButton();   // AUDIO-3-LOG-DUMP — internally gated to gameplay/game-over states
}

requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
