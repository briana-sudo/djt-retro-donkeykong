<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<!-- N-FIX-8 — iOS Safari PWA hints. Brian's iPhone has the game saved as a home-screen
     icon (PWA-style launcher). iOS treats home-screen-launched pages slightly differently
     than browser tabs; these meta tags signal "this page is a standalone PWA," which on
     some iOS versions resolves audio-routing quirks (the launcher uses a slightly different
     WebKit instance than the browser tab). black-translucent status bar avoids a top
     padding artifact on launch. -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<!-- AUDIO-1 — Howler.js for music playback. MP3 files in /audio/ replace the synth music
     scheduling that lived in N-FIX-2 through N-FIX-9. Howler handles cross-browser audio
     playback (including iOS Safari quirks), looping, fade in/out, and playback events.
     Loaded BEFORE the main game script so SOUND_LIBRARY is available at game-init time. -->
<script src="https://cdn.jsdelivr.net/npm/howler@2.2.4/dist/howler.min.js"></script>
<title>DNC vs DJT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* E1.A2 — canvas pinned to visual viewport top via position:fixed + top:0. Horizontal
     centering via left:50% + translateX(-50%). Bypasses the flex/dvh chain entirely so the
     canvas top is ALWAYS at viewport y=0 regardless of body height, flex behavior, or dvh
     support. The body is just a black backdrop now. */
  html, body { background: #000; overflow: hidden; height: 100%; width: 100%; }
  canvas {
    display: block;
    image-rendering: pixelated;
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }
</style>

<script>
// AUDIO-3-LOG-DUMP — global ring buffer for [BGM:*] logs. console.log wrapper intercepts
// every call whose first arg is a string starting with '[BGM:' and pushes a structured
// entry (prefix, data, timestamp) to window.bgmLogBuffer. Ring caps at 500 entries; oldest
// drops first. Original console.log behavior is unchanged — every entry still prints to
// DevTools as before. Other (non-BGM) console.log calls pass through untouched. This wrapper
// is installed BEFORE the Howl.prototype monkey-patches below so those patches' [BGM:howl-*]
// logs flow into the buffer too.
window.bgmLogBuffer    = [];
window.bgmLogBufferMax = 500;
const _origConsoleLog  = console.log;
console.log = function() {
  // PAUSE-DIAG — also capture [PAUSE-DIAG] prefix so DUMP LOGS picks up the diagnostic
  // output added to pointerdown / touchstart / togglePause for iPhone pause-button trace.
  // CAPSULE-DIAG — also capture [CAPSULE-DIAG] for the SFX-PACK round-3 capsule
  // destruction trace (Brian field test: synth still sounds, despite both prior strips).
  // CAPSULE-SPAWN-DIAG / LADDER-DROP-DIAG — added in P-DIFFICULTY-1-FIX-V3 to trace
  // speedMult application at L8+ (Bug 10) and L10 ladder-drop chance (Bug 7 NEW).
  // CAPSULE-CENSUS — added in P-DIFFICULTY-1-FIX-V4-DIAG to trace MAX_CAPSULES bail
  // (Trump-throws-but-no-capsule symptom). Logs full capsule census at the bail moment
  // so Brian can DUMP LOGS and report which slot-class is dominant (FLOOR pile-up,
  // Pelosi-carry hold, or mid-cascade stall).
  if (arguments.length > 0 && typeof arguments[0] === 'string' && (arguments[0].indexOf('[BGM:') === 0 || arguments[0].indexOf('[PAUSE-DIAG]') === 0 || arguments[0].indexOf('[CAPSULE-DIAG]') === 0 || arguments[0].indexOf('[CAPSULE-SPAWN-DIAG]') === 0 || arguments[0].indexOf('[LADDER-DROP-DIAG]') === 0 || arguments[0].indexOf('[CAPSULE-CENSUS]') === 0 || arguments[0].indexOf('[LAYOUT-V4-DIAG]') === 0 || arguments[0].indexOf('[DESCENT-DIAG]') === 0 || arguments[0].indexOf('[FLOOR-TTL]') === 0 || arguments[0].indexOf('[DIAGONAL-THROW]') === 0 || arguments[0].indexOf('[DK-DIFFICULTY-RAMP]') === 0 || arguments[0].indexOf('[LEFT-WALL]') === 0 || arguments[0].indexOf('[HAT-') === 0 || arguments[0].indexOf('[BADGE-') === 0)) {
    window.bgmLogBuffer.push({
      prefix: arguments[0],
      data:   arguments.length > 1 ? arguments[1] : null,
      t:      performance.now().toFixed(0),
    });
    if (window.bgmLogBuffer.length > window.bgmLogBufferMax) {
      window.bgmLogBuffer.shift();
    }
  }
  return _origConsoleLog.apply(console, arguments);
};

// AUDIO-3-SIMPLIFY-BUGHUNT-2 — monkey-patch Howl.prototype.{stop,play,once,off} BEFORE
// SOUND_LIBRARY is constructed. Pure logging, every method delegates to the original after
// printing the call site context. Captures Howl lifecycle events that are otherwise opaque:
// every stop/play call (with seek + Howler ctx state), every once registration (with the
// callback wrapped to log when it fires), every off detach. Catches "leftover handler
// firing after a reset" (candidate 2) and "unexpected play/stop calls undoing a reset"
// patterns. Helper resolves the Howl-instance back to its SOUND_LIBRARY key for readability.
if (typeof Howl !== 'undefined') {
  const _resolveHowlName = function(howlInst) {
    if (typeof SOUND_LIBRARY === 'undefined') return 'pre-lib';
    for (const k of Object.keys(SOUND_LIBRARY)) {
      if (SOUND_LIBRARY[k] === howlInst) return k;
    }
    return 'unknown';
  };
  const _origStop = Howl.prototype.stop;
  const _origPlay = Howl.prototype.play;
  const _origOnce = Howl.prototype.once;
  const _origOff  = Howl.prototype.off;
  Howl.prototype.stop = function() {
    const name = _resolveHowlName(this);
    let wasPlaying = false, seekBefore = -1;
    try { wasPlaying = this.playing(); } catch (e) {}
    try { seekBefore = this.seek(); } catch (e) {}
    console.log('[BGM:howl-stop]', {
      howl: name, wasPlaying: wasPlaying, seekBefore: seekBefore,
      t: performance.now().toFixed(0),
    });
    return _origStop.apply(this, arguments);
  };
  Howl.prototype.play = function() {
    const name = _resolveHowlName(this);
    let seekBefore = -1;
    try { seekBefore = this.seek(); } catch (e) {}
    console.log('[BGM:howl-play]', {
      howl: name, seekBefore: seekBefore,
      howlerCtxState: (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx.state : 'no-ctx',
      t: performance.now().toFixed(0),
    });
    return _origPlay.apply(this, arguments);
  };
  Howl.prototype.once = function(event, fn) {
    const name = _resolveHowlName(this);
    console.log('[BGM:howl-once-register]', {
      howl: name, event: event, t: performance.now().toFixed(0),
    });
    const wrappedFn = function() {
      console.log('[BGM:howl-once-fire]', {
        howl: name, event: event,
        state: (typeof state !== 'undefined') ? state : 'no-state',
        currentMusic: (typeof currentMusic !== 'undefined') ? currentMusic : 'no-cm',
        t: performance.now().toFixed(0),
      });
      return fn.apply(this, arguments);
    };
    const args = Array.prototype.slice.call(arguments);
    args[1] = wrappedFn;
    return _origOnce.apply(this, args);
  };
  Howl.prototype.off = function(event) {
    const name = _resolveHowlName(this);
    console.log('[BGM:howl-off]', {
      howl: name, event: event || 'all', t: performance.now().toFixed(0),
    });
    return _origOff.apply(this, arguments);
  };
}
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─────────────────────────────────────────────
//  SPRITE IMAGES
// ─────────────────────────────────────────────
const sprites = {};
const spriteData = {
  dtj_idle: 'sprites/dtj_idle.png',
  dtj_walk: 'sprites/dtj_walk.png',
  dtj_walk2: 'sprites/dtj_walk2.png',
  dtj_throw: 'sprites/dtj_throw.png',
  // I-EAGLE-REWRITE — added for the PHASE3 4-step pose sequence (turn → surprised → cut to combo).
  dtj_surprised: 'sprites/dtj_surprised.png',
  djt1: 'sprites/djt1.png',
  djt2: 'sprites/djt2.png',
  djt3: 'sprites/djt3.png',
  djt4: 'sprites/djt4.png',
  djt5: 'sprites/djt5.png',
  djt6: 'sprites/djt6.png',
  pelosi_idle: 'sprites/pelosi_idle.png',
  pelosi_tear: 'sprites/pelosi_tear.png',
  eagle_fly: 'sprites/eagle_fly.png',
  eagle_carry: 'sprites/eagle_carry.png',
  antifa: 'sprites/antifa.png',
  secret_service: 'sprites/secret_service.png',
  briefcase: 'sprites/briefcase.png',
  zombie_winemom: 'sprites/zombie_winemom.png',
  zombie_pinkhair: 'sprites/zombie_pinkhair.png',
  zombie_glasses: 'sprites/zombie_glasses.png',
  zombie_dad: 'sprites/zombie_dad.png',
  barrel_upright: 'sprites/barrel_upright.png',
  barrel_endview: 'sprites/barrel_endview.png',
  // P-ENEMY-1: MAGA hat — DTJ-aligned ambient floating threat. 64×64 PNG with
  // transparent background. Renders centered on hat.x/hat.y at HAT_SPRITE_SIZE.
  maga_hat: 'sprites/maga_hat.png',
  // P-WEAPON-1: FBI badge — DK-hammer-pattern weapon. Pickup at fixed P2/P4
  // positions. Wielding player kills hats AND capsules via AABB overlap.
  fbi_badge: 'sprites/fbi_badge.png',
  // I2 — RNC convention stage background. 960×541 RGBA. Used as the cutscene backdrop in
  // CUTSCENE_PHASE1 / CUTSCENE_PHASE3 / CUTSCENE_SCORE (letterboxed in the canvas).
  rnc_stage: 'sprites/rnc_stage.png'
};

// G1 REPLACEMENT — sprites ship as PNGs with real alpha (rembg-converted from the original JPGs;
// see scripts/convert_sprites_to_png.py). Runtime alpha-keying is removed. Each loaded image is
// drawn to its own offscreen canvas, then trimmed to the tight bounding box of the alpha channel
// (the F5 footprint anchor). drawSprite reads exclusively from spriteCache[name].
const spriteCache = {};                                       // name -> HTMLCanvasElement (trimmed, alpha intact)
let spritesLoaded = 0;
const spritesTotal = Object.keys(spriteData).length;

function processSprite(name, img) {
  const w = img.naturalWidth, h = img.naturalHeight;
  if (!w || !h) {
    console.warn('Sprite has no dimensions:', name);
    return;
  }
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const ictx = off.getContext('2d');
  ictx.drawImage(img, 0, 0);
  const id = ictx.getImageData(0, 0, w, h);
  const d = id.data;

  // F5 — find tight bounding box of pixels that have non-zero alpha. Also count alpha < 255
  // pixels (informational — confirms the PNG actually has a usable alpha channel).
  let alphaPixels = 0;
  let minX = w, maxX = -1, minY = h, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const a = d[(y * w + x) * 4 + 3];
      if (a < 255) alphaPixels++;
      if (a > 0) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (maxX < 0 || maxY < 0) {
    // entirely transparent — extremely unlikely for a converted sprite, but defend anyway
    spriteCache[name] = off;
    console.warn('Sprite ' + name + ' is fully transparent — keeping as-is');
    return;
  }

  // P-ENEMY-1-FIX V2 — runtime AGGRESSIVE white-key. Triggered when ANY
  // corner pixel is OPAQUE near-white (R≥240, G≥240, B≥240, alpha=255).
  // Replaces V1 corner-flood-fill which only keyed pixels CONNECTED to a
  // corner — V1 missed scattered opaque-white blobs interior to the image
  // because the hat's red boundary broke 4-connectivity. V2 scans every
  // pixel and zeros alpha for all opaque-near-white pixels regardless of
  // position. Tradeoff: any white text inside a hat shape (e.g., the "MAGA"
  // letters) also gets keyed. Acceptable — source PNG can be iterated for
  // text-on-red contrast (e.g., yellow or black text) if needed. Skipped
  // entirely if no corner is opaque-near-white (i.e., sprite is properly
  // alpha-keyed — typical case for rembg-converted sprites).
  const NEAR_WHITE_R = 240, NEAR_WHITE_G = 240, NEAR_WHITE_B = 240;
  const isNearWhiteOpaque = function (off4) {
    return d[off4 + 3] === 255 &&
           d[off4]     >= NEAR_WHITE_R &&
           d[off4 + 1] >= NEAR_WHITE_G &&
           d[off4 + 2] >= NEAR_WHITE_B;
  };
  const cornerOffsets = [
    0,                                  // top-left
    (w - 1) * 4,                        // top-right
    ((h - 1) * w) * 4,                  // bottom-left
    ((h - 1) * w + (w - 1)) * 4,        // bottom-right
  ];
  let needsKey = false;
  for (const cOff of cornerOffsets) {
    if (isNearWhiteOpaque(cOff)) { needsKey = true; break; }
  }
  if (needsKey) {
    let keyedCount = 0;
    for (let off4 = 0; off4 < d.length; off4 += 4) {
      if (isNearWhiteOpaque(off4)) {
        d[off4 + 3] = 0;
        keyedCount++;
      }
    }
    ictx.putImageData(id, 0, 0);
    // Re-run bounding box (now without the keyed-out region).
    minX = w; maxX = -1; minY = h; maxY = -1;
    for (let y = 0; y < h; y++) {
      for (let x = 0; x < w; x++) {
        const a = d[(y * w + x) * 4 + 3];
        if (a > 0) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    console.log('White-keyed sprite:', name, 'keyed pixels:', keyedCount,
                'of', (w * h), '(', (100 * keyedCount / (w * h)).toFixed(1), '%)',
                'new bbox:', (maxX - minX + 1) + 'x' + (maxY - minY + 1));
  }

  const tw = maxX - minX + 1;
  const th = maxY - minY + 1;
  if (tw === w && th === h) {
    spriteCache[name] = off;                                  // already tight, no trim needed
  } else {
    const trimmed = document.createElement('canvas');
    trimmed.width = tw; trimmed.height = th;
    const tctx = trimmed.getContext('2d');
    tctx.drawImage(off, minX, minY, tw, th, 0, 0, tw, th);
    spriteCache[name] = trimmed;
  }
  console.log('Sprite loaded:', name,
              'native=' + w + 'x' + h,
              'trimmed=' + spriteCache[name].width + 'x' + spriteCache[name].height,
              'alphaPixels=' + alphaPixels);
}

for (const [name, src] of Object.entries(spriteData)) {
  sprites[name] = new Image();
  sprites[name].onload = () => {
    processSprite(name, sprites[name]);
    spritesLoaded++;
    // G1 — once all sprites have finished loading + processing, enumerate the cache so it's
    // immediately visible in devtools whether anything is missing.
    if (spritesLoaded === spritesTotal) {
      const keys = Object.keys(spriteCache).sort();
      console.log('G1 — sprite cache ready: ' + keys.length + ' / ' + spritesTotal + ' sprites');
      console.log('G1 — cache keys: ' + keys.join(', '));
      const missing = Object.keys(spriteData).filter(k => !spriteCache[k]);
      if (missing.length) console.error('G1 — sprites MISSING from cache:', missing);
    }
  };
  sprites[name].onerror = (e) => console.warn('Block A — sprite FAILED to load:', name, e);
  sprites[name].src = src;
}

// Draw a sprite centered on x, feet at y. ALWAYS uses the alpha-keyed cached canvas.
// G1 — raw-img fallback removed. If the cache is missing for a loaded sprite, we log loudly
// and SKIP the draw rather than fall back to the un-keyed JPG (that fallback was the source
// of the white/gray boxes around briefcase, barrel, etc.).
function drawSprite(name, x, y, targetH, flip=false, footFrac=1.0) {
  const cached = spriteCache[name];
  if (!cached) {
    const img = sprites[name];
    if (img && img.complete && img.naturalWidth) {
      // Loaded but somehow not in cache — should never happen; surface immediately.
      console.error('drawSprite: cache MISSING for loaded sprite "' + name + '"');
    }
    return;                                                              // skip draw — never use raw img
  }
  const nw = cached.width, nh = cached.height;
  if (!nw || !nh) return;

  const aspect = nw / nh;
  const targetW = targetH * aspect;
  const drawX = x - targetW / 2;
  const drawY = y - targetH * footFrac;

  ctx.save();
  if (flip) { ctx.translate(drawX*2 + targetW, 0); ctx.scale(-1, 1); }
  ctx.drawImage(cached, drawX, drawY, targetW, targetH);
  ctx.restore();
}

// Safe ellipse wrapper — ctx.ellipse needs 7 args, this handles the translate/scale approach
function ell(x, y, rx, ry, rot, s, e) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(rx, ry);
  ctx.arc(0, 0, 1, s, e);
  ctx.restore();
}
const W = 480, H = 854;
let scale = 1;
// MOBILE-PAUSE-ONLY — viewport detection, computed ONCE at script load. Used to:
//   • hide the speaker icon on mobile entirely (drawAudioIcon returns early; speaker
//     hit-test is gated off) — phone hardware volume buttons handle audio anyway
//   • enlarge the pause hit-rect from 50×50 to 60×60 for finger reliability
// Detection covers (a) iOS/Android touchscreens, (b) hybrid devices with stylus, and
// (c) narrow desktop windows (<600px) — the last is acknowledged side-effect; PC users
// who shrink their window will also get the mobile UI. Acceptable trade-off vs. a
// screen-size-only check that would miss tablets in landscape.
const IS_MOBILE = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) || (window.innerWidth < 600);

function resize() {
  // E1 — use clientWidth/Height (excludes browser chrome, scrollbars) so the canvas always
  // fits the *visible* area on iOS Safari and desktop Chrome. window.innerHeight on iOS can
  // report the larger viewport (URL bar collapsed) which caused the canvas top to be cropped.
  const vw = document.documentElement.clientWidth;
  const vh = document.documentElement.clientHeight;
  scale = Math.min(vw / W, vh / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);                // mobile rotation
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize); // iOS URL-bar shrink

// E1.A2 — one-shot startup diagnostic. If the top of the canvas appears cropped on a real
// device, open devtools console, find this line, and paste it back. The values name the actual
// offender immediately (e.g. canvasTop=-44 → canvas IS positioned above viewport; or scale=1.5
// + canvasH=1281 → canvas is sized too tall; etc).
{
  const r = canvas.getBoundingClientRect();
  console.log('VIEWPORT_DIAG',
    'innerH=' + window.innerHeight,
    'clientH=' + document.documentElement.clientHeight,
    'visualH=' + (window.visualViewport ? window.visualViewport.height : 'N/A'),
    'canvasTop=' + r.top,
    'canvasH=' + r.height,
    'scale=' + scale);
}

// ─────────────────────────────────────────────
//  GAME LAYOUT DATA
// ─────────────────────────────────────────────
const PLAT_H = 14;
// Block B — geometry per Notion spec (canonical baseline). Pre-audited 6/6 PASS.
const platforms = [
  { x:  0, y: 790, w: 480, h: 14, tilt:  0   },  // FLOOR — full width
  { x: 80, y: 660, w: 400, h: 14, tilt: -2.5 },  // P1 — tilts right-down
  { x: 10, y: 530, w: 370, h: 14, tilt:  2.5 },  // P2 — tilts left-down
  { x: 80, y: 400, w: 370, h: 14, tilt: -2.5 },  // P3
  { x: 10, y: 270, w: 370, h: 14, tilt:  2.5 },  // P4
  { x: 60, y: 140, w: 420, h: 14, tilt:  0   }   // TOP — F1: extends to right screen edge (x=480)
];

  { x: 195, y: 672, h: 118 },  // [0] FLOOR -> P1, V4: x=195 (reverted from V3's x=300, back to V2 position)
  { x: 370, y: 672, h: 118 },  // [1] FLOOR -> P1 right       (UNCHANGED V2/V3/V4)
  { x: 300, y: 548, h: 118 },  // [2] P1 -> P2, V4: x=300 (was 175 in V2/V3)
  { x: 170, y: 419, h: 118 },  // [3] P2 -> P3                (UNCHANGED V4 — V3: x=170)
  { x: 270, y: 289, h: 118 },  // [4] P3 -> P4                (UNCHANGED V4 — V3: x=270)
  { x: 350, y: 159, h: 118 }   // [5] P4 -> TOP               (UNCHANGED — win trigger)

console.log('[LAYOUT-V4-DIAG]', 'new ladder layout',
  ladders.map(function (l, i) { return { i: i, x: l.x, y: l.y, h: l.h }; }));
const LADDER_W = 24;
const TOP = platforms[5];
const FLOOR = platforms[0];
// Block C / F2 — single source of truth for DTJ + barrel positions on TOP.
// TOP is x=60 w=420 (after F1 extension). Layout left→right:
//   CNN col @ TOP.x+8 (range 68–104)
//   → DTJ @ DTJ_GAMEPLAY_X (just LEFT of barrel)
//   → barrel decoration @ BARREL_X (capsule spawn origin)
//   → MSNBC col @ TOP.x+TOP.w-40 (right edge of TOP, range 440–476)
const BARREL_X        = TOP.x + 170;   // = 230 (unchanged from Block C)
const DTJ_GAMEPLAY_X  = TOP.x + 100;   // F2: DTJ moved from TOP.x+260 to LEFT of barrel

// ─────────────────────────────────────────────
//  STATE MACHINE
// ─────────────────────────────────────────────
// INTRO_BLACK → INTRO_TITLE → INTRO_ESCALATOR → INTRO_STAIRS
// → INTRO_TAUNT → INTRO_SHATTER → GAMEPLAY
// J — added DEATH_REACTION (ragdoll-and-burst on capsule hit) and GAME_OVER (overlay + tap-to-restart).
//     DEATH_REACTION → GAMEPLAY (respawn) | GAME_OVER (last life)
//     GAME_OVER tap → INTRO_BLACK (full reset; the codebase has no separate 'STARTING' state —
//     INTRO_BLACK is the start of the intro chain that the spec calls "STARTING").
let state = 'INTRO_BLACK', stateT = 0, totalT = 0;
let skipDone = false;

// J — lives flow + high-score persistence + ragdoll-burst death reaction.
//   DEATH_REACTION: 1.2s total — gameplay-overlay (NOT a freeze). Capsules / helpers / Pelosi
//     keep updating beneath. Player physics handled separately in the DEATH_REACTION case.
//       phase1 'ragdoll' (0.0–0.8s): launched in capsule's vx direction (deathVx) + small upward
//         pop (deathVy=-200), gravity applies, rotates 720°/s, ignores platform collision.
//       phase2 'burst'   (transition→1.2s): triggered when player.y > FLOOR.y+40 OR phase1
//         elapsed >= 0.8s. Spawns ~12 debris rects + 1-frame white flash. Player sprite is
//         suppressed; debris IS the player visual now.
//     At t=1.2s: lives -= 1 → respawn (lives>0) or GAME_OVER (lives==0).
//     Block L (DTJ YMCA dance) will play simultaneously on top of this — coexist, don't gate.
//   GAME_OVER: breakdown overlay (reuses CUTSCENE_SCORE layout via drawScoreBreakdown). Shows
//     final + high score + creator credit. Tap → restartFromGameOver → INTRO_BLACK or GAMEPLAY.
//
// K — ragdoll+burst code path is now SHARED. Antifa entities thrown by Secret Service reuse
// the same physics + debris + flash via spawnRagdollBurst() and the per-entity ragdoll fields
// (deathVx, deathVy, deathRotation, ragdollPhase, ragdollT). The deathDebris array is renamed
// `ragdollDebris` and ticks every frame in the main loop regardless of state — both player
// burst and Antifa burst items share the array.
const DEATH_REACTION_DURATION   = 1.2;
const DEATH_PHASE1_MAX_DURATION = 0.8;     // hard cap on ragdoll phase even if player stays on-screen
const DEATH_BURST_FALL_TRIGGER  = 40;      // px below FLOOR before phase1→phase2 forced
const DEATH_DEBRIS_COUNT        = 12;
const RAGDOLL_DEBRIS_LIFE       = 0.4;     // K — debris alpha-fades over this duration (s)
const RAGDOLL_BURST_FLASH_ALPHA = 0.6;     // K — full-screen white flash alpha at burst moment
let   deathReactionT            = 0;
let   deathPhase                = 'phase1';// 'phase1' | 'phase2'
// N-FIX-8 — dedicated GAMEOVER_PENDING duration counter. Decoupled from `stateT` so any
// code path that resets stateT mid-PENDING (legitimate or accidental) cannot bypass the
// 6-second YMCA-dance protection floor. Reset to 0 only on PENDING entry; incremented per
// frame in the PENDING update branch.
let   gameOverPendingT          = 0;
let   ragdollBurstFlashT        = 0;       // ticks down from 1 across one frame after any burst
const ragdollDebris             = [];     // K — shared between player + Antifa bursts
let   gameOverFinalScore        = 0;
let   highScoreNew              = false;   // true on game over if final qualified for the top-5 board
let   introHasPlayed            = false;   // K — set true at INTRO_SHATTER end; per-session, not persisted
// K-FIX-5 — replaced single highScore + highScoreInitials with a top-5 leaderboard array.
// Storage key 'djt_high_scores' (plural). Each entry: { initials: 'BRI', score: 5799 }. Sorted
// descending by score. Maximum 5 entries. Empty leaderboard = []. The K-FIX-2 legacy single
// keys (HIGH_SCORE_KEY / HIGH_SCORE_INITIALS_KEY) remain on disk and serve as the migration
// source for first-boot under K-FIX-5.
let   highScores                = [];      // top-5 leaderboard
const HIGH_SCORES_KEY           = 'djt_high_scores';
const HIGH_SCORE_KEY            = 'djt_high_score';            // legacy J/K key — read for migration only
const HIGH_SCORE_INITIALS_KEY   = 'djt_high_score_initials';   // legacy K-FIX-4 key — read for migration only
const LEADERBOARD_MAX           = 5;

// K — shared debris-burst spawn. Used by both player DEATH_REACTION phase2 and Antifa RAGDOLL
// phase2. Each item: 4-6px square, random vx [-150,150], vy [-300,-100], gravity, rotates,
// alpha-fades over RAGDOLL_DEBRIS_LIFE seconds. Also triggers the one-frame full-screen white flash.
function spawnRagdollBurst(cx, cy, n) {
  const count = (typeof n === 'number') ? n : DEATH_DEBRIS_COUNT;
  for (let i = 0; i < count; i++) {
    ragdollDebris.push({
      x:    cx,
      y:    cy,
      vx:   -150 + Math.random() * 300,
      vy:   -300 + Math.random() * 200,
      size: 4 + Math.random() * 2,
      rot:  Math.random() * Math.PI * 2,
      rotV: -8 + Math.random() * 16,
      life: RAGDOLL_DEBRIS_LIFE,
      t:    0,
      color: ['#ffffff', '#aaccff', '#ff88aa', '#ffcc66'][Math.floor(Math.random() * 4)],
    });
  }
  ragdollBurstFlashT = 1;                                // 1 frame of full-bright flash
}

// K — global tick for ragdoll debris. Called from main loop top regardless of state so items
// drain naturally even if state changes (e.g. player wins to cutscene mid-Antifa-burst).
function tickRagdollDebris(dt) {
  for (let i = ragdollDebris.length - 1; i >= 0; i--) {
    const d = ragdollDebris[i];
    d.t  += dt;
    d.x  += d.vx * dt;
    d.y  += d.vy * dt;
    d.vy += GRAVITY * dt;
    d.rot += d.rotV * dt;
    if (d.t >= d.life) ragdollDebris.splice(i, 1);
  }
}

function renderRagdollDebrisAndFlash() {
  for (const d of ragdollDebris) {
    const a = Math.max(0, 1 - d.t / d.life);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size);
    ctx.restore();
  }
  if (ragdollBurstFlashT > 0) {
    ctx.save();
    ctx.globalAlpha = RAGDOLL_BURST_FLASH_ALPHA;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    ragdollBurstFlashT = 0;                              // one-frame; cleared after first render
  }
}

// K — Secret Service entity. Decorative-only system: 3 stationary units that fade in when an
// Antifa starts climbing ladder[5] (P4→TOP), grab-and-throw any Antifa exiting onto TOP near
// ladder[5], fade out 0.5s after the last Antifa dies. ZERO interaction with player or capsules.
//   units[0] — DTJ bodyguard (decorative; never grabs or throws)
//   units[1] — left flank of ladder[5]
//   units[2] — right flank of ladder[5]
const SS_GRAB_DURATION    = 0.2;
const SS_FADE_DURATION    = 0.5;
const SS_THROW_VY         = -300;
const SS_THROW_VX_MAG     = 200;                          // sign randomized per throw
const SS_TARGET_LADDER_IX = 5;                            // ladders[5] = P4 → TOP
const SS_HEIGHT           = 64;                           // 2x render scale, matches helper standard
const SS_GRAB_X_RANGE     = 40;                           // antifa within ±40 of ladder[5] cx triggers grab
const ss = {
  active: false,
  fadeAlpha: 0,
  fadeOutTimer: 0,
  units: [
    { x: 0, y: 0, state: 'IDLE', stateT: 0, targetAntifa: null },
    { x: 0, y: 0, state: 'IDLE', stateT: 0, targetAntifa: null },
    { x: 0, y: 0, state: 'IDLE', stateT: 0, targetAntifa: null },
  ],
};

// K — initials entry sub-state of GAME_OVER. K-FIX-5 — trigger now `scoreMakesTop5(playerScore)`
// (replaces K's wasNewHigh OR wasFirstScore). UI renders ON TOP of the score breakdown.
// Submit on 3rd confirm pushes the entry into highScores and saves the array.
let   initialsEntryActive   = false;
let   initialsCursor        = 0;
const initialsLetters       = ['A', 'A', 'A'];
let   initialsConfirmedT    = 0;                          // post-submit "INITIALS SAVED" timer (s)
const INITIALS_CONFIRM_DURATION = 1.0;
// P-DIFFICULTY-1-FIX-V2 ITEM 4: 15s auto-lock timer for initials entry. Ticks while
// initialsEntryActive=true; at 15s, calls submitInitialsEntry() which locks whatever
// initialsLetters[] currently contains (defaults to 'AAA' from line 511 / 2949-2951
// reset, plus any letter changes the player made before timeout).
let   initialsEntryT        = 0;
const INITIALS_AUTO_LOCK_SEC = 15.0;

// K-FIX-5 — leaderboard storage. Replaces K's single highScore + highScoreInitials pair.
// loadHighScores: read 'djt_high_scores' JSON array. Validate each entry (3-char A-Z+space
// initials, non-negative integer score). Sort descending, slice to top 5. On miss/parse error,
// fall back to migrateLegacyOrEmpty.
function loadHighScores() {
  try {
    // P-DIFFICULTY-1 — one-time leaderboard wipe migration. Scoring rules changed
    // (per-second survival removed, time-bonus rate doubled, win-bonus per-level),
    // so prior scores are not comparable. Wipe runs exactly once per browser/device;
    // the migration flag persists in localStorage so subsequent loads skip it.
    const P_DIFFICULTY_MIGRATION_KEY = 'pdiff_migrated_v1';
    if (!localStorage.getItem(P_DIFFICULTY_MIGRATION_KEY)) {
      localStorage.removeItem(HIGH_SCORES_KEY);
      localStorage.removeItem(HIGH_SCORE_KEY);             // legacy single-score
      localStorage.removeItem(HIGH_SCORE_INITIALS_KEY);    // legacy initials
      localStorage.setItem(P_DIFFICULTY_MIGRATION_KEY, 'true');
    }
    const raw = localStorage.getItem(HIGH_SCORES_KEY);
    if (raw == null) return migrateLegacyOrEmpty();
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return migrateLegacyOrEmpty();
    const valid = arr.filter(e =>
      e && typeof e.initials === 'string' &&
      /^[A-Z ]{3}$/.test(e.initials) &&
      typeof e.score === 'number' && e.score >= 0
    );
    return valid.sort((a, b) => b.score - a.score).slice(0, LEADERBOARD_MAX);
  } catch (err) {
    return migrateLegacyOrEmpty();
  }
}

// K-FIX-5 — first-boot under leaderboard system: read the K-FIX-4-era single keys
// (djt_high_score + djt_high_score_initials) and bootstrap a 1-entry leaderboard if a legacy
// score exists. Old keys are LEFT IN PLACE (defensive — never delete user data). Subsequent
// boots read the new key and ignore the legacy ones.
function migrateLegacyOrEmpty() {
  try {
    const oldRaw = localStorage.getItem(HIGH_SCORE_KEY);
    if (oldRaw == null) return [];
    const oldScore = parseInt(oldRaw, 10);
    if (!isFinite(oldScore) || oldScore <= 0) return [];
    const oldInitialsRaw = localStorage.getItem(HIGH_SCORE_INITIALS_KEY);
    const initials = (typeof oldInitialsRaw === 'string' && /^[A-Z ]{3}$/.test(oldInitialsRaw))
      ? oldInitialsRaw
      : '   ';                                              // legacy J-save with no initials → 3 spaces (HUD trims)
    return [{ initials: initials, score: oldScore }];
  } catch (e) { return []; }
}

function saveHighScores(arr) {
  try {
    const trimmed = arr.slice(0, LEADERBOARD_MAX);
    localStorage.setItem(HIGH_SCORES_KEY, JSON.stringify(trimmed));
  } catch (e) {
    if (typeof console !== 'undefined') console.warn('saveHighScores failed:', e);
  }
}

// K-FIX-5 — convenience accessors. Used by HUD render + GAME_OVER overlay where Block J/K code
// previously read `highScore` / `highScoreInitials` directly. Single read site means future
// leaderboard schema changes don't ripple through the codebase.
function getTopScore()    { return highScores.length > 0 ? highScores[0].score    : 0;  }
function getTopInitials() { return highScores.length > 0 ? highScores[0].initials : ''; }

// K-FIX-5 — initials-entry trigger predicate. Score makes top 5 if the leaderboard isn't full
// OR the score beats the lowest entry. Empty signature guard: score must be > 0.
function scoreMakesTop5(score) {
  if (score <= 0) return false;
  if (highScores.length < LEADERBOARD_MAX) return true;
  return score > highScores[highScores.length - 1].score;
}

highScores = loadHighScores();

// ─────────────────────────────────────────────
//  L — DTJ YMCA DEATH DANCE
// ─────────────────────────────────────────────
// L1 — DTJ performs a 6-pose YMCA dance whenever the player loses a life or the game ends.
// Plays simultaneously with the player ragdoll+burst (Block J) and Antifa splat (K). DTJ stays
// on TOP, no gating. 200ms trigger delay after the capsule hit (lets the player ragdoll start
// first so the dance kicks in once the death is visually established).
//
// CYCLES — 1 if the player will respawn (lives > 1 at hit-time, since lives decrements at end
// of DEATH_REACTION); 2 if this is the last life (game-over). Cycle = 3.0s.
//
// SPEECH BUBBLE — Cycle 1: random pick of LOSER!/SAD!. Cycle 2 (game-over only): swap to
// 'GREATEST WIN EVER!'. Each bubble: hold 1.5s + fade 0.5s = 2.0s on screen (1.0s gap before
// cycle ends).
//
// AUDIO — 130 BPM YMCA-shaped descending arpeggio (E5, D5, C5, G4) on square+triangle oscillators
// detuned +7 cents. Loops while DANCING; clean stop on dance end.
//
// TAUNT GATE — Block M's planned gameplay-taunt system MUST check `dtjDanceState !== 'IDLE'`
// before firing a taunt. The dance owns DTJ's render slot exclusively while active.
const DTJ_DANCE_POSES = [
  { sprite: 'djt1', duration: 0.4 },     // 1: standing neutral, arms loose (intro)
  { sprite: 'djt6', duration: 1.0 },     // 2: right arm raised high (hero pose, the "Y") — held longest
  { sprite: 'djt2', duration: 0.4 },     // 3: strutting, arm across chest (swagger)
  { sprite: 'djt5', duration: 0.4 },     // 4: hands at tie, eyes closed laughing
  { sprite: 'djt3', duration: 0.4 },     // 5: hands clasped at chest, walking forward
  { sprite: 'djt4', duration: 0.4 },     // 6: striding with arms swinging out (finale)
];
const DTJ_DANCE_CYCLE_DURATION = 3.0;    // sum of pose durations; verified at boot below
const DTJ_DANCE_TRIGGER_DELAY  = 0.2;    // 200ms after hit before dance starts
let   dtjDanceState     = 'IDLE';        // 'IDLE' | 'DANCING'
let   dtjDanceT         = 0;             // elapsed time within the dance (0..totalDuration)
let   dtjDanceCycles    = 1;             // 1 (respawn) or 2 (game-over)
let   dtjDanceTrigger   = false;         // pending trigger flag set on capsule hit
let   dtjDanceTriggerT  = 0;             // countdown to dance start (s)

function getDtjDancePose(tWithinCycle) {
  let elapsed = 0;
  for (const pose of DTJ_DANCE_POSES) {
    if (tWithinCycle < elapsed + pose.duration) return pose.sprite;
    elapsed += pose.duration;
  }
  return DTJ_DANCE_POSES[DTJ_DANCE_POSES.length - 1].sprite;     // safety: end-of-cycle edge
}

// L — speech bubble state (single global at a time). M — generalized to drive BOTH dance
// bubbles (Block L) AND gameplay taunt bubbles (Block M). Per-bubble hold/fade durations live
// on the struct so each spawn picks its own timing.
//   text:  current bubble text
//   t:     elapsed time on screen
//   holdT: hold-at-full-alpha duration
//   fadeT: fade-out duration after hold
//   active: visibility flag
let bubble = { text: '', t: 0, holdT: 0, fadeT: 0, active: false };
const DTJ_DANCE_BUBBLE_HOLD = 1.5;
const DTJ_DANCE_BUBBLE_FADE = 0.5;
const DTJ_DANCE_BUBBLE_CYCLE1_TEXTS = ['LOSER!', 'SAD!'];
const DTJ_DANCE_BUBBLE_CYCLE2_TEXT  = 'GREATEST WIN EVER!';

// Generic spawn — used by both dance (1.5s + 0.5s) and taunt (1.0s + 0.5s) callers.
function spawnBubble(text, holdSec, fadeSec) {
  bubble.text = text;
  bubble.t = 0;
  bubble.holdT = holdSec;
  bubble.fadeT = fadeSec;
  bubble.active = true;
}

// Block L back-compat thin wrapper — dance callers continue to use spawnDanceBubble.
function spawnDanceBubble(text) {
  spawnBubble(text, DTJ_DANCE_BUBBLE_HOLD, DTJ_DANCE_BUBBLE_FADE);
}

function tickBubble(dt) {
  if (!bubble.active) return;
  bubble.t += dt;
  if (bubble.t >= bubble.holdT + bubble.fadeT) bubble.active = false;
}

function getBubbleAlpha() {
  if (!bubble.active) return 0;
  if (bubble.t < bubble.holdT) return 1;
  return Math.max(0, 1 - (bubble.t - bubble.holdT) / bubble.fadeT);
}

// M — interrupt the current bubble (used by Antifa spawn taunt to cancel-and-replace any
// in-progress regular taunt or dance bubble — though dance bubble cancel is unlikely since
// taunts are gated against dancing state).
function cancelBubble() {
  bubble.active = false;
  bubble.text = '';
}

// ─────────────────────────────────────────────
//  M — DTJ GAMEPLAY TAUNTS
// ─────────────────────────────────────────────
// DTJ taunts the player during gameplay via right-side speech bubbles (same component as
// Block L dance bubbles). Random pool of 8 phrases + 1 contextual phrase tied to Antifa spawn.
// Triggers on a randomized 8-15s timer AND on platform-reach events. Silent in M (audio
// added in Block N). Gated to GAMEPLAY-only + dance-not-active + bubble-not-active.
const TAUNT_POOL = [
  'CROOKED DEMS!',
  'WEAK! VERY WEAK!',
  'NASTY!',
  'WORST EVER!',
  'DISGRACEFUL!',
  'PATHETIC LOSERS!',
  'TOTALLY CORRUPT!',
  'DEMOCRATS HATE AMERICA!',
];
const ANTIFA_TAUNT = 'RADICAL LEFT MOB!';     // contextual — fires on Antifa spawn only, NOT in TAUNT_POOL
const TAUNT_INTERVAL_MIN = 8.0;
const TAUNT_INTERVAL_MAX = 15.0;
const TAUNT_HOLD = 1.0;
const TAUNT_FADE = 0.5;
let lastTauntIndex = -1;
let tauntTimer = TAUNT_INTERVAL_MIN + Math.random() * (TAUNT_INTERVAL_MAX - TAUNT_INTERVAL_MIN);

function pickTaunt() {
  // No-repeat-last from the general pool. Antifa contextual phrase doesn't participate.
  let idx;
  if (TAUNT_POOL.length <= 1) {
    idx = 0;
  } else {
    do {
      idx = Math.floor(Math.random() * TAUNT_POOL.length);
    } while (idx === lastTauntIndex);
  }
  lastTauntIndex = idx;
  return TAUNT_POOL[idx];
}

function fireTaunt(phrase) {
  spawnBubble(phrase, TAUNT_HOLD, TAUNT_FADE);
  // INTRO_TAUNT-AUDIO — generic TRUMP_AUDIO lookup keyed by the bubble text. Covers
  // all 8 TAUNT_POOL entries + ANTIFA_TAUNT in one line (replaces AUDIO-3F's WEAK-only
  // conditional). TRUMP_AUDIO keys match the phrase strings exactly so the lookup
  // resolves without per-phrase if-branches. Per GLOBAL AUDIO RULE: the clip whose
  // word matches the bubble text fires when that bubble appears. Any future taunt
  // added to TAUNT_POOL with a matching TRUMP_AUDIO entry gets audio for free; any
  // without one stays synth-only (playSfx_taunt below) without breaking.
  if (typeof TRUMP_AUDIO !== 'undefined' && TRUMP_AUDIO[phrase]) TRUMP_AUDIO[phrase].play();
  playSfx_taunt();                                                // N — taunt SFX (was silent in M)
}

function resetTauntTimer() {
  tauntTimer = TAUNT_INTERVAL_MIN + Math.random() * (TAUNT_INTERVAL_MAX - TAUNT_INTERVAL_MIN);
}

// M — call on every platform reach (the existing platformsReached.add + +500 reach bonus
// scoring sites). Fires a random-pool taunt + resets the regular timer so the player doesn't
// get stacked bubbles.
function firePlatformReachTaunt() {
  if (state !== 'GAMEPLAY') return;
  if (dtjDanceState !== 'IDLE') return;
  if (bubble.active) return;                                      // don't stack bubbles
  fireTaunt(pickTaunt());
  resetTauntTimer();
}

// M — call on Antifa spawn (inside triggerHelperSpawn → spawnAntifaWave path). Cancels any
// in-progress bubble, fires the contextual ANTIFA_TAUNT, resets the regular timer.
function fireAntifaSpawnTaunt() {
  if (state !== 'GAMEPLAY') return;
  if (dtjDanceState !== 'IDLE') return;
  cancelBubble();                                                 // cancel-and-replace
  fireTaunt(ANTIFA_TAUNT);
  resetTauntTimer();
}

// M — taunt timer tick. Called from main loop top with a state guard. Only ticks during
// GAMEPLAY (not intros, not cutscenes, not death/game-over states), only when no dance is
// running, and only when no bubble is currently displayed (regular taunt waits its turn).
function tickTaunts(dt) {
  if (state !== 'GAMEPLAY') return;
  if (dtjDanceState !== 'IDLE') return;
  if (bubble.active) return;
  tauntTimer -= dt;
  if (tauntTimer <= 0) {
    fireTaunt(pickTaunt());
    resetTauntTimer();
  }
}

// ─────────────────────────────────────────────
//  L / N — AUDIO CONTEXT + CHANNELS + YMCA SYNTH
// ─────────────────────────────────────────────
// Web Audio is gated by user-gesture init. First user input on any state primes the context.
// Subsequent calls are idempotent. iOS Safari requires the context's resume() inside a touch
// handler too, otherwise it stays in 'suspended' state. ensureAudioContext() handles both.
//
// N — channel topology under the master gain:
//    master  (1.0 default, 0 when muted by audio toggle)
//      ├── bgmChannel   (1.0 normal, 0.5 during dance ducking, smooth 200ms ramps)
//      ├── sfxChannel   (1.0 always)
//      └── synthChannel (1.0 always — used by Block L's YMCA dance synth, NOT ducked
//                        because YMCA is the focal audio while the player ragdolls)
// All play* functions guard on `audioContext && audioOn` — when toggled off, master.gain=0
// silences output but BGM keeps scheduling so unmute resumes from current position.
let audioContext   = null;
let masterChannel  = null;
let bgmChannel     = null;
let sfxChannel     = null;
let synthChannel   = null;
let audioOn        = true;             // boot default; loaded from localStorage below
// AUDIO-3e-MUSIC-BUTTON — set true after the user taps the dedicated TAP TO START MUSIC
// button on INTRO_BLACK. Purely UX: the button gives users an explicit one-tap-to-unlock-
// audio path BEFORE they tap to start the game. Because the music button's tap is its own
// user gesture, Howler's auto-unlock listeners fire on it cleanly; subsequent tap-to-start
// runs on a fully-unlocked Howler. Skipping the music button (tapping straight to start)
// keeps the original behavior — accepted UX trade-off.
let audioUnlocked  = false;
// N-FIX-3 — bumped key from 'djt_audio_on' to 'djt_audio_on_v2'. Old key may be stuck at
// 'false' for any user who pressed M during N-FIX-2 (or an earlier deploy where audio was
// suspect), which sets masterChannel.gain.value=0 and silences EVERYTHING including the
// new BGM rotation, intro music cues, and Nessun Dorma. Bumping the key forces a one-time
// fresh boot so audioOn defaults to true; user can re-mute with M if they want.
const AUDIO_ON_KEY = 'djt_audio_on_v2';

// Boot — read persisted toggle state. try/catch wraps Safari private mode.
try {
  const stored = localStorage.getItem(AUDIO_ON_KEY);
  if (stored === 'false') audioOn = false;
} catch (e) { /* default true */ }

function ensureAudioContext() {
  if (!audioContext) {
    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (Ctor) audioContext = new Ctor();
    } catch (e) {
      audioContext = null;                                       // fallback: silent game
      return;
    }
    if (audioContext) {
      // N — build channel graph once on first init.
      try {
        masterChannel = audioContext.createGain();
        bgmChannel    = audioContext.createGain();
        sfxChannel    = audioContext.createGain();
        synthChannel  = audioContext.createGain();
        masterChannel.gain.value = audioOn ? 1.0 : 0.0;
        bgmChannel.gain.value    = 1.0;
        sfxChannel.gain.value    = 1.0;
        synthChannel.gain.value  = 1.0;
        bgmChannel.connect(masterChannel);
        sfxChannel.connect(masterChannel);
        synthChannel.connect(masterChannel);
        masterChannel.connect(audioContext.destination);
      } catch (e) {
        // Channel graph build failed; fall back to direct destination routing in legacy code.
        masterChannel = bgmChannel = sfxChannel = synthChannel = null;
      }
    }
  }
  // N-FIX-6 4.5 — iOS Safari has stricter Web Audio rules than desktop Chrome:
  //   1. AudioContext must be CREATED inside a user-gesture handler (handled by callers).
  //   2. resume() must be CALLED synchronously inside that same handler (this block).
  //   3. resume() returns a Promise on modern browsers; ignoring it can leak rejections
  //      and on some iOS versions the context never actually transitions to 'running'.
  //   4. Some iOS versions need a "warm-up" silent oscillator scheduled inside the gesture
  //      before subsequent scheduled audio is audible. The 0-volume blip below handles this.
  // Desktop Chrome is forgiving on points 2-4. iOS Safari is not — without this block the
  // context stays 'suspended' (or 'running' but mute) and YouTube works while our app is silent.
  if (audioContext && audioContext.state === 'suspended') {
    try {
      const result = audioContext.resume();
      if (result && typeof result.then === 'function') {
        // Modern browsers — Promise is returned. Swallow rejection so it doesn't surface
        // as an Unhandled Promise Rejection in DevTools.
        result.catch(() => { /* will retry on next gesture */ });
      }
    } catch (e) { /* old-style synchronous resume threw — ignore, retry next gesture */ }
  }
  // AUDIO-3e Fix C — explicit Howler.ctx.resume() on the same user gesture. Howler.js does
  // attach its own auto-unlock listeners, but they can fail to fire if a competing handler
  // calls e.preventDefault() on the same event (the keydown handler does this for game keys
  // at L1353 — Arrow/Space/A/Z). Explicitly resuming Howler's context here guarantees both
  // the SFX context (above) AND the music context (Howler) unlock together on first gesture,
  // eliminating the "music doesn't play until you tap mute" symptom.
  if (typeof Howler !== 'undefined' && Howler.ctx && Howler.ctx.state === 'suspended') {
    try {
      const r = Howler.ctx.resume();
      if (r && typeof r.then === 'function') r.catch(() => { /* retry next gesture */ });
    } catch (e) { /* ignore, retry next gesture */ }
  }
  // iOS Safari warm-up blips — N-FIX-8 layered fix. Some iOS versions need TWO warm-ups
  // to fully unlock Web Audio: blip 1 is a silent default-frequency oscillator (wakes the
  // graph), blip 2 is an explicit 440Hz oscillator at gain=0 (older iOS versions only
  // accept the audio graph as "primed" after a real frequency has been scheduled). Both
  // gated on state === 'running' so we only fire when the context is ready.
  if (audioContext && audioContext.state === 'running' && masterChannel) {
    try {
      // Blip 1 — silent oscillator (wakes the audio graph on most iOS versions).
      const blip1     = audioContext.createOscillator();
      const blip1Gain = audioContext.createGain();
      blip1Gain.gain.value = 0;
      blip1.connect(blip1Gain);
      blip1Gain.connect(masterChannel);
      blip1.start(audioContext.currentTime);
      blip1.stop(audioContext.currentTime + 0.01);
      // Blip 2 — 440Hz at gain=0 (older iOS versions only treat the graph as primed after
      // an explicit frequency has been scheduled).
      const blip2     = audioContext.createOscillator();
      blip2.frequency.value = 440;
      const blip2Gain = audioContext.createGain();
      blip2Gain.gain.value = 0;
      blip2.connect(blip2Gain);
      blip2Gain.connect(masterChannel);
      blip2.start(audioContext.currentTime);
      blip2.stop(audioContext.currentTime + 0.05);
    } catch (e) { /* blip failed; main audio path still works on most browsers */ }
  }
}

// AUDIO-1 — toggle master audio. Mutes BOTH Howler (music playback) AND the SFX channel
// (synth oscillators) so the M-key / speaker-icon affects everything. Persists to localStorage.
// Bound to M-key on PC + speaker icon tap on mobile. Works during GAMEPLAY and PAUSED only.
function toggleAudio() {
  audioOn = !audioOn;
  // Howler controls all music playback.
  if (typeof Howler !== 'undefined') Howler.mute(!audioOn);
  // Master gain still controls SFX (which routes through the audioContext masterChannel).
  if (masterChannel) masterChannel.gain.value = audioOn ? 1.0 : 0.0;
  try { localStorage.setItem(AUDIO_ON_KEY, String(audioOn)); } catch (e) {}
  if (audioOn) playSfx_pauseToggle();                            // feedback chirp on enable
}

// ─────────────────────────────────────────────
//  N — SFX LIBRARY (~25 effects, all synth)
// ─────────────────────────────────────────────
// Each playSfx_* function creates oscillators on-demand, sets envelope, plays once, and
// auto-disconnects via osc.stop(t+dur). No asset loading. All routed through sfxChannel so
// master toggle silences them. Audio-off / no-context: every function early-returns no-op.

// Generic envelope helper. attack 5ms peak → exp decay to near-zero by durSec. Caller picks
// frequency, oscillator type, peak gain, total duration. Used by ~half the SFX.
function _sfxNote(freq, oscType, durSec, gainPeak, channel) {
  if (!audioContext || !audioOn) return;
  const ch = channel || sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  osc.type = oscType;
  osc.frequency.setValueAtTime(freq, t);
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(0.01, durSec));
  osc.connect(g);
  g.connect(ch);
  osc.start(t);
  osc.stop(t + durSec + 0.05);
}

// Frequency sweep — linear ramp from f0→f1 over durSec.
function _sfxSweep(f0, f1, oscType, durSec, gainPeak) {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  osc.type = oscType;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.linearRampToValueAtTime(f1, t + durSec);
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + durSec);
  osc.connect(g); g.connect(ch);
  osc.start(t); osc.stop(t + durSec + 0.05);
}

// Filtered noise burst. Used for thuds, splashes, glass, etc.
function _sfxNoise(durSec, filterType, filterFreq, gainPeak) {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  const bufferSize = Math.max(1, Math.floor(audioContext.sampleRate * durSec));
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioContext.createBufferSource();
  src.buffer = buffer;
  const filter = audioContext.createBiquadFilter();
  filter.type = filterType || 'highpass';
  filter.frequency.value = filterFreq || 1000;
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + durSec);
  src.connect(filter); filter.connect(g); g.connect(ch);
  src.start(t); src.stop(t + durSec + 0.05);
}

// Arpeggio — sequence of notes at startTime + i*spacing.
function _sfxArpeggio(freqs, oscType, noteSpacing, noteDur, gainPeak) {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t0 = audioContext.currentTime;
  for (let i = 0; i < freqs.length; i++) {
    const t = t0 + i * noteSpacing;
    const osc = audioContext.createOscillator();
    osc.type = oscType;
    osc.frequency.setValueAtTime(freqs[i], t);
    const g = audioContext.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + noteDur);
    osc.connect(g); g.connect(ch);
    osc.start(t); osc.stop(t + noteDur + 0.05);
  }
}

  // flag) so the song plays from dance-start at hit+0.2s, through the 9s dance, through the
  // ~1s PENDING tail buffer, through the GAME_OVER overlay + high-score entry, until the
  // player taps to continue. On tap, resetForGameOver flips state→INTRO_BLACK; next tickBGM
  // sees ESCALATOR is desired and stops YMCA cleanly with the standard 200ms fade.
  if (state === 'GAMEOVER_PENDING' || state === 'GAME_OVER') {
    return MUSIC_STATES.YMCA;
  }
  // WIN_FREEZE — silent (the win moment, before cutscene fade-in).
  if (state === 'WIN_FREEZE') {
    return MUSIC_STATES.SILENT;
  }
  // AUDIO-3e Fix B — DEATH_REACTION split by lives:
  //   - Final-life death (lives <= 1 pre-decrement): SILENT so the YMCA dance gate above
  //     can fire when dance triggers at hit+0.2s with cycles=3.
  //   - Non-final death (lives >= 2): BGM_ROTATION — equals currentMusic (since GAMEPLAY
  //     was BGM_ROTATION), so transitionToMusic early-returns. Howler is NOT stopped, the
  //     current song's playback position is NOT reset. BGM continues seamlessly underneath
  //     the death + dance + respawn. Antifa wave still wins via state===GAMEPLAY → MACHO_MAN
  //     after respawn (state machine handles via natural transitions).
  if (state === 'DEATH_REACTION') {
    if (typeof player !== 'undefined' && player.lives <= 1) {
      return MUSIC_STATES.SILENT;
    }
    return MUSIC_STATES.BGM_ROTATION;
  }
  // Intro chain. ESCALATOR music plays under INTRO_BLACK / INTRO_TITLE / INTRO_ESCALATOR.
  // INTRO_STAIRS swaps to AVE_MARIA. SHATTER and TAUNT are silent (crash SFX dominates).
  if (state === 'INTRO_BLACK' || state === 'INTRO_TITLE' || state === 'INTRO_ESCALATOR') {
    return MUSIC_STATES.ESCALATOR;
  }
  if (state === 'INTRO_STAIRS') {
    return MUSIC_STATES.AVE_MARIA;
  }
  if (state === 'INTRO_SHATTER' || state === 'INTRO_TAUNT') {
    return MUSIC_STATES.SILENT;
  }
  // GAMEPLAY — Antifa wave overrides BGM rotation with Macho Man.
  if (state === 'GAMEPLAY') {
    let antifaCount = 0;
    if (typeof helpers !== 'undefined') {
      for (const h of helpers) { if (h.type === 'ANTIFA') { antifaCount++; break; } }
    }
    if (antifaCount > 0) return MUSIC_STATES.MACHO_MAN;
    return MUSIC_STATES.BGM_ROTATION;
  }
  // PAUSED — preserve whatever was playing (no swap during pause).
  if (state === 'PAUSED') {
    return currentMusic;
  }
  return MUSIC_STATES.SILENT;
}

// AUDIO-1 — apply the music change. Stops the currently-playing Howl with a 200ms fade-out,
// then plays the new sound at volume 0 and fades it up to its target volume over 200ms.
// SOUND_MAP translates MUSIC_STATES values to SOUND_LIBRARY keys. BGM_ROTATION is special-
// cased to delegate to startBgmRotation, which subscribes to the song's 'end' event so each
// 3-song cycle advances naturally without timers. SILENT just stops the current sound.
function transitionToMusic(newMusic) {
  // AUDIO-BUGHUNT-1 LOG POINT 1 — fires on every transitionToMusic call, BEFORE the
  // early-return check. Captures the from/to MUSIC_STATES, current state, rotation idx,
  // which Howls are actually playing right now (vs what currentMusic claims), Howler ctx
  // state, and a timestamp. Diagnostic only — no behavior change.
  console.log('[BGM:transition]', {
    from: currentMusic,
    to: newMusic,
    state: state,
    rotationIdx: bgmRotationIdx,
    actuallyPlaying: (() => {
      const playing = [];
      for (const [name, howl] of Object.entries(SOUND_LIBRARY)) {
        if (howl && typeof howl.playing === 'function' && howl.playing()) {
          playing.push(name);
        }
      }
      return playing;
    })(),
    howlerCtxState: (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx.state : 'no-ctx',
    t: performance.now().toFixed(0),
  });
  if (newMusic === currentMusic) return;
  const FADE_MS = 200;
  // AUDIO-3e Fix D — rotation songs (greenwood/queen/brown) get .pause() instead of .stop().
  // .pause() preserves Howler's internal seek position; .stop() resets seek to 0. So when the
  // BGM rotation is interrupted (e.g. by WIN_FREEZE → SILENT for cutscene), the song's
  // playback position survives. Note: Fix A advances bgmRotationIdx on level transition so
  // the same paused song doesn't get re-played at the next level — the NEXT song plays. The
  // pause-preserved seek matters for rare cases like Antifa wave end → BGM resume.
  // One-shot songs (free_world/ave_maria/nessun_dorma/macho_man/ymca) keep .stop() so they
  // always restart from the beginning when the scene next triggers them.
  const ROTATION_SONGS_SET = new Set(['greenwood', 'queen', 'brown']);
  if (currentlyPlayingSound && SOUND_LIBRARY[currentlyPlayingSound]) {
    const stopRef = currentlyPlayingSound;
    const sound   = SOUND_LIBRARY[stopRef];
    sound.off('end');                                 // detach any rotation-end handler
    sound.fade(sound.volume(), 0, FADE_MS);
    const isRotation = ROTATION_SONGS_SET.has(stopRef);
    // AUDIO-3-SIMPLIFY-BUGHUNT-2 LOG POINT 3 — the only audio-music setTimeout in the
    // codebase. Schedules a .pause() (rotation) or .stop() (one-shot) 250ms after the fade
    // starts. Captures schedule + fire moments to catch "zombie timer fires after a reset"
    // (candidate 3): if a [BGM:settimeout-fire] appears AFTER a [BGM:reset-howler-snapshot],
    // the fire's stop/pause is silently undoing the reset's clean slate by either re-stopping
    // (no harm) or re-pausing (preserves stale seek for resumption later).
    console.log('[BGM:settimeout-schedule]', {
      purpose: isRotation ? 'fade-then-pause' : 'fade-then-stop',
      delay: FADE_MS + 50,
      stopRef: stopRef,
      state: state,
      currentMusic: currentMusic,
      t: performance.now().toFixed(0),
    });
    setTimeout(() => {
      console.log('[BGM:settimeout-fire]', {
        purpose: isRotation ? 'fade-then-pause' : 'fade-then-stop',
        stopRef: stopRef,
        state: state,
        currentMusic: currentMusic,
        t: performance.now().toFixed(0),
      });
      if (isRotation) sound.pause();                  // preserve seek for resumption
      else            sound.stop();                   // one-shots: reset to start
    }, FADE_MS + 50);
  }
  currentMusic = newMusic;
  currentlyPlayingSound = null;
  if (newMusic === MUSIC_STATES.SILENT) return;
  // BGM_ROTATION delegates to its own helper so the 'end' event chain is set up.
  if (newMusic === MUSIC_STATES.BGM_ROTATION) {
    startBgmRotation();
    return;
  }
  // SOUND_MAP defined inline so it picks up live MUSIC_STATES values.
  const SOUND_MAP = {
    [MUSIC_STATES.ESCALATOR]:    'free_world',
    [MUSIC_STATES.AVE_MARIA]:    'ave_maria',
    [MUSIC_STATES.NESSUN_DORMA]: 'nessun_dorma',
    [MUSIC_STATES.MACHO_MAN]:    'macho_man',
    [MUSIC_STATES.YMCA]:         'ymca',
  };
  const SOUND_DEFAULT_VOLUMES = {
    free_world:   0.6,
    ave_maria:    0.7,
    nessun_dorma: 0.7,
    macho_man:    0.7,
    ymca:         0.7,
  };
  const soundKey = SOUND_MAP[newMusic];
  if (soundKey && SOUND_LIBRARY[soundKey]) {
    const sound = SOUND_LIBRARY[soundKey];
    sound.off('end');
    // AUDIO-3e Fix D — every song dispatched via SOUND_MAP is a one-shot (BGM rotation
    // takes its own startBgmRotation path above). Seek to 0 first so it always plays from
    // the beginning — defensive against any stray paused state from prior runs (e.g. if a
    // future code path were to .pause() one of these). Without this, a paused one-shot
    // would resume mid-track on next play() instead of starting fresh.
    sound.seek(0);
    sound.volume(0);
    sound.play();
    sound.fade(0, SOUND_DEFAULT_VOLUMES[soundKey] || 0.7, FADE_MS);
    currentlyPlayingSound = soundKey;
  }
}

// AUDIO-1 — BGM rotation helper. Plays the current rotation song, subscribes to its 'end'
// event to advance bgmRotationIdx and recurse. Idempotent: re-calling stops any previous
// 'end' handler before subscribing fresh. tickBGM never advances rotation — it's purely
// event-driven on song-end, which means natural song duration determines rotation timing.
function startBgmRotation() {
  const songKey = BGM_ROTATION_SONGS[bgmRotationIdx];
  const sound   = SOUND_LIBRARY[songKey];
  if (!sound) return;
  sound.off('end');                                   // clear any previous handler
  // AUDIO-3-BUGHUNT-3-FIX — read targetVol from BGM_ROTATION_VOLUMES table, NOT from
  // sound.volume(). The Howl's runtime volume can be 0 if a prior transitionToMusic
  // faded it out and paused it — reading 0 makes the fade-in a fade(0→0) no-op,
  // producing the silent-30s / audible-30s cycle observed in field test. (transition-
  // ToMusic line ~1202 is `sound.fade(sound.volume(), 0, FADE_MS)` followed by a
  // setTimeout pause; on a rotation song this leaves the Howl at internal volume=0.
  // When rotation cycles back to that song, startBgmRotation called sound.volume() →
  // got 0 → fade(0→0,200ms) → song plays inaudibly for full duration → 'end' fires →
  // next song's Howl was untouched, plays audibly. Hence the 30s on / 30s off pattern.)
  const targetVol = BGM_ROTATION_VOLUMES[songKey];
  sound.volume(0);
  sound.play();
  sound.fade(0, targetVol, 200);
  currentlyPlayingSound = songKey;
  sound.once('end', () => {
    // AUDIO-3-SIMPLIFY — belt-and-suspenders guard. If somehow a song hits 'end' while
    // PAUSED (CHANGE 1's togglePause should have prevented this by .pause()-ing the Howl
    // before it could reach end), refuse to advance rotation. Otherwise the silent
    // background-advance corrupts currentMusic vs Howl sync. Log so we can see if it ever
    // fires post-CHANGE-1 (would indicate an unanticipated path).
    if (state === 'PAUSED') {
      console.log('[BGM:end-blocked-paused]', {
        endedSong: BGM_ROTATION_SONGS[bgmRotationIdx],
        t: performance.now().toFixed(0),
      });
      return;
    }
    // AUDIO-BUGHUNT-1 LOG POINT 2a — fires when a rotation song reaches its natural end.
    // Captures which song ended, current state/music, and what the next rotation pick will
    // be. If this never logs when a song ends, the 'end' event chain is broken (e.g. .pause()
    // suppressed it, or .off('end') detached it before the song reached duration).
    const _endedIdx  = bgmRotationIdx;
    const _nextIdx   = (bgmRotationIdx + 1) % BGM_ROTATION_SONGS.length;
    console.log('[BGM:end-fired]', {
      endedSong: BGM_ROTATION_SONGS[_endedIdx],
      state: state,
      currentMusic: currentMusic,
      nextIdx: _nextIdx,
      nextSong: BGM_ROTATION_SONGS[_nextIdx],
      t: performance.now().toFixed(0),
    });
    bgmRotationIdx = (bgmRotationIdx + 1) % BGM_ROTATION_SONGS.length;
    if (currentMusic === MUSIC_STATES.BGM_ROTATION) startBgmRotation();
    // AUDIO-BUGHUNT-1 LOG POINT 2b — fires after the advancement+restart attempt. If
    // newSongPlaying === false here, the recursive startBgmRotation didn't actually start
    // the next song (most likely because currentMusic !== BGM_ROTATION at the moment of
    // recursion, OR because the .play() call failed/queued).
    const _newSongName = BGM_ROTATION_SONGS[bgmRotationIdx];
    const _newHowl     = SOUND_LIBRARY[_newSongName];
    console.log('[BGM:end-handled]', {
      newIdx: bgmRotationIdx,
      newSong: _newSongName,
      newSongPlaying: (_newHowl && typeof _newHowl.playing === 'function') ? _newHowl.playing() : 'unknown',
      t: performance.now().toFixed(0),
    });
  });
}

// AUDIO-1 — state-machine-driven scheduler. Each frame: ask what music SHOULD play, swap
// if needed via transitionToMusic. Howler manages its own audio context internally and
// handles cross-browser unlock; no per-frame note scheduling needed. PAUSED bails so music
// doesn't switch during pause.
function tickBGM() {
  // AUDIO-BUGHUNT-1 LOG POINT 4 — state-change watcher. Module-level `window._lastLoggedState`
  // holds the previous state seen by tickBGM. When it differs from the current state, log
  // the transition with audio context. Fires once per state edge regardless of how many
  // frames spend in each state. Diagnostic only; no behavior change.
  if (typeof window._lastLoggedState === 'undefined') {
    window._lastLoggedState = null;
  }
  if (state !== window._lastLoggedState) {
    console.log('[BGM:state-change]', {
      from: window._lastLoggedState,
      to: state,
      currentMusic: currentMusic,
      lives: (typeof player !== 'undefined') ? player.lives : 'no-player',
      rotationIdx: bgmRotationIdx,
      t: performance.now().toFixed(0),
    });
    window._lastLoggedState = state;
  }
  if (state === 'PAUSED') return;
  const desired = computeDesiredMusic();
  if (desired !== currentMusic) {
    transitionToMusic(desired);
  }
}

// AUDIO-3-MUSIC-UX — self-healing BGM. Called from each input handler (keydown / pointerdown
// / touchstart). If the desired music for the current state SHOULD be playing but the
// underlying Howl reports !playing(), force a fresh transition. tickBGM's normal compare-
// and-swap can't catch this because currentMusic === desired (state machine thinks music is
// playing); only checking sound.playing() reveals the silent reality. Common triggers:
// - First-load Howler unlock failed to flush queued plays
// - Mute/unmute song handoff dropped at once('end') boundary
// - Pause/unpause caused Howler to silently stop a sound
// Self-heal nullifies currentMusic so transitionToMusic doesn't early-return at L1057, then
// invokes it with the same desired value to issue a fresh play.
function selfHealBgm() {
  // AUDIO-BUGHUNT-1 LOG POINT 3a — capture entry vars BEFORE guards. Local var only;
  // no behavior change. Used by LOG POINT 3b below to log the full eval context once
  // we know the call passed the guards.
  const _selfHealEntry = {
    audioOn: audioOn,
    state: state,
    howlerCtxState: (typeof Howler !== 'undefined' && Howler.ctx) ? Howler.ctx.state : 'no-ctx',
    currentMusic: currentMusic,
    t: performance.now().toFixed(0),
  };
  if (!audioOn) return;
  if (state === 'PAUSED') return;
  if (typeof Howler === 'undefined' || !Howler.ctx || Howler.ctx.state !== 'running') return;
  // AUDIO-3-MUSIC-UX-2 — only self-heal in stable states where BGM should clearly be
  // playing. Skip during transitional/cutscene/death states where transitions are mid-flight
  // (DEATH_REACTION's lives-gate eval, WIN_FREEZE's pre-cutscene moment, the entire
  // CUTSCENE_* chain which has its own music routing). Without this allowlist, self-heal
  // could fire mid-transition and double-play or play the wrong song.
  const STABLE_STATES = new Set([
    'GAMEPLAY',
    'INTRO_BLACK', 'INTRO_TITLE', 'INTRO_ESCALATOR', 'INTRO_STAIRS',
    'INTRO_TAUNT', 'INTRO_SHATTER',
    'GAMEOVER_PENDING', 'GAME_OVER',
  ]);
  if (!STABLE_STATES.has(state)) return;
  const desired = computeDesiredMusic();
  if (desired === MUSIC_STATES.SILENT) return;
  let isPlaying = false;
  if (desired === MUSIC_STATES.BGM_ROTATION) {
    const songName = BGM_ROTATION_SONGS[bgmRotationIdx];
    const sound    = SOUND_LIBRARY[songName];
    isPlaying = !!(sound && sound.playing());
  } else {
    const songName = MUSIC_STATE_TO_SOUND[desired];
    const sound    = SOUND_LIBRARY[songName];
    isPlaying = !!(sound && sound.playing());
  }
  // AUDIO-BUGHUNT-1 LOG POINT 3b — fires for every selfHealBgm call that passes the
  // guards. Captures entry context (from LOG POINT 3a above), the desired music, whether
  // the desired Howl is actually playing, and whether self-heal will trigger a forced
  // transition. If willTrigger is true repeatedly for the same desired song, the heal is
  // racing against something that re-silences the Howl (R3/R4 likely candidates).
  console.log('[BGM:selfHeal-eval]', {
    audioOn:        _selfHealEntry.audioOn,
    state:          _selfHealEntry.state,
    howlerCtxState: _selfHealEntry.howlerCtxState,
    currentMusic:   _selfHealEntry.currentMusic,
    t:              _selfHealEntry.t,
    desired:        desired,
    isPlaying:      isPlaying,
    willTrigger:   !isPlaying,
  });
  if (!isPlaying) {
    currentMusic = null;             // sentinel so transitionToMusic doesn't early-return
    transitionToMusic(desired);
  }
}

// AUDIO-1 — Macho Man synth + intro/cutscene cue functions + duckBGM/unduckBGM/bgmFadeOut/
// bgmFadeIn helpers all DELETED. Howler owns playback and fade timing. The state machine
// (computeDesiredMusic + transitionToMusic) drives swaps from a single per-frame tick.


// ─────────────────────────────────────────────
//  N — PAUSE STATE
// ─────────────────────────────────────────────
// New game state 'PAUSED'. Entered via P-key, Escape-key, or pause-icon tap during GAMEPLAY.
// Most update branches gate on state==='GAMEPLAY' so they freeze automatically when state
// flips to PAUSED. Block M's taunt timer + tickDtjDance + tickBubble + tickBGM all check
// state==='PAUSED' (or its inverse) explicitly to avoid drift.
//
// lastGameplayState: stores the pre-pause state value to restore on unpause. Almost always
// 'GAMEPLAY' but kept as a string for forward compat (e.g., a future block could allow
// pausing during a different state).
let lastGameplayState = 'GAMEPLAY';

function isPausableState() {
  // Only allow pause during active gameplay. Death animations, game-over, intros, cutscenes
  // are already non-interactive; pausing them would conflict with their own time-driven logic.
  return state === 'GAMEPLAY';
}

function togglePause() {
  // PAUSE-DIAG — entry log. If togglePause is reached but state isn't 'GAMEPLAY' or 'PAUSED',
  // both branches no-op silently — that's the suspected mobile failure mode.
  console.log('[PAUSE-DIAG] togglePause-entry', { stateBefore: state, isPausableState: isPausableState() });
  if (state === 'PAUSED') {
    // AUDIO-3-SIMPLIFY — leaving PAUSED. Resume the active rotation Howl (matching
    // bgmRotationIdx if currentMusic === BGM_ROTATION) and YMCA (if currentMusic === YMCA).
    // Howler's .play() on a paused Howl resumes from the paused seek position automatically.
    if (typeof SOUND_LIBRARY !== 'undefined') {
      const activeRotationSong = BGM_ROTATION_SONGS[bgmRotationIdx];
      for (const songName of BGM_ROTATION_SONGS) {
        const sound = SOUND_LIBRARY[songName];
        if (sound && songName === activeRotationSong &&
            currentMusic === MUSIC_STATES.BGM_ROTATION) {
          sound.play();
        }
      }
      if (SOUND_LIBRARY.ymca && currentMusic === MUSIC_STATES.YMCA) {
        SOUND_LIBRARY.ymca.play();
      }
    }
    state = lastGameplayState;
    stateT = 0;
    playSfx_pauseToggle();
  } else if (isPausableState()) {
    lastGameplayState = state;
    state = 'PAUSED';
    stateT = 0;
    playSfx_pauseToggle();
    // AUDIO-3-SIMPLIFY — entering PAUSED. Stop the playback head on every rotation Howl
    // and YMCA. Without this, songs continue playing inaudibly via Howler.mute (or just
    // continue period if mute isn't set), reach their natural end during pause, and the
    // once('end') handler advances rotation silently — corrupting currentMusic vs Howl
    // sync. AUDIO-BUGHUNT-1 logs showed 8+ silent handoffs during a single 3-min pause.
    // .pause() (not .stop()) preserves seek so unpause resumes from the same spot.
    if (typeof SOUND_LIBRARY !== 'undefined') {
      for (const songName of BGM_ROTATION_SONGS) {
        const sound = SOUND_LIBRARY[songName];
        if (sound && sound.playing()) sound.pause();
      }
      if (SOUND_LIBRARY.ymca && SOUND_LIBRARY.ymca.playing()) {
        SOUND_LIBRARY.ymca.pause();
      }
    }
  }
  // PAUSE-DIAG — exit log. Compare stateAfter with stateBefore from the entry log to
  // confirm whether either branch actually mutated state, or both no-op'd silently.
  console.log('[PAUSE-DIAG] togglePause-exit', { stateAfter: state });
}

function drawPauseOverlay() {
  if (state !== 'PAUSED') return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W/2, H/2 - 20);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('TAP OR PRESS P TO RESUME', W/2, H/2 + 20);
  ctx.fillStyle = '#9a7a00';
  ctx.font = '10px monospace';
  ctx.fillText('Created by Brian Albert', W/2, H - 20);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  N — AUDIO + PAUSE ICONS (top-right corner)
// ─────────────────────────────────────────────
// Two small icon buttons rendered at the top-right of the canvas, just below the SCORE/HI HUD.
// Speaker icon (audio toggle) at SPEAKER_BOX. Pause/play icon at PAUSE_BOX (immediately left
// of speaker). Tap zones are larger than the icon visuals for finger-friendly hit testing.
const ICON_Y       = 48;                                          // below HUD bar (HUD ends ~y=42)
const ICON_SIZE    = 22;
const SPEAKER_BOX  = { x: W - 30, y: ICON_Y, w: ICON_SIZE, h: ICON_SIZE };
// AUDIO-3e-MUSIC-BUTTON — large mobile-friendly tap zone for the explicit audio-unlock
// button. Centered horizontally, positioned below the INSERT QUARTER text. 200×40 px gives
// plenty of finger area on phones. Rendered only on INTRO_BLACK while !audioUnlocked.
const MUSIC_BTN_BOX = { x: W / 2 - 100, y: H / 2 + 40, w: 200, h: 40 };
const PAUSE_BOX    = { x: W - 60, y: ICON_Y, w: ICON_SIZE, h: ICON_SIZE };
// MOBILE-HIT-TEST-FIX — 50×50 transparent hit-rects, decoupled from the 22×22 visual icons.
// Same pattern as the d-pad zones (boxLeft/boxRight/boxJump/boxUp/boxDown) — finger-friendly
// invisible touch areas; the icon graphics are just visual markers. Centered on the original
// 22×22 visual rects: SPEAKER visual center = (W-19, ICON_Y+11), PAUSE visual center =
// (W-49, ICON_Y+11); subtract 25 on each axis to get the 50×50 top-left.
// Spans: SPEAKER_HIT_BOX x=[W-44 .. W+6], PAUSE_HIT_BOX x=[W-74 .. W-24] — they OVERLAP
// by 20px in the x=[W-44 .. W-24] strip (each centered on its 22×22 visual icon spaced
// 30px apart, so the 50×50 zones can't help but encroach). Speaker is checked BEFORE pause
// in pointerdown/touchstart, so the overlap strip resolves deterministically to toggleAudio.
// Acceptable: speaker is the more-frequently-tapped of the two, so first-precedence is right.
const SPEAKER_HIT_BOX = { x: W - 44, y: ICON_Y - 14, w: 50, h: 50 };
const PAUSE_HIT_BOX   = { x: W - 74, y: ICON_Y - 14, w: 50, h: 50 };
// MOBILE-PAUSE-ONLY — on mobile, enlarge the pause rect from 50×50 to 60×60 (finger size).
// Mutating const-bound objects is legal — only the binding is frozen, not the property bag.
// PAUSE_BOX is also resized + repositioned to MATCH PAUSE_HIT_BOX so drawPauseIcon's center
// math (cx = PAUSE_BOX.x + PAUSE_BOX.w/2) lands the icon glyph in the middle of the bg rect.
// Without this, the glyph would render at the original 22×22 PAUSE_BOX center while the bg
// rect drew around the new 60×60 PAUSE_HIT_BOX — they'd be offset by ~14px each axis.
// SPEAKER boxes are NOT touched here — drawAudioIcon early-returns on mobile, and the
// pointerdown/touchstart speaker hit-test is gated by !IS_MOBILE, so the speaker rects
// are inert dead constants on mobile rather than re-jiggered geometry.
if (IS_MOBILE) {
  PAUSE_HIT_BOX.w = 60;
  PAUSE_HIT_BOX.h = 60;
  PAUSE_BOX.x     = PAUSE_HIT_BOX.x;
  PAUSE_BOX.y     = PAUSE_HIT_BOX.y;
  PAUSE_BOX.w     = 60;
  PAUSE_BOX.h     = 60;
}
// AUDIO-3-LOG-DUMP — bottom-right DUMP LOGS button. 80×24 px, gameplay+game-over states
// only. Positioned where it doesn't overlap touch controls (left jump+walk are on left
// side; right ladder controls live higher up at H*0.45). Tap opens a DOM modal showing
// the captured [BGM:*] log buffer with COPY ALL + CLOSE controls.
const DUMP_BTN_BOX = { x: W - 90, y: H - 30, w: 80, h: 24 };
const DUMP_BTN_VISIBLE_STATES = new Set([
  'GAMEPLAY', 'GAMEOVER_PENDING', 'GAME_OVER', 'CUTSCENE_BETWEEN',
]);
function dumpBtnVisible() { return DUMP_BTN_VISIBLE_STATES.has(state); }
function showDumpLogModal() {
  // AUDIO-3-LOG-DUMP — DOM modal so the JSON is selectable, scrollable, and clipboard-
  // copyable on mobile (canvas-rendered text would not be). Pure DOM manipulation, no
  // game-state changes. Closing removes the overlay div from <body>.
  if (document.getElementById('bgm-dump-modal')) return;   // idempotent — don't double-open
  const dumpText = JSON.stringify(window.bgmLogBuffer, null, 2);
  const overlay = document.createElement('div');
  overlay.id = 'bgm-dump-modal';
  overlay.style.cssText =
    'position:fixed;top:0;left:0;width:100vw;height:100vh;' +
    'background:rgba(0,0,0,0.85);z-index:99999;display:flex;' +
    'flex-direction:column;padding:16px;box-sizing:border-box;';
  const header = document.createElement('div');
  header.style.cssText =
    'display:flex;justify-content:space-between;align-items:center;' +
    'color:white;font:14px monospace;margin-bottom:8px;';
  header.innerHTML =
    '<span>BGM LOG DUMP (' + window.bgmLogBuffer.length + ' entries)</span>' +
    '<span>' +
      '<button id="bgm-copy-btn" style="margin-right:8px;padding:4px 12px;font:13px monospace;">COPY ALL</button>' +
      '<button id="bgm-close-btn" style="padding:4px 12px;font:13px monospace;">CLOSE</button>' +
    '</span>';
  overlay.appendChild(header);
  const textarea = document.createElement('textarea');
  textarea.value = dumpText;
  textarea.readOnly = true;
  textarea.style.cssText =
    'flex:1;width:100%;font:10px monospace;padding:8px;' +
    'background:#111;color:#0f0;border:1px solid #444;' +
    'box-sizing:border-box;resize:none;';
  overlay.appendChild(textarea);
  const toast = document.createElement('div');
  toast.id = 'bgm-toast';
  toast.style.cssText =
    'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);' +
    'background:rgba(0,128,0,0.9);color:white;padding:12px 24px;' +
    'font:16px monospace;border-radius:4px;display:none;';
  toast.textContent = 'COPIED!';
  overlay.appendChild(toast);
  document.body.appendChild(overlay);
  document.getElementById('bgm-copy-btn').onclick = function() {
    let copied = false;
    try {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textarea.value);
        copied = true;
      }
    } catch (e) { /* fall through to execCommand */ }
    if (!copied) {
      try {
        textarea.select();
        document.execCommand('copy');
      } catch (e) { /* clipboard may be unavailable; user can manual-copy */ }
    }
    toast.style.display = 'block';
    setTimeout(function() { toast.style.display = 'none'; }, 1000);
  };
  document.getElementById('bgm-close-btn').onclick = function() {
    overlay.remove();
  };
}

function drawDumpLogsButton() {
  if (!dumpBtnVisible()) return;
  const b = DUMP_BTN_BOX;
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1;
  ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
  ctx.fillStyle = '#ffffff';
  ctx.font = '11px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('DUMP LOGS', b.x + b.w / 2, b.y + b.h / 2);
