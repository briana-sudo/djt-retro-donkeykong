  ctx.restore();
}

function drawAudioIcon() {
  // MOBILE-PAUSE-ONLY — speaker hidden entirely on mobile. Phone hardware volume buttons
  // serve the muting role; the on-canvas speaker just adds clutter and competes with the
  // pause button for top-right finger space. M-key on PC keyboards still calls toggleAudio.
  if (IS_MOBILE) return;
  const cx = SPEAKER_BOX.x + SPEAKER_BOX.w / 2;
  const cy = SPEAKER_BOX.y + SPEAKER_BOX.h / 2;
  ctx.save();
  // BUTTONS-VISIBLE-MOBILE — d-pad-style semi-transparent bg rect over the 50×50 hit-zone
  // (NOT the 22×22 visual SPEAKER_BOX). Same alpha values as drawDpad's idle state — speaker
  // has no hold-state so we never paint the active variant. Makes the button finger-findable
  // on iPhone where the bare icon glyph was invisible against dark scenery.
  ctx.fillStyle   = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.roundRect(SPEAKER_HIT_BOX.x + 2, SPEAKER_HIT_BOX.y + 2, SPEAKER_HIT_BOX.w - 4, SPEAKER_HIT_BOX.h - 4, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
  // Existing speaker icon glyph — centered on the original 22×22 SPEAKER_BOX, unchanged.
  ctx.strokeStyle = audioOn ? '#88ccff' : '#888888';
  ctx.fillStyle   = audioOn ? '#88ccff' : '#888888';
  ctx.lineWidth = 2;
  // Speaker box outline
  ctx.beginPath();
  ctx.moveTo(cx - 7, cy - 4);
  ctx.lineTo(cx - 3, cy - 4);
  ctx.lineTo(cx + 1, cy - 7);
  ctx.lineTo(cx + 1, cy + 7);
  ctx.lineTo(cx - 3, cy + 4);
  ctx.lineTo(cx - 7, cy + 4);
  ctx.closePath();
  ctx.fill();
  if (audioOn) {
    // Sound waves
    ctx.beginPath(); ctx.arc(cx + 4, cy, 4, -Math.PI/3, Math.PI/3); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + 4, cy, 7, -Math.PI/3, Math.PI/3); ctx.stroke();
  } else {
    // Slash through speaker
    ctx.strokeStyle = '#ff5555';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - 8, cy - 8);
    ctx.lineTo(cx + 9, cy + 9);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPauseIcon() {
  const cx = PAUSE_BOX.x + PAUSE_BOX.w / 2;
  const cy = PAUSE_BOX.y + PAUSE_BOX.h / 2;
  ctx.save();
  // BUTTONS-VISIBLE-MOBILE — d-pad-style semi-transparent bg rect over the 50×50 hit-zone
  // (NOT the 22×22 visual PAUSE_BOX). Idle alpha matches drawDpad idle; when state==='PAUSED'
  // we use the active alphas (matching drawDpad's pressed-button feedback) so the button
  // visibly brightens as a "currently engaged" indicator. Mobile-finger-findable; PC users
  // see the same effect with no behavior change.
  const pausedActive = (state === 'PAUSED');
  ctx.fillStyle   = pausedActive ? 'rgba(255,255,255,0.18)' : 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.roundRect(PAUSE_HIT_BOX.x + 2, PAUSE_HIT_BOX.y + 2, PAUSE_HIT_BOX.w - 4, PAUSE_HIT_BOX.h - 4, 10);
  ctx.fill();
  ctx.strokeStyle = pausedActive ? 'rgba(255,255,255,0.30)' : 'rgba(255,255,255,0.15)';
  ctx.lineWidth   = 1.5;
  ctx.stroke();
  // Existing pause/play icon glyph — centered on the original 22×22 PAUSE_BOX, unchanged.
  // Blue tint kept (Brian's call) to distinguish it as a non-d-pad control.
  ctx.fillStyle = '#88ccff';
  if (state === 'PAUSED') {
    // Play triangle (▶)
    ctx.beginPath();
    ctx.moveTo(cx - 5, cy - 7);
    ctx.lineTo(cx + 7, cy);
    ctx.lineTo(cx - 5, cy + 7);
    ctx.closePath();
    ctx.fill();
  } else {
    // Pause bars (||)
    ctx.fillRect(cx - 6, cy - 7, 4, 14);
    ctx.fillRect(cx + 2, cy - 7, 4, 14);
  }
  ctx.restore();
}

function pointInIconBox(tx, ty, box) {
  return tx >= box.x && tx <= box.x + box.w && ty >= box.y && ty <= box.y + box.h;
}

// L — dance tick. Handles trigger countdown → dance start, then dance progression. Called from
// main loop every frame regardless of state so a dance survives state transitions cleanly
// (e.g. DEATH_REACTION → GAMEPLAY respawn while dance still playing on TOP).
function tickDtjDance(dt) {
  // N — pause halts dance progression. Trigger countdown also frozen so a dance pending at
  // pause time fires at the expected total elapsed time post-resume.
  if (state === 'PAUSED') return;
  if (dtjDanceTrigger) {
    dtjDanceTriggerT -= dt;
    if (dtjDanceTriggerT <= 0) {
      dtjDanceState  = 'DANCING';
      dtjDanceT      = 0;
      dtjDanceCycles = (player.lives > 1) ? 1 : 3;     // AUDIO-3c — game-over dance bumped 2 → 3 cycles (6s → 9s) for full YMCA hook
      dtjDanceTrigger = false;
      const c1 = DTJ_DANCE_BUBBLE_CYCLE1_TEXTS[Math.floor(Math.random() * DTJ_DANCE_BUBBLE_CYCLE1_TEXTS.length)];
      spawnDanceBubble(c1);
      // AUDIO-3F — fire the matching Trump voice clip in lockstep with the chosen bubble text.
      // Currently picks LOSER! or SAD! since those are the only two strings in CYCLE1_TEXTS.
      // No lives gate needed here: the dance trigger itself only runs from the death code path.
      if (typeof TRUMP_AUDIO !== 'undefined' && TRUMP_AUDIO[c1]) TRUMP_AUDIO[c1].play();
      // AUDIO-1 — startYmca / duckBGM removed. computeDesiredMusic returns YMCA whenever
      // dtjDanceState === 'DANCING' (highest-priority rule). transitionToMusic plays the
      // ymca.mp3 Howl at the next tickBGM call and fades any prior music out cleanly.
    }
  }
  if (dtjDanceState === 'DANCING') {
    const prevT = dtjDanceT;
    dtjDanceT += dt;
    // AUDIO-3c — fire the "GREATEST WIN EVER!" bubble at the START of the LAST cycle,
    // generically. (dtjDanceCycles - 1) * DTJ_DANCE_CYCLE_DURATION = the t-boundary of the
    // last cycle. For cycles=2 (legacy 6s dance) this is 3.0s; for cycles=3 (new 9s game-over
    // dance) this is 6.0s. Old code hardcoded === 2 with t-boundary at 3.0s, which would
    // have skipped the bubble entirely on cycles=3.
    if (dtjDanceCycles >= 2) {
      const lastCycleStart = (dtjDanceCycles - 1) * DTJ_DANCE_CYCLE_DURATION;
      if (prevT < lastCycleStart && dtjDanceT >= lastCycleStart) {
        spawnDanceBubble(DTJ_DANCE_BUBBLE_CYCLE2_TEXT);
      }
    }
    const totalDuration = DTJ_DANCE_CYCLE_DURATION * dtjDanceCycles;
    if (dtjDanceT >= totalDuration) {
      dtjDanceState = 'IDLE';
      dtjDanceT = 0;
      // AUDIO-1 — stopYmca / unduckBGM / bgmDeathMuted reset all removed. Once dtjDanceState
      // flips to 'IDLE', computeDesiredMusic returns the normal state-based mapping
      // (BGM_ROTATION on respawn, SILENT during PENDING/GAME_OVER), and transitionToMusic
      // swaps cleanly on the next tick.
    }
  }
  tickBubble(dt);
}

// I1 — cutscene input: route a tap to the next phase based on current state.
//   CUTSCENE_PHASE1 / CUTSCENE_PHASE3 with cutsceneT >= 10s: skip straight to SCORE
//   CUTSCENE_SCORE: advance to BETWEEN
//   CUTSCENE_BETWEEN: restart (drop to INTRO_BLACK; gameplay reset happens at GAMEPLAY entry)
//   Anything else (FADE_IN, WIN_FREEZE, early PHASE1/PHASE3): input ignored
function cutsceneAdvance() {
  if (state === 'CUTSCENE_PHASE1' || state === 'CUTSCENE_PHASE3') {
    // P-DIFFICULTY-1-FIX-V2 ITEM 3: removed `if (cutsceneT >= CUTSCENE_SKIP_THRESHOLD)`
    // gate (was 10s minimum hold). Per Brian: ONE TAP = SKIP ENTIRE CURRENT SCENE.
    // Drops captions, resets eagle combo, jumps straight to SCORE.
    // P-DIFFICULTY-1-FIX-V3 BUG 6/7: stop the looping cutscene audio so it doesn't
    // bleed into CUTSCENE_SCORE (and from there into GAMEPLAY). PHASE1 has the
    // crowd_cheer loop (line ~6991 play, line ~7022 natural-exit stop); PHASE3
    // has the crowd_usa_chant loop. Tap-skip bypasses both natural-exit stops,
    // so we fire them here instead.
    if (state === 'CUTSCENE_PHASE1' && typeof GAME_SFX !== 'undefined' && GAME_SFX.crowd_cheer) {
      GAME_SFX.crowd_cheer.stop();
    }
    if (state === 'CUTSCENE_PHASE3' && typeof GAME_SFX !== 'undefined' && GAME_SFX.crowd_usa_chant) {
      GAME_SFX.crowd_usa_chant.stop();
    }
    clearCaptions();
    dtjStageMode = 'NONE';
    comboActive  = false;
    state = 'CUTSCENE_SCORE';
    stateT = 0;
    return;
  }
  if (state === 'CUTSCENE_SCORE') {
    // I-CORR-3 — any leftover SCORE caption tail is cleared before BETWEEN seeds its rotation.
    clearCaptions();
    // I-EAGLE-REWRITE (direction-fix addendum) — combo travels right→left in BETWEEN to match
    // the eagle_carry sprite's facing direction. Spawn off-screen RIGHT, mid-canvas vertically.
    // Spawn x tuned so that 80 px/s × 4.5s of travel lands the center exactly at canvas center
    // (W/2 = 240 with the current 480-wide canvas) — sprite holds cleanly in the middle when it
    // slows to 0 at t=4.5s, not "too far left."
    comboActive  = true;
    dtjStageMode = 'NONE';
    combo.x = W / 2 + 80 * 4.5;                         // = 240 + 360 = 600 → final at W/2 = 240
    combo.y = H * 0.4 + COMBO_H * 0.5;
    state = 'CUTSCENE_BETWEEN';
    stateT = 0;
    seedCutsceneClouds();                                 // I2 — fresh cloud layout each visit
    // I-CORR-3 — push the 3 BETWEEN dialogue lines on transition entry (no fade between, but the
    // caption strip still applies its own 0.2s fade-in / 0.3s fade-out per line).
    pushCaption('DJT', 'THANK YOU PATRIOTS!',     1.5);
    pushCaption('DJT', 'GREATEST VOTERS EVER!',   1.5);
    pushCaption('DJT', 'WE LOVE THE EAGLE!',      1.5);
    return;
  }
  if (state === 'CUTSCENE_BETWEEN') {
    // P-DIFFICULTY-1-FIX-V2 ITEM 3: removed `if (stateT < 5.0) return;` gate.
    // Per Brian: ONE TAP = SKIP ENTIRE CURRENT SCENE. Tap during BETWEEN
    // immediately fires resetForLevelTransition (which transitions to GAMEPLAY).
    // K-FIX-3 — BETWEEN tap now carries score + lives forward into the new level. Distinct from
    // the GAME_OVER tap (resetForGameOver) which wipes everything. Both BETWEEN and GAME_OVER
    // tap paths are now clearly distinct, no flag-driven shared helper.
    // N-FIX-7 — state-driven: resetForLevelTransition flips state to GAMEPLAY which maps
    // to BGM_ROTATION; tickBGM transitions NESSUN_DORMA → BGM_ROTATION on next tick.
    resetForLevelTransition();
    return;
  }
}

function skipToGame() {
  // P-DIFFICULTY-1-FIX BUG 9: skipToGame regression — was reading the now-commented-
  // out PELOSI_INTERVAL_MIN/MAX constants → ReferenceError on tap during non-GAMEPLAY
  // state (intro/cutscene). Replaced with the same per-level pelosi-timer formula
  // used elsewhere. Also using getLevelParams for capsuleSpawnInterval.
  if (state !== 'GAMEPLAY') { state = 'GAMEPLAY'; stateT = 0; particles = []; bricks = []; zoomScale = 1; capsules.length = 0; capsuleSpawnT = 0; { const _sp = getLevelParams(); const _v = _sp.spawnIntervalAvg * _sp.spawnVariance; capsuleSpawnInterval = _sp.spawnIntervalAvg - _v + Math.random() * _v * 2; } dtjAnimState = 'IDLE'; dtjAnimT = 0; dtjAnimX = DTJ_GAMEPLAY_X; helpers.length = 0; player.lives = 3; player.invulnT = 0; player.platformsReached = new Set([0]); playerScore = 0; multiplier = MULT_BASE; multiplierT = 0; levelStartTime = totalT; scoreFloats.length = 0; resetStats(); pickupSpawnTimer = 0; pickupRespawnDelay = 0; pickup.active = false; spawnFirstPickup(); pelosi.active = false; pelosi.phase = 'IDLE'; pelosi.phaseT = 0; { const _pp = getLevelParams().pelosiInterval; pelosi.timer = _pp * 0.8 + Math.random() * _pp * 0.4; } pelosi.facing = -1; pelosi.targetCapsule = null; pelosiFlash.active = false; tornPieces.length = 0; climberCampT = 0; throwCounter = 0; levelTime = 0; dkDifficultyEffective = Math.min(currentLevel, 5); hats.length = 0; capsulesReachedFloor = 0; spawnInitialHats(); spawnBadges(); }
}

const keys = {};
const GAME_KEYS = new Set(['ArrowLeft','ArrowRight','Space','KeyA','KeyZ']);
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (GAME_KEYS.has(e.code)) e.preventDefault();
  ensureAudioContext();                                          // L — first-input audio gate (PC keyboard path)
  // P-DIFFICULTY-1-FIX BUG 8 — Ctrl+Shift+L debug level skip. GAMEPLAY-only;
  // increments currentLevel only. DOES NOT advance bgmRotationIdx (per Brian:
  // lets per-level audio testing stay isolated). e.repeat filter prevents
  // held-key spam. DK-GATE-PHASE-2: dead-state resets removed.
  if (state === 'GAMEPLAY' && !e.repeat && e.ctrlKey && e.shiftKey && e.code === 'KeyL') {
    e.preventDefault();
    currentLevel++;
    return;
  }
  // N — global audio toggle (M-key). Works in any state.
  if (e.code === 'KeyM') { toggleAudio(); return; }
  // N — pause toggle (P-key, Escape). togglePause internally gates on isPausableState().
  if (e.code === 'KeyP' || e.code === 'Escape') {
    e.preventDefault();
    togglePause();
    return;
  }
  // N — PAUSED state eats all OTHER input (no movement, no UI advance).
  if (state === 'PAUSED') return;
  // I1 — cutscene states route through cutsceneAdvance (which honors per-state rules).
  // WIN_FREEZE eats input (still in pause). Intro states bounce to GAMEPLAY via skipToGame.
  // J — DEATH_REACTION eats input. GAME_OVER tap = restartFromGameOver — full reset.
  if (state === 'WIN_FREEZE' || state === 'CUTSCENE_FADE_IN' || state === 'DEATH_REACTION' || state === 'GAMEOVER_PENDING') return;
  // K — INITIALS_ENTRY input intercept (must precede GAME_OVER tap-to-restart).
  // K-FIX-4 — cycle extended to A-Z + ' '. Spacebar rerouted from confirm to set-space.
  //   ArrowUp / W       → cycle current letter forward (A→B→...→Z→' '→A)
  //   ArrowDown / S     → cycle backward
  //   ArrowRight / D / Enter → confirm + advance (3rd confirm submits)  [Spacebar removed]
  //   Spacebar          → K-FIX-4: set ' ' (space) in active slot, auto-advance like a letter key
  //   ArrowLeft         → backspace (move cursor back, doesn't clear)
  //   Letter keys A-Z   → direct-set current letter, auto-advance (3rd direct-set submits)
  if (state === 'GAME_OVER' && initialsEntryActive) {
    e.preventDefault();
    if (e.code === 'ArrowUp'    || e.code === 'KeyW') { cycleInitialsLetter(+1); return; }
    if (e.code === 'ArrowDown'  || e.code === 'KeyS') { cycleInitialsLetter(-1); return; }
    if (e.code === 'ArrowRight' || e.code === 'KeyD' || e.code === 'Enter') {
      confirmInitialsLetter(); return;
    }
    if (e.code === 'Space') { setInitialsLetter(' '); return; }          // K-FIX-4 — direct-set space
    if (e.code === 'ArrowLeft') { backspaceInitials(); return; }
    if (/^Key[A-Z]$/.test(e.code)) { setInitialsLetter(e.code.charAt(3)); return; }
    return;                                                              // eat all other input
  }
  if (state === 'GAME_OVER') { restartFromGameOver(); return; }
  if (state.indexOf('CUTSCENE_') === 0) { cutsceneAdvance(); return; }
  // N-FIX-5 BUG 2 — first gesture during INTRO_BLACK only primes audioContext (already done
  // above via ensureAudioContext) and lets the natural state machine advance to INTRO_TITLE
  // with audio. Skipping to GAMEPLAY here would short-circuit the intro entirely — Brian
  // wants the intro music audible, which requires the user to gesture early enough to prime
  // audioContext but NOT skip past the music scheduling.
  if (state === 'INTRO_BLACK') return;
  if (state !== 'GAMEPLAY') skipToGame();
  // AUDIO-3-MUSIC-UX — self-heal BGM after gameplay input. Catches scenarios where the
  // state machine thinks music is playing but the underlying Howl is silent (R2/R3/R4
  // residuals: post-death restart didn't fire, mute/unmute song handoff dropped, pause/
  // unpause silenced a Howl). No-op if music is healthy.
  selfHealBgm();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function getPlatY(plat, px) {
  const mid = plat.x + plat.w / 2;
  const rad = plat.tilt * Math.PI / 180;
  return plat.y + Math.tan(rad) * (px - mid);
}

// Can player grab ladder from TOP? Must be on platform just above ladder top.
function ladderAtTop(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.8) continue;
    // Player must be near the top of this ladder (within 28px above lad.y)
    if (py < lad.y - 28 || py > lad.y + 6) continue;
    return lad;
  }
  return null;
}

// Can player grab this ladder? Must be near the ladder's BASE platform surface.
function ladderAtBase(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.8) continue;
    // Find the platform at the bottom of this ladder
    for (const plat of platforms) {
      if (px < plat.x - 2 || px > plat.x + plat.w + 2) continue;
      const platY = getPlatY(plat, px);
      // This platform is at the base of the ladder if its surface is near lad.y+h
      if (Math.abs(platY - (lad.y + lad.h)) < 20) {
        // Player must be standing on that platform
        if (Math.abs(py - platY) < 12) return lad;
      }
    }
  }
  return null;
}

// K addendum — eject the player off ladder[5] when SS is active and they reach the top.
// Visual cue: player.shakeT armed for 0.2s of horizontal jitter (drawGameplay applies).
// Physics: horizontal kick in player.facing direction + small upward pop. Gravity does the
// rest — player arcs back down to P4 (or wherever facing direction lands them).
// Ladder state released cleanly + ladderCooldown=0.5 prevents immediate re-grab.
// Only ladder[5] gates this — ladders 0-4 are unaffected.
function ejectPlayerFromLadder5() {
  player.shakeT          = 0.2;                          // 200ms shake
  player.vx              = player.facing * 200;          // horizontal kick (facing direction)
  player.vy              = -120;                         // small upward pop, ~30px arc
  player.onLadder        = false;
  player.ladderEntryY    = 0;
  player.ladderCooldown  = 0.5;                          // prevent immediate re-grab
  // Player is now in WALK state (onLadder=false). Gravity in updatePlayer below pulls them down.
}

// Is player currently within a ladder's climbable range?
// Match the FULL ladder height — from lad.y all the way to lad.y+h
// Exit conditions are handled explicitly in updatePlayer
function ladderContaining(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.8) continue;
    // Full range: top to base
    if (py >= lad.y - 26 && py <= lad.y + lad.h + 8) return lad;
  }
  return null;
}

// Platform is SOLID to walking player always.
// When climbing, open a gap at the ladder's x ONLY for the platform
// that the ladder BASE sits on (the one the player is climbing FROM).
// The destination platform (top of ladder) stays solid until the explicit
// top-exit snaps the player onto it.
function platSolidAt(px, plat, climbing) {
  if (!climbing) return true;
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) > LADDER_W * 0.65) continue;
    const platYatLad = getPlatY(plat, ladCx);
    // Open gap for ANY platform the ladder passes through vertically
    // (base platform, destination platform, or any mid-platform)
    if (platYatLad >= lad.y - 10 && platYatLad <= lad.y + lad.h + 10) return false;
  }
  return true;
}

// ─────────────────────────────────────────────
//  UPDATE PLAYER
// ─────────────────────────────────────────────
function updatePlayer(dt) {
  // P-DIFFICULTY-1-FIX BUG 8: 3s level-start lock. Tick down + early-return so
  // ALL player physics + input are skipped during the lock window. Player starts
  // at FLOOR with onGround=true / vy=0, so freezing physics is safe — they sit
  // in place. Capsules + DTJ animation continue running (separate update calls)
  // so by the time the lock releases the first capsule has cascaded down.
  if (levelStartLockT > 0) {
    levelStartLockT -= dt;
    return;
  }
  const left   = keys['ArrowLeft']  || touch.left;
  const right  = keys['ArrowRight'] || touch.right;
  const climbU = keys['KeyA']       || touch.climbUp;
  const climbD = keys['KeyZ']       || touch.climbDown;
  const doJump = keys['Space']      || touch.jump;

  // Tick cooldown
  if (player.ladderCooldown > 0) player.ladderCooldown -= dt;
  // K addendum — tick shake timer (set by ejectPlayerFromLadder5).
  if (player.shakeT > 0) player.shakeT = Math.max(0, player.shakeT - dt);
  // Block 3 — tick invulnerability timer, floored at 0
  if (player.invulnT > 0) player.invulnT = Math.max(0, player.invulnT - dt);

  // DK-GATE-PHASE-2: ladderTime tick removed — anti-camp behavior eliminated.
  // Player camping is now punished naturally via shouldDropDownLadder() Step 3
  // alignment (camped player at lad.x triggers drops on every Step 1+2 pass).
  // DK-CLIMBER-TIMER: ticks continuous-ladder-time; resets to 0 the moment
  // player leaves the ladder. Read by shouldDropDownLadder() Step 0 to lapse
  // the 16px climber-protection after CLIMBER_CAMP_SEC seconds.
  if (player.onLadder) climberCampT += dt;
  else climberCampT = 0;

  // ══════════════════════════════════════════
  //  CLIMB STATE
  // ══════════════════════════════════════════
  if (player.onLadder) {
    const lad = ladderContaining(player.x, player.y);

    if (!lad) {
      player.onLadder = false;
      // fall through to walk state
    } else {
      // Clear ground state — we are on a ladder, not a platform
      player.onGround = false;

      // Lock x to ladder center
      player.x = lad.x + LADDER_W / 2;

      // Vertical movement
      if (climbU)      player.y -= CLIMB_SPD * dt;
      else if (climbD) player.y += CLIMB_SPD * dt;
      if (climbU || climbD) player.walkT += dt;

      // Jump off ladder
      if (doJump) {
        player.onLadder = false;
        player.vy = JUMP_VY;
        player.ladderCooldown = 0.3;
        return;
      }

      // ── TOP EXIT: only when player actually ascended to top ──
      // entryY check prevents immediate exit on grab from top platform
      if (player.y <= lad.y + 4 && player.y < player.ladderEntryY - 8) {
        // K addendum — ladder[5] gate: while SS is guarding TOP, the player gets ejected
        // before the normal exit code runs. Other ladders pass through unchanged.
        if (lad === ladders[5] && ss.active) {
          ejectPlayerFromLadder5();
          return;
        }
        // Find destination platform — generous x margin so edge ladders find their platform
        let snapY = lad.y;
        let snapPlat = null;                              // D3 — track for lastGroundedPlat
        let bestDiff = 999;
        for (const plat of platforms) {
          if (player.x < plat.x - 16 || player.x > plat.x + plat.w + 16) continue;
          const py = getPlatY(plat, player.x);
          if (py > lad.y + 6) continue; // must be at or above ladder top
          const diff = Math.abs(py - lad.y);
          if (diff < bestDiff) { bestDiff = diff; snapY = py; snapPlat = plat; }
        }
        player.y = snapY;
        player.vy = 0;
        player.onLadder = false;
        player.onGround = true;
        if (snapPlat) {
          player.lastGroundedPlat = snapPlat;             // D3
          // H2 — first time on this platform this life → +500 × multiplier
          const idx = platforms.indexOf(snapPlat);
          if (idx >= 0 && !player.platformsReached.has(idx)) {
            player.platformsReached.add(idx);
            stats.platformCount++;
            addScore(PLATFORM_REACH_BONUS, true, player.x, player.y - 40, '#88ddff');
            firePlatformReachTaunt();                              // M — DTJ taunts on each new platform
          }
        }
        // H1 — top of ladder[5] (P4 → TOP) is the win trigger. Fires on the same tick the player
        // snaps onto TOP. After triggerWin() the state is no longer GAMEPLAY so subsequent capsule
        // collisions are suppressed via the state guard added in capsule update.
        if (lad === ladders[5]) {
          triggerWin();
          return;
        }
        player.ladderCooldown = 0.5;
        return;
      }

      // ── BOTTOM EXIT: only when player actually descended to base ──
      // entryY check prevents immediate exit on grab from base platform
      if (player.y >= lad.y + lad.h - 2 && player.y > player.ladderEntryY + 8) {
        // Snap to the platform below
        let snapY = lad.y + lad.h;
        let snapPlat = null;                              // D3 — track for lastGroundedPlat
        for (const plat of platforms) {
          if (player.x < plat.x - 4 || player.x > plat.x + plat.w + 4) continue;
          const py = getPlatY(plat, player.x);
          if (Math.abs(py - (lad.y + lad.h)) < 15) { snapY = py; snapPlat = plat; break; }
        }
        player.y = snapY;
        player.vy = 0;
        player.onLadder = false;
        player.onGround = true;
        if (snapPlat) {
          player.lastGroundedPlat = snapPlat;             // D3
          // H2 — bottom-exit landing also counts as "platform reached"
          const idx = platforms.indexOf(snapPlat);
          if (idx >= 0 && !player.platformsReached.has(idx)) {
            player.platformsReached.add(idx);
            stats.platformCount++;
            addScore(PLATFORM_REACH_BONUS, true, player.x, player.y - 40, '#88ddff');
            firePlatformReachTaunt();                              // M — DTJ taunts on each new platform
          }
        }
        player.ladderCooldown = 0.2;
        return;
      }

      return; // stay in climb state
    }
  }

  // ══════════════════════════════════════════
  //  WALK STATE
  // ══════════════════════════════════════════

  // Horizontal movement
  if (left)       { player.vx = -WALK_SPD; player.facing = -1; }
  else if (right) { player.vx =  WALK_SPD; player.facing =  1; }
  else            { player.vx = 0; }

  // Grab ladder going UP — A pressed at base
  if (climbU && player.ladderCooldown <= 0) {
    const lad = ladderAtBase(player.x, player.y);
    if (lad) {
      // P-WEAPON-1: block win-ladder climb while wielding badge. Prevents
      // grab-and-win exploit (player picks up badge then immediately climbs
      // to TOP untouchable). Other ladders unrestricted. Same single-source-
      // of-truth as SS_TARGET_LADDER_IX = 5.
      if (lad === ladders[5] && player.wieldingBadge) return;
      player.onLadder = true;
      player.ladderEntryY = player.y;
      player.x = lad.x + LADDER_W / 2;
      player.vx = 0;
      player.vy = 0;
      return;
    }
  }

  // Grab ladder going DOWN — Z pressed at top of ladder
  if (climbD && player.ladderCooldown <= 0) {
    const lad = ladderAtTop(player.x, player.y);
    if (lad) {
      // K addendum — ladder[5] gate: SS is guarding both ENTRY and EXIT at TOP. Top-grab is
      // also blocked while ss.active, so a player who somehow ended up on TOP during an SS
      // window can't climb DOWN through ladder[5] either. They must wait for SS to fade.
      if (lad === ladders[5] && ss.active) return;
      // P-WEAPON-1: block win-ladder DOWN-grab while wielding badge (parallel
      // to UP-grab block above — defensive even though player on TOP with
      // badge is unlikely given the UP-grab block).
      if (lad === ladders[5] && player.wieldingBadge) return;
      player.onLadder = true;
      player.ladderEntryY = player.y;
      player.x = lad.x + LADDER_W / 2;
      player.vx = 0;
      player.vy = 0;
      return;
    }
  }

  // Jump
  if (doJump && player.onGround) {
    player.vy = JUMP_VY;
    player.onGround = false;
    playSfx_jump();                                              // N — short upward chirp on jump
  }

  // Gravity
  player.vy += GRAVITY * dt;
  player.vy = Math.min(player.vy, 900); // terminal velocity

  // Integrate position
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // ── PLATFORM COLLISION ──────────────────────
  // Platforms are SOLID to walking player.
  // Gap only opens at ladder x when player.onLadder.
  player.onGround = false;
  for (const plat of platforms) {
    // Horizontal bounds check
    if (player.x < plat.x - 2 || player.x > plat.x + plat.w + 2) continue;

    const platY = getPlatY(plat, player.x);
    const prevY = player.y - player.vy * dt;

    // Only collide when moving downward (or standing still)
    if (player.vy < 0) continue;

    // Player must have been ABOVE platform last frame
    if (prevY > platY + 1) continue;  // was below — skip (already passed through)

    // Player must have reached or crossed platform surface this frame
    if (player.y < platY - 1) continue;  // hasn't reached yet

    // Is platform solid here?
    if (!platSolidAt(player.x, plat, player.onLadder)) continue;

    // LAND
    player.y = platY;
    player.vy = 0;
    player.onGround = true;
    player.lastGroundedPlat = plat;                       // D3 — track for above-platform kill block
    // H2 — first time on this platform this life → +500 × multiplier
    {
      const idx = platforms.indexOf(plat);
      if (idx >= 0 && !player.platformsReached.has(idx)) {
        player.platformsReached.add(idx);
        stats.platformCount++;
        addScore(PLATFORM_REACH_BONUS, true, player.x, player.y - 40, '#88ddff');
        firePlatformReachTaunt();                                  // M — DTJ taunts on each new platform
      }
    }
    break;
  }

  // Screen bounds
  player.x = Math.max(8, Math.min(W - 8, player.x));

  // Ceiling
  if (player.y < 40) { player.y = 40; player.vy = 0; }

  // Fell off bottom — respawn
  if (player.y > H + 50) {
    player.x = FLOOR.x + 60;
    player.y = FLOOR.y;
    player.vy = 0;
    player.onGround = true;
    player.ladderCooldown = 0;
    player.lastGroundedPlat = FLOOR;                      // D3
  }

  if (player.vx !== 0 && player.onGround) player.walkT += dt;
}

// ─────────────────────────────────────────────
//  BLOCK 1 — CONSTITUTION CAPSULE ROLLING ENEMY
// ─────────────────────────────────────────────
// DTJ at top throws capsules. They roll downhill on tilted platforms,
// fall off edges to the platform below, and have a chance to drop down
// any ladder they cross. AABB hit on DNC triggers hit() (stub until Block 3).
const capsules = [];
let capsuleSpawnT = 0;
// P-DIFFICULTY-1: variable spawn interval driven by per-level params (was: hardcoded 2.5-4.5s).
// Initial value is just a placeholder; updateCapsules re-rolls per-spawn using getLevelParams.
let capsuleSpawnInterval = 2.5;
const CAPSULE_R = 18;                              // Block 2.5 — bumped from 12
const CAPSULE_ROLL_SPD = 75;
const CAPSULE_GRAV = 1100;
// DK-DESCENT-V1: fixed per-frame rate during ladder descent. Mirrors arcade DK
// behavior (Barrel_State_VertMovement per RussianManSMWC NES disassembly +
// jotd666 Amiga port) — constant rate, NOT gravity-accelerated. Slightly
// faster than player CLIMB_SPD=110 since capsules visually roll, not climb.
// At 130 px/s a typical ~120px descent takes ~0.92s. Tunable in field test.
const CAPSULE_DESCEND_SPD = 130;
// P-DIFFICULTY-1: now per-level via getLevelParams().ladderDropChance (used at line ~2566).
// const CAPSULE_LADDER_DROP_CHANCE = 0.65;           // Block 2.5 — bumped from 0.5
// C2 v2 — capsules have NO lifeTimer. They persist until off-screen-left exit (after rolling off
// FLOOR's left edge) or until a helper / Pelosi destroys them. The previous CAPSULE_LIFE+30s
// backstop and the 40%-on-expiry Burning Briefcase spawn are both deleted here. Burning Briefcase
// was removed from design April 30 2026.
const MAX_CAPSULES = 8;
// DK-LEFT-WALL: hard left-edge boundary at x=CAPSULE_R for ALL capsules
// regardless of state (rolling, falling, descending, thrown, FLOOR or non-FLOOR).
// Matches arcade DK convention — barrels never leave the canvas via the left
// edge. Capsules hitting the wall reverse vx to rightward (forces continued
// cascade rather than pinning at the wall). Right edge intentionally has NO
// equivalent hard wall: FLOOR right-edge is the primary cascade drain (per
// V3 BUG 4c FLOOR exception + DK-FLOOR-EDGE-FIX). Pre-DK-LEFT-WALL: capsules
// rolling left off P1's left edge (x=80) entered falling state with leftward
// vx, no clamp caught them (DK-FLOOR-EDGE-FIX exempts onPlat=null), they
// despawned at off-screen-left (x<-36). Brian observed at L6 — visually a
// capsule "flying off canvas." Now they bounce back rightward.
const LEFT_WALL_X = CAPSULE_R;

// ─────────────────────────────────────────────
//  P-ENEMY-1 — MAGA HAT (P-ENEMY-1-FIX: fireball/firefox AI + arcade-DK
//  spawn rules)
// ─────────────────────────────────────────────
// DTJ-aligned ambient enemy. Walks platforms + climbs ladders per arcade DK
// fireball/firefox AI (mariowiki / Donkey Blog research):
//   - "Fireballs can climb ladders, no matter if they are broken or fixed.
//     They cannot fall from ledges or cross gaps." (mariowiki)
//   - "Firefoxes can reverse their direction while climbing ladders" — random
//     mid-climb reversal per HAT_REVERSE_CHANCE_PER_SEC.
//   - Random AI: hat does NOT track player, just walks + climbs randomly.
// Kills player on AABB overlap UNLESS player is jumping over (player.y above
// hat.y AND vy >= 0) — grants +100 pts (HAT_DODGE_SCORE), hat survives.
// Destroyed by Antifa or Zombie Voter contact (BOTH die).
// Spawn rules (B5b — arcade DK):
//   - Initial count at level entry = min(level, 5).
//   - Hard cap HAT_MAX_ONSCREEN = 5 (matches arcade).
//   - One additional hat per CAPSULE_PER_HAT (8) capsules reaching FLOOR.
// Speed scales per level (B5c — Donkey Blog plateau):
//   L1=55, L2=60, L3=65, L4=70, L5+=75 walk; climb is walk-10.
// Persists through respawn; resets on level transition / game over / skipToGame.
const HAT_LADDER_CHANCE_PER_SEC   = 0.5;    // 50%/s when on ladder x to start climbing
const HAT_REVERSE_CHANCE_PER_SEC  = 0.1;    // 10%/s to reverse direction mid-climb (firefox)
const HAT_LADDER_X_TOLERANCE      = 12;     // px proximity to ladCx for "on ladder" detection
const HAT_PULSE_PERIOD            = 1.0;    // scale-pulse cycle (sec) — kept for visual flair
const HAT_PULSE_MIN               = 1.0;
const HAT_PULSE_MAX               = 1.1;
const HAT_MAX_ONSCREEN            = 5;      // hard ceiling per arcade DK (was 8)
// P-WEAPON-1-FIX (May 3 2026): additional 25% reduction per Brian field-test.
// 34→26 sprite, 22→17 AABB W, 17→13 AABB H. FBI badge constants UNCHANGED (Brian:
// "FBI badge is perfect size"). Ratio: 26 * 0.75 = 19.5 if Brian wants another pass.
const HAT_AABB_W                  = 17;     // collision width (32→22→17)
const HAT_AABB_H                  = 13;     // collision height (24→17→13)
const HAT_SPRITE_SIZE             = 26;     // render box size (48→34→26)
const HAT_DODGE_SCORE             = 100;    // pts for jumping over hat
const CAPSULE_PER_HAT             = 8;      // capsules reaching FLOOR per bonus hat spawn

// Per-level speed tables (Donkey Blog plateau-at-L5 convention, mirrors
// capsuleSpeedMult curve from DK-GATE-PHASE-3).
const HAT_WALK_SPD_TABLE  = [55, 60, 65, 70, 75, 75, 75, 75, 75, 75];
const HAT_CLIMB_SPD_TABLE = [45, 50, 55, 60, 65, 65, 65, 65, 65, 65];
function getHatWalkSpd(level)  { return HAT_WALK_SPD_TABLE [Math.min(Math.max(level, 1), 10) - 1]; }
function getHatClimbSpd(level) { return HAT_CLIMB_SPD_TABLE[Math.min(Math.max(level, 1), 10) - 1]; }

// Initial spawn count at level entry: min(level, 5) per arcade DK.
function getHatInitialCount(level) { return Math.min(Math.max(level, 1), 5); }

// ─────────────────────────────────────────────
//  P-WEAPON-1 — FBI BADGE WEAPON
// ─────────────────────────────────────────────
// DK-hammer-pattern pickup at fixed P2/P4 positions. Player JUMPS under badge
// to grab it (matches arcade DK). Wielding state lets player walk/jump/climb
// regular ladders normally but BLOCKS the win-ladder (ladders[5]). AABB
// overlap kills hats AND capsules — no swing animation, badge always
// kill-active during wield. Score +50 × multiplier per kill. 0.15s
// white-yellow flash at kill location. Duration scales L1=10s → L10=6s.
// No in-level respawn (DK convention) — badges restore on level transition
// AND on player respawn after death (different from hat behavior).
// Audio: pickup briefcase_pickup.mp3, capsule kill capsule_destruction.mp3,
// hat kill (by badge AND by helper) player_death_scream.mp3.
const BADGE_SPRITE_SIZE     = 28;       // render size (scaled from cached aspect)
const BADGE_AABB_W          = 22;       // pickup + kill-zone width
const BADGE_AABB_H          = 22;       // pickup + kill-zone height
const BADGE_HOVER_OFFSET    = 32;       // P-WEAPON-1-FIX: 24→32, more clearance so badge clearly hovers above platform (was visually "sitting on")
const BADGE_FLASH_DURATION  = 0.15;     // sec, white-yellow kill flash
const BADGE_FADE_DURATION   = 0.3;      // sec, expiration fade
const BADGE_KILL_SCORE      = 50;       // base score per kill (× multiplier via addScore)
const BADGE_DURATION_TABLE  = [10, 9.5, 9, 8.5, 8, 7.5, 7, 6.5, 6, 6];
function getBadgeDuration(level) {
  return BADGE_DURATION_TABLE[Math.min(Math.max(level, 1), 10) - 1];
}
// Fixed spawn positions per spec — diagonal opposite corners force traversal.
const BADGE_SPAWN_POSITIONS = [
  { platIdx: 2, x: 300 },                // P2 right side (P2 x=10..380)
  { platIdx: 4, x:  80 },                // P4 left side  (P4 x=10..380)
];
// badges[]: { x, y, platIdx, collected, spawnIdx }. Reset on level entry +
// respawn via spawnBadges(). Badge.collected blocks re-pickup AND render.
const badges = [];
// killFlashes[]: { x, y, startTime, duration }. Drained per-frame in update;
// rendered as white-yellow circle that fades over duration.
const killFlashes = [];

// Spawn the 2 fixed badges at level entry / respawn. y computed from current
// platform geometry + BADGE_HOVER_OFFSET. Resets player.wieldingBadge so a
// player who died mid-wield doesn't carry phantom badge state into respawn.
function spawnBadges() {
  badges.length = 0;
  killFlashes.length = 0;
  player.wieldingBadge   = false;
  player.badgeWieldEndTime = 0;
  for (let i = 0; i < BADGE_SPAWN_POSITIONS.length; i++) {
    const pos = BADGE_SPAWN_POSITIONS[i];
    const plat = platforms[pos.platIdx];
    badges.push({
      x:         pos.x,
      y:         getPlatY(plat, pos.x) - BADGE_HOVER_OFFSET,
      platIdx:   pos.platIdx,
      collected: false,
      spawnIdx:  i,
    });
  }
}

// hats[]: ambient enemy entities. Each: {x, y, state, dir, onPlat, ladderRef,
// climbDir, dodged, pulseT}. state ∈ {'WALKING', 'CLIMBING'}. dir ∈ {-1, +1}.
// pulseT init to random offset so spawned hats don't pulse in sync. dodged
// resets on AABB-clear so each pass-over awards points once.
const hats = [];
// Counter of capsules that have reached FLOOR this level. Bumps a hat spawn
// every CAPSULE_PER_HAT (=8) capsules. Reset to 0 in same paths that reset
// hats[] (level transition, game over, skipToGame). Per-level not per-life.
let capsulesReachedFloor = 0;

// Spawn a single hat on a random upper platform (P3/P4/TOP), excluding the
// player's current grounded platform. Initial state WALKING with random dir
// (±1). Snapped to platform surface (y = getPlatY(plat) - HAT_SPRITE_SIZE/2).
// Caps at HAT_MAX_ONSCREEN. Logs [HAT-SPAWN] with reason
// ('level-entry' or 'capsule-reached-floor').
function spawnHat(reason) {
  if (hats.length >= HAT_MAX_ONSCREEN) return;
  // P-ENEMY-1-FIX ADDENDUM: spawn pool restricted to [P3, P4] only.
  // TOP removed — TOP is the boss zone (DTJ's domain) and hats must never
  // appear there. Combined with findLadderForHat skipping ladders[5], hats
  // can never reach TOP via climb either.
  const upperPlats = [platforms[3], platforms[4]];                 // P3, P4 only
  const playerPlat = (typeof player !== 'undefined') ? player.lastGroundedPlat : null;
  const candidates = upperPlats.filter(function (p) { return p !== playerPlat; });
  if (candidates.length === 0) return;
  const plat = candidates[Math.floor(Math.random() * candidates.length)];
  const margin = HAT_SPRITE_SIZE / 2 + 4;
  const xMin = plat.x + margin;
  const xMax = plat.x + plat.w - margin;
  const x = xMin + Math.random() * (xMax - xMin);
  const y = getPlatY(plat, x) - HAT_SPRITE_SIZE / 2;
  hats.push({
    x: x, y: y,
    state:      'WALKING',
    dir:        Math.random() < 0.5 ? -1 : 1,
    onPlat:     plat,
    ladderRef:  null,
    climbDir:   0,
    dodged:     false,
    pulseT:     Math.random() * HAT_PULSE_PERIOD,
  });
  console.log('[HAT-SPAWN]', {
    reason:    reason,
    level:     currentLevel,
    totalHats: hats.length,
    initial:   getHatInitialCount(currentLevel),
    cap:       HAT_MAX_ONSCREEN,
    spawnX:    Math.round(x),
    spawnY:    Math.round(y),
    plat:      'P' + platforms.indexOf(plat),
    dir:       hats[hats.length - 1].dir,
  });
}

// Initial spawn at level entry — fires getHatInitialCount(currentLevel) hats.
function spawnInitialHats() {
  capsulesReachedFloor = 0;
  const count = getHatInitialCount(currentLevel);
  for (let i = 0; i < count; i++) spawnHat('level-entry');
}

// Helpers for ladder-aware hat AI. Find the platform whose surface y at
// ladCx is closest to a target y (lad.y for top, lad.y+lad.h for bottom).
// Falls back to FLOOR if none found within tolerance (defensive).
function findHatLadderTopPlat(ladder) {
  const ladCx = ladder.x + LADDER_W / 2;
  let bestPlat = null, bestDelta = Infinity;
  for (const p of platforms) {
    if (ladCx < p.x - 4 || ladCx > p.x + p.w + 4) continue;
    const delta = Math.abs(getPlatY(p, ladCx) - ladder.y);
    if (delta < bestDelta) { bestDelta = delta; bestPlat = p; }
  }
  return bestPlat;
}
function findHatLadderBottomPlat(ladder) {
  const ladCx = ladder.x + LADDER_W / 2;
  const bottomY = ladder.y + ladder.h;
  let bestPlat = null, bestDelta = Infinity;
  for (const p of platforms) {
    if (ladCx < p.x - 4 || ladCx > p.x + p.w + 4) continue;
    const delta = Math.abs(getPlatY(p, ladCx) - bottomY);
    if (delta < bestDelta) { bestDelta = delta; bestPlat = p; }
  }
  return bestPlat;
}
// Find a ladder centerline within tolerance of hat.x where the hat's current
// onPlat is one of the ladder's two endpoint platforms (so the hat can
// actually transition to climbing on it).
// P-ENEMY-1-FIX ADDENDUM: SKIP ladders[5] (the win-ladder, P4↔TOP). The
// win-ladder is the player's victory path and TOP is the boss zone — hats
// must NEVER climb up to TOP via this ladder, both to keep TOP hat-free
// (DTJ's domain) and to avoid blocking the player's win climb. Same index
// is hard-coded as SS_TARGET_LADDER_IX = 5 elsewhere — single source of
// truth for "the win ladder."
function findLadderForHat(hat) {
  for (let li = 0; li < ladders.length; li++) {
    if (li === 5) continue;                                          // skip win-ladder (P4↔TOP)
    const lad = ladders[li];
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(hat.x - ladCx) > HAT_LADDER_X_TOLERANCE) continue;
    const topPlat = findHatLadderTopPlat(lad);
    const botPlat = findHatLadderBottomPlat(lad);
    if (hat.onPlat === topPlat || hat.onPlat === botPlat) return lad;
  }
  return null;
}

// Per-frame hat update: per-hat WALKING / CLIMBING state machine, AABB-vs-
// player with jump-over scoring. Hats persist through player death (do NOT
// despawn when killing player). State-agnostic (no pause/cutscene gate —
// caller invokes only during GAMEPLAY).
function updateHats(dt) {
  const _walkSpd  = getHatWalkSpd(currentLevel);
  const _climbSpd = getHatClimbSpd(currentLevel);

  for (let i = hats.length - 1; i >= 0; i--) {
    const hat = hats[i];
    hat.pulseT += dt;

    if (hat.state === 'WALKING') {
      // Walk along current platform. Tilt-snapped y.
      hat.x += hat.dir * _walkSpd * dt;

      // Ladder-transition decision: hat must be near a ladder centerline AND
      // random-roll succeeds this frame. HAT_LADDER_CHANCE_PER_SEC is a
      // per-second probability; multiplied by dt gives per-frame chance.
      const lad = findLadderForHat(hat);
      if (lad && Math.random() < HAT_LADDER_CHANCE_PER_SEC * dt) {
        const ladCx   = lad.x + LADDER_W / 2;
        const topPlat = findHatLadderTopPlat(lad);
        const botPlat = findHatLadderBottomPlat(lad);
        // Choose direction based on current platform: if hat is on the top
        // platform, can only descend; if on bottom, can only ascend.
        const climbDir = (hat.onPlat === topPlat) ? 1 : -1;
        hat.state     = 'CLIMBING';
        hat.ladderRef = lad;
        hat.climbDir  = climbDir;
        hat.x         = ladCx;
        console.log('[HAT-CLIMB]', {
          level:    currentLevel,
          hatX:     Math.round(hat.x),
          hatY:     Math.round(hat.y),
          ladCx:    ladCx,
          climbDir: climbDir,
        });
      } else {
        // Edge-detection: turn around at platform boundaries (cannot fall off).
        const margin = HAT_SPRITE_SIZE / 2;
        if (hat.x <= hat.onPlat.x + margin)               { hat.dir =  1; hat.x = hat.onPlat.x + margin; }
        else if (hat.x >= hat.onPlat.x + hat.onPlat.w - margin) { hat.dir = -1; hat.x = hat.onPlat.x + hat.onPlat.w - margin; }
        // Snap y to current platform surface (handles tilt).
        hat.y = getPlatY(hat.onPlat, hat.x) - HAT_SPRITE_SIZE / 2;
      }
    } else if (hat.state === 'CLIMBING') {
      hat.y += hat.climbDir * _climbSpd * dt;

      // Random reversal mid-climb (firefox AI).
      if (Math.random() < HAT_REVERSE_CHANCE_PER_SEC * dt) {
        hat.climbDir *= -1;
      }

      const lad = hat.ladderRef;
      const ladTopY = lad.y;
      const ladBotY = lad.y + lad.h;
      const margin = HAT_SPRITE_SIZE / 2;

      if (hat.y <= ladTopY - margin) {
        // Reached ladder top → transition to walking on top platform.
        hat.state     = 'WALKING';
        hat.onPlat    = findHatLadderTopPlat(lad);
        hat.ladderRef = null;
        hat.dir       = Math.random() < 0.5 ? -1 : 1;
        hat.y         = getPlatY(hat.onPlat, hat.x) - HAT_SPRITE_SIZE / 2;
      } else if (hat.y >= ladBotY - margin) {
        // Reached ladder bottom → transition to walking on bottom platform.
        hat.state     = 'WALKING';
        hat.onPlat    = findHatLadderBottomPlat(lad);
        hat.ladderRef = null;
        hat.dir       = Math.random() < 0.5 ? -1 : 1;
        hat.y         = getPlatY(hat.onPlat, hat.x) - HAT_SPRITE_SIZE / 2;
      }
    }

    // AABB-vs-player. Player hitbox: x±10, y in [player.y - 32, player.y - 4].
    // Hat hitbox: x±HAT_AABB_W/2, y±HAT_AABB_H/2 centered on hat.x/y. Hat does
    // NOT despawn — keeps moving after killing player. hit() guards on state/
    // invuln so re-fire during DEATH_REACTION is suppressed.
    if (state === 'GAMEPLAY') {
      const overlapX = (hat.x + HAT_AABB_W / 2 > player.x - 10) &&
                       (hat.x - HAT_AABB_W / 2 < player.x + 10);
      const overlapY = (hat.y + HAT_AABB_H / 2 > player.y - 32) &&
                       (hat.y - HAT_AABB_H / 2 < player.y - 4);
      if (overlapX && overlapY) {
        // Jump-over check: player feet ABOVE hat top AND descending/at apex.
        const playerAboveHat = player.y < hat.y - HAT_AABB_H / 2;
        const playerFalling  = player.vy >= 0;
        if (playerAboveHat && playerFalling) {
          if (!hat.dodged) {
            hat.dodged = true;
            addScore(HAT_DODGE_SCORE, true, hat.x, hat.y - 30, '#ffd700');
            console.log('[HAT-DODGE]', {
              level:   currentLevel,
              hatX:    Math.round(hat.x),
              hatY:    Math.round(hat.y),
              playerX: Math.round(player.x),
              playerY: Math.round(player.y),
            });
          }
        } else if (!player.wieldingBadge) {
          // P-WEAPON-1-FIX: badge wield protects from contact death. updateBadges()
          // runs later this same frame and its kill loop splices the hat + awards
          // score. Symmetric to the capsule guard at line ~3745 (search 'P-WEAPON-1-FIX').
          console.log('[HAT-DEATH]', {
            level:    currentLevel,
            hatX:     Math.round(hat.x),
            hatY:     Math.round(hat.y),
            playerX:  Math.round(player.x),
            playerY:  Math.round(player.y),
          });
          hit('hat', null);
        }
      } else {
        // Reset dodged flag once separated, so each future jump-over scores.
        hat.dodged = false;
      }
    }
  }
}

// P-WEAPON-1: per-frame badge update. Three responsibilities:
//   1. Pickup detection — player must be RISING (vy<0 = jumping) AND AABB
//      overlap with an uncollected badge.
//   2. Wielding state — if active, AABB-kill all overlapping capsules + hats,
//      award score × multiplier, push kill flash, play SFX. Expire when
//      levelTime reaches badgeWieldEndTime.
//   3. Kill flash drain — remove flashes whose elapsed > duration.
// Uses player hitbox convention from existing pickup AABB (line ~4478):
// x±10 horizontal, y in [py-32, py-4] (player.y is foot).
function updateBadges(dt) {
  // Drain expired kill flashes (backward iteration so splice is index-safe).
  for (let i = killFlashes.length - 1; i >= 0; i--) {
    if (levelTime - killFlashes[i].startTime >= killFlashes[i].duration) {
      killFlashes.splice(i, 1);
    }
  }

  // Pickup detection: player rising (vy<0) + AABB overlap with uncollected badge.
  if (!player.wieldingBadge && player.vy < 0 && state === 'GAMEPLAY') {
    for (const badge of badges) {
      if (badge.collected) continue;
      const overlapX = (badge.x + BADGE_AABB_W / 2 > player.x - 10) &&
                       (badge.x - BADGE_AABB_W / 2 < player.x + 10);
      const overlapY = (badge.y + BADGE_AABB_H / 2 > player.y - 32) &&
                       (badge.y - BADGE_AABB_H / 2 < player.y - 4);
      if (overlapX && overlapY) {
        badge.collected           = true;
        player.wieldingBadge      = true;
        player.badgeWieldEndTime  = levelTime + getBadgeDuration(currentLevel);
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.briefcase_pickup) {
          GAME_SFX.briefcase_pickup.play();
        }
        console.log('[BADGE-PICKUP]', {
          level:    currentLevel,
          spawnIdx: badge.spawnIdx,
          plat:     'P' + badge.platIdx,
          duration: getBadgeDuration(currentLevel),
        });
        // P-WEAPON-1-FIX: explicit wield-start log per spec — confirms wieldingBadge
        // state actually transitioned to true (Brian DUMP LOGS verification).
        console.log('[BADGE-WIELD-START]', {
          level:       currentLevel,
          endTime:     +player.badgeWieldEndTime.toFixed(2),
          currentTime: +levelTime.toFixed(2),
        });
        break;
      }
    }
  }

  // Wielding state — kill any overlapping capsule or hat.
  if (player.wieldingBadge) {
    if (levelTime >= player.badgeWieldEndTime) {
      player.wieldingBadge = false;
      console.log('[BADGE-EXPIRE]', {
        level:   currentLevel,
        playerX: Math.round(player.x),
        playerY: Math.round(player.y),
      });
      return;
    }
    if (state !== 'GAMEPLAY') return;

    // P-WEAPON-1-FIX: per-frame tick log per Brian's spec — confirms the wielding
    // kill loop is being reached every frame while badge is active. Brian DUMP LOGS
    // should show ~60 entries/sec during a wield. Verbose by design.
    console.log('[BADGE-WIELD-TICK]', {
      level:        currentLevel,
      remaining:    +(player.badgeWieldEndTime - levelTime).toFixed(2),
      capsuleCount: capsules.length,
      hatCount:     hats.length,
    });

    // Kill capsules — backward iter for splice safety. Capsule center ±
    // CAPSULE_R vs player x±10, y in [py-32, py-4].
    for (let i = capsules.length - 1; i >= 0; i--) {
      const cap = capsules[i];
      if (cap.carried) continue;                                     // don't yank from Pelosi
      const cOverlapX = (cap.x + CAPSULE_R > player.x - 10) &&
                       (cap.x - CAPSULE_R < player.x + 10);
      const cOverlapY = (cap.y + CAPSULE_R > player.y - 32) &&
                       (cap.y - CAPSULE_R < player.y - 4);
      if (cOverlapX && cOverlapY) {
        const _scoreBefore = playerScore;
        addScore(BADGE_KILL_SCORE, true, cap.x, cap.y - 20, '#ffffaa');
        killFlashes.push({ x: cap.x, y: cap.y, startTime: levelTime, duration: BADGE_FLASH_DURATION });
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.capsule_destruction) {
          GAME_SFX.capsule_destruction.play();
        }
        console.log('[BADGE-KILL]', { target: 'capsule', level: currentLevel, capX: Math.round(cap.x), capY: Math.round(cap.y) });
        // P-WEAPON-1-FIX: explicit kill-fired log per spec, with score delta proof.
        console.log('[BADGE-KILL-FIRED]', {
          target:      'capsule',
          level:       currentLevel,
          scoreBefore: _scoreBefore,
          scoreAfter:  playerScore,
        });
        capsules.splice(i, 1);
      }
    }

    // Kill hats — same pattern. Backward iter; AABB on HAT_AABB_W/H.
    for (let i = hats.length - 1; i >= 0; i--) {
      const hat = hats[i];
      const hOverlapX = (hat.x + HAT_AABB_W / 2 > player.x - 10) &&
                       (hat.x - HAT_AABB_W / 2 < player.x + 10);
      const hOverlapY = (hat.y + HAT_AABB_H / 2 > player.y - 32) &&
                       (hat.y - HAT_AABB_H / 2 < player.y - 4);
      if (hOverlapX && hOverlapY) {
        const _scoreBefore = playerScore;
        addScore(BADGE_KILL_SCORE, true, hat.x, hat.y - 20, '#ffffaa');
        killFlashes.push({ x: hat.x, y: hat.y, startTime: levelTime, duration: BADGE_FLASH_DURATION });
        if (typeof GAME_SFX !== 'undefined' && GAME_SFX.player_death_scream) {
          GAME_SFX.player_death_scream.play();
        }
        console.log('[BADGE-KILL]', { target: 'hat', level: currentLevel, hatX: Math.round(hat.x), hatY: Math.round(hat.y) });
        // P-WEAPON-1-FIX: explicit kill-fired log per spec, with score delta proof.
        console.log('[BADGE-KILL-FIRED]', {
          target:      'hat',
          level:       currentLevel,
          scoreBefore: _scoreBefore,
          scoreAfter:  playerScore,
        });
        hats.splice(i, 1);
      }
    }
  }
}

// DK-FLOOR-TTL: seconds a capsule can survive on FLOOR before TTL despawn
// fires. Restores FLOOR drainage that DK-LADDER-DODGE-FIX correctly removed
// (the H2 walk-past clear path was the dominant FLOOR drain; airborne-only
// gate left only off-screen-right exit + Pelosi grab as drains, leading to
// MAX_CAPSULES bail at L1). Single tuning dial — adjust if FLOOR feels too
// crowded (lower) or too sparse (raise). Off-screen-right exit at x > 516
// usually wins first; TTL is the safety net for capsules that stall.
const FLOOR_TTL = 8.0;
// DK-DIAGONAL-THROW: pass-through diagonal trajectory from DTJ position.
// Capsule launches at constant velocity (no gravity), passes visually through
// P4/P3/P2 girders without colliding (matches arcade DK throw-through-girders
// convention per Wikipedia + Cutting Room Floor research), lands on P1.
// Trajectory: spawn (BARREL_X=230, TOP.y+16=156), slope 4.0 (vy/vx), no gravity
// during flight. From spawn, capsule lands at x=350 on P1 (capsule center at
// y=642 = P1 surface 660 - CAPSULE_R 18) in 0.8s.
// DK-GATE-PHASE-3: slowed from vx=180/vy=720 (flight 0.67s) to vx=150/vy=600
// (flight 0.8s). Slope unchanged. Reads more clearly as a thrown projectile.
// NON-LETHAL in flight (DK-DIAGONAL-THROW V2 gates AABB on c.thrown).
// Cap #2 of every life is the mandatory diagonal (DK-DIAGONAL-CAP-2; cap #1 is
// the "crazy barrel" normal Path C). Cap #3+ uses per-level frequency via
// getDiagonalEveryN(level).
const DIAGONAL_THROW_VX = 150;
const DIAGONAL_THROW_VY = 600;
function getDiagonalEveryN(level) {
  if (level <= 3) return 6;
  if (level <= 6) return 5;
  if (level <= 9) return 4;
  return 3;
}
// G4 — initial throw direction. -1 = leftward (current Level 1), +1 = rightward.
// Used to derive (a) capsule spawn vx sign and (b) the dtj_throw render flip — keeping them
// in lockstep so changing one constant flips both. After spawn, capsule vx still snaps to platform
// tilt while rolling; this only controls the initial throw and the render mirror.
const CAPSULE_THROW_DIR = -1;

// H1 + I1 — Win flow + cutscene state machine. Player completes ladder[5] top exit:
//   GAMEPLAY → WIN_FREEZE (0.6s frozen on the gameplay canvas, capsule kills suppressed)
//           → CUTSCENE_FADE_IN  (0.5s fade gameplay → RNC stage)
//           → CUTSCENE_PHASE1   (DNC walks in, both speech bubbles, ~3s)
//           → CUTSCENE_PHASE3   (eagle descends, grabs DTJ, ascends, ~3s)
//           → CUTSCENE_SCORE    (breakdown overlay; tap to advance)
//           → CUTSCENE_BETWEEN  (sky + eagle flies across; LEVEL 2 COMING SOON; tap)
//           → INTRO_BLACK       (intro replays; full reset on the GAMEPLAY entry)
const WIN_FREEZE_DURATION    = 0.6;
const CUTSCENE_FADE_DURATION = 0.5;
const CUTSCENE_PHASE1_DURATION = 3.0;
// I-EAGLE-REWRITE — CUTSCENE_PHASE3_GRAB_DELAY removed. PHASE3 is now a 4-step pose sequence
// with a hard cut to the eagle_carry combo at t=2.0s — no grab-pause beat.
const CUTSCENE_SKIP_THRESHOLD = 10.0;         // input during PHASE1/PHASE3 after this skips to SCORE
// P-DIFFICULTY-1: now per-level via getLevelParams().winBonus (used at line ~2434 triggerWin).
// const WIN_BONUS              = 2000;
let   winFreezeT             = 0;
let   winFinalScore          = 0;
let   cutsceneT              = 0;             // seconds since CUTSCENE_FADE_IN entered

function triggerWin() {
  if (state !== 'GAMEPLAY') return;
  playSfx_levelComplete();                                       // N — fanfare sting on win trigger
  // P-DIFFICULTY-1: per-level WIN_BONUS via getLevelParams (was: flat const WIN_BONUS = 2000).
  // L1=2000, L10=6000, L11+=6000+(level-10)*400.
  const _winBonus = getLevelParams().winBonus;
  playerScore += _winBonus;
  stats.winBonus = _winBonus;                      // I5 — capture for breakdown
  // H2 — time bonus: completing under TARGET_TIME awards remaining seconds × TIME_BONUS_PER_SECOND.
  // No multiplier per spec.
  const levelTime = totalT - levelStartTime;
  const timeBonus = Math.max(0, Math.round((TARGET_TIME - levelTime) * TIME_BONUS_PER_SECOND));
  playerScore += timeBonus;
  stats.timeBonus = timeBonus;                     // I5 — capture for breakdown
  state = 'WIN_FREEZE';
  stateT = 0;
  winFreezeT = 0;
  cutsceneT = 0;
  player.vx = 0;
  player.vy = 0;
  // I5 — snapshot final score now so the breakdown matches what the player sees on the WIN screen
  // even if survival/animation continues to add a few points during the cutscene.
  winFinalScore = playerScore;
  // I-CORR-3 — make sure no stale caption lingers from a prior win cycle. The PHASE1 captions are
  // pushed on FADE_IN→PHASE1 entry, so the queue should be empty at WIN_FREEZE start.
  clearCaptions();
  // I-EAGLE-REWRITE — defensive cutscene state reset at every win trigger. The PHASE3 step
  // machine + cutsceneAdvance handle the rest from a known-clean baseline.
  dtjStageMode  = 'NONE';
  comboActive   = false;
  dtjScale      = 1.0;
  dtjScaleTarget = 1.0;
}

// C3 / D1 — DTJ throw animation state machine. On capsule spawn timer fire (and only if IDLE):
//   WALK_TO_BARREL (0.4s, dtj_walk/dtj_walk2 cycle, no flip)
//     → THROW_COCK (0.15s, dtj_throw NORMAL — wind-up, arm pulled back to the right)
//     → THROW_RELEASE (0.15s, dtj_throw MIRRORED — follow-through, arm extended left)
//        → at the END of THROW_RELEASE, the capsule (barrel_endview entity) is spawned at BARREL_X
//     → WALK_BACK (0.3s, dtj_walk/dtj_walk2 cycle, mirrored) → IDLE
// Both throw frames render the SAME dtj_throw asset; only the horizontal flip differs. Static
// barrel never moves. If spawn timer fires during anim, the new throw kicks off when state
// returns to IDLE (the gate below handles it naturally — no queue var needed).
const DTJ_WALK_TO_DURATION    = 0.4;
const DTJ_COCK_DURATION       = 0.15;       // D1 — wind-up frame (dtj_throw, no flip)
const DTJ_RELEASE_DURATION    = 0.15;       // D1 — follow-through frame (dtj_throw, mirrored); capsule spawns at end
const DTJ_WALK_BACK_DURATION  = 0.3;
let dtjAnimState = 'IDLE';                  // 'IDLE' | 'WALK_TO_BARREL' | 'THROW_COCK' | 'THROW_RELEASE' | 'WALK_BACK'
let dtjAnimT     = 0;
let dtjAnimX     = DTJ_GAMEPLAY_X;          // current x during the animation

function spawnCapsule() {
  // C2 v2 — capsule entity has no lifeTimer. Cap visible count via MAX_CAPSULES.
  // P-DIFFICULTY-1-FIX-V4-DIAG: census logging on silent bail. Trump's throw animation
  // completes regardless of whether spawnCapsule pushed (line ~2684 unconditionally
  // transitions to WALK_BACK), so a hit on this guard manifests as "Trump throws but no
  // capsule appears" in the world. The census tells us which slot-class is dominant
  // (FLOOR pile-up, Pelosi-carry hold, mid-cascade stall) so V4 fix can target it.
  // INSTRUMENTATION ONLY — no behavioral change. Strip after V4 fix sized + landed.
  if (capsules.length >= MAX_CAPSULES) {
    const census = capsules.map(function (c, i) {
      return {
        i:       i,
        x:       Math.round(c.x),
        y:       Math.round(c.y),
        onPlat:  c.onPlat ? (c.onPlat === FLOOR ? 'FLOOR' : ('y' + c.onPlat.y)) : 'falling',
        vx:      Math.round(c.vx),
        vy:      Math.round(c.vy),
        carried: !!c.carried,
        cleared: !!c.cleared,
      };
    });
    console.log('[CAPSULE-CENSUS] MAX_CAPSULES bail', {
      currentLevel:   currentLevel,
      count:          capsules.length,
      MAX_CAPSULES:   MAX_CAPSULES,
      pelosiState:    (typeof pelosi !== 'undefined') ? pelosi.state : 'no-pelosi',
      pelosiCarrying: (typeof pelosi !== 'undefined' && pelosi.targetCapsule)
                        ? capsules.indexOf(pelosi.targetCapsule) : -1,
      helpersAlive:   (typeof helpers !== 'undefined') ? helpers.length : 'no-helpers',
      census:         census,
    });
    return;
  }
  // DK-GATE-PHASE-2: anti-camp branch + first-pair branch + throw-cycle
  // suppression all REMOVED. Capsule cascade is now driven entirely by
  // shouldDropDownLadder() at the crossing-decision site. spawnCapsule
  // pushes one capsule per DTJ throw cycle. DK-DIAGONAL-THROW (added later):
  // first throw of every level is diagonal; subsequent throws are mostly
  // normal Path C (TOP roll) with diagonal frequency scaling per level.
  // Player camping is punished naturally via Step 3 alignment in
  // shouldDropDownLadder (camped player is at lad.x, so any capsule that
  // passes Step 1 + Step 2 will drop on the camped ladder).
  const _p = getLevelParams();
  // DK-DIAGONAL-THROW + DK-DIAGONAL-CAP-2: increment throw counter and decide
  // diagonal vs normal. Cap #1 of every life is NORMAL Path C ("crazy barrel"
  // per Don Hodges Z80 disassembly — uncontrollable, rolls across TOP
  // naturally). Cap #2 is the MANDATORY diagonal throw (per Cutting Room Floor:
  // "Donkey Kong's first barrel is always thrown directly downwards to ignite
  // the oil can"). Cap #3+ uses per-level diagonal frequency via
  // getDiagonalEveryN(currentLevel) — L1-3:6, L4-6:5, L7-9:4, L10+:3.
  // throwCounter resets to 0 on level transition AND on respawn, so cap #1
  // and cap #2 both fire fresh after every death (mirrors arcade behavior).
  // The explicit `throwCounter > 2` guard on the frequency check prevents
  // double-fire if a future per-level frequency ever hits 2 (current min is 3).
  throwCounter++;
  const _isMandatoryDiagonal = (throwCounter === 2);
  const _diagonalEveryN      = getDiagonalEveryN(currentLevel);
  const _isDiagonal          = _isMandatoryDiagonal
                            || (throwCounter > 2 && throwCounter % _diagonalEveryN === 0);
  if (_isDiagonal) {
    // Diagonal throw: pass-through trajectory from DTJ position. Capsule
    // visually passes through P4/P3/P2 (no platform collision during flight),

    // Lethal mid-flight (AABB collision unaffected by thrown state).
    capsules.push({
      x:                 BARREL_X,
      y:                 TOP.y + 16,                   // just below TOP, capsule center

      vy:                DIAGONAL_THROW_VY,

      vx: CAPSULE_THROW_DIR * _p.capsuleSpeedMult * CAPSULE_ROLL_SPD,   // G4 — sign × per-level speed
      vy: 0,
      rolling: true,
      onPlat: TOP,
      rot: 0,
      speedMult: _p.capsuleSpeedMult,             // P-DIFFICULTY-1: cached for per-frame velocity re-application
      thrown: false,                              // DK-DIAGONAL-THROW: explicit false on normal Path C
      // DK-DESCENT-V1: ladder-descent state fields. Initialized false/null on
      // spawn; set when the drop decision fires (line ~2960). Cleared when
      // descent reaches destination platform (line ~2826).
      descending:        false,
      descendLadder:     null,
      descendDestY:      null,
      descendDestPlat:   null,

      floorTime:         0,

  // can confirm via DUMP LOGS what value is actually applied at L8+ (Bug 10
  // field test report: "capsules at L8+ NOT visibly faster").
  console.log('[CAPSULE-SPAWN-DIAG]', {
    site:        'normal',
    currentLevel: currentLevel,
    speedMult:   _p.capsuleSpeedMult,
  });

// DK-GATE-PHASE-1: DK-faithful ladder-drop decision routine. Port of original
// arcade DK Z80 ROM addresses $2178-$219E per Don Hodges' disassembly:
//   http://donhodges.com/Controlling_the_barrels_in_Donkey_Kong.htm
// Three chained gates plus a climber-protection pre-check:
//   Step 0 (DK-CLIMBER-PROTECT — JP arcade rule per Cutting Room Floor):
//     If player is climbing THIS ladder and capsule is within 16px vertically
//     of the ladder top, skip the drop. Gives the player a brief safe window
//     to wait for a gap. Famous "ladder cheat" — disabled in US Set 1
//     (reduced to 4px). https://tcrf.net/Donkey_Kong_(Arcade)
//     20s camp timer follows in DK-CLIMBER-TIMER.
//   Step 1 (vertical filter): capsule must be ABOVE player. Capsules at or
//     below player level never drop. (DK arcade rule — barrels can't materialize
//     beneath the player's feet.)
//   Step 2 (difficulty roll): random(0..2) vs threshold = floor(diff/2)+1.
//     Per Q6 audit: only 3 distinct outcomes — diff=1→33%, diff=2-3→67%,
//     diff=4-5→100%. Adjacent-value adjustments (2→3, 4→5) are NO-OPS by
//     design. Faithful to ROM.
//   Step 3 (player alignment): if capsule.x near player.x → drop. If capsule
//     to one side and player moving toward that side ("commanding" the barrel)
//     → drop. Otherwise 25% fallback chance via second independent RNG draw.
//
// PHASE 2 STATUS: AUTHORITATIVE. Wired into the drop decision in updateCapsules
// crossing block. The four legacy bias behaviors (anti-camp force-drop,
// under-ladder bias, fleeing bias, forcedLadderDrop flag) and their dead state
// (firstCapsuleDropped, ladderTime, forceNextDropAtLadder, antiCampSec column)
// were all DELETED in Phase 2. Result logged via [LADDER-DROP-DIAG].
//
// Returns an OBJECT (not a boolean) so the diagnostic can show WHY the routine
// decided as it did — gives Brian a structured payload in DUMP LOGS.
function shouldDropDownLadder(capsule, ladder, player, levelParams) {
  // Step 0: DK-CLIMBER-PROTECT (JP arcade DK rule). If player is climbing
  // THIS ladder (player.x snapped to ladCx by climb code at line 2237) AND
  // the capsule is within 16px vertically of the ladder top (lad.y), skip
  // the drop. Capsule keeps rolling on the dest plat — may drop at a
  // different ladder, may roll off the platform edge. Player gets a brief
  // safe pocket on this ladder. Other ladders/platforms remain hostile.
  // Threshold compared against capsule's expected rolling y on the dest
  // plat (lad.y - CAPSULE_R) so the 16px is the literal arcade-rule slack
  // around the ladder TOP. Climbers are auto-snapped exact to ladCx so
  // LADDER_W (24px) tolerance on x uniquely identifies the climbed ladder
  // (V4 layout's closest ladder pair is 130px apart).
  // DK-CLIMBER-TIMER: protection lapses after CLIMBER_CAMP_SEC seconds of
  // continuous ladder time. climberCampT is module-level, ticked in
  // updatePlayer (line ~2228) and reset to 0 the moment player leaves the
  // ladder. Once the timer expires, player must dismount + remount to
  // re-engage protection. Forces forward motion.
  const CLIMBER_PROTECT_PX = 16;
  const CLIMBER_CAMP_SEC   = 20;
  if (player.onLadder
      && climberCampT < CLIMBER_CAMP_SEC
      && Math.abs(player.x - (ladder.x + LADDER_W / 2)) <= LADDER_W
      && Math.abs(capsule.y - (ladder.y - CAPSULE_R)) <= CLIMBER_PROTECT_PX) {
    return { drop: false, reason: 'step0-climber-protect' };
  }
  // Step 1: vertical filter
  const VERT_TOLERANCE = 4;
  if (capsule.y >= player.y - VERT_TOLERANCE) {
    return { drop: false, reason: 'step1-vertical' };
  }
  // Step 2: difficulty roll
  const threshold = Math.floor(levelParams.dkDifficulty / 2) + 1;
  const roll = Math.floor(Math.random() * 3);
  if (roll >= threshold) {
    return { drop: false, reason: 'step2-difficulty', roll: roll, threshold: threshold };
  }
  // Step 3: player alignment
  // PLAYER_X_TOLERANCE = 12px — Brian-confirmed. CRT-era arcade DK was
  // pixel-perfect; modern displays need slack. 12px catches climbers
  // auto-snapped to lad.x + LADDER_W/2 and gives "near alignment" feel.
  const PLAYER_X_TOLERANCE = 12;
  const dx = capsule.x - player.x;
  if (Math.abs(dx) <= PLAYER_X_TOLERANCE) {
    return { drop: true, reason: 'step3-aligned', roll: roll, threshold: threshold };
  }
  // Velocity threshold of 50 matches existing fleeing-bias floor (line ~2828).
  // Players using button input have vx of 0 or ±WALK_SPD, so |vx|>50 is
  // effectively "moving left/right".
  if (dx < 0 && player.vx < -50) {
    return { drop: true, reason: 'step3-flee-left', roll: roll, threshold: threshold };
  }
  if (dx > 0 && player.vx > 50) {
    return { drop: true, reason: 'step3-flee-right', roll: roll, threshold: threshold };
  }
  // Fallback 25% — second independent Math.random() draw (NOT the Step 2 roll).
  if (Math.random() < 0.25) {
    return { drop: true, reason: 'step3-fallback-hit', roll: roll, threshold: threshold };
  }
  return { drop: false, reason: 'step3-fallback-miss', roll: roll, threshold: threshold };
}

function updateCapsules(dt) {
  // C3 — drive DTJ throw animation. State transitions handle their own x interpolation and the
  // capsule entity spawn (at the start of the THROW phase).
  capsuleSpawnT += dt;
  if (dtjAnimState === 'IDLE') {
    if (capsuleSpawnT >= capsuleSpawnInterval) {
      capsuleSpawnT = 0;
      // P-DIFFICULTY-1: per-level spawn interval with symmetric variance.
      // At L1 (avg=2.5, var=0.30): range 1.75-3.25s. L10 (avg=1.0, var=0.15): 0.85-1.15s.
      const _sp = getLevelParams();
      const _v  = _sp.spawnIntervalAvg * _sp.spawnVariance;
      capsuleSpawnInterval = _sp.spawnIntervalAvg - _v + Math.random() * _v * 2;
      dtjAnimState = 'WALK_TO_BARREL';
      dtjAnimT = 0;
      dtjAnimX = DTJ_GAMEPLAY_X;
    }
  } else {
    dtjAnimT += dt;
    if (dtjAnimState === 'WALK_TO_BARREL') {
      const t = Math.min(dtjAnimT / DTJ_WALK_TO_DURATION, 1);
      dtjAnimX = DTJ_GAMEPLAY_X + (BARREL_X - DTJ_GAMEPLAY_X) * t;
      if (t >= 1) {
        dtjAnimX = BARREL_X;
        dtjAnimState = 'THROW_COCK';                          // D1 — wind-up frame, no capsule yet
        dtjAnimT = 0;
      }
    } else if (dtjAnimState === 'THROW_COCK') {
      if (dtjAnimT >= DTJ_COCK_DURATION) {
        dtjAnimState = 'THROW_RELEASE';                       // D1 — follow-through frame
        dtjAnimT = 0;
      }
    } else if (dtjAnimState === 'THROW_RELEASE') {
      if (dtjAnimT >= DTJ_RELEASE_DURATION) {
        spawnCapsule();                                       // D1 — capsule pops out at the END of release
        dtjAnimState = 'WALK_BACK';
        dtjAnimT = 0;
      }
    } else if (dtjAnimState === 'WALK_BACK') {
      const t = Math.min(dtjAnimT / DTJ_WALK_BACK_DURATION, 1);
      dtjAnimX = BARREL_X + (DTJ_GAMEPLAY_X - BARREL_X) * t;
      if (t >= 1) {
        dtjAnimX = DTJ_GAMEPLAY_X;
        dtjAnimState = 'IDLE';
        dtjAnimT = 0;
        // If the spawn timer is already past threshold (queued during anim), the next loop will
        // re-fire from the IDLE branch above — no explicit queue var needed.
      }
    }
  }

  for (let i = capsules.length - 1; i >= 0; i--) {
    const c = capsules[i];
    // P-DIFFICULTY-1-FIX-V4: splice-on-cleared. The "jumped over" dodge bonus at
    // line ~2920 sets c.cleared = true but never spliced — pre-V4, cleared capsules
    // kept rolling, eating MAX_CAPSULES slots until helper-kill / Pelosi-smash /
    // off-screen exit removed them. V4-DIAG census confirmed this was the dominant
    // slot-class (i=0 carried cleared:true ~11s across 7 bails). Splicing here
    // closes the despawn gap. Guarded by !c.carried so we don't yank from Pelosi
    // mid-CARRY_TO_ANCHOR (her state machine has a stale ref recovery path at
    // line ~4219 but the spec is explicit: don't rely on it). Backward iteration
    // (line above) keeps splice index-safe. One-frame latency vs the SET site at
    // line ~2920 is intentional — same-frame splice would skip the dodge-bonus
    // award block. Strip after V4 field test confirms the fix landed.
    if (c.cleared && !c.carried) {
      capsules.splice(i, 1);
      continue;
    }
    // J — Pelosi-carried capsules are position-controlled by updatePelosi (CARRY_TO_ANCHOR).
    // Skip ALL physics, off-screen despawn, player-collision, and clear-bonus checks for these.
    // The carried capsule rejoins normal flow only if Pelosi shrugs (carried flag cleared) or
    // gets despawned at SLAM (capsule spliced from array).
    if (c.carried) continue;

    // DK-FLOOR-TTL: per-capsule cumulative FLOOR-time accumulator + despawn.
    // Restores FLOOR drainage that DK-LADDER-DODGE-FIX correctly removed (the
    // H2 walk-past clear path). Off-screen-right exit at x>516 usually fires
    // first; this is the safety net for capsules that stall near the right
    // edge or pile up behind a slow Pelosi grab cycle. !c.carried already
    // guarded above. Diagnostic [FLOOR-TTL] log lets Brian verify TTL fires
    // and tune FLOOR_TTL per level if needed.
    if (c.onPlat === FLOOR) {
      c.floorTime = (c.floorTime || 0) + dt;
      if (c.floorTime >= FLOOR_TTL) {
        console.log('[FLOOR-TTL]', {
          capX:      Math.round(c.x),
          capY:      Math.round(c.y),
          floorTime: c.floorTime.toFixed(2),
        });
        capsules.splice(i, 1);
        continue;
      }
    }

    // Boundary clamp: keep mid-cascade rolling capsules on tilted platforms
    // from rolling off the screen edge. Skipped for FLOOR (V3 BUG 4c
    // exception — FLOOR capsules exit off-screen naturally) AND for capsules
    // in post-off-edge transition state (onPlat=null) per DK-FLOOR-EDGE-FIX —
    // those need to reach off-screen despawn (x>516 or x<-36) without being
    // yanked back. Pre-fix: a FLOOR capsule that rolled past x=484 had
    // c.onPlat set to null by the off-edge transition (line 2967) but still
    // had c.vx=+75; on the next frame `c.onPlat !== FLOOR` was true (null
    // !== FLOOR), the clamp fired, c.x was yanked back to 462 and vx zeroed,
    // and the falling-block re-landed it on FLOOR. Capsule oscillated 462 →
    // 485 → 462 forever until DK-FLOOR-TTL (8s) drained it. The added
    // `c.onPlat &&` short-circuit lets falling capsules proceed to natural
    // off-screen despawn (~0.4s at L1, ~0.25s at L10) instead of stalling.
    if (c.onPlat && c.onPlat !== FLOOR) {
      if      (c.x < CAPSULE_R)        { c.x = CAPSULE_R;        c.vx = 0; }
      else if (c.x > W - CAPSULE_R)    { c.x = W - CAPSULE_R;    c.vx = 0; }
    }

    // DK-DIAGONAL-THROW: thrown state takes priority over descending/rolling/
    // falling. Constant-velocity straight-line trajectory (no gravity). Lands
    // ONLY on P1 (or FLOOR backstop) — passes visually through P4/P3/P2
    // girders during flight. Does NOT `continue` — falls through to AABB
    // collision so thrown capsules remain lethal mid-flight.
    if (c.thrown) {
      const _prevYThrown = c.y;
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.rot += 0.18;
      // Landing detection: only P1 + FLOOR. P4/P3/P2 deliberately ignored.
      const _landingPlats = [platforms[1], FLOOR];   // P1 then FLOOR backstop
      for (const _lplat of _landingPlats) {
        if (c.x < _lplat.x - 4 || c.x > _lplat.x + _lplat.w + 4) continue;
        const _surfT = getPlatY(_lplat, c.x) - CAPSULE_R;
        if (_prevYThrown > _surfT + 1) continue;     // was already below
        if (c.y < _surfT) continue;                  // hasn't reached
        // Land on this platform.
        c.y       = _surfT;
        c.thrown  = false;
        c.rolling = true;
        c.onPlat  = _lplat;
        c.vy      = 0;
        const _rsT = (c.speedMult || 1) * CAPSULE_ROLL_SPD;
        if (_lplat === FLOOR)        c.vx =  _rsT;
        else if (_lplat.tilt >  0.1) c.vx =  _rsT;
        else if (_lplat.tilt < -0.1) c.vx = -_rsT;
        else                         c.vx = c.vx >= 0 ? _rsT : -_rsT;
        console.log('[DIAGONAL-THROW]', 'land', {
          capX:  Math.round(c.x),
          capY:  Math.round(c.y),
          plat:  (_lplat === FLOOR) ? 'FLOOR' : ('P' + platforms.indexOf(_lplat)),
        });
        break;
      }
    } else if (c.descending) {
      c.y += CAPSULE_DESCEND_SPD * dt;
      c.rot += 0.18;
      if (c.y >= c.descendDestY) {
        if (c.descendDestPlat) {
          // Reached destination platform surface — transition to rolling.
          c.descending      = false;
          c.rolling         = true;
          c.onPlat          = c.descendDestPlat;
          c.y               = c.descendDestY;
          // P-ENEMY-1-FIX (B5b): bump hat-spawn trigger when a capsule first
          // reaches FLOOR via descent-end. Every CAPSULE_PER_HAT (=8) FLOOR
          // arrivals attempts a hat spawn (capped at HAT_MAX_ONSCREEN).
          if (c.onPlat === FLOOR) {
            capsulesReachedFloor++;
            if (capsulesReachedFloor % CAPSULE_PER_HAT === 0 && hats.length < HAT_MAX_ONSCREEN) {
              spawnHat('capsule-reached-floor');
            }
          }
          // Seed vx from destination tilt (mirrors falling-block landing logic
          // at line ~2963). FLOOR + tilted plats snap to downhill direction.
          const _rs = (c.speedMult || 1) * CAPSULE_ROLL_SPD;
          if (c.onPlat === FLOOR)         c.vx =  _rs;
          else if (c.onPlat.tilt >  0.1)  c.vx =  _rs;
          else if (c.onPlat.tilt < -0.1)  c.vx = -_rs;
          else                            c.vx = c.vx >= 0 ? _rs : -_rs;
          console.log('[DESCENT-DIAG]', 'end', {
            capX:  Math.round(c.x),
            capY:  Math.round(c.y),
            platY: Math.round(c.onPlat.y),
          });
          c.descendLadder    = null;
          c.descendDestY     = null;
          c.descendDestPlat  = null;
        }
        // If no destPlat (FLOOR-source ladder), capsule continues past H+30
        // and the existing off-screen splice at line ~2976 destroys it.
      }
    } else if (c.rolling && c.onPlat) {
      // D2 — FLOOR is the only flat platform where direction is forced (rightward, toward Pelosi).

      // P-DIFFICULTY-1: per-capsule speedMult cached at spawn (see spawnCapsule line ~2478).
      const _rs1 = (c.speedMult || 1) * CAPSULE_ROLL_SPD;
      if (c.onPlat === FLOOR)             c.vx =  _rs1;     // always RIGHT on FLOOR
      else if (c.onPlat.tilt >  0.1)      c.vx =  _rs1;     // right-tilted = right downhill
      else if (c.onPlat.tilt < -0.1)      c.vx = -_rs1;     // left-tilted  = left downhill

      let dropped = false;

        const ladCx = lad.x + LADDER_W / 2;
