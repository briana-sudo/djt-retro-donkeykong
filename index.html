<!-- N-FIX-9 — eruda mobile console for iPhone Safari diagnostics. Drops a small floating

     including the AUDIO IOS DIAG / PENDING TICK / PRESSED-KEY DIAG / TOGGLE-AUDIO DIAG /

<title>DNC vs DJT</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  /* E1.A2 — canvas pinned to visual viewport top via position:fixed + top:0. Horizontal
     centering via left:50% + translateX(-50%). Bypasses the flex/dvh chain entirely so the
     canvas top is ALWAYS at viewport y=0 regardless of body height, flex behavior, or dvh
     support. The body is just a black backdrop now. */
  html, body { background: #000; overflow: hidden; height: 100%; width: 100%; }
  canvas {
    display: block;
    image-rendering: pixelated;
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
  }
</style>

<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─────────────────────────────────────────────
//  SPRITE IMAGES
// ─────────────────────────────────────────────
const sprites = {};
const spriteData = {
  dtj_idle: 'sprites/dtj_idle.png',
  dtj_walk: 'sprites/dtj_walk.png',
  dtj_walk2: 'sprites/dtj_walk2.png',
  dtj_throw: 'sprites/dtj_throw.png',
  // I-EAGLE-REWRITE — added for the PHASE3 4-step pose sequence (turn → surprised → cut to combo).
  dtj_surprised: 'sprites/dtj_surprised.png',
  djt1: 'sprites/djt1.png',
  djt2: 'sprites/djt2.png',
  djt3: 'sprites/djt3.png',
  djt4: 'sprites/djt4.png',
  djt5: 'sprites/djt5.png',
  djt6: 'sprites/djt6.png',
  pelosi_idle: 'sprites/pelosi_idle.png',
  pelosi_tear: 'sprites/pelosi_tear.png',
  eagle_fly: 'sprites/eagle_fly.png',
  eagle_carry: 'sprites/eagle_carry.png',
  antifa: 'sprites/antifa.png',
  secret_service: 'sprites/secret_service.png',
  briefcase: 'sprites/briefcase.png',
  zombie_winemom: 'sprites/zombie_winemom.png',
  zombie_pinkhair: 'sprites/zombie_pinkhair.png',
  zombie_glasses: 'sprites/zombie_glasses.png',
  zombie_dad: 'sprites/zombie_dad.png',
  barrel_upright: 'sprites/barrel_upright.png',
  barrel_endview: 'sprites/barrel_endview.png',
  // I2 — RNC convention stage background. 960×541 RGBA. Used as the cutscene backdrop in
  // CUTSCENE_PHASE1 / CUTSCENE_PHASE3 / CUTSCENE_SCORE (letterboxed in the canvas).
  rnc_stage: 'sprites/rnc_stage.png'
};

// G1 REPLACEMENT — sprites ship as PNGs with real alpha (rembg-converted from the original JPGs;
// see scripts/convert_sprites_to_png.py). Runtime alpha-keying is removed. Each loaded image is
// drawn to its own offscreen canvas, then trimmed to the tight bounding box of the alpha channel
// (the F5 footprint anchor). drawSprite reads exclusively from spriteCache[name].
const spriteCache = {};                                       // name -> HTMLCanvasElement (trimmed, alpha intact)
let spritesLoaded = 0;
const spritesTotal = Object.keys(spriteData).length;

function processSprite(name, img) {
  const w = img.naturalWidth, h = img.naturalHeight;
  if (!w || !h) {
    console.warn('Sprite has no dimensions:', name);
    return;
  }
  const off = document.createElement('canvas');
  off.width = w; off.height = h;
  const ictx = off.getContext('2d');
  ictx.drawImage(img, 0, 0);
  const id = ictx.getImageData(0, 0, w, h);
  const d = id.data;

  // F5 — find tight bounding box of pixels that have non-zero alpha. Also count alpha < 255
  // pixels (informational — confirms the PNG actually has a usable alpha channel).
  let alphaPixels = 0;
  let minX = w, maxX = -1, minY = h, maxY = -1;
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const a = d[(y * w + x) * 4 + 3];
      if (a < 255) alphaPixels++;
      if (a > 0) {
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }

  if (maxX < 0 || maxY < 0) {
    // entirely transparent — extremely unlikely for a converted sprite, but defend anyway
    spriteCache[name] = off;
    console.warn('Sprite ' + name + ' is fully transparent — keeping as-is');
    return;
  }
  const tw = maxX - minX + 1;
  const th = maxY - minY + 1;
  if (tw === w && th === h) {
    spriteCache[name] = off;                                  // already tight, no trim needed
  } else {
    const trimmed = document.createElement('canvas');
    trimmed.width = tw; trimmed.height = th;
    const tctx = trimmed.getContext('2d');
    tctx.drawImage(off, minX, minY, tw, th, 0, 0, tw, th);
    spriteCache[name] = trimmed;
  }
  console.log('Sprite loaded:', name,
              'native=' + w + 'x' + h,
              'trimmed=' + spriteCache[name].width + 'x' + spriteCache[name].height,
              'alphaPixels=' + alphaPixels);
}

for (const [name, src] of Object.entries(spriteData)) {
  sprites[name] = new Image();
  sprites[name].onload = () => {
    processSprite(name, sprites[name]);
    spritesLoaded++;
    // G1 — once all sprites have finished loading + processing, enumerate the cache so it's
    // immediately visible in devtools whether anything is missing.
    if (spritesLoaded === spritesTotal) {
      const keys = Object.keys(spriteCache).sort();
      console.log('G1 — sprite cache ready: ' + keys.length + ' / ' + spritesTotal + ' sprites');
      console.log('G1 — cache keys: ' + keys.join(', '));
      const missing = Object.keys(spriteData).filter(k => !spriteCache[k]);
      if (missing.length) console.error('G1 — sprites MISSING from cache:', missing);
    }
  };
  sprites[name].onerror = (e) => console.warn('Block A — sprite FAILED to load:', name, e);
  sprites[name].src = src;
}

// Draw a sprite centered on x, feet at y. ALWAYS uses the alpha-keyed cached canvas.
// G1 — raw-img fallback removed. If the cache is missing for a loaded sprite, we log loudly
// and SKIP the draw rather than fall back to the un-keyed JPG (that fallback was the source
// of the white/gray boxes around briefcase, barrel, etc.).
function drawSprite(name, x, y, targetH, flip=false, footFrac=1.0) {
  const cached = spriteCache[name];
  if (!cached) {
    const img = sprites[name];
    if (img && img.complete && img.naturalWidth) {
      // Loaded but somehow not in cache — should never happen; surface immediately.
      console.error('drawSprite: cache MISSING for loaded sprite "' + name + '"');
    }
    return;                                                              // skip draw — never use raw img
  }
  const nw = cached.width, nh = cached.height;
  if (!nw || !nh) return;

  const aspect = nw / nh;
  const targetW = targetH * aspect;
  const drawX = x - targetW / 2;
  const drawY = y - targetH * footFrac;

  ctx.save();
  if (flip) { ctx.translate(drawX*2 + targetW, 0); ctx.scale(-1, 1); }
  ctx.drawImage(cached, drawX, drawY, targetW, targetH);
  ctx.restore();
}

// Safe ellipse wrapper — ctx.ellipse needs 7 args, this handles the translate/scale approach
function ell(x, y, rx, ry, rot, s, e) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.scale(rx, ry);
  ctx.arc(0, 0, 1, s, e);
  ctx.restore();
}
const W = 480, H = 854;
let scale = 1;

function resize() {
  // E1 — use clientWidth/Height (excludes browser chrome, scrollbars) so the canvas always
  // fits the *visible* area on iOS Safari and desktop Chrome. window.innerHeight on iOS can
  // report the larger viewport (URL bar collapsed) which caused the canvas top to be cropped.
  const vw = document.documentElement.clientWidth;
  const vh = document.documentElement.clientHeight;
  scale = Math.min(vw / W, vh / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W * scale + 'px';
  canvas.style.height = H * scale + 'px';
}
resize();
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', resize);                // mobile rotation
if (window.visualViewport) window.visualViewport.addEventListener('resize', resize); // iOS URL-bar shrink

// E1.A2 — one-shot startup diagnostic. If the top of the canvas appears cropped on a real
// device, open devtools console, find this line, and paste it back. The values name the actual
// offender immediately (e.g. canvasTop=-44 → canvas IS positioned above viewport; or scale=1.5
// + canvasH=1281 → canvas is sized too tall; etc).
{
  const r = canvas.getBoundingClientRect();
  console.log('VIEWPORT_DIAG',
    'innerH=' + window.innerHeight,
    'clientH=' + document.documentElement.clientHeight,
    'visualH=' + (window.visualViewport ? window.visualViewport.height : 'N/A'),
    'canvasTop=' + r.top,
    'canvasH=' + r.height,
    'scale=' + scale);
}

// ─────────────────────────────────────────────
//  GAME LAYOUT DATA
// ─────────────────────────────────────────────
const PLAT_H = 14;
// Block B — geometry per Notion spec (canonical baseline). Pre-audited 6/6 PASS.
const platforms = [
  { x:  0, y: 790, w: 480, h: 14, tilt:  0   },  // FLOOR — full width
  { x: 80, y: 660, w: 400, h: 14, tilt: -2.5 },  // P1 — tilts right-down
  { x: 10, y: 530, w: 370, h: 14, tilt:  2.5 },  // P2 — tilts left-down
  { x: 80, y: 400, w: 370, h: 14, tilt: -2.5 },  // P3
  { x: 10, y: 270, w: 370, h: 14, tilt:  2.5 },  // P4
  { x: 60, y: 140, w: 420, h: 14, tilt:  0   }   // TOP — F1: extends to right screen edge (x=480)
];
const ladders = [
  { x:  80, y: 672, h: 118 },  // [0] FLOOR -> P1 left  (cx=92, inside P1 x=80)
  { x: 370, y: 672, h: 118 },  // [1] FLOOR -> P1 right
  { x: 120, y: 548, h: 118 },  // [2] P1 -> P2
  { x: 340, y: 419, h: 118 },  // [3] P2 -> P3
  { x:  90, y: 289, h: 118 },  // [4] P3 -> P4
  { x: 350, y: 159, h: 118 }   // [5] P4 -> TOP
];
const LADDER_W = 24;
const TOP = platforms[5];
const FLOOR = platforms[0];
// Block C / F2 — single source of truth for DTJ + barrel positions on TOP.
// TOP is x=60 w=420 (after F1 extension). Layout left→right:
//   CNN col @ TOP.x+8 (range 68–104)
//   → DTJ @ DTJ_GAMEPLAY_X (just LEFT of barrel)
//   → barrel decoration @ BARREL_X (capsule spawn origin)
//   → MSNBC col @ TOP.x+TOP.w-40 (right edge of TOP, range 440–476)
const BARREL_X        = TOP.x + 170;   // = 230 (unchanged from Block C)
const DTJ_GAMEPLAY_X  = TOP.x + 100;   // F2: DTJ moved from TOP.x+260 to LEFT of barrel

// ─────────────────────────────────────────────
//  STATE MACHINE
// ─────────────────────────────────────────────
// INTRO_BLACK → INTRO_TITLE → INTRO_ESCALATOR → INTRO_STAIRS
// → INTRO_TAUNT → INTRO_SHATTER → GAMEPLAY
// J — added DEATH_REACTION (ragdoll-and-burst on capsule hit) and GAME_OVER (overlay + tap-to-restart).
//     DEATH_REACTION → GAMEPLAY (respawn) | GAME_OVER (last life)
//     GAME_OVER tap → INTRO_BLACK (full reset; the codebase has no separate 'STARTING' state —
//     INTRO_BLACK is the start of the intro chain that the spec calls "STARTING").
let state = 'INTRO_BLACK', stateT = 0, totalT = 0;
let skipDone = false;

// J — lives flow + high-score persistence + ragdoll-burst death reaction.
//   DEATH_REACTION: 1.2s total — gameplay-overlay (NOT a freeze). Capsules / helpers / Pelosi
//     keep updating beneath. Player physics handled separately in the DEATH_REACTION case.
//       phase1 'ragdoll' (0.0–0.8s): launched in capsule's vx direction (deathVx) + small upward
//         pop (deathVy=-200), gravity applies, rotates 720°/s, ignores platform collision.
//       phase2 'burst'   (transition→1.2s): triggered when player.y > FLOOR.y+40 OR phase1
//         elapsed >= 0.8s. Spawns ~12 debris rects + 1-frame white flash. Player sprite is
//         suppressed; debris IS the player visual now.
//     At t=1.2s: lives -= 1 → respawn (lives>0) or GAME_OVER (lives==0).
//     Block L (DTJ YMCA dance) will play simultaneously on top of this — coexist, don't gate.
//   GAME_OVER: breakdown overlay (reuses CUTSCENE_SCORE layout via drawScoreBreakdown). Shows
//     final + high score + creator credit. Tap → restartFromGameOver → INTRO_BLACK or GAMEPLAY.
//
// K — ragdoll+burst code path is now SHARED. Antifa entities thrown by Secret Service reuse
// the same physics + debris + flash via spawnRagdollBurst() and the per-entity ragdoll fields
// (deathVx, deathVy, deathRotation, ragdollPhase, ragdollT). The deathDebris array is renamed
// `ragdollDebris` and ticks every frame in the main loop regardless of state — both player
// burst and Antifa burst items share the array.
const DEATH_REACTION_DURATION   = 1.2;
const DEATH_PHASE1_MAX_DURATION = 0.8;     // hard cap on ragdoll phase even if player stays on-screen
const DEATH_BURST_FALL_TRIGGER  = 40;      // px below FLOOR before phase1→phase2 forced
const DEATH_DEBRIS_COUNT        = 12;
const RAGDOLL_DEBRIS_LIFE       = 0.4;     // K — debris alpha-fades over this duration (s)
const RAGDOLL_BURST_FLASH_ALPHA = 0.6;     // K — full-screen white flash alpha at burst moment
let   deathReactionT            = 0;
let   deathPhase                = 'phase1';// 'phase1' | 'phase2'
// N-FIX-8 — dedicated GAMEOVER_PENDING duration counter. Decoupled from `stateT` so any
// code path that resets stateT mid-PENDING (legitimate or accidental) cannot bypass the
// 6-second YMCA-dance protection floor. Reset to 0 only on PENDING entry; incremented per
// frame in the PENDING update branch.
let   gameOverPendingT          = 0;
let   ragdollBurstFlashT        = 0;       // ticks down from 1 across one frame after any burst
const ragdollDebris             = [];     // K — shared between player + Antifa bursts
let   gameOverFinalScore        = 0;
let   highScoreNew              = false;   // true on game over if final qualified for the top-5 board
let   introHasPlayed            = false;   // K — set true at INTRO_SHATTER end; per-session, not persisted
// K-FIX-5 — replaced single highScore + highScoreInitials with a top-5 leaderboard array.
// Storage key 'djt_high_scores' (plural). Each entry: { initials: 'BRI', score: 5799 }. Sorted
// descending by score. Maximum 5 entries. Empty leaderboard = []. The K-FIX-2 legacy single
// keys (HIGH_SCORE_KEY / HIGH_SCORE_INITIALS_KEY) remain on disk and serve as the migration
// source for first-boot under K-FIX-5.
let   highScores                = [];      // top-5 leaderboard
const HIGH_SCORES_KEY           = 'djt_high_scores';
const HIGH_SCORE_KEY            = 'djt_high_score';            // legacy J/K key — read for migration only
const HIGH_SCORE_INITIALS_KEY   = 'djt_high_score_initials';   // legacy K-FIX-4 key — read for migration only
const LEADERBOARD_MAX           = 5;

// K — shared debris-burst spawn. Used by both player DEATH_REACTION phase2 and Antifa RAGDOLL
// phase2. Each item: 4-6px square, random vx [-150,150], vy [-300,-100], gravity, rotates,
// alpha-fades over RAGDOLL_DEBRIS_LIFE seconds. Also triggers the one-frame full-screen white flash.
function spawnRagdollBurst(cx, cy, n) {
  const count = (typeof n === 'number') ? n : DEATH_DEBRIS_COUNT;
  for (let i = 0; i < count; i++) {
    ragdollDebris.push({
      x:    cx,
      y:    cy,
      vx:   -150 + Math.random() * 300,
      vy:   -300 + Math.random() * 200,
      size: 4 + Math.random() * 2,
      rot:  Math.random() * Math.PI * 2,
      rotV: -8 + Math.random() * 16,
      life: RAGDOLL_DEBRIS_LIFE,
      t:    0,
      color: ['#ffffff', '#aaccff', '#ff88aa', '#ffcc66'][Math.floor(Math.random() * 4)],
    });
  }
  ragdollBurstFlashT = 1;                                // 1 frame of full-bright flash
}

// K — global tick for ragdoll debris. Called from main loop top regardless of state so items
// drain naturally even if state changes (e.g. player wins to cutscene mid-Antifa-burst).
function tickRagdollDebris(dt) {
  for (let i = ragdollDebris.length - 1; i >= 0; i--) {
    const d = ragdollDebris[i];
    d.t  += dt;
    d.x  += d.vx * dt;
    d.y  += d.vy * dt;
    d.vy += GRAVITY * dt;
    d.rot += d.rotV * dt;
    if (d.t >= d.life) ragdollDebris.splice(i, 1);
  }
}

function renderRagdollDebrisAndFlash() {
  for (const d of ragdollDebris) {
    const a = Math.max(0, 1 - d.t / d.life);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(d.x, d.y);
    ctx.rotate(d.rot);
    ctx.fillStyle = d.color;
    ctx.fillRect(-d.size / 2, -d.size / 2, d.size, d.size);
    ctx.restore();
  }
  if (ragdollBurstFlashT > 0) {
    ctx.save();
    ctx.globalAlpha = RAGDOLL_BURST_FLASH_ALPHA;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    ragdollBurstFlashT = 0;                              // one-frame; cleared after first render
  }
}

// K — Secret Service entity. Decorative-only system: 3 stationary units that fade in when an
// Antifa starts climbing ladder[5] (P4→TOP), grab-and-throw any Antifa exiting onto TOP near
// ladder[5], fade out 0.5s after the last Antifa dies. ZERO interaction with player or capsules.
//   units[0] — DTJ bodyguard (decorative; never grabs or throws)
//   units[1] — left flank of ladder[5]
//   units[2] — right flank of ladder[5]
const SS_GRAB_DURATION    = 0.2;
const SS_FADE_DURATION    = 0.5;
const SS_THROW_VY         = -300;
const SS_THROW_VX_MAG     = 200;                          // sign randomized per throw
const SS_TARGET_LADDER_IX = 5;                            // ladders[5] = P4 → TOP
const SS_HEIGHT           = 64;                           // 2x render scale, matches helper standard
const SS_GRAB_X_RANGE     = 40;                           // antifa within ±40 of ladder[5] cx triggers grab
const ss = {
  active: false,
  fadeAlpha: 0,
  fadeOutTimer: 0,
  units: [
    { x: 0, y: 0, state: 'IDLE', stateT: 0, targetAntifa: null },
    { x: 0, y: 0, state: 'IDLE', stateT: 0, targetAntifa: null },
    { x: 0, y: 0, state: 'IDLE', stateT: 0, targetAntifa: null },
  ],
};

// K — initials entry sub-state of GAME_OVER. K-FIX-5 — trigger now `scoreMakesTop5(playerScore)`
// (replaces K's wasNewHigh OR wasFirstScore). UI renders ON TOP of the score breakdown.
// Submit on 3rd confirm pushes the entry into highScores and saves the array.
let   initialsEntryActive   = false;
let   initialsCursor        = 0;
const initialsLetters       = ['A', 'A', 'A'];
let   initialsConfirmedT    = 0;                          // post-submit "INITIALS SAVED" timer (s)
const INITIALS_CONFIRM_DURATION = 1.0;

// K-FIX-5 — leaderboard storage. Replaces K's single highScore + highScoreInitials pair.
// loadHighScores: read 'djt_high_scores' JSON array. Validate each entry (3-char A-Z+space
// initials, non-negative integer score). Sort descending, slice to top 5. On miss/parse error,
// fall back to migrateLegacyOrEmpty.
function loadHighScores() {
  try {
    const raw = localStorage.getItem(HIGH_SCORES_KEY);
    if (raw == null) return migrateLegacyOrEmpty();
    const arr = JSON.parse(raw);
    if (!Array.isArray(arr)) return migrateLegacyOrEmpty();
    const valid = arr.filter(e =>
      e && typeof e.initials === 'string' &&
      /^[A-Z ]{3}$/.test(e.initials) &&
      typeof e.score === 'number' && e.score >= 0
    );
    return valid.sort((a, b) => b.score - a.score).slice(0, LEADERBOARD_MAX);
  } catch (err) {
    return migrateLegacyOrEmpty();
  }
}

// K-FIX-5 — first-boot under leaderboard system: read the K-FIX-4-era single keys
// (djt_high_score + djt_high_score_initials) and bootstrap a 1-entry leaderboard if a legacy
// score exists. Old keys are LEFT IN PLACE (defensive — never delete user data). Subsequent
// boots read the new key and ignore the legacy ones.
function migrateLegacyOrEmpty() {
  try {
    const oldRaw = localStorage.getItem(HIGH_SCORE_KEY);
    if (oldRaw == null) return [];
    const oldScore = parseInt(oldRaw, 10);
    if (!isFinite(oldScore) || oldScore <= 0) return [];
    const oldInitialsRaw = localStorage.getItem(HIGH_SCORE_INITIALS_KEY);
    const initials = (typeof oldInitialsRaw === 'string' && /^[A-Z ]{3}$/.test(oldInitialsRaw))
      ? oldInitialsRaw
      : '   ';                                              // legacy J-save with no initials → 3 spaces (HUD trims)
    return [{ initials: initials, score: oldScore }];
  } catch (e) { return []; }
}

function saveHighScores(arr) {
  try {
    const trimmed = arr.slice(0, LEADERBOARD_MAX);
    localStorage.setItem(HIGH_SCORES_KEY, JSON.stringify(trimmed));
  } catch (e) {
    if (typeof console !== 'undefined') console.warn('saveHighScores failed:', e);
  }
}

// K-FIX-5 — convenience accessors. Used by HUD render + GAME_OVER overlay where Block J/K code
// previously read `highScore` / `highScoreInitials` directly. Single read site means future
// leaderboard schema changes don't ripple through the codebase.
function getTopScore()    { return highScores.length > 0 ? highScores[0].score    : 0;  }
function getTopInitials() { return highScores.length > 0 ? highScores[0].initials : ''; }

// K-FIX-5 — initials-entry trigger predicate. Score makes top 5 if the leaderboard isn't full
// OR the score beats the lowest entry. Empty signature guard: score must be > 0.
function scoreMakesTop5(score) {
  if (score <= 0) return false;
  if (highScores.length < LEADERBOARD_MAX) return true;
  return score > highScores[highScores.length - 1].score;
}

highScores = loadHighScores();

// ─────────────────────────────────────────────
//  L — DTJ YMCA DEATH DANCE
// ─────────────────────────────────────────────
// L1 — DTJ performs a 6-pose YMCA dance whenever the player loses a life or the game ends.
// Plays simultaneously with the player ragdoll+burst (Block J) and Antifa splat (K). DTJ stays
// on TOP, no gating. 200ms trigger delay after the capsule hit (lets the player ragdoll start
// first so the dance kicks in once the death is visually established).
//
// CYCLES — 1 if the player will respawn (lives > 1 at hit-time, since lives decrements at end
// of DEATH_REACTION); 2 if this is the last life (game-over). Cycle = 3.0s.
//
// SPEECH BUBBLE — Cycle 1: random pick of LOSER!/SAD!. Cycle 2 (game-over only): swap to
// 'GREATEST WIN EVER!'. Each bubble: hold 1.5s + fade 0.5s = 2.0s on screen (1.0s gap before
// cycle ends).
//
// AUDIO — 130 BPM YMCA-shaped descending arpeggio (E5, D5, C5, G4) on square+triangle oscillators
// detuned +7 cents. Loops while DANCING; clean stop on dance end.
//
// TAUNT GATE — Block M's planned gameplay-taunt system MUST check `dtjDanceState !== 'IDLE'`
// before firing a taunt. The dance owns DTJ's render slot exclusively while active.
const DTJ_DANCE_POSES = [
  { sprite: 'djt1', duration: 0.4 },     // 1: standing neutral, arms loose (intro)
  { sprite: 'djt6', duration: 1.0 },     // 2: right arm raised high (hero pose, the "Y") — held longest
  { sprite: 'djt2', duration: 0.4 },     // 3: strutting, arm across chest (swagger)
  { sprite: 'djt5', duration: 0.4 },     // 4: hands at tie, eyes closed laughing
  { sprite: 'djt3', duration: 0.4 },     // 5: hands clasped at chest, walking forward
  { sprite: 'djt4', duration: 0.4 },     // 6: striding with arms swinging out (finale)
];
const DTJ_DANCE_CYCLE_DURATION = 3.0;    // sum of pose durations; verified at boot below
const DTJ_DANCE_TRIGGER_DELAY  = 0.2;    // 200ms after hit before dance starts
let   dtjDanceState     = 'IDLE';        // 'IDLE' | 'DANCING'
let   dtjDanceT         = 0;             // elapsed time within the dance (0..totalDuration)
let   dtjDanceCycles    = 1;             // 1 (respawn) or 2 (game-over)
let   dtjDanceTrigger   = false;         // pending trigger flag set on capsule hit
let   dtjDanceTriggerT  = 0;             // countdown to dance start (s)

function getDtjDancePose(tWithinCycle) {
  let elapsed = 0;
  for (const pose of DTJ_DANCE_POSES) {
    if (tWithinCycle < elapsed + pose.duration) return pose.sprite;
    elapsed += pose.duration;
  }
  return DTJ_DANCE_POSES[DTJ_DANCE_POSES.length - 1].sprite;     // safety: end-of-cycle edge
}

// L — speech bubble state (single global at a time). M — generalized to drive BOTH dance
// bubbles (Block L) AND gameplay taunt bubbles (Block M). Per-bubble hold/fade durations live
// on the struct so each spawn picks its own timing.
//   text:  current bubble text
//   t:     elapsed time on screen
//   holdT: hold-at-full-alpha duration
//   fadeT: fade-out duration after hold
//   active: visibility flag
let bubble = { text: '', t: 0, holdT: 0, fadeT: 0, active: false };
const DTJ_DANCE_BUBBLE_HOLD = 1.5;
const DTJ_DANCE_BUBBLE_FADE = 0.5;
const DTJ_DANCE_BUBBLE_CYCLE1_TEXTS = ['LOSER!', 'SAD!'];
const DTJ_DANCE_BUBBLE_CYCLE2_TEXT  = 'GREATEST WIN EVER!';

// Generic spawn — used by both dance (1.5s + 0.5s) and taunt (1.0s + 0.5s) callers.
function spawnBubble(text, holdSec, fadeSec) {
  bubble.text = text;
  bubble.t = 0;
  bubble.holdT = holdSec;
  bubble.fadeT = fadeSec;
  bubble.active = true;
}

// Block L back-compat thin wrapper — dance callers continue to use spawnDanceBubble.
function spawnDanceBubble(text) {
  spawnBubble(text, DTJ_DANCE_BUBBLE_HOLD, DTJ_DANCE_BUBBLE_FADE);
}

function tickBubble(dt) {
  if (!bubble.active) return;
  bubble.t += dt;
  if (bubble.t >= bubble.holdT + bubble.fadeT) bubble.active = false;
}

function getBubbleAlpha() {
  if (!bubble.active) return 0;
  if (bubble.t < bubble.holdT) return 1;
  return Math.max(0, 1 - (bubble.t - bubble.holdT) / bubble.fadeT);
}

// M — interrupt the current bubble (used by Antifa spawn taunt to cancel-and-replace any
// in-progress regular taunt or dance bubble — though dance bubble cancel is unlikely since
// taunts are gated against dancing state).
function cancelBubble() {
  bubble.active = false;
  bubble.text = '';
}

// ─────────────────────────────────────────────
//  M — DTJ GAMEPLAY TAUNTS
// ─────────────────────────────────────────────
// DTJ taunts the player during gameplay via right-side speech bubbles (same component as
// Block L dance bubbles). Random pool of 8 phrases + 1 contextual phrase tied to Antifa spawn.
// Triggers on a randomized 8-15s timer AND on platform-reach events. Silent in M (audio
// added in Block N). Gated to GAMEPLAY-only + dance-not-active + bubble-not-active.
const TAUNT_POOL = [
  'CROOKED DEMS!',
  'WEAK! VERY WEAK!',
  'NASTY!',
  'WORST EVER!',
  'DISGRACEFUL!',
  'PATHETIC LOSERS!',
  'TOTALLY CORRUPT!',
  'DEMOCRATS HATE AMERICA!',
];
const ANTIFA_TAUNT = 'RADICAL LEFT MOB!';     // contextual — fires on Antifa spawn only, NOT in TAUNT_POOL
const TAUNT_INTERVAL_MIN = 8.0;
const TAUNT_INTERVAL_MAX = 15.0;
const TAUNT_HOLD = 1.0;
const TAUNT_FADE = 0.5;
let lastTauntIndex = -1;
let tauntTimer = TAUNT_INTERVAL_MIN + Math.random() * (TAUNT_INTERVAL_MAX - TAUNT_INTERVAL_MIN);

function pickTaunt() {
  // No-repeat-last from the general pool. Antifa contextual phrase doesn't participate.
  let idx;
  if (TAUNT_POOL.length <= 1) {
    idx = 0;
  } else {
    do {
      idx = Math.floor(Math.random() * TAUNT_POOL.length);
    } while (idx === lastTauntIndex);
  }
  lastTauntIndex = idx;
  return TAUNT_POOL[idx];
}

function fireTaunt(phrase) {
  spawnBubble(phrase, TAUNT_HOLD, TAUNT_FADE);
  playSfx_taunt();                                                // N — taunt SFX (was silent in M)
}

function resetTauntTimer() {
  tauntTimer = TAUNT_INTERVAL_MIN + Math.random() * (TAUNT_INTERVAL_MAX - TAUNT_INTERVAL_MIN);
}

// M — call on every platform reach (the existing platformsReached.add + +500 reach bonus
// scoring sites). Fires a random-pool taunt + resets the regular timer so the player doesn't
// get stacked bubbles.
function firePlatformReachTaunt() {
  if (state !== 'GAMEPLAY') return;
  if (dtjDanceState !== 'IDLE') return;
  if (bubble.active) return;                                      // don't stack bubbles
  fireTaunt(pickTaunt());
  resetTauntTimer();
}

// M — call on Antifa spawn (inside triggerHelperSpawn → spawnAntifaWave path). Cancels any
// in-progress bubble, fires the contextual ANTIFA_TAUNT, resets the regular timer.
function fireAntifaSpawnTaunt() {
  if (state !== 'GAMEPLAY') return;
  if (dtjDanceState !== 'IDLE') return;
  cancelBubble();                                                 // cancel-and-replace
  fireTaunt(ANTIFA_TAUNT);
  resetTauntTimer();
}

// M — taunt timer tick. Called from main loop top with a state guard. Only ticks during
// GAMEPLAY (not intros, not cutscenes, not death/game-over states), only when no dance is
// running, and only when no bubble is currently displayed (regular taunt waits its turn).
function tickTaunts(dt) {
  if (state !== 'GAMEPLAY') return;
  if (dtjDanceState !== 'IDLE') return;
  if (bubble.active) return;
  tauntTimer -= dt;
  if (tauntTimer <= 0) {
    fireTaunt(pickTaunt());
    resetTauntTimer();
  }
}

// ─────────────────────────────────────────────
//  L / N — AUDIO CONTEXT + CHANNELS + YMCA SYNTH
// ─────────────────────────────────────────────
// Web Audio is gated by user-gesture init. First user input on any state primes the context.
// Subsequent calls are idempotent. iOS Safari requires the context's resume() inside a touch
// handler too, otherwise it stays in 'suspended' state. ensureAudioContext() handles both.
//
// N — channel topology under the master gain:
//    master  (1.0 default, 0 when muted by audio toggle)
//      ├── bgmChannel   (1.0 normal, 0.5 during dance ducking, smooth 200ms ramps)
//      ├── sfxChannel   (1.0 always)
//      └── synthChannel (1.0 always — used by Block L's YMCA dance synth, NOT ducked
//                        because YMCA is the focal audio while the player ragdolls)
// All play* functions guard on `audioContext && audioOn` — when toggled off, master.gain=0
// silences output but BGM keeps scheduling so unmute resumes from current position.
let audioContext   = null;
let masterChannel  = null;
let bgmChannel     = null;
let sfxChannel     = null;
let synthChannel   = null;
let audioOn        = true;             // boot default; loaded from localStorage below
// N-FIX-3 — bumped key from 'djt_audio_on' to 'djt_audio_on_v2'. Old key may be stuck at
// 'false' for any user who pressed M during N-FIX-2 (or an earlier deploy where audio was
// suspect), which sets masterChannel.gain.value=0 and silences EVERYTHING including the
// new BGM rotation, intro music cues, and Nessun Dorma. Bumping the key forces a one-time
// fresh boot so audioOn defaults to true; user can re-mute with M if they want.
const AUDIO_ON_KEY = 'djt_audio_on_v2';

// Boot — read persisted toggle state. try/catch wraps Safari private mode.
try {
  const stored = localStorage.getItem(AUDIO_ON_KEY);
  if (stored === 'false') audioOn = false;
} catch (e) { /* default true */ }

function ensureAudioContext() {
  if (!audioContext) {
    try {
      const Ctor = window.AudioContext || window.webkitAudioContext;
      if (Ctor) audioContext = new Ctor();
    } catch (e) {
      audioContext = null;                                       // fallback: silent game
      return;
    }
    if (audioContext) {
      // N — build channel graph once on first init.
      try {
        masterChannel = audioContext.createGain();
        bgmChannel    = audioContext.createGain();
        sfxChannel    = audioContext.createGain();
        synthChannel  = audioContext.createGain();
        masterChannel.gain.value = audioOn ? 1.0 : 0.0;
        bgmChannel.gain.value    = 1.0;
        sfxChannel.gain.value    = 1.0;
        synthChannel.gain.value  = 1.0;
        bgmChannel.connect(masterChannel);
        sfxChannel.connect(masterChannel);
        synthChannel.connect(masterChannel);
        masterChannel.connect(audioContext.destination);
      } catch (e) {
        // Channel graph build failed; fall back to direct destination routing in legacy code.
        masterChannel = bgmChannel = sfxChannel = synthChannel = null;
      }
    }
  }
  // N-FIX-6 4.5 — iOS Safari has stricter Web Audio rules than desktop Chrome:
  //   1. AudioContext must be CREATED inside a user-gesture handler (handled by callers).
  //   2. resume() must be CALLED synchronously inside that same handler (this block).
  //   3. resume() returns a Promise on modern browsers; ignoring it can leak rejections
  //      and on some iOS versions the context never actually transitions to 'running'.
  //   4. Some iOS versions need a "warm-up" silent oscillator scheduled inside the gesture
  //      before subsequent scheduled audio is audible. The 0-volume blip below handles this.
  // Desktop Chrome is forgiving on points 2-4. iOS Safari is not — without this block the
  // context stays 'suspended' (or 'running' but mute) and YouTube works while our app is silent.
  if (audioContext && audioContext.state === 'suspended') {
    try {
      const result = audioContext.resume();
      if (result && typeof result.then === 'function') {
        // Modern browsers — Promise is returned. Swallow rejection so it doesn't surface
        // as an Unhandled Promise Rejection in DevTools.
        result.catch(() => { /* will retry on next gesture */ });
      }
    } catch (e) { /* old-style synchronous resume threw — ignore, retry next gesture */ }
  }
  // iOS Safari warm-up blips — N-FIX-8 layered fix. Some iOS versions need TWO warm-ups
  // to fully unlock Web Audio: blip 1 is a silent default-frequency oscillator (wakes the
  // graph), blip 2 is an explicit 440Hz oscillator at gain=0 (older iOS versions only
  // accept the audio graph as "primed" after a real frequency has been scheduled). Both
  // gated on state === 'running' so we only fire when the context is ready.
  if (audioContext && audioContext.state === 'running' && masterChannel) {
    try {
      // Blip 1 — silent oscillator (wakes the audio graph on most iOS versions).
      const blip1     = audioContext.createOscillator();
      const blip1Gain = audioContext.createGain();
      blip1Gain.gain.value = 0;
      blip1.connect(blip1Gain);
      blip1Gain.connect(masterChannel);
      blip1.start(audioContext.currentTime);
      blip1.stop(audioContext.currentTime + 0.01);
      // Blip 2 — 440Hz at gain=0 (older iOS versions only treat the graph as primed after
      // an explicit frequency has been scheduled).
      const blip2     = audioContext.createOscillator();
      blip2.frequency.value = 440;
      const blip2Gain = audioContext.createGain();
      blip2Gain.gain.value = 0;
      blip2.connect(blip2Gain);
      blip2Gain.connect(masterChannel);
      blip2.start(audioContext.currentTime);
      blip2.stop(audioContext.currentTime + 0.05);
      // N-FIX-8 iOS DIAG (post-blip).
      if (typeof console !== 'undefined') {
        console.log('AUDIO IOS DIAG: warm-up blips scheduled, audioContext.currentTime =',
          audioContext.currentTime);
      }
    } catch (e) { /* blip failed; main audio path still works on most browsers */ }
  }
  // N-FIX-8 — temporary iOS audio diagnostic. Removed in N-FIX-9 once iPhone audio is
  // confirmed working in field. Logs every ensureAudioContext call so Brian can see
  // (via Mac Safari Web Inspector OR eruda) whether the context state transitions to
  // 'running' on iPhone Safari.
  if (typeof console !== 'undefined') {
    console.log('AUDIO IOS DIAG: ensureAudioContext called',
      'context state =', audioContext ? audioContext.state : 'null',
      'time =', audioContext ? audioContext.currentTime : 'null',
      'master gain =', masterChannel ? masterChannel.gain.value : 'null');
  }
}

// N — toggle master audio. Idempotent state mutation + localStorage persist + channel apply.
// Bound to M-key on PC + speaker icon tap on mobile. Works during GAMEPLAY and PAUSED only.
function toggleAudio() {
  audioOn = !audioOn;
  if (masterChannel) masterChannel.gain.value = audioOn ? 1.0 : 0.0;
  try { localStorage.setItem(AUDIO_ON_KEY, String(audioOn)); } catch (e) {}
  if (audioOn) playSfx_pauseToggle();                            // feedback chirp on enable
  // N-FIX-9 diagnostic — TEMPORARY. Logs the audio state right after toggle so Brian can
  // compare against PRESSED-KEY DIAG. Hypothesis: M-toggle's playSfx_pauseToggle scheduling
  // an audible (gain>0) oscillator unlocks Chrome's audio output, while ensureAudioContext's
  // silent (gain=0) warm-up blip doesn't count. Removed in N-FIX-10.
  if (typeof console !== 'undefined') {
    console.log('TOGGLE-AUDIO DIAG:',
      'audioContextState =', audioContext ? audioContext.state : 'null',
      'masterGain =', masterChannel ? masterChannel.gain.value : 'null',
      'audioOn =', audioOn,
      'currentTime =', audioContext ? audioContext.currentTime : 'null');
  }
}

// L — YMCA synth. 130 BPM descending arpeggio (E5, D5, C5, G4) per locked spec. Each note:
// square + triangle oscillators, triangle detuned +7 cents for chorus. Per-note ADSR envelope
// (attack 5ms, decay 80ms to sustain 0.3, release 50ms). Notes scheduled via setInterval at
// the per-note duration (60/130 ≈ 0.4615s). startYmca() idempotent; stopYmca() clears the
// scheduler; running notes finish their tail naturally via the envelope.
const YMCA_MELODY    = [659.25, 587.33, 523.25, 392.00];         // E5, D5, C5, G4
const YMCA_BPM       = 130;
const YMCA_NOTE_DUR  = 60 / YMCA_BPM;                            // seconds per note
const YMCA_DETUNE    = 1.00405;                                  // +7 cents = 2^(7/1200)
let   ymcaSchedulerId = null;
let   ymcaNoteIdx     = 0;

function playYmcaNote(freq) {
  if (!audioContext) return;
  const now = audioContext.currentTime;
  const osc1 = audioContext.createOscillator();
  osc1.type = 'square';
  osc1.frequency.setValueAtTime(freq, now);
  const osc2 = audioContext.createOscillator();
  osc2.type = 'triangle';
  osc2.frequency.setValueAtTime(freq * YMCA_DETUNE, now);
  const gain = audioContext.createGain();
  // ADSR: attack 5ms → 0.08, decay 80ms → 0.024 (sustain 0.3 of peak), release 50ms → 0.
  const peak = 0.08;
  const sustain = peak * 0.3;
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(peak, now + 0.005);
  gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, sustain), now + 0.085);
  gain.gain.setValueAtTime(sustain, now + 0.32);
  gain.gain.linearRampToValueAtTime(0.0001, now + 0.37);
  osc1.connect(gain);
  osc2.connect(gain);
  // N — route through synthChannel so master toggle silences the YMCA synth (was direct to
  // destination in Block L, which would have bypassed the toggle). Fallback to destination
  // if channel graph failed to init.
  gain.connect(synthChannel || audioContext.destination);
  osc1.start(now);
  osc2.start(now);
  osc1.stop(now + 0.4);
  osc2.stop(now + 0.4);
}

function startYmca() {
  if (!audioContext) return;
  if (ymcaSchedulerId !== null) return;                          // already playing
  ymcaNoteIdx = 0;
  playYmcaNote(YMCA_MELODY[ymcaNoteIdx]);
  ymcaNoteIdx = (ymcaNoteIdx + 1) % YMCA_MELODY.length;
  ymcaSchedulerId = setInterval(() => {
    playYmcaNote(YMCA_MELODY[ymcaNoteIdx]);
    ymcaNoteIdx = (ymcaNoteIdx + 1) % YMCA_MELODY.length;
  }, YMCA_NOTE_DUR * 1000);
}

function stopYmca() {
  if (ymcaSchedulerId !== null) {
    clearInterval(ymcaSchedulerId);
    ymcaSchedulerId = null;
  }
}

// ─────────────────────────────────────────────
//  N — SFX LIBRARY (~25 effects, all synth)
// ─────────────────────────────────────────────
// Each playSfx_* function creates oscillators on-demand, sets envelope, plays once, and
// auto-disconnects via osc.stop(t+dur). No asset loading. All routed through sfxChannel so
// master toggle silences them. Audio-off / no-context: every function early-returns no-op.

// Generic envelope helper. attack 5ms peak → exp decay to near-zero by durSec. Caller picks
// frequency, oscillator type, peak gain, total duration. Used by ~half the SFX.
function _sfxNote(freq, oscType, durSec, gainPeak, channel) {
  if (!audioContext || !audioOn) return;
  const ch = channel || sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  osc.type = oscType;
  osc.frequency.setValueAtTime(freq, t);
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(0.01, durSec));
  osc.connect(g);
  g.connect(ch);
  osc.start(t);
  osc.stop(t + durSec + 0.05);
}

// Frequency sweep — linear ramp from f0→f1 over durSec.
function _sfxSweep(f0, f1, oscType, durSec, gainPeak) {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  const osc = audioContext.createOscillator();
  osc.type = oscType;
  osc.frequency.setValueAtTime(f0, t);
  osc.frequency.linearRampToValueAtTime(f1, t + durSec);
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + durSec);
  osc.connect(g); g.connect(ch);
  osc.start(t); osc.stop(t + durSec + 0.05);
}

// Filtered noise burst. Used for thuds, splashes, glass, etc.
function _sfxNoise(durSec, filterType, filterFreq, gainPeak) {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  const bufferSize = Math.max(1, Math.floor(audioContext.sampleRate * durSec));
  const buffer = audioContext.createBuffer(1, bufferSize, audioContext.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
  const src = audioContext.createBufferSource();
  src.buffer = buffer;
  const filter = audioContext.createBiquadFilter();
  filter.type = filterType || 'highpass';
  filter.frequency.value = filterFreq || 1000;
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + durSec);
  src.connect(filter); filter.connect(g); g.connect(ch);
  src.start(t); src.stop(t + durSec + 0.05);
}

// Arpeggio — sequence of notes at startTime + i*spacing.
function _sfxArpeggio(freqs, oscType, noteSpacing, noteDur, gainPeak) {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t0 = audioContext.currentTime;
  for (let i = 0; i < freqs.length; i++) {
    const t = t0 + i * noteSpacing;
    const osc = audioContext.createOscillator();
    osc.type = oscType;
    osc.frequency.setValueAtTime(freqs[i], t);
    const g = audioContext.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(gainPeak, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + noteDur);
    osc.connect(g); g.connect(ch);
    osc.start(t); osc.stop(t + noteDur + 0.05);
  }
}

// ─────────────────────────────────────────────
//  N-FIX-2 — BACKGROUND MUSIC (3-song Trump rally rotation)
// ─────────────────────────────────────────────
// Three-song rotation cycles forever during GAMEPLAY. Each song is fully scheduled at its
// start time via Web Audio's setValueAtTime/linearRampToValueAtTime — no per-bar dispatch.
//   1. 'God Bless the U.S.A.' (Lee Greenwood, 1984) — D major, 96 BPM 3/4 waltz
//   2. 'We Are the Champions' (Queen, 1977)        — F major, 64 BPM 4/4 anthem
//   3. 'It's a Man's World' (James Brown, 1966)    — D minor, 70 BPM 6/8 slow funk
// Each song ~30s. Songs play in fixed order, no shuffle. After song 3 completes, loop to song 1.
//
// LAZY-START (N-FIX-2 BUG #1 fix): tickBGM auto-starts BGM whenever state==='GAMEPLAY' and
// audioContext is available. Both intro paths (auto-advance INTRO_SHATTER→GAMEPLAY at L5122
// where audioContext is null pre-gesture, and skipToGame which never called startBGM) now
// auto-recover via this lazy-start.
//
// CUTSCENE BGM HANDOFF (N-FIX-2): BGM stops on CUTSCENE_FADE_IN entry; Nessun Dorma synth
// plays through CUTSCENE_PHASE3 + CUTSCENE_BETWEEN; BGM rotation resumes (from bgmCurrentSongIdx
// where it left off) when player taps to continue from BETWEEN.

const BGM_LOOKAHEAD = 0.5;
let   bgmActive          = false;
let   bgmCurrentSongIdx  = 0;                                    // 0=greenwood, 1=queen, 2=brown
let   bgmSongStartTime   = 0;                                    // audioContext.currentTime when current song started
let   bgmDuckLevel       = 1.0;                                  // 1.0 normal, 0.5 ducked
// N-FIX-3 — declared alongside above for diagnostic-console-query friendliness. The shipped
// N-FIX-2 scheduler is per-song (entire song scheduled at startBGMSong time), so these two
// are not on the hot path. Kept as live state so `typeof bgmStartCurrentTime` returns
// 'number' and `bgmScheduledUntil` returns a numeric value during gameplay. Both mirror
// bgmSongStartTime + BGM_SONG_DUR[idx] (i.e. when the current song's last note ends).
let   bgmStartCurrentTime = 0;
let   bgmScheduledUntil   = 0;

// N-FIX-2 — schedule a single song's notes starting at t0 on the bgmChannel. Each song's
// scheduleFn handles its own tempo, time signature, melody, bass, percussion. Notes are
// scheduled all at once via Web Audio absolute timestamps.
function startBGMSong(songIdx, t0) {
  if (!audioContext || !bgmChannel) return;
  bgmCurrentSongIdx = ((songIdx % 3) + 3) % 3;                   // wrap
  bgmSongStartTime  = t0;
  // N-FIX-3 — mirror state for diagnostic console queries. bgmStartCurrentTime tracks the
  // last song-start absolute time (== bgmSongStartTime); bgmScheduledUntil tracks the
  // moment the current song's last note finishes. Both are read-only mirrors; the per-song
  // scheduler doesn't depend on them.
  bgmStartCurrentTime = t0;
  bgmScheduledUntil   = t0 + BGM_SONG_DUR[bgmCurrentSongIdx];
  if      (bgmCurrentSongIdx === 0) _bgmScheduleGreenwood(t0);
  else if (bgmCurrentSongIdx === 1) _bgmScheduleQueen(t0);
  else                              _bgmScheduleBrown(t0);
}

// Per-song durations (seconds). Constants here so tickBGM can compute song-end without
// re-running the full schedule logic.
const BGM_SONG_DUR = [30, 30, 30];

// SONG 1 — "God Bless the U.S.A." (Lee Greenwood, D major 3/4, 96 BPM)
// Hook: "And I'm proud to be an American". Square melody + triangle bass + soft snare on beat 2.
// 16 bars × 1.875s = 30s.
function _bgmScheduleGreenwood(t0) {
  const beat = 60 / 96;                                          // 0.625s
  const bar  = 3 * beat;                                         // 1.875s
  // D major: D2=73.42, A2=110.00, D4=293.66, F#4=369.99, G4=392.00, A4=440.00, B4=493.88, D5=587.33
  // Hook melody pattern (4 bars), repeated 4× across 16 bars with light variation.
  const HOOK = [
    // bar a: A4 (1 beat) - D5 (2 beats)
    {b:0, t:0,        f:440.00, d:beat},
    {b:0, t:beat,     f:587.33, d:beat*2},
    // bar b: F#4 - A4 - B4
    {b:1, t:0,        f:369.99, d:beat},
    {b:1, t:beat,     f:440.00, d:beat},
    {b:1, t:beat*2,   f:493.88, d:beat},
    // bar c: A4 - F#4 - E4
    {b:2, t:0,        f:440.00, d:beat},
    {b:2, t:beat,     f:369.99, d:beat},
    {b:2, t:beat*2,   f:329.63, d:beat},
    // bar d: D4 sustained
    {b:3, t:0,        f:293.66, d:bar},
  ];
  for (let cycle = 0; cycle < 4; cycle++) {
    const cycleT = t0 + cycle * 4 * bar;
    for (const n of HOOK) {
      _bgmScheduleNoteAt(cycleT + n.b * bar + n.t, n.f, n.d, 'square', bgmChannel, 0.05);
    }
  }
  // Bass — D2 / A2 alternating per bar (waltz feel, 1 note per bar held 3 beats)
  for (let bIdx = 0; bIdx < 16; bIdx++) {
    const f = (bIdx % 2 === 0) ? 73.42 : 110.00;
    _bgmScheduleNoteAt(t0 + bIdx * bar, f, bar, 'triangle', bgmChannel, 0.06);
  }
  // Soft snare on beat 2 of every bar (3/4 → strong-weak-weak; snare on 2 = comping)
  for (let bIdx = 0; bIdx < 16; bIdx++) {
    _bgmScheduleSnareBurst(t0 + bIdx * bar + beat, 0.04, 0.04);
  }
}

// SONG 2 — "We Are the Champions" (Queen, F major slow 4/4, 64 BPM, anthemic)
// Hook: "We are the champions, my friends". Triangle melody + square bass pads. No snare.
// 8 bars × 3.75s = 30s.
function _bgmScheduleQueen(t0) {
  const beat = 60 / 64;                                          // 0.9375s
  const bar  = 4 * beat;                                         // 3.75s
  // F major: F2=87.31, C3=130.81, F3=174.61, A3=220.00, Bb3=233.08, C4=261.63, D4=293.66,
  // E4=329.63, F4=349.23, A4=440.00, Bb4=466.16, C5=523.25
  // Hook: F - A - C - F - E - D - C - Bb - C - C (8-bar phrase, triangle, sustained)
  const HOOK = [
    {b:0, t:0,        f:349.23, d:beat*2},   // F4
    {b:0, t:beat*2,   f:440.00, d:beat*2},   // A4
    {b:1, t:0,        f:523.25, d:beat*2},   // C5
    {b:1, t:beat*2,   f:349.23, d:beat*2},   // F4
    {b:2, t:0,        f:329.63, d:beat*2},   // E4
    {b:2, t:beat*2,   f:293.66, d:beat*2},   // D4
    {b:3, t:0,        f:261.63, d:beat*2},   // C4
    {b:3, t:beat*2,   f:233.08, d:beat*2},   // Bb3
    {b:4, t:0,        f:261.63, d:beat*4},   // C4 sustained
    {b:5, t:0,        f:261.63, d:beat*4},   // C4 sustained
    {b:6, t:0,        f:349.23, d:beat*2},   // F4
    {b:6, t:beat*2,   f:329.63, d:beat*2},   // E4
    {b:7, t:0,        f:349.23, d:beat*4},   // F4 final tonic
  ];
  for (const n of HOOK) {
    _bgmScheduleNoteAt(t0 + n.b * bar + n.t, n.f, n.d, 'triangle', bgmChannel, 0.06);
  }
  // Sustained bass pads — F2 / Bb2 / C3 / F2 cycling (I - IV - V - I)
  const BASS_PROG = [87.31, 116.54, 130.81, 87.31, 87.31, 116.54, 130.81, 87.31];
  for (let bIdx = 0; bIdx < 8; bIdx++) {
    _bgmScheduleNoteAt(t0 + bIdx * bar, BASS_PROG[bIdx], bar, 'square', bgmChannel, 0.05);
  }
}

// SONG 3 — "It's a Man's World" (James Brown, D minor 6/8 slow funk, 70 BPM)
// Hook: descending bass riff D-C-Bb-A. Horn-stab synth + filtered noise hi-hat.
// 16 bars × ~1.71s = ~27.4s (rounded to 30s with 2.6s outro tail).
function _bgmScheduleBrown(t0) {
  const beat = 60 / 70;                                          // 0.857s (in 6/8, this is dotted-quarter feel)
  const bar  = 2 * beat;                                         // 1.714s (2 dotted-quarters per bar in 6/8)
  // D minor: D2=73.42, A2=110.00, Bb2=116.54, C3=130.81, D3=146.83, F3=174.61, A3=220.00,
  // Bb3=233.08, C4=261.63, D4=293.66, F4=349.23, A4=440.00
  // Bass riff: D-C-Bb-A descending (4 bars), repeats × 4 = 16 bars.
  const BASS_RIFF = [73.42, 130.81, 116.54, 110.00];
  for (let bIdx = 0; bIdx < 16; bIdx++) {
    const f = BASS_RIFF[bIdx % 4];
    _bgmScheduleNoteAt(t0 + bIdx * bar, f, bar, 'triangle', bgmChannel, 0.07);
  }
  // Horn stabs on beat 1 of every other bar — square wave hits at A3 + C4 (minor 3rd interval)
  for (let bIdx = 0; bIdx < 16; bIdx += 2) {
    _bgmScheduleNoteAt(t0 + bIdx * bar, 220.00, beat * 0.5, 'square', bgmChannel, 0.05);
    _bgmScheduleNoteAt(t0 + bIdx * bar, 261.63, beat * 0.5, 'square', bgmChannel, 0.04);
    // Noise burst with the stab for impact
    _bgmScheduleSnareBurst(t0 + bIdx * bar, beat * 0.3, 0.03);
  }
  // Hi-hat shuffle on every beat of every bar
  for (let bIdx = 0; bIdx < 16; bIdx++) {
    for (let b = 0; b < 2; b++) {
      _bgmScheduleSnareBurst(t0 + bIdx * bar + b * beat, 0.04, 0.025);
    }
  }
}

// N-FIX-3 — diagnostic-friendly aliases. The shipped functions are named
// _bgmScheduleGreenwood/Queen/Brown (per-song full schedule). N-FIX-3 spec referred to
// them as _bgmGreenwoodBar/_bgmQueenBar/_bgmBrownBar (per-bar dispatch from an earlier
// design). Both names point at the same function so console queries and any future
// per-bar callers both resolve. BGM_SONGS array provided for the same reason — Brian's
// spec referred to it; the live dispatcher uses a switch but these are equivalent.
const _bgmGreenwoodBar = _bgmScheduleGreenwood;
const _bgmQueenBar     = _bgmScheduleQueen;
const _bgmBrownBar     = _bgmScheduleBrown;
const BGM_SONGS = [
  { name: 'Greenwood',  scheduleFn: _bgmScheduleGreenwood, durSec: BGM_SONG_DUR[0] },
  { name: 'Queen',      scheduleFn: _bgmScheduleQueen,     durSec: BGM_SONG_DUR[1] },
  { name: 'JamesBrown', scheduleFn: _bgmScheduleBrown,     durSec: BGM_SONG_DUR[2] },
];

// Snare-like noise burst helper (extracted from the old _bgmScheduleBar). Used by all songs.
function _bgmScheduleSnareBurst(t, dur, peak) {
  if (!audioContext || !bgmChannel) return;
  if (t < audioContext.currentTime - 0.1) return;                // skip past-time
  const bs = Math.max(1, Math.floor(audioContext.sampleRate * dur));
  const buf = audioContext.createBuffer(1, bs, audioContext.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bs; i++) data[i] = Math.random() * 2 - 1;
  const src = audioContext.createBufferSource();
  src.buffer = buf;
  const f = audioContext.createBiquadFilter();
  f.type = 'highpass'; f.frequency.value = 4000;
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.003);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(f); f.connect(g); g.connect(bgmChannel);
  src.start(t); src.stop(t + dur + 0.05);
}

function _bgmScheduleNoteAt(t, freq, durSec, oscType, channel, peak) {
  const osc = audioContext.createOscillator();
  osc.type = oscType;
  osc.frequency.setValueAtTime(freq, t);
  const g = audioContext.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.005);
  g.gain.setValueAtTime(peak * 0.3, t + 0.085);
  g.gain.linearRampToValueAtTime(0.0001, t + Math.max(0.1, durSec - 0.05));
  osc.connect(g);
  g.connect(channel);
  osc.start(t);
  osc.stop(t + durSec + 0.05);
}

// ─────────────────────────────────────────────
//  N-FIX-7 — STATE-DRIVEN MUSIC ARCHITECTURE
// ─────────────────────────────────────────────
// Replaces the timer-based start/stop/tick model from N-FIX-2 through N-FIX-6. Core principle:
// at every frame, exactly ONE music track should be playing on bgmChannel, determined by the
// current game state. computeDesiredMusic returns the answer; transitionToMusic owns the swap.
// No setTimeouts. No parallel timers. State is truth.
//
// Old code paths replaced:
//   - startBGM / stopBGM           → handled by state machine
//   - startMachoMan / stopMachoMan → handled by state machine (deleted)
//   - tickBGM lazy-start branch    → handled by state machine (every frame is a "lazy retry")
//   - escalator→stairs setTimeout  → state changes drive music, no manual swap
//   - playEscalatorMusic deferred-retry → every tick re-evaluates, no need
//
// Music change is always: cancel pending ramps → 100ms fade-out → 200ms fade-in to 1.0 →
// schedule new music's notes. _bgmSchedule* functions still own the per-song scheduling.
const MUSIC_STATES = {
  SILENT:        'silent',
  ESCALATOR:     'escalator',
  AVE_MARIA:     'aveMaria',
  NESSUN_DORMA:  'nessunDorma',
  MACHO_MAN:     'machoMan',
  BGM_ROTATION:  'bgmRotation',
};
let currentMusic = MUSIC_STATES.SILENT;

// Map state → desired music. Single source of truth. tickBGM compares against currentMusic
// and calls transitionToMusic on mismatch.
function computeDesiredMusic() {
  // Cutscenes — Nessun Dorma plays through PHASE3 / SCORE / BETWEEN; silent during the
  // earlier black/dialogue phases. (Spec listed SCORE as silent but the operatic synth
  // tail across SCORE→BETWEEN is what was originally designed; preserving that here.)
  if (state === 'CUTSCENE_PHASE3' || state === 'CUTSCENE_SCORE' || state === 'CUTSCENE_BETWEEN') {
    return MUSIC_STATES.NESSUN_DORMA;
  }
  if (state === 'CUTSCENE_FADE_IN' || state === 'CUTSCENE_PHASE1') {
    return MUSIC_STATES.SILENT;
  }
  // WIN_FREEZE / GAME_OVER / GAMEOVER_PENDING — silent. Death-dance (DEATH_REACTION) — silent.
  if (state === 'WIN_FREEZE' || state === 'GAME_OVER' || state === 'GAMEOVER_PENDING' ||
      state === 'DEATH_REACTION') {
    return MUSIC_STATES.SILENT;
  }
  // Intro chain. ESCALATOR music plays under INTRO_BLACK / INTRO_TITLE / INTRO_ESCALATOR.
  // INTRO_STAIRS swaps to AVE_MARIA. SHATTER and TAUNT are silent (crash SFX dominates).
  if (state === 'INTRO_BLACK' || state === 'INTRO_TITLE' || state === 'INTRO_ESCALATOR') {
    return MUSIC_STATES.ESCALATOR;
  }
  if (state === 'INTRO_STAIRS') {
    return MUSIC_STATES.AVE_MARIA;
  }
  if (state === 'INTRO_SHATTER' || state === 'INTRO_TAUNT') {
    return MUSIC_STATES.SILENT;
  }
  // GAMEPLAY — death-dance keeps BGM silent until the dance ends (bgmDeathMuted gates this).
  // Antifa wave overrides BGM rotation with Macho Man.
  if (state === 'GAMEPLAY') {
    if (bgmDeathMuted) return MUSIC_STATES.SILENT;
    let antifaCount = 0;
    if (typeof helpers !== 'undefined') {
      for (const h of helpers) { if (h.type === 'ANTIFA') { antifaCount++; break; } }
    }
    if (antifaCount > 0) return MUSIC_STATES.MACHO_MAN;
    return MUSIC_STATES.BGM_ROTATION;
  }
  // PAUSED — preserve whatever was playing (no swap during pause).
  if (state === 'PAUSED') {
    return currentMusic;
  }
  return MUSIC_STATES.SILENT;
}

// Apply the music change. Cancels pending ramps, fades the channel out (100ms), updates
// state, fades the channel back in (200ms) for non-silent destinations, and schedules the
// new music's notes via the existing _bgmSchedule* helpers.
function transitionToMusic(newMusic) {
  if (newMusic === currentMusic) return;
  if (!audioContext || !bgmChannel) return;       // bail; next tick will retry once audio infra is ready
  const t = audioContext.currentTime;
  // Cancel any pending duck/unduck/fade ramps and snap to current value, then fade out.
  bgmChannel.gain.cancelScheduledValues(t);
  bgmChannel.gain.setValueAtTime(bgmChannel.gain.value, t);
  bgmChannel.gain.linearRampToValueAtTime(0.0001, t + 0.1);
  // Halt all per-song scheduling flags so the new music can re-schedule cleanly.
  bgmActive = false;
  machoManActive = false;
  escalatorMusicScheduled = false;
  stairsMusicScheduled    = false;
  nessunDormaScheduled    = false;
  const oldMusic = currentMusic;
  currentMusic = newMusic;
  if (newMusic === MUSIC_STATES.SILENT) return;
  // Schedule fade-in for non-silent destinations (200ms ramp from current 0 to 1.0).
  bgmChannel.gain.linearRampToValueAtTime(1.0, t + 0.2);
  // Dispatch new music. Each schedule call handles its own note layout.
  if (newMusic === MUSIC_STATES.ESCALATOR) {
    playEscalatorMusic();
  } else if (newMusic === MUSIC_STATES.AVE_MARIA) {
    playStairsMusic();
  } else if (newMusic === MUSIC_STATES.NESSUN_DORMA) {
    playNessunDorma();
  } else if (newMusic === MUSIC_STATES.MACHO_MAN) {
    // Save BGM rotation position only when transitioning FROM rotation (otherwise the
    // saved position is stale from a prior session).
    if (oldMusic === MUSIC_STATES.BGM_ROTATION) {
      bgmSavedSongIdx = bgmCurrentSongIdx;
      bgmSavedElapsed = audioContext.currentTime - bgmSongStartTime;
    }
    machoManActive = true;
    machoManLoopT  = audioContext.currentTime;
    _bgmScheduleMachoMan(machoManLoopT);
  } else if (newMusic === MUSIC_STATES.BGM_ROTATION) {
    // Resume from saved song idx if returning from Macho Man; otherwise start from current.
    const idx = (oldMusic === MUSIC_STATES.MACHO_MAN) ? bgmSavedSongIdx : bgmCurrentSongIdx;
    bgmActive = true;
    startBGMSong(idx, audioContext.currentTime);
  }
}

// State-machine-driven scheduler. Every frame: ask what music SHOULD play, swap if needed,
// then handle loop boundaries for songs that loop (Macho Man = 16s, BGM rotation = per-song).
function tickBGM() {
  if (!audioContext || !bgmChannel) return;
  if (state === 'PAUSED') return;
  // N-FIX-8 — temporary iOS audio diagnostic. One-shot log on first tickBGM call after
  // audio infra is ready. Confirms tickBGM is reaching the state machine + which music
  // it picks first. Removed in N-FIX-9.
  if (typeof window !== 'undefined' && !window.__ios_diag_tick_logged) {
    if (typeof console !== 'undefined') {
      console.log('AUDIO IOS DIAG: tickBGM running',
        'state =', state, 'currentMusic =', currentMusic,
        'audioContext.state =', audioContext.state);
    }
    window.__ios_diag_tick_logged = true;
  }
  const desired = computeDesiredMusic();
  if (desired !== currentMusic) {
    transitionToMusic(desired);
  }
  // Loop-boundary handling — re-schedule the next block when the current one is about to end.
  if (currentMusic === MUSIC_STATES.MACHO_MAN) {
    const elapsedMM = audioContext.currentTime - machoManLoopT;
    if (elapsedMM >= MACHO_MAN_DUR - BGM_LOOKAHEAD && elapsedMM < MACHO_MAN_DUR) {
      const nextStart = machoManLoopT + MACHO_MAN_DUR;
      _bgmScheduleMachoMan(nextStart);
      machoManLoopT = nextStart;
    }
  } else if (currentMusic === MUSIC_STATES.BGM_ROTATION) {
    const elapsed = audioContext.currentTime - bgmSongStartTime;
    const songDur = BGM_SONG_DUR[bgmCurrentSongIdx];
    if (elapsed >= songDur - BGM_LOOKAHEAD && elapsed < songDur) {
      const nextIdx = (bgmCurrentSongIdx + 1) % 3;
      startBGMSong(nextIdx, bgmSongStartTime + songDur);
    }
  }
}

// ─────────────────────────────────────────────
//  N-FIX-5 — MACHO MAN (Village People) Antifa-wave music
// ─────────────────────────────────────────────
// Replaces BGM rotation while an Antifa wave is active. F major, 120 BPM 4/4, 8-bar loop
// (16s). Square melody (brass-like) + triangle bass (root + fifth) + filtered-noise hi-hat
// shuffle on every 8th. Crossfade in/out on start/stop. BGM rotation position is saved on
// start so it resumes from the same point post-stop.
const MACHO_MAN_DUR = 16;                                 // 8 bars × 2.0s = 16s
let   machoManActive   = false;
let   machoManLoopT    = 0;                               // audioContext.currentTime when current 16-bar block started
let   bgmSavedSongIdx  = 0;
let   bgmSavedElapsed  = 0;

function _bgmScheduleMachoMan(t0) {
  if (!audioContext || !bgmChannel) return;
  const beat = 60 / 120;                                  // 0.5s
  const bar  = 4 * beat;                                  // 2.0s
  // F major: F2=87.31, C3=130.81, F3=174.61, A3=220.00, C4=261.63, F4=349.23, G4=392.00,
  //          A4=440.00, Bb4=466.16, C5=523.25, F5=698.46
  // Bass: F-C alternating root/fifth on every quarter (4 notes per bar, 8 bars × 4 = 32 notes)
  for (let bIdx = 0; bIdx < 8; bIdx++) {
    for (let b = 0; b < 4; b++) {
      const f = (b % 2 === 0) ? 87.31 : 130.81;            // F2 / C3
      _bgmScheduleNoteAt(t0 + bIdx * bar + b * beat, f, beat * 0.85, 'triangle', bgmChannel, 0.07);
    }
  }
  // "Macho! Macho! Man!" hook — fires on bars 0, 2, 4, 6 (every other bar). 5-note phrase:
  // F4 - F4 - A4 - C5 - F4(hold). Square wave, brass-stab feel.
  for (let bIdx = 0; bIdx < 8; bIdx += 2) {
    const cycleT = t0 + bIdx * bar;
    _bgmScheduleNoteAt(cycleT + 0.0,        349.23, beat * 0.4, 'square', bgmChannel, 0.09); // F4
    _bgmScheduleNoteAt(cycleT + beat * 0.5, 349.23, beat * 0.4, 'square', bgmChannel, 0.09); // F4
    _bgmScheduleNoteAt(cycleT + beat * 1.0, 440.00, beat * 0.4, 'square', bgmChannel, 0.10); // A4
    _bgmScheduleNoteAt(cycleT + beat * 1.5, 523.25, beat * 0.4, 'square', bgmChannel, 0.10); // C5
    _bgmScheduleNoteAt(cycleT + beat * 2.0, 349.23, beat * 1.5, 'square', bgmChannel, 0.08); // F4 hold
    _bgmScheduleNoteAt(cycleT + beat * 3.5, 523.25, beat * 0.3, 'square', bgmChannel, 0.10); // C5 stab on '4-and'
  }
  // Response melody — bars 1, 3, 5, 7. Descending C5-A4-G4-F4 (one note per beat).
  for (let bIdx = 1; bIdx < 8; bIdx += 2) {
    const cycleT = t0 + bIdx * bar;
    _bgmScheduleNoteAt(cycleT + beat * 0,   523.25, beat * 0.5, 'square', bgmChannel, 0.07); // C5
    _bgmScheduleNoteAt(cycleT + beat * 1,   440.00, beat * 0.5, 'square', bgmChannel, 0.07); // A4
    _bgmScheduleNoteAt(cycleT + beat * 2,   392.00, beat * 0.5, 'square', bgmChannel, 0.07); // G4
    _bgmScheduleNoteAt(cycleT + beat * 3,   349.23, beat * 1.0, 'square', bgmChannel, 0.07); // F4 hold
  }
  // Hi-hat shuffle — every 8th note across all 8 bars.
  for (let bIdx = 0; bIdx < 8; bIdx++) {
    for (let eighth = 0; eighth < 8; eighth++) {
      _bgmScheduleSnareBurst(t0 + bIdx * bar + eighth * (beat / 2), 0.04, 0.025);
    }
  }
}

// N-FIX-7 — startMachoMan / stopMachoMan deleted. transitionToMusic owns the swap. Their
// setTimeout-based fade chain was the BUG 3 root cause (machoManActive=true persisted into
// the 500ms fade-out window, allowing updateHelpers to re-fire stopMachoMan ~30 times).

// ─────────────────────────────────────────────
//  N-FIX-2 — INTRO + CUTSCENE MUSIC CUES
// ─────────────────────────────────────────────
// Escalator: "Rockin' in the Free World" (Neil Young) synth riff during INTRO_ESCALATOR.
// Stairs:    "Ave Maria" (Schubert/Pavarotti) reverent ascent during INTRO_STAIRS.
// Shatter:   4-layer crash SFX at INTRO_SHATTER animation trigger.
// Nessun Dorma: opera synth during win cutscene (replaces BGM rotation).
//
// All cues route through bgmChannel (so master toggle silences them) except the crash which
// uses sfxChannel (it's a one-shot impact, not music). Each cue tracks its own scheduling
// state so it can be stopped cleanly without disturbing other audio.

// Track which cue is currently scheduled. Used to prevent double-scheduling on state re-entry
// (e.g. if INTRO_ESCALATOR is briefly re-entered, the cue doesn't double-up).
let escalatorMusicScheduled = false;
let stairsMusicScheduled    = false;
let nessunDormaScheduled    = false;

// "Rockin' in the Free World" — E minor, ~140 BPM, driving forward riff.
// Hook (4 bars): E - D - G - F# repeated with kick/snare backbeat.
// Plays once per INTRO_ESCALATOR scene (~12s). Self-stops.
function playEscalatorMusic() {
  // N-FIX-7 — no deferred retry; the state-driven tickBGM re-evaluates every frame, so if
  // audioContext isn't ready right now, the next tick's transitionToMusic call will retry.
  if (!audioContext || !bgmChannel) return;
  if (escalatorMusicScheduled) return;
  escalatorMusicScheduled = true;
  const t0 = audioContext.currentTime;
  const beat = 60 / 140;                                         // 0.4286s
  const bar  = 4 * beat;                                         // 1.7143s
  // E minor: E2=82.41, B2=123.47, E3=164.81, F#3=185.00, G3=196.00, A3=220.00, B3=246.94, D4=293.66, E4=329.63
  // Riff: E - D - G - F# (root - flat7 - flat3 - 2)
  const RIFF = [82.41, 73.42, 98.00, 92.50];                    // octave below for guitar feel
  for (let bIdx = 0; bIdx < 7; bIdx++) {
    const f = RIFF[bIdx % 4];
    // Riff plays as eighth-notes (8 notes per bar, alternating on/off feel)
    for (let eighth = 0; eighth < 8; eighth++) {
      const t = t0 + bIdx * bar + eighth * (beat / 2);
      _bgmScheduleNoteAt(t, f, beat / 2 - 0.02, 'square', bgmChannel, 0.06);
    }
  }
  // Kick on beats 1, 3 every bar
  for (let bIdx = 0; bIdx < 7; bIdx++) {
    for (let b of [0, 2]) {
      _bgmScheduleNoteAt(t0 + bIdx * bar + b * beat, 60, 0.08, 'sine', bgmChannel, 0.10);
    }
  }
  // Snare on beats 2, 4 every bar
  for (let bIdx = 0; bIdx < 7; bIdx++) {
    for (let b of [1, 3]) {
      _bgmScheduleSnareBurst(t0 + bIdx * bar + b * beat, 0.06, 0.06);
    }
  }
  // N-FIX-7 — no setTimeout flag-clear. transitionToMusic clears the flag when leaving
  // ESCALATOR (or any state); next entry can schedule cleanly.
}

function escalatorMusicStop() {
  // N-FIX-7 — kept as a no-op shim for any legacy call sites; flag clearing is owned by
  // transitionToMusic. Already-scheduled notes finish their tail naturally.
  escalatorMusicScheduled = false;
}

// "Ave Maria" — B♭ major, slow 6/8, reverent ascent. Triangle melody (warm) + slow drone bass.
// Plays once per INTRO_STAIRS scene (~10s).
function playStairsMusic() {
  if (!audioContext || !bgmChannel || stairsMusicScheduled) return;
  stairsMusicScheduled = true;
  const t0 = audioContext.currentTime;
  // Bb major: Bb2=116.54, F3=174.61, Bb3=233.08, D4=293.66, F4=349.23, Bb4=466.16, D5=587.33
  // Opening melodic phrase: Bb - F - Bb - D - F (rising). Slow notes, ~1s each.
  const MELODY = [
    {t: 0.0, f: 466.16, d: 1.2},        // Bb4
    {t: 1.2, f: 349.23, d: 1.0},        // F4
    {t: 2.2, f: 466.16, d: 1.0},        // Bb4
    {t: 3.2, f: 587.33, d: 1.2},        // D5
    {t: 4.4, f: 698.46, d: 1.5},        // F5 (climax)
    {t: 5.9, f: 587.33, d: 1.0},        // D5
    {t: 6.9, f: 466.16, d: 2.0},        // Bb4 (resolution, sustain)
  ];
  for (const n of MELODY) {
    _bgmScheduleNoteAt(t0 + n.t, n.f, n.d, 'triangle', bgmChannel, 0.07);
  }
  // Sustained bass drone on Bb + F (root + fifth)
  _bgmScheduleNoteAt(t0,       116.54, 9.0, 'square',   bgmChannel, 0.04);   // Bb2
  _bgmScheduleNoteAt(t0 + 4.5, 174.61, 4.5, 'square',   bgmChannel, 0.04);   // F3 second half
  // N-FIX-7 — no setTimeout flag-clear; transitionToMusic clears the flag on state exit.
}

function stairsMusicStop() {
  stairsMusicScheduled = false;
}

// Memorial crash — 4-layer SFX at INTRO_SHATTER moment. Multi-frequency impact + tail.
function playSfx_memorialCrash() {
  if (!audioContext || !audioOn) return;
  const ch = sfxChannel || audioContext.destination;
  const t = audioContext.currentTime;
  // Layer 1 — low rumble (filtered noise, lowpass 200Hz, 500ms)
  _sfxNoise(0.50, 'lowpass', 200, 0.12);
  // Layer 2 — mid-range crash (square at 80Hz, hard envelope, 200ms)
  _sfxNote(80, 'square', 0.20, 0.12);
  // Layer 3 — high shatter (filtered noise, highpass 4000Hz, 150ms) — fire 5ms after impact
  setTimeout(() => _sfxNoise(0.15, 'highpass', 4000, 0.10), 5);
  // Layer 4 — settling debris tail (bandpass noise centered 800Hz, 400ms) — fire 100ms after
  setTimeout(() => _sfxNoise(0.40, 'bandpass', 800, 0.06), 100);
}

// Nessun Dorma — operatic synth replaces BGM during the win cutscene (CUTSCENE_PHASE3 +
// CUTSCENE_BETWEEN). Bb major, slow 4/4, building to "Vincerò" climax.
// Total ~30s — covers PHASE3 (~4.5s) + BETWEEN flight (~10s) + LEVEL 2 reveal hold.
function playNessunDorma() {
  if (!audioContext || !bgmChannel || nessunDormaScheduled) return;
  nessunDormaScheduled = true;
  const t0 = audioContext.currentTime;
  // Bb major: F#3/Gb3=185.00, G3=196.00, A3=220.00, Bb3=233.08, D4=293.66, F4=349.23, G4=392.00,
  // A4=440.00, Bb4=466.16, D5=587.33, F5=698.46, G5=783.99, A5=880.00, Bb5=932.33
  // Opening "Nessun dorma" phrase + build to "Vincerò" finale.
  const MELODY = [
    // Opening: F# - G - A - Bb - A - G - F# (descending rise)
    {t: 0.0,  f: 369.99, d: 1.5},       // F#4 ("Nes-")
    {t: 1.5,  f: 392.00, d: 1.0},       // G4  ("-sun")
    {t: 2.5,  f: 440.00, d: 1.5},       // A4  ("dor-")
    {t: 4.0,  f: 466.16, d: 2.0},       // Bb4 ("-ma")
    {t: 6.0,  f: 440.00, d: 1.0},       // A4
    {t: 7.0,  f: 392.00, d: 1.0},       // G4
    {t: 8.0,  f: 369.99, d: 1.5},       // F#4 (resolution)
    // Build to climax — ascending pattern
    {t: 10.0, f: 392.00, d: 1.5},       // G4
    {t: 11.5, f: 466.16, d: 1.5},       // Bb4
    {t: 13.0, f: 587.33, d: 2.0},       // D5
    // "Vincerò!" finale — sustained high notes
    {t: 15.0, f: 698.46, d: 2.0},       // F5  ("Vin-")
    {t: 17.0, f: 783.99, d: 1.5},       // G5  ("-ce-")
    {t: 18.5, f: 880.00, d: 1.5},       // A5  ("-rò!")
    {t: 20.0, f: 932.33, d: 4.0},       // Bb5 sustained final tonic
  ];
  for (const n of MELODY) {
    _bgmScheduleNoteAt(t0 + n.t, n.f, n.d, 'triangle', bgmChannel, 0.08);
  }
  // Sustained Bb tonic drone underneath the whole phrase
  _bgmScheduleNoteAt(t0,        116.54, 15.0, 'square',  bgmChannel, 0.04);  // Bb2 first half
  _bgmScheduleNoteAt(t0 + 15.0, 116.54, 9.0,  'square',  bgmChannel, 0.05);  // Bb2 second half (louder for climax)
  // Tenor octave-up doubled voice during "Vincerò" climax
  for (let i = 0; i < 4; i++) {
    const n = MELODY[10 + i];
    _bgmScheduleNoteAt(t0 + n.t, n.f * 2, n.d, 'triangle', bgmChannel, 0.05);
  }
  // N-FIX-7 — no setTimeout flag-clear; transitionToMusic clears the flag on state exit.
}

function stopNessunDorma() {
  nessunDormaScheduled = false;
  // Already-scheduled notes finish their tail. The bgmChannel persists, so a subsequent
  // BGM rotation start is unaffected.
}

// N — BGM ducking on dance start/end. 200ms linear ramp via bgmChannel.gain. Synth (YMCA)
// continues at full volume on synthChannel — only BGM ducks because YMCA is the focal audio
// during the death dance.
//
// N-FIX-5 BUG 1 fix — death-mute precedence flag. The dance fires on EVERY capsule hit (both
// "lose a life" and "lose last life" paths). Without this flag, hit() bgmFadeOut(0.1) would
// ramp gain to 0, then 200ms later tickDtjDance fires duckBGM() which cancelScheduledValues
// and ramps gain back UP to 0.5. Net effect: BGM is at 50% during the death dance instead
// of muted. This flag locks duck/unduck out while a death-mute is in effect.
let bgmDeathMuted = false;
function duckBGM() {
  if (!audioContext || !bgmChannel) return;
  if (bgmDeathMuted) return;             // N-FIX-5 — death-mute takes precedence over dance-duck
  bgmDuckLevel = 0.5;
  const t = audioContext.currentTime;
  bgmChannel.gain.cancelScheduledValues(t);
  bgmChannel.gain.setValueAtTime(bgmChannel.gain.value, t);
  bgmChannel.gain.linearRampToValueAtTime(0.5, t + 0.2);
}
function unduckBGM() {
  if (!audioContext || !bgmChannel) return;
  if (bgmDeathMuted) return;             // N-FIX-5 — death-mute persists past dance-end (until respawn)
  bgmDuckLevel = 1.0;
  const t = audioContext.currentTime;
  bgmChannel.gain.cancelScheduledValues(t);
  bgmChannel.gain.setValueAtTime(bgmChannel.gain.value, t);
  bgmChannel.gain.linearRampToValueAtTime(1.0, t + 0.2);
}

// N-FIX-4 — hard-mute / un-mute helpers for transition cleanup. These ramp bgmChannel.gain
// to 0 (mute) or back to 1.0 (full) over a configurable duration. Distinct from duckBGM
// (50%) — these are used for full silence during DEATH_REACTION, escalator→stairs handoff,
// and the WIN_FREEZE→CUTSCENE_FADE_IN handoff to Nessun Dorma. Already-scheduled notes
// continue playing through bgmChannel but at the new gain level (which is 0 for fade-out).
// Use cancelScheduledValues to nuke any pending duck/unduck ramps so the fade applies cleanly.
function bgmFadeOut(durSec) {
  if (!audioContext || !bgmChannel) return;
  const t = audioContext.currentTime;
  bgmChannel.gain.cancelScheduledValues(t);
  bgmChannel.gain.setValueAtTime(bgmChannel.gain.value, t);
  bgmChannel.gain.linearRampToValueAtTime(0.0001, t + Math.max(0.01, durSec));
}
function bgmFadeIn(durSec, targetLevel) {
  if (!audioContext || !bgmChannel) return;
  const target = (typeof targetLevel === 'number') ? targetLevel : 1.0;
  const t = audioContext.currentTime;
  bgmChannel.gain.cancelScheduledValues(t);
  bgmChannel.gain.setValueAtTime(bgmChannel.gain.value, t);
  bgmChannel.gain.linearRampToValueAtTime(target, t + Math.max(0.01, durSec));
}

// ─────────────────────────────────────────────
//  N — PAUSE STATE
// ─────────────────────────────────────────────
// New game state 'PAUSED'. Entered via P-key, Escape-key, or pause-icon tap during GAMEPLAY.
// Most update branches gate on state==='GAMEPLAY' so they freeze automatically when state
// flips to PAUSED. Block M's taunt timer + tickDtjDance + tickBubble + tickBGM all check
// state==='PAUSED' (or its inverse) explicitly to avoid drift.
//
// lastGameplayState: stores the pre-pause state value to restore on unpause. Almost always
// 'GAMEPLAY' but kept as a string for forward compat (e.g., a future block could allow
// pausing during a different state).
let lastGameplayState = 'GAMEPLAY';

function isPausableState() {
  // Only allow pause during active gameplay. Death animations, game-over, intros, cutscenes
  // are already non-interactive; pausing them would conflict with their own time-driven logic.
  return state === 'GAMEPLAY';
}

function togglePause() {
  if (state === 'PAUSED') {
    state = lastGameplayState;
    stateT = 0;
    playSfx_pauseToggle();
  } else if (isPausableState()) {
    lastGameplayState = state;
    state = 'PAUSED';
    stateT = 0;
    playSfx_pauseToggle();
  }
}

function drawPauseOverlay() {
  if (state !== 'PAUSED') return;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 48px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('PAUSED', W/2, H/2 - 20);
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.font = 'bold 14px monospace';
  ctx.fillText('TAP OR PRESS P TO RESUME', W/2, H/2 + 20);
  ctx.fillStyle = '#9a7a00';
  ctx.font = '10px monospace';
  ctx.fillText('Created by Brian Albert', W/2, H - 20);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  N — AUDIO + PAUSE ICONS (top-right corner)
// ─────────────────────────────────────────────
// Two small icon buttons rendered at the top-right of the canvas, just below the SCORE/HI HUD.
// Speaker icon (audio toggle) at SPEAKER_BOX. Pause/play icon at PAUSE_BOX (immediately left
// of speaker). Tap zones are larger than the icon visuals for finger-friendly hit testing.
const ICON_Y       = 48;                                          // below HUD bar (HUD ends ~y=42)
const ICON_SIZE    = 22;
const SPEAKER_BOX  = { x: W - 30, y: ICON_Y, w: ICON_SIZE, h: ICON_SIZE };
const PAUSE_BOX    = { x: W - 60, y: ICON_Y, w: ICON_SIZE, h: ICON_SIZE };

function drawAudioIcon() {
  const cx = SPEAKER_BOX.x + SPEAKER_BOX.w / 2;
  const cy = SPEAKER_BOX.y + SPEAKER_BOX.h / 2;
  ctx.save();
  ctx.strokeStyle = audioOn ? '#88ccff' : '#888888';
  ctx.fillStyle   = audioOn ? '#88ccff' : '#888888';
  ctx.lineWidth = 2;
  // Speaker box outline
  ctx.beginPath();
  ctx.moveTo(cx - 7, cy - 4);
  ctx.lineTo(cx - 3, cy - 4);
  ctx.lineTo(cx + 1, cy - 7);
  ctx.lineTo(cx + 1, cy + 7);
  ctx.lineTo(cx - 3, cy + 4);
  ctx.lineTo(cx - 7, cy + 4);
  ctx.closePath();
  ctx.fill();
  if (audioOn) {
    // Sound waves
    ctx.beginPath(); ctx.arc(cx + 4, cy, 4, -Math.PI/3, Math.PI/3); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx + 4, cy, 7, -Math.PI/3, Math.PI/3); ctx.stroke();
  } else {
    // Slash through speaker
    ctx.strokeStyle = '#ff5555';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - 8, cy - 8);
    ctx.lineTo(cx + 9, cy + 9);
    ctx.stroke();
  }
  ctx.restore();
}

function drawPauseIcon() {
  const cx = PAUSE_BOX.x + PAUSE_BOX.w / 2;
  const cy = PAUSE_BOX.y + PAUSE_BOX.h / 2;
  ctx.save();
  ctx.fillStyle = '#88ccff';
  if (state === 'PAUSED') {
    // Play triangle (▶)
    ctx.beginPath();
    ctx.moveTo(cx - 5, cy - 7);
    ctx.lineTo(cx + 7, cy);
    ctx.lineTo(cx - 5, cy + 7);
    ctx.closePath();
    ctx.fill();
  } else {
    // Pause bars (||)
    ctx.fillRect(cx - 6, cy - 7, 4, 14);
    ctx.fillRect(cx + 2, cy - 7, 4, 14);
  }
  ctx.restore();
}

function pointInIconBox(tx, ty, box) {
  return tx >= box.x && tx <= box.x + box.w && ty >= box.y && ty <= box.y + box.h;
}

// L — dance tick. Handles trigger countdown → dance start, then dance progression. Called from
// main loop every frame regardless of state so a dance survives state transitions cleanly
// (e.g. DEATH_REACTION → GAMEPLAY respawn while dance still playing on TOP).
function tickDtjDance(dt) {
  // N — pause halts dance progression. Trigger countdown also frozen so a dance pending at
  // pause time fires at the expected total elapsed time post-resume.
  if (state === 'PAUSED') return;
  if (dtjDanceTrigger) {
    dtjDanceTriggerT -= dt;
    if (dtjDanceTriggerT <= 0) {
      dtjDanceState  = 'DANCING';
      dtjDanceT      = 0;
      dtjDanceCycles = (player.lives > 1) ? 1 : 2;
      dtjDanceTrigger = false;
      const c1 = DTJ_DANCE_BUBBLE_CYCLE1_TEXTS[Math.floor(Math.random() * DTJ_DANCE_BUBBLE_CYCLE1_TEXTS.length)];
      spawnDanceBubble(c1);
      startYmca();
      duckBGM();                                                  // N — duck BGM on dance start
    }
  }
  if (dtjDanceState === 'DANCING') {
    const prevT = dtjDanceT;
    dtjDanceT += dt;
    if (dtjDanceCycles === 2 && prevT < DTJ_DANCE_CYCLE_DURATION && dtjDanceT >= DTJ_DANCE_CYCLE_DURATION) {
      spawnDanceBubble(DTJ_DANCE_BUBBLE_CYCLE2_TEXT);
    }
    const totalDuration = DTJ_DANCE_CYCLE_DURATION * dtjDanceCycles;
    if (dtjDanceT >= totalDuration) {
