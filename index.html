  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100%; background: #000; }
  body {
    background: #000;
    width: 100%;
    height: 100%;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    overflow: hidden;
    touch-action: none;

<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Safe ellipse — works in all environments including sandboxed iframes
function ell(x,y,rx,ry,rot,s,e){
  ctx.save();
  ctx.translate(x,y);
  ctx.rotate(rot);
  ctx.scale(rx,ry);
  ctx.arc(0,0,1,s,e);
  ctx.restore();
}


// ─────────────────────────────────────────────
//  (no sprite images — all characters drawn in canvas)
// ─────────────────────────────────────────────


// Sprite ready flags

const W = 480, H = 854;
let scale = 1;

// roundRect polyfill for older browsers
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    const radius = Array.isArray(r) ? r[0] : (r || 0);
    this.beginPath();
    this.moveTo(x + radius, y);
    this.lineTo(x + w - radius, y);
    this.quadraticCurveTo(x + w, y, x + w, y + radius);
    this.lineTo(x + w, y + h - radius);
    this.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    this.lineTo(x + radius, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - radius);
    this.lineTo(x, y + radius);
    this.quadraticCurveTo(x, y, x + radius, y);
    this.closePath();
    return this;
  };
}

function resize() {
  const scaleX = window.innerWidth  / W;
  const scaleY = window.innerHeight / H;
  scale = Math.min(scaleX, scaleY);
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = Math.floor(W * scale) + 'px';
  canvas.style.height = Math.floor(H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);
canvas.style.touchAction = 'none';  // prevent iOS scroll interference

// ─────────────────────────────────────────────
//  GAME LAYOUT DATA
// ─────────────────────────────────────────────
const PLAT_H = 14;
const platforms = [
  { x:  0,  y: 790, w: 480, h: PLAT_H, tilt: 0,    dir:  1 }, // floor — full width
  { x: 80,  y: 660, w: 370, h: PLAT_H, tilt:-2.5,  dir: -1 }, // R2
  { x: 10,  y: 530, w: 370, h: PLAT_H, tilt: 2.5,  dir:  1 }, // R3
  { x: 80,  y: 400, w: 370, h: PLAT_H, tilt:-2.5,  dir: -1 }, // R4
  { x: 10,  y: 270, w: 370, h: PLAT_H, tilt: 2.5,  dir:  1 }, // R5
  { x: 60,  y: 140, w: 360, h: PLAT_H, tilt: 0,    dir:  1 }, // TOP
];
const ladders = [
  { x: 60,  y: 672, h: 118 },
  { x: 370, y: 672, h: 118 },
  { x: 120, y: 542, h: 118 },
  { x: 340, y: 412, h: 118 },
  { x: 90,  y: 282, h: 118 },
  { x: 350, y: 152, h: 118 },
];
const LADDER_W = 24;
const TOP = platforms[5];
const FLOOR = platforms[0];

// ─────────────────────────────────────────────
//  PLAYER STATE
// ─────────────────────────────────────────────
const GRAVITY    = 1400;   // px/s²
const JUMP_VY    = -580;   // px/s (negative = up)
const WALK_SPD   = 120;    // px/s
const CLIMB_SPD  = 100;    // px/s
const LADDER_W_HALF = LADDER_W / 2;

const player = {
  x: FLOOR.x + 60,   // center x — start away from ladder
  y: FLOOR.y,        // feet exactly on floor surface
  vx: 0,
  vy: 0,
  onGround: false,
  onLadder: false,
  facing: 1,         // 1=right, -1=left
  walkT: 0,          // walk animation timer
};

// Input state
const keys = {};
const GAME_KEYS = new Set(['ArrowLeft','ArrowRight','Space','KeyA','KeyZ']);
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (GAME_KEYS.has(e.code)) e.preventDefault();
  if (state !== 'GAMEPLAY') skipToGame();
});
window.addEventListener('keyup', e => {
  keys[e.code] = false;
});

// Touch controls — virtual d-pad
// Touch state — zone based, no buttons
const touch = { left:false, right:false, climbUp:false, climbDown:false, jump:false };
let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
let activeTouchId = null;

// ─────────────────────────────────────────────
//  HELPER: get platform y at given x (accounting for tilt)
// ─────────────────────────────────────────────
function getPlatY(plat, px) {
  // tilt is degrees, positive = right side lower
  const mid = plat.x + plat.w / 2;
  const rad = plat.tilt * Math.PI / 180;
  return plat.y + Math.tan(rad) * (px - mid);
}

// ─────────────────────────────────────────────
//  HELPER: is player over a ladder gap in a platform?
//  Returns true if player center x is within LADDER_W of ladder center
// ─────────────────────────────────────────────
function overLadder(px, plat) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) < LADDER_W * 0.55) {
      // Check the ladder connects through this platform vertically
      if (lad.y <= plat.y + 4 && lad.y + lad.h >= plat.y - 4) return lad;
    }
  }
  return null;
}

// ─────────────────────────────────────────────
//  HELPER: is player on/near a ladder (for climbing)
// ─────────────────────────────────────────────
function nearLadder(px, py) {
  for (const lad of ladders) {
    const ladCx = lad.x + LADDER_W / 2;
    if (Math.abs(px - ladCx) < LADDER_W * 0.6) {
      if (py >= lad.y && py <= lad.y + lad.h + 10) return lad;
    }
  }
  return null;
}

// ─────────────────────────────────────────────
//  UPDATE PLAYER
// ─────────────────────────────────────────────
function updatePlayer(dt) {
  // Controls:
  //   Arrow Left / Right  = walk
  //   A                   = climb up ladder
  //   Z                   = climb down ladder
  //   Space               = jump (when on ground)
  //   Touch d-pad buttons = same

  // Left Arrow=left  Right Arrow=right  A=climb up  Z=climb down  Space=jump
  const left   = keys['ArrowLeft']  || touch.left;
  const right  = keys['ArrowRight'] || touch.right;
  const climbU = keys['KeyA']       || touch.climbUp;
  const climbD = keys['KeyZ']       || touch.climbDown;
  const doJump = keys['Space']      || touch.jump;

  // ── Find nearest ladder ───────────────────────
  const lad = nearLadder(player.x, player.y);

  // ── Grab ladder when pressing A near one ─────
  if (!player.onLadder && lad && climbU) {
    player.onLadder = true;
  }
  // Release ladder if pressing jump or no ladder present
  if (player.onLadder && !lad) {
    player.onLadder = false;
  }

  // ── LADDER MODE ───────────────────────────────
  if (player.onLadder && lad) {
    const ladCx = lad.x + LADDER_W / 2;
    player.vx = 0;
    player.vy = 0;
    // Snap toward ladder center
    player.x += (ladCx - player.x) * 0.25;

    if (climbU)  player.y -= CLIMB_SPD * dt;  // A = up
    if (climbD)  player.y += CLIMB_SPD * dt;  // Z = down

    // Jump off ladder
    if (doJump) {
      player.onLadder = false;
      player.vy = JUMP_VY;
    }

    // Reached top of ladder — step off onto platform
    if (player.y < lad.y) {
      player.y = lad.y;
      player.onLadder = false;
      player.vy = 0;
    }
    // Reached bottom — step off
    if (player.y > lad.y + lad.h) {
      player.y = lad.y + lad.h;
      player.onLadder = false;
    }

    player.walkT += dt;
    return; // skip gravity/walking while on ladder
  }

  // ── WALKING ───────────────────────────────────
  if (left)       { player.vx = -WALK_SPD; player.facing = -1; }
  else if (right) { player.vx =  WALK_SPD; player.facing =  1; }
  else            { player.vx = 0; }

  // Jump — only when firmly on ground
  if (doJump && player.onGround) {
    player.vy = JUMP_VY;
    player.onGround = false;
  }

  // Gravity
  player.vy += GRAVITY * dt;

  // Integrate position
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // ── PLATFORM COLLISION ────────────────────────
  player.onGround = false;
  for (const plat of platforms) {
    const platY  = getPlatY(plat, player.x);
    const prevY  = player.y - player.vy * dt;

    // Horizontal bounds check (with small margin)
    if (player.x < plat.x - 6 || player.x > plat.x + plat.w + 6) continue;

    // Only collide when falling downward onto the platform surface
    if (player.vy < 0) continue;                       // moving up — pass through
    if (prevY > platY + 2) continue;                   // was already below — pass through
    if (player.y < platY - 2) continue;                // not yet reached platform

    // Is this a ladder gap? Let player pass through
    if (overLadder(player.x, plat)) continue;

    // Land on platform
    player.y = platY;
    player.vy = 0;
    player.onGround = true;
    break; // stop at first platform hit
  }

  // Screen left/right bounds
  player.x = Math.max(8, Math.min(W - 8, player.x));

  // Fell off bottom — respawn on floor
  if (player.y > H + 50) {
    player.x = FLOOR.x + 60;
    player.y = FLOOR.y;
    player.vy = 0;
    player.onGround = true;
  }

  // Walk animation timer
  if (player.vx !== 0 && player.onGround) player.walkT += dt;
}



// ─────────────────────────────────────────────
//  STATE MACHINE
// ─────────────────────────────────────────────
// INTRO_BLACK → INTRO_TITLE → INTRO_ESCALATOR → INTRO_ZOOM
// → INTRO_STAIRS → INTRO_TAUNT → INTRO_SHATTER → GAMEPLAY
let state = 'INTRO_BLACK', stateT = 0, totalT = 0;
let skipDone = false;

// Zoom state: starts zoomed out (scale=0.35), zooms in to (scale=1.0)
// Camera anchors so top of stairs lands at y=140 when fully zoomed
let zoomScale = 0.35;
let zoomOffX = 0, zoomOffY = 0;

function skipToGame() {
  if (state !== 'GAMEPLAY') { state = 'GAMEPLAY'; stateT = 0; particles = []; bricks = []; zoomScale = 1; }
}
// skipToGame is called from the main keydown listener above and pointerdown below

// ─────────────────────────────────────────────
//  STARS
// ─────────────────────────────────────────────
const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * W, y: Math.random() * H * 0.7,
  r: Math.random() * 1.6 + 0.2, a: Math.random()
}));

// ─────────────────────────────────────────────
//  PARTICLES
// ─────────────────────────────────────────────
let particles = [];
function boom(x, y, n = 30, big = false) {
  const cols = ['#ff6600','#ffcc00','#ff3300','#ffffff','#ff8800'];
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = (big ? 220 : 130) + Math.random() * 100;
    particles.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - (big?60:0),
      life: 1, decay: 0.7 + Math.random() * 0.5,
      r: (big ? 7 : 3) + Math.random() * 4,
      color: cols[Math.floor(Math.random() * cols.length)] });
  }
}

// ─────────────────────────────────────────────
//  BRICK TUMBLE  (shatter transition)
// ─────────────────────────────────────────────
let bricks = [];
let shakeAmt = 0;

function initBricks() {
  bricks = [];
  // Steps in screen space (zoomed in, offset applied)
  // LM.STEP_TOP=320 maps to screen y=140 (offset = 140-320 = -180)
  const bOffY = 140 - LM.STEP_TOP; // -180
  for (let row = 0; row < LM.N_STEPS; row++) {
    const widen = row * Math.round(W * 0.015);
    const bx = LM.BX - widen;
    const bw = LM.BW + widen * 2;
    const by = (LM.STEP_TOP + row * LM.STEP_H) + bOffY; // screen y
    const brickW = 44, brickH = Math.max(LM.STEP_H - 2, 10);
    const nBricks = Math.ceil(bw / brickW) + 1;
    for (let col = 0; col < nBricks; col++) {
      bricks.push({
        x: bx + col * brickW - 4,
        startY: by,
        y: by,
        w: brickW - 2, h: brickH,
        vx: (Math.random() - 0.5) * 100,
        vy: 0,
        rot: 0, rotV: (Math.random() - 0.5) * 6,
        delay: row * 0.10 + Math.random() * 0.06,
        active: false, exploded: false,
        row,
        color: `hsl(40,${20+Math.random()*20}%,${45+Math.random()*15}%)`
      });
    }
  }
}

// ─────────────────────────────────────────────
//  ESCALATOR INTRO STATE
// ─────────────────────────────────────────────
// DTJ walks from right → steps on escalator → rides up (escalator covers him like a tube)
let esc = { x: W + 60, y: H - 110, phase: 'walk', t: 0, progress: 0, armSwing: 0 };

// ─────────────────────────────────────────────
//  STAIRS INTRO STATE
// ─────────────────────────────────────────────
// DTJ walks from bottom-left → center → up the stairs
let stairsPhase = 'walk'; // 'walk' | 'climb' | 'top'
let stairsX = -60, stairsY = H - 80, stairsStep = 0, stairsT = 0;
const STAIR_TOP_X = W / 2, STAIR_TOP_Y = 140; // top of stairs = EXACTLY top platform y
const STAIR_MID_X = W / 2 - 60; // where he stops before climbing

// Arm raise for taunt
let tauntArm = 0, tauntBubble = 0;

// Shatter progress
let shatterT = 0, rampReveal = 0, buildingFade = 1;

// ─────────────────────────────────────────────
//  TICKER
// ─────────────────────────────────────────────
const TICKER = 'FAKE NEWS!   TOTAL WITCH HUNT   GREATEST ECONOMY EVER   VERY STABLE GENIUS   PERFECT PHONE CALL   DEEP STATE EXPOSED   BELIEVE ME   NOBODY KNOWS MORE THAN ME   ★   ';
let tickX = W;

// ─────────────────────────────────────────────
//  NIGHTSCAPE CITY BACKGROUND  (escalator scene)
// ─────────────────────────────────────────────
function drawNightCity() {
  // Sky gradient — deep purple-blue night
  const sg = ctx.createLinearGradient(0, 0, 0, H);
  sg.addColorStop(0, '#05040f');
  sg.addColorStop(0.5, '#0a0820');
  sg.addColorStop(1, '#12103a');
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.a * 0.9})`;
    ctx.beginPath(); ctx.arc(s.x, s.y * 0.8, s.r, 0, Math.PI * 2); ctx.fill();
  });

  // Moon
  ctx.fillStyle = '#ffffee';
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(380, 60, 28, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Moon crater detail
  ctx.fillStyle = '#eeeedd';
  ctx.beginPath(); ctx.arc(390, 52, 7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(374, 68, 5, 0, Math.PI * 2); ctx.fill();

  // Background buildings silhouette
  const buildings = [
    {x:0,   w:50,  h:320, color:'#080618'},
    {x:45,  w:35,  h:280, color:'#090720'},
    {x:75,  w:60,  h:400, color:'#07061a'},
    {x:130, w:40,  h:260, color:'#0a0820'},
    {x:165, w:80,  h:500, color:'#060515'}, // tall center tower
    {x:240, w:45,  h:350, color:'#08071c'},
    {x:280, w:30,  h:290, color:'#090820'},
    {x:305, w:55,  h:420, color:'#070618'},
    {x:355, w:40,  h:310, color:'#0a0920'},
    {x:390, w:50,  h:360, color:'#080719'},
    {x:435, w:50,  h:280, color:'#090820'},
  ];
  buildings.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, H - b.h - 80, b.w, b.h);
    // Window grid
    for (let wy = H - b.h - 70; wy < H - 90; wy += 22) {
      for (let wx = b.x + 4; wx < b.x + b.w - 8; wx += 14) {
        const on = Math.random() > 0.35;
        ctx.fillStyle = on ? `rgba(255,220,120,${0.2 + Math.random()*0.5})` : `rgba(0,0,20,0.9)`;
        ctx.fillRect(wx, wy, 8, 12);
      }
    }
  });

  // D.T.J. TOWER sign on center tall building
  ctx.fillStyle = '#c8a44a';
  ctx.font = 'bold 9px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('D.T.J. TOWER', 205, H - 500 - 80 + 18);

  // Ground street
  const gg = ctx.createLinearGradient(0, H - 80, 0, H);
  gg.addColorStop(0, '#0e0d22');
  gg.addColorStop(1, '#181630');
  ctx.fillStyle = gg;
  ctx.fillRect(0, H - 80, W, 80);

  // Street reflections
  ctx.fillStyle = 'rgba(200,164,74,0.06)';
  ctx.fillRect(0, H - 40, W, 40);

  // Street lights
  [80, 200, 340, 420].forEach(lx => {
    ctx.strokeStyle = '#555577';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(lx, H - 80); ctx.lineTo(lx, H - 160); ctx.stroke();
    ctx.fillStyle = '#ffee88';
    ctx.shadowColor = '#ffee88'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(lx, H - 162, 4, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// ─────────────────────────────────────────────
//  ESCALATOR DRAWING  (covers character while riding)
// ─────────────────────────────────────────────
const ESC_X1 = 80, ESC_Y1 = H - 90;   // bottom entry
const ESC_X2 = 260, ESC_Y2 = 200;     // top exit

function drawEscalatorStructure(animT) {
  const dx = ESC_X2 - ESC_X1, dy = ESC_Y2 - ESC_Y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(ESC_X1, ESC_Y1);
  ctx.rotate(ang);

  // Glass tube / enclosure — the character is hidden inside this
  ctx.fillStyle = 'rgba(180,220,255,0.12)';
  ctx.strokeStyle = 'rgba(180,220,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-10, -38, len + 20, 60, 6);
  ctx.fill(); ctx.stroke();

  // Gold handrail top
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, -26); ctx.lineTo(len, -26); ctx.stroke();

  // Gold handrail bottom
  ctx.strokeStyle = '#b8960c';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 18); ctx.lineTo(len, 18); ctx.stroke();

  // Moving steps inside
  const stepSpacing = 28;
  const scrollOffset = (animT * 60) % stepSpacing;
  ctx.strokeStyle = 'rgba(212,175,55,0.7)';
  ctx.lineWidth = 2;
  for (let sx = -scrollOffset; sx < len + 10; sx += stepSpacing) {
    ctx.beginPath(); ctx.moveTo(sx, -20); ctx.lineTo(sx + 16, -20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx + 16, -20); ctx.lineTo(sx + 16, -4); ctx.stroke();
  }

  // Side frame / structural
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(-12, -40, 12, 80);
  ctx.fillRect(len, -40, 12, 80);

  // Gold trim strips
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(0, -40, len, 4);
  ctx.fillRect(0, 36, len, 4);

  ctx.restore();

  // Base platform at bottom entry
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(ESC_X1 - 20, ESC_Y1 - 4, 50, 8);
  // Top landing platform
  ctx.fillRect(ESC_X2 - 20, ESC_Y2 - 4, 50, 8);
}

// ─────────────────────────────────────────────
//  LINCOLN MEMORIAL PARODY
//  Drawn in "world space" at native coords:
//    Total height: H (854px)
//    Building (pediment+columns): 3/8 × H = 320px  → top y=0, bottom y=320
//    Stairs: 5/8 × H = 534px  → top y=320, bottom y=854
//    Width: full W=480px
//    When zoomed in: ctx.scale+translate maps so stairs-top (y=320) → screen y=140
// ─────────────────────────────────────────────

// Building geometry constants (world space, zoomed out = full screen)
const LM = {
  BX: 0,          // building left edge
  BW: W,          // building full width
  BLDG_H: Math.round(H * 3/8),   // 320px — columns+pediment
  STAIR_H: Math.round(H * 5/8),  // 534px — stairs
  get TOP_Y()    { return 0; },                        // pediment peak area
  get ENT_Y()    { return Math.round(H*3/8*0.45); },  // entablature top (~144px)
  get COL_TOP()  { return Math.round(H*3/8*0.5); },   // columns start (~160px)
  get COL_BOT()  { return Math.round(H*3/8); },       // columns end = stairs start (320px)
  get STEP_TOP() { return Math.round(H*3/8); },       // first step top (320px)
  get STEP_BOT() { return H; },                       // last step bottom (854px)
  get N_STEPS()  { return 11; },
  get STEP_H()   { return Math.round((H - Math.round(H*3/8)) / 11); }, // ~48px each
};

function drawLincolnBuilding(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // Sky
  const sg = ctx.createLinearGradient(0, 0, 0, H);
  sg.addColorStop(0, '#04040e');
  sg.addColorStop(0.5, '#080820');
  sg.addColorStop(1, '#0c0c28');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.a * 0.8})`;
    ctx.beginPath(); ctx.arc(s.x, s.y * 0.4, s.r, 0, Math.PI * 2); ctx.fill();
  });

  const {BX, BW, ENT_Y, COL_TOP, COL_BOT, STEP_TOP, STEP_BOT, N_STEPS, STEP_H} = LM;

  // ── Pediment (triangle) ──────────────────────
  ctx.fillStyle = '#d8d8c8';
  ctx.beginPath();
  ctx.moveTo(BX, ENT_Y);
  ctx.lineTo(BX + BW/2, 10);   // peak near top of screen
  ctx.lineTo(BX + BW, ENT_Y);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#b0b0a0'; ctx.lineWidth = 1; ctx.stroke();

  // Pediment detail lines
  ctx.strokeStyle = '#c8c8b8'; ctx.lineWidth = 0.5;
  ctx.beginPath(); ctx.moveTo(BX+20,ENT_Y); ctx.lineTo(BX+BW/2,16); ctx.lineTo(BX+BW-20,ENT_Y); ctx.stroke();

  // ── Entablature band ─────────────────────────
  const entH = COL_TOP - ENT_Y;
  const eg = ctx.createLinearGradient(0, ENT_Y, 0, COL_TOP);
  eg.addColorStop(0, '#e8e8d8'); eg.addColorStop(1, '#d0d0c0');
  ctx.fillStyle = eg;
  ctx.fillRect(BX, ENT_Y, BW, entH);

  // Frieze text
  ctx.fillStyle = '#888877'; ctx.font = `bold ${Math.round(entH*0.45)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('LINCOLN MEMORIAL  ★  (PARODY)', W/2, ENT_Y + entH*0.72);

  // ── Columns ──────────────────────────────────
  const colH = COL_BOT - COL_TOP;
  const nCols = 12;
  const colW = Math.floor(BW / (nCols * 2.8));
  const colSpacing = BW / nCols;

  for (let i = 0; i < nCols; i++) {
    const cx = BX + colSpacing * i + colSpacing/2 - colW/2;
    // Fluted column gradient
    const cg = ctx.createLinearGradient(cx, 0, cx + colW, 0);
    cg.addColorStop(0,   '#b8b8a8');
    cg.addColorStop(0.2, '#e0e0d0');
    cg.addColorStop(0.5, '#f0f0e0');
    cg.addColorStop(0.8, '#d8d8c8');
    cg.addColorStop(1,   '#b0b0a0');
    ctx.fillStyle = cg;
    ctx.fillRect(cx, COL_TOP, colW, colH);

    // Capital
    ctx.fillStyle = '#e8e8d8';
    ctx.fillRect(cx - 3, COL_TOP, colW + 6, Math.round(colH*0.04));
    // Base
    ctx.fillStyle = '#d0d0c0';
    ctx.fillRect(cx - 3, COL_BOT - Math.round(colH*0.03), colW + 6, Math.round(colH*0.03));

    // Column shadow stripe
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(cx + colW*0.7, COL_TOP, colW*0.15, colH);
  }

  // ── Stylobate (top step platform) ────────────
  ctx.fillStyle = '#d0d0c0';
  ctx.fillRect(BX, COL_BOT, BW, Math.round(STEP_H * 0.3));

  // ── Steps (5/8 of screen, 11 steps) ──────────
  // Each step widens as it goes down
  for (let s = 0; s < N_STEPS; s++) {
    const widen = s * Math.round(BW * 0.015);  // widen each step
    const sx = BX - widen;
    const sw = BW + widen * 2;
    const sy = STEP_TOP + s * STEP_H;

    // Step face gradient — marble look
    const stepG = ctx.createLinearGradient(0, sy, 0, sy + STEP_H);
    stepG.addColorStop(0,   '#eeeedd');
    stepG.addColorStop(0.3, '#ddddc8');
    stepG.addColorStop(1,   '#c8c8b4');
    ctx.fillStyle = stepG;
    ctx.fillRect(sx, sy, sw, STEP_H);

    // Step top highlight (light hits top edge)
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(sx, sy, sw, 3);

    // Step bottom shadow
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    ctx.fillRect(sx, sy + STEP_H - 4, sw, 4);

    // Subtle vertical joint lines
    ctx.strokeStyle = 'rgba(0,0,0,0.06)'; ctx.lineWidth = 1;
    for (let jx = sx + 60; jx < sx + sw; jx += 60) {
      ctx.beginPath(); ctx.moveTo(jx, sy); ctx.lineTo(jx, sy + STEP_H); ctx.stroke();
    }
  }

  // Ground below steps
  ctx.fillStyle = '#0a1a0a';
  ctx.fillRect(0, STEP_BOT - 4, W, 8);

  ctx.restore();
}

// ─────────────────────────────────────────────
//  D.T.J. CHARACTER  (code body + photo head, no white box)
//  x,y = feet. armRaise 0-1 (0=down, 1=raised). walking=bool.

function drawDTJ(x, y, sc=1, armRaise=0, walking=false, walkT=0) {
  ctx.save();

  ctx.scale(sc, sc);

  const wt = walking ? walkT : 0;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath(); ell(0,2,20,5,0,0,Math.PI*2); ctx.fill();

  ctx.fillStyle='#131368';
  ctx.save(); ctx.translate(-9,bob); ctx.rotate(legSwing*Math.PI/180);
  ctx.fillRect(-7,0,14,26); ctx.restore();
  ctx.save(); ctx.translate(9,bob); ctx.rotate(-legSwing*Math.PI/180);

  // SHOES
  ctx.fillStyle='#080808';
  ctx.beginPath(); ell(-9,28,11,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ell( 9,28,11,5,0,0,Math.PI*2); ctx.fill();

  ctx.save(); ctx.translate(0,bob);

  // BODY — wide shouldered navy suit
  ctx.fillStyle='#1a1a6a';
  ctx.beginPath();
  ctx.moveTo(-28,-2); ctx.quadraticCurveTo(-30,-20,-24,-34);
  ctx.lineTo(-11,-34); ctx.lineTo(0,-20); ctx.lineTo(11,-34);
  ctx.lineTo(24,-34); ctx.quadraticCurveTo(30,-20,28,-2);

  // Lapels
  ctx.fillStyle='#14146a';
  ctx.beginPath(); ctx.moveTo(-11,-34); ctx.lineTo(0,-20); ctx.lineTo(-18,4); ctx.lineTo(-22,-6); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(11,-34);  ctx.lineTo(0,-20); ctx.lineTo(18,4);  ctx.lineTo(22,-6);  ctx.closePath(); ctx.fill();

  // White shirt
  ctx.fillStyle='#f8f8f8';
  ctx.beginPath(); ctx.moveTo(-6,-34); ctx.lineTo(6,-34); ctx.lineTo(8,4); ctx.lineTo(-8,4); ctx.closePath(); ctx.fill();

  ctx.lineTo(7,2); ctx.lineTo(0,14); ctx.lineTo(-7,2);

  // ARMS — down at rest, raise for taunt
  const lAng = armRaise*(-Math.PI*0.75) - 0.12 + (walking ? Math.sin(wt*8+Math.PI)*0.2 : 0);
  const rAng = armRaise*( Math.PI*0.75) + 0.12 + (walking ? Math.sin(wt*8)*0.2 : 0);

  // Left arm + fist
  ctx.save(); ctx.translate(-26,-22); ctx.rotate(lAng);
  ctx.fillStyle='#1a1a6a';
  ctx.beginPath(); ell(0,12,7,15,0,0,Math.PI*2); ctx.fill();
  // White cuff

  // Fist — compact block

  ctx.fillRect(-6,27,13,11);
  // Knuckle lines

  ctx.restore();

  ctx.fillRect(-6,27,13,11);
  ctx.strokeStyle='#c8904a'; ctx.lineWidth=1;
  [-4,0,4].forEach(kx=>{ctx.beginPath();ctx.moveTo(kx,29);ctx.lineTo(kx,39);ctx.stroke();});

  // HEAD — pixel-art style, bold readable shapes

  // Neck

  ctx.fillRect(-6,-48,12,11);

  ctx.fillStyle='#9a7820';
  ctx.save(); ctx.translate(-7,-66); ctx.rotate(0.3); ctx.fillRect(-5,-1,11,2.5); ctx.restore();

  // EYES
  ctx.fillStyle='#fff';
  ctx.fillRect(-12,-62,9,6);

  ctx.fillStyle='rgba(150,75,20,0.5)';

// ─────────────────────────────────────────────
//  PLATFORM DRAWING
// ─────────────────────────────────────────────
function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h/2);
  ctx.rotate(p.tilt * Math.PI / 180);
  const hw = p.w/2, hh = p.h/2;
  // Shadow
  ctx.fillStyle = '#6b5220';
  ctx.fillRect(-hw+3, -hh+4, p.w, p.h);
  // Body
  const pg = ctx.createLinearGradient(0,-hh,0,hh);
  pg.addColorStop(0,'#e8c46a'); pg.addColorStop(0.3,'#c8a44a'); pg.addColorStop(1,'#9a7830');
  ctx.fillStyle = pg;
  ctx.fillRect(-hw,-hh,p.w,p.h);
  // Rivet bolts
  ctx.fillStyle = '#6b5220';
  for (let rx = -hw+14; rx < hw-14; rx += 38) {
    ctx.beginPath(); ctx.arc(rx, 0, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8a44a';
    ctx.beginPath(); ctx.arc(rx-0.5,-0.5,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b5220';
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  LADDER DRAWING
// ─────────────────────────────────────────────
function drawLadder(l) {
  const {x, y, h} = l;
  // Rails
  const lg = ctx.createLinearGradient(x,0,x+LADDER_W,0);
  lg.addColorStop(0,'#c8a800'); lg.addColorStop(0.5,'#f0d020'); lg.addColorStop(1,'#c8a800');
  ctx.fillStyle = lg;
  ctx.fillRect(x, y, 4, h);
  ctx.fillRect(x+LADDER_W-4, y, 4, h);
  // Rungs
  for (let ry = y+8; ry < y+h-4; ry+=16) {
    ctx.fillStyle = '#a08800';
    ctx.fillRect(x+4, ry, LADDER_W-8, 5);
    ctx.fillStyle = '#d4b000';
    ctx.fillRect(x+4, ry, LADDER_W-8, 2);
  }
}

// ─────────────────────────────────────────────
//  TV (small, on top platform)
// ─────────────────────────────────────────────
function drawTV(x, y, label, t) {
  const w=36, h=30;
  // Stand
  ctx.fillStyle='#222244';
  ctx.fillRect(x+w/2-3,y+h,6,7);
  ctx.fillRect(x+w/2-8,y+h+6,16,3);
  // Case
  ctx.fillStyle='#1a1a3a';
  ctx.strokeStyle='#4444aa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill(); ctx.stroke();
  // Bezel
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.fill();
  // Screen
  ctx.save();
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.clip();
  ctx.fillStyle = label==='CNN' ? '#0d0808' : '#08080d';
  ctx.fillRect(x+3,y+3,w-6,h-9);
  // Scan band
  const sb = ((t*25)%(h-9))+y+3;
  ctx.fillStyle = label==='CNN' ? 'rgba(255,50,50,0.15)':'rgba(50,100,255,0.15)';
  ctx.fillRect(x+3,sb,w-6,5);
  // Static noise
  for(let ni=0;ni<6;ni++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.06})`;
    ctx.fillRect(x+3+Math.random()*(w-6), y+3+Math.random()*(h-9), Math.random()*8+2, 1);
  }
  // Tiny text
  ctx.fillStyle = label==='CNN'?'#ff4444':'#4488ff';
  ctx.font='4px monospace'; ctx.textAlign='left';
  ctx.fillText('BREAKING',x+4,y+10);
  ctx.fillStyle='#aaa'; ctx.fillText('LIVE',x+4,y+15);
  // Scan lines overlay
  for(let sl=y+3;sl<y+h-6;sl+=2){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(x+3,sl,w-6,1);
  }
  ctx.restore();
  // Power LED
  ctx.fillStyle=label==='CNN'?'#ff2200':'#0055ff';
  ctx.beginPath(); ctx.arc(x+w-6,y+h-5,2,0,Math.PI*2); ctx.fill();
  // Label
  ctx.fillStyle=label==='CNN'?'#cc0000':'#0033bb';
  ctx.fillRect(x+3,y+h-8,w-6,7);
  ctx.fillStyle='#fff'; ctx.font='bold 5px monospace'; ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h-3);
}

// ─────────────────────────────────────────────
//  TICKER
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
//  TOUCH CONTROLS
//
//  RIGHT SIDE — two stacked boxes, thumb reach:
//    Top box    = UP (climb)
//    Bottom box = DOWN (climb)
//
//  BOTTOM LEFT — three boxes:
//    [  JUMP (wide, spans left+right width)  ]
//    [ LEFT ][ RIGHT ]
// ─────────────────────────────────────────────

// Box dimensions (canvas px)
const BW = 90;   // width of each left/right box
const BH = 75;   // height of each box

// LEFT/RIGHT boxes — bottom left corner
const boxLeft  = { x: 0,   y: H - BH,       w: BW,   h: BH, action: 'left'  };
const boxRight = { x: BW,  y: H - BH,       w: BW,   h: BH, action: 'right' };
// JUMP bar — same width as left+right combined, directly above them
const boxJump  = { x: 0,   y: H - BH*2,     w: BW*2, h: BH, action: 'jump'  };
// UP/DOWN — right side, stacked, vertically centered for thumb
const boxUp    = { x: W - BW, y: H*0.45,        w: BW, h: BH, action: 'up'   };
const boxDown  = { x: W - BW, y: H*0.45 + BH,   w: BW, h: BH, action: 'down' };

const allBoxes = [boxLeft, boxRight, boxJump, boxUp, boxDown];

// Active touch tracking
const activeTouches = {};
let lastTapTime = 0, lastTapBox = null;
const DBL_TAP_MS = 280;

function getBoxAt(tx, ty) {
  for (const b of allBoxes) {
    if (tx >= b.x && tx <= b.x + b.w && ty >= b.y && ty <= b.y + b.h) return b;
  }
  return null;
}

function applyTouchState() {
  touch.left = touch.right = touch.climbUp = touch.climbDown = false;
  for (const id in activeTouches) {
    const a = activeTouches[id].action;
    if (a === 'left')  touch.left     = true;
    if (a === 'right') touch.right    = true;
    if (a === 'up')    touch.climbUp  = true;
    if (a === 'down')  touch.climbDown= true;
  }
}

// Pointer events — work on both touch AND mouse, no lift required
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  if (state !== 'GAMEPLAY') { skipToGame(); return; }
  canvas.setPointerCapture(e.pointerId);  // capture so move fires even outside canvas
  const r  = canvas.getBoundingClientRect();
  const tx = (e.clientX - r.left) / scale;
  const ty = (e.clientY - r.top)  / scale;
  const b  = getBoxAt(tx, ty);
  // Register touch even if not on a box — so slide-in works via pointermove
  activeTouches[e.pointerId] = { action: b ? b.action : null, box: b };
  if (b && b.action === 'jump') {
    touch.jump = true;
    setTimeout(() => { touch.jump = false; }, 120);
  }
  applyTouchState();
});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!(e.pointerId in activeTouches)) return;  // only track registered fingers
  const r  = canvas.getBoundingClientRect();
  const tx = (e.clientX - r.left) / scale;
  const ty = (e.clientY - r.top)  / scale;
  const b  = getBoxAt(tx, ty);
  const prev = activeTouches[e.pointerId];
  // Trigger jump when sliding ONTO the jump box
  if (b && b.action === 'jump' && prev.action !== 'jump') {
    touch.jump = true;
    setTimeout(() => { touch.jump = false; }, 120);
  }
  // Update to current box (or null if finger moved off all boxes)
  activeTouches[e.pointerId] = { action: b ? b.action : null, box: b };
  applyTouchState();
});

canvas.addEventListener('pointerup',     e => { delete activeTouches[e.pointerId]; applyTouchState(); });
canvas.addEventListener('pointercancel', e => { delete activeTouches[e.pointerId]; applyTouchState(); });

// ─────────────────────────────────────────────
//  DRAW CONTROL BOXES
// ─────────────────────────────────────────────
function drawDpad() {
  if (state !== 'GAMEPLAY') return;
  ctx.save();

  const defs = [
    { b: boxJump,  icon: 'JUMP', big: false },
    { b: boxLeft,  icon: '◀',   big: true  },
    { b: boxRight, icon: '▶',   big: true  },
    { b: boxUp,    icon: '▲',   big: true  },
    { b: boxDown,  icon: '▼',   big: true  },
  ];

  for (const { b, icon, big } of defs) {
    const active = Object.values(activeTouches).some(t => t.box === b);
    // Background
    ctx.fillStyle = active ? 'rgba(255,255,255,0.28)' : 'rgba(255,255,255,0.10)';
    ctx.beginPath();
    ctx.roundRect(b.x+2, b.y+2, b.w-4, b.h-4, 10);
    ctx.fill();
    // Border
    ctx.strokeStyle = active ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Icon
    ctx.fillStyle = active ? '#fff' : 'rgba(255,255,255,0.55)';
    if (big) {
      ctx.font = 'bold 28px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(icon, b.x + b.w/2, b.y + b.h/2 + 10);
    } else {
      // JUMP label
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(icon, b.x + b.w/2, b.y + b.h/2 + 6);
    }
  }

  ctx.restore();
}

function drawBubble(x, y, text, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;

  ctx.fillStyle='#fff'; ctx.strokeStyle='#cc0000'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,8); ctx.fill(); ctx.stroke();
  // Tail
  ctx.beginPath(); ctx.moveTo(x-12,py+ph); ctx.lineTo(x,py+ph+20); ctx.lineTo(x+12,py+ph); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#cc0000'; ctx.font='bold 15px monospace'; ctx.textAlign='center';

// ─────────────────────────────────────────────
//  TV SPEECH BUBBLES
// ─────────────────────────────────────────────
const TV_WORDS = [
  'RUSSIA HOAX!', 'WITCH HUNT!', 'FAKE NEWS!', 'NO COLLUSION!',
  'PERFECT CALL!', 'DEEP STATE!', 'RIGGED!', 'TOTAL HOAX!',
  'BELIEVE ME!', 'HUGE!', 'TREMENDOUS!', 'WRONG!'
];

// Each bubble: { x, y, word, life, vy, side }
let tvBubbles = [];
let tvBubbleTimer = 0;

function updateTVBubbles(dt) {
  tvBubbleTimer -= dt;
  if (tvBubbleTimer <= 0) {
    tvBubbleTimer = 1.2 + Math.random() * 0.8;
    const side = Math.random() > 0.5 ? 'cnn' : 'msnbc';
    const bx = side === 'cnn'
      ? TOP.x + 8 + 18          // CNN center x
      : TOP.x + TOP.w - 46 + 18; // MSNBC center x
    const by = TOP.y - 34 - 10;  // above top TV
    tvBubbles.push({
      x: bx, y: by,
      word: TV_WORDS[Math.floor(Math.random() * TV_WORDS.length)],
      life: 1.0, vy: -28,
      side
    });
  }
  tvBubbles.forEach(b => {
    b.y += b.vy * dt;
    b.vy *= 0.96; // slow drift
    b.life -= 0.4 * dt;
  });
  tvBubbles = tvBubbles.filter(b => b.life > 0);
}

function drawTVBubbles() {
  tvBubbles.forEach(b => {
    ctx.save();
    ctx.globalAlpha = Math.min(b.life * 2, 1);
    const isCNN = b.side === 'cnn';
    const col = isCNN ? '#cc0000' : '#0033cc';
    const tw = ctx.measureText(b.word).width + 14;
    const th = 18;
    const bx = b.x - tw/2, by = b.y - th;

    // Bubble
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.roundRect(bx, by, tw, th, 4); ctx.fill(); ctx.stroke();

    // Tail pointing down toward TV
    const tailX = isCNN ? bx + tw*0.3 : bx + tw*0.7;
    ctx.beginPath();
    ctx.moveTo(tailX, by+th);
    ctx.lineTo(tailX+4, by+th+8);
    ctx.lineTo(tailX+10, by+th);
    ctx.closePath(); ctx.fill(); ctx.stroke();

    // Text
    ctx.fillStyle = col;
    ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
    ctx.fillText(b.word, b.x, by + 12);
    ctx.restore();
  });
}

function drawGameplay(shake) {
  const sx = shake ? (Math.random()-0.5)*shakeAmt : 0;

  // Stars

    ctx.fillStyle=`rgba(255,255,255,${s.a*0.5})`;

  });

  // Ground
  ctx.fillStyle='#08081e'; ctx.fillRect(0,804,W,50);
  ctx.fillStyle='#0a0a28'; ctx.fillRect(0,804,W,6);

  // Platforms
  platforms.forEach(drawPlatform);
  // Ladders

  // TVs on top platform — exact same positions as gameplay

  drawTVBubbles();

  // D.T.J. at left side of top platform, feet on surface
  drawDTJ(TOP.x + 80, TOP.y, 0.85, 0);

  // Donkey — driven by player state
  const walking = player.vx !== 0 || player.onLadder;
  drawDonkey(player.x, player.y, 0.65, player.facing < 0, walking, player.walkT);

  [{x:160,y:645},{x:260,y:385},{x:130,y:255}].forEach(m=>{

  ctx.restore();

  drawHUD();
  drawTicker();
  drawDpad();
}

// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
let lastT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts; totalT += dt; stateT += dt;

  // Ticker scroll
  tickX -= 70*dt;
  if (tickX < -(ctx.measureText(TICKER).width||1200)) tickX = W;

  // TV bubbles update
  updateTVBubbles(dt);

  // Star twinkle
  stars.forEach(s=>{ s.a+=((Math.random()-0.5)*0.025); s.a=Math.max(0.1,Math.min(1,s.a)); });

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.life-=p.decay*dt;
  });
  particles=particles.filter(p=>p.life>0);

  // Shake decay
  if (shakeAmt>0) shakeAmt=Math.max(0,shakeAmt-18*dt);

  // State transitions
  switch(state) {
    case 'INTRO_BLACK':
      if(stateT>1.4){state='INTRO_TITLE';stateT=0;} break;

    case 'INTRO_TITLE':
      if(stateT>2.8){state='INTRO_ESCALATOR';stateT=0;esc={x:W+60,y:H-110,phase:'walk',t:0,progress:0,armSwing:0};} break;

    case 'INTRO_ESCALATOR':
      esc.t+=dt; esc.armSwing=totalT;
      if(esc.phase==='walk'){
        esc.x-=90*dt;
        if(esc.x<=ESC_X1+10){esc.phase='rise';esc.progress=0;}
      } else {
        esc.progress=Math.min(esc.progress+dt/3.5,1);
        esc.x=ESC_X1+(ESC_X2-ESC_X1)*esc.progress;
        esc.y=ESC_Y1+(ESC_Y2-ESC_Y1)*esc.progress;
        if(esc.progress>=1&&stateT>5.5){
          state='INTRO_ZOOM'; stateT=0;
          zoomScale=0.35;
        }
      }
      break;

    case 'INTRO_ZOOM': {
      // 0-1s: hold zoomed out full building view
      // 1-4s: smooth zoom in — stairs top lands at y=140
      // 4.5s: transition to stairs
      if(stateT < 1.0){
        zoomScale = 0.35;
      } else if(stateT < 4.0){
        const t = (stateT-1.0)/3.0;
        const ease = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
        zoomScale = 0.35 + (1.0-0.35)*ease;
      } else {
        zoomScale = 1.0;
      }
      if(stateT>4.5){
        state='INTRO_STAIRS'; stateT=0;
        stairsPhase='walk'; stairsX=-60; stairsY=H-80; stairsT=0;
        zoomScale=1.0;
      }
      break;
    }

    case 'INTRO_STAIRS':
      stairsT+=dt;
      if(stairsPhase==='walk'){
        stairsX+=110*dt;
        if(stairsX>=STAIR_MID_X-10){stairsPhase='climb';}
      } else if(stairsPhase==='climb'){
        const climbDur=3.0;
        const prog=Math.min(stairsT/climbDur,1);
        stairsX=STAIR_MID_X + prog*40;
        stairsY=(H-80) - prog*((H-80)-STAIR_TOP_Y);
        if(prog>=1){stairsPhase='top'; stairsT=0;}
      } else {
        // at top
        if(stairsT>1.0){state='INTRO_TAUNT';stateT=0;tauntArm=0;tauntBubble=0;}
      }
      break;

    case 'INTRO_TAUNT':
      tauntArm=Math.min(stateT/0.9,1);
      tauntBubble=stateT>0.7?Math.min((stateT-0.7)/0.5,1):0;
      if(stateT>3.2){
        state='INTRO_SHATTER';stateT=0;shatterT=0;rampReveal=0;buildingFade=1;
        initBricks();
        boom(W/2,300,36,true);
        shakeAmt=14;
      }
      break;

    case 'INTRO_SHATTER':
      shatterT+=dt;
      // Building fades out
      buildingFade=Math.max(1-shatterT*1.2,0);
      // Bricks activate top→bottom, tumble down
      bricks.forEach(b=>{
        if(shatterT>b.delay){
          b.active=true;
          b.vy+=400*dt;
          b.y+=b.vy*dt;
          b.x+=b.vx*dt;
          b.rot+=b.rotV*dt;
          if(!b.exploded && b.y>b.startY+30){
            b.exploded=true;
            boom(b.x+b.w/2, b.y+b.h/2, 2);
          }
        }
      });
      // Platforms/grid reveal
      rampReveal=Math.min(shatterT/2.0,1);
      // Shake on first hit
      if(shatterT>0.5&&shatterT<0.55){ shakeAmt=10; boom(W/2,500,28,true); }
      if(shatterT>1.2&&shatterT<1.25){ shakeAmt=8; }
      if(shatterT>3.5){ state='GAMEPLAY'; stateT=0; particles=[]; bricks=[]; }
      break;
  }

  // ── RENDER ───────────────────────────────
  ctx.clearRect(0,0,W,H);

  switch(state) {

    case 'INTRO_BLACK': {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      const a=Math.min(stateT/0.9,1);
      ctx.globalAlpha=a;
      ctx.fillStyle='#cc0000'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText('● INSERT QUARTER ●',W/2,H/2);
      ctx.globalAlpha=1;
      break;
    }

    case 'INTRO_TITLE': {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      // CRT scanlines
      for(let sl=0;sl<H;sl+=3){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,sl,W,1);}
      const a=Math.min(stateT/0.6,1); ctx.globalAlpha=a;
      ctx.shadowColor='#cc0000'; ctx.shadowBlur=30;
      ctx.fillStyle='#cc0000'; ctx.font='bold 48px monospace'; ctx.textAlign='center';
      ctx.fillText('DONKEY',W/2,H/2-70);
      ctx.shadowBlur=0;
      ctx.fillStyle='#ffcc00'; ctx.font='bold 22px monospace';
      ctx.fillText('vs.',W/2,H/2-28);
      ctx.shadowColor='#4466ff'; ctx.shadowBlur=20;
      ctx.fillStyle='#ffffff'; ctx.font='bold 44px monospace';
      ctx.fillText('D.T.J.',W/2,H/2+24);
      ctx.shadowBlur=0;
      ctx.fillStyle='#888'; ctx.font='10px monospace';
      ctx.fillText('CLIMB THE TOWER OF POWER',W/2,H/2+62);
      ctx.fillStyle='#333'; ctx.font='9px monospace';
      ctx.fillText('© SATIRE ENTERTAINMENT  ★  ALL FICTIONAL',W/2,H-28);
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='10px monospace';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-10);
      break;
    }

    case 'INTRO_ESCALATOR': {
      drawNightCity();

      // Draw escalator FIRST (back layer)
      drawEscalatorStructure(esc.t);

      // Character — hidden inside escalator glass during 'rise'
      if(esc.phase==='walk'){
        // Walking toward escalator from right — fully visible
        drawDTJ(esc.x, esc.y, 1, 0, true, esc.armSwing);
      } else {
        // Inside escalator — clip to tube area so he appears inside it
        ctx.save();
        const dx=ESC_X2-ESC_X1, dy=ESC_Y2-ESC_Y1;
        const ang=Math.atan2(dy,dx);
        const len=Math.sqrt(dx*dx+dy*dy);
        ctx.translate(ESC_X1,ESC_Y1); ctx.rotate(ang);
        ctx.beginPath(); ctx.rect(-2,-36,len+4,60); ctx.clip();
        ctx.rotate(-ang); ctx.translate(-ESC_X1,-ESC_Y1);
        // draw at escalator position — slightly smaller inside tube
        drawDTJ(esc.x, esc.y, 0.88, 0, false, esc.armSwing);
        ctx.restore();
      }

      // D.T.J. label
      if(esc.phase==='walk'){
        ctx.fillStyle='#ffcc00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
        ctx.fillText('D.T.J.',esc.x,esc.y-80);
      }

      // Chyron
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,H-55,W,32);
      ctx.fillStyle='#cc0000'; ctx.fillRect(0,H-55,W,5);
      ctx.fillStyle='#ffcc00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.fillText('D.T.J. ARRIVES AT TOWER  ★  LIVE COVERAGE',W/2,H-32);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-8);
      break;
    }

    case 'INTRO_ZOOM': {
      // Draw building with zoom transform
      // When zoomScale=0.35: full building fits screen (zoomed out)
      // When zoomScale=1.0: stairs fill screen, top of stairs at y=140
      // The zoom anchor: stairs-top (LM.STEP_TOP = H*3/8 = 320) should map to y=140 when fully zoomed
      // At scale s: screen_y = (world_y - anchorY) * s + targetY
      // anchorY = LM.STEP_TOP = 320, targetY = 140
      // At s=0.35 (zoomed out): center building on screen
      ctx.fillStyle='#04040e'; ctx.fillRect(0,0,W,H);

      const anchorWorldY = LM.STEP_TOP; // 320 — top of stairs in world space
      const targetScreenY = 140;        // where stairs-top should appear on screen
      const anchorWorldX = W/2;         // center stays centered

      // At zoom=0.35: offset so full building is centered
      // At zoom=1.0: offset so stairs-top is at y=140
      const offX = W/2 - anchorWorldX * zoomScale;
      const offY = targetScreenY - anchorWorldY * zoomScale;

      ctx.save();
      ctx.translate(offX, offY);
      ctx.scale(zoomScale, zoomScale);
      drawLincolnBuilding(1);
      ctx.restore();

      // "ESTABLISHING SHOT" label while zoomed out
      if(stateT < 1.5){
        const la = Math.min(stateT/0.4, 1) * (stateT < 1.0 ? 1 : Math.max(0,(1.5-stateT)/0.5));
        ctx.globalAlpha = la;
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(0, H-50, W, 36);
        ctx.fillStyle='#ffcc00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
        ctx.fillText('WASHINGTON D.C.  ★  LINCOLN MEMORIAL  ★  TONIGHT', W/2, H-26);
        ctx.globalAlpha=1;
      }

      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-8);
      break;
    }

    case 'INTRO_STAIRS': {
      // Always draw building at zoom=1 (zoomed in)
      const offX = W/2 - (W/2) * 1.0;
      const offY = 140 - LM.STEP_TOP * 1.0;
      ctx.save();
      ctx.translate(offX, offY);
      ctx.scale(1.0, 1.0);
      drawLincolnBuilding(1);
      ctx.restore();

      // Figure walking up steps
      const climbing = stairsPhase==='climb'||stairsPhase==='top';
      drawDTJ(stairsX, stairsY, 1.1, 0, stairsPhase==='walk'||stairsPhase==='climb', stairsT);

      // "D.T.J." nameplate when at top
      if(stairsPhase==='top'){
        ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(W/2-80,H/2-20,160,30);
        ctx.fillStyle='#ffcc00'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
        ctx.fillText('D.T.J. HAS ARRIVED',W/2,H/2);
      }

      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-12);
      break;
    }

    case 'INTRO_TAUNT': {
      // Draw building with zoom=1 transform
      const bOffY = 140 - LM.STEP_TOP;
      ctx.save(); ctx.translate(0, bOffY); drawLincolnBuilding(1); ctx.restore();
      drawDTJ(stairsX, stairsY, 1.1, tauntArm);
      if(tauntBubble>0.05) drawBubble(stairsX+30, stairsY-80, '"FAKE NEWS!"', tauntBubble);
      // TVs in exact gameplay positions, fading in with taunt
      ctx.globalAlpha=Math.min(tauntBubble*1.5,1);
      drawTV(TOP.x+8,        TOP.y-68, 'CNN',   totalT);
      drawTV(TOP.x+8,        TOP.y-34, 'CNN',   totalT+0.4);
      drawTV(TOP.x+TOP.w-46, TOP.y-68, 'MSNBC', totalT);
      drawTV(TOP.x+TOP.w-46, TOP.y-34, 'MSNBC', totalT+0.4);
      if(tauntBubble>0.5) drawTVBubbles();
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-12);
      break;
    }

    case 'INTRO_SHATTER': {
      const bOffY2 = 140 - LM.STEP_TOP;
      if(buildingFade>0){
        ctx.save(); ctx.translate(0, bOffY2); drawLincolnBuilding(buildingFade); ctx.restore();
      }

      // Gameplay grid phasing in
      if(rampReveal>0){
        ctx.globalAlpha=rampReveal;
        drawGameplay(false);
        ctx.globalAlpha=1;
      }

      // Bricks tumbling
      const shakeX=(Math.random()-0.5)*shakeAmt;
      const shakeY=(Math.random()-0.5)*shakeAmt;
      ctx.save(); ctx.translate(shakeX,shakeY);
      bricks.forEach(b=>{
        if(!b.active) return;
        ctx.save();
        ctx.translate(b.x+b.w/2, b.y+b.h/2);
        ctx.rotate(b.rot);
        ctx.fillStyle=b.color;
        ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
        // Mortar line
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
        ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.fillRect(-b.w/2,-b.h/2,b.w,3);
        ctx.restore();
      });
      ctx.restore();

      // Particles
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;

      // Screen flash on big impacts
      if(shatterT<0.12){
        ctx.fillStyle=`rgba(255,255,255,${(0.12-shatterT)/0.12*0.7})`;
        ctx.fillRect(0,0,W,H);
      }
      if(shatterT>0.5&&shatterT<0.62){
        ctx.fillStyle=`rgba(255,180,0,${(0.62-shatterT)/0.12*0.5})`;
        ctx.fillRect(0,0,W,H);
      }
      break;
    }

    case 'GAMEPLAY': {
      drawGameplay(shakeAmt>0);
      // Particles leftover
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      // Press to start
      if(stateT<4){
        const ba=Math.sin(stateT*4)>0;
        if(ba){
          ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H/2-55,W,75);
          ctx.fillStyle='#ffcc00'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
          ctx.fillText('PRESS ANY KEY TO PLAY',W/2,H/2-16);
          ctx.fillStyle='#aaa'; ctx.font='11px monospace';
          ctx.fillText('← → MOVE   SPACE JUMP   ↑↓ CLIMB',W/2,H/2+14);
        }
      }
      break;
    }
  }
}

requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
