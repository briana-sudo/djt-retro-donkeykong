<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>Simple Arcade Platformer (Skeleton)</title>
  <style>
    html, body { margin:0; height:100%; background:#0b0d12; overflow:hidden; touch-action:none; }
    canvas { display:block; margin:0 auto; background:#111625; image-rendering: pixelated; }
  </style>
</head>
<body>
<canvas id="game" tabindex="0" aria-label="Game canvas"></canvas>

<script>
(() => {
  "use strict";

  // ----------------------------
  // CONFIG (central knobs)
  // ----------------------------
  const CONFIG = {
    CANVAS_W: 900,
    CANVAS_H: 600,
    DT_CLAMP: 1 / 30, // prevent huge dt spikes
  };

  // ----------------------------
  // STATE MACHINE (locked v1)
  // ----------------------------
  const State = Object.freeze({
    START: "START",
    PLAY: "PLAY",
    PAUSE: "PAUSE",
    WIN: "WIN",
    GAME_OVER: "GAME_OVER",
  });

  const game = {
    state: State.START,
    lastTs: 0,
    timeInState: 0,
    score: 0,
    mult: 1.0,
    lives: 3,
    debug: false,
  };

  function setState(next) {
    if (game.state === next) return;
    game.state = next;
    game.timeInState = 0;
  }

  // ----------------------------
  // CANVAS SETUP (fixed internal res)
  // ----------------------------
  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha: false });

  function resize() {
    // Keep internal resolution fixed; scale via CSS size to fit window.
    const scale = Math.min(
      window.innerWidth / CONFIG.CANVAS_W,
      window.innerHeight / CONFIG.CANVAS_H
    );

    canvas.width = CONFIG.CANVAS_W;
    canvas.height = CONFIG.CANVAS_H;

    canvas.style.width = Math.floor(CONFIG.CANVAS_W * scale) + "px";
    canvas.style.height = Math.floor(CONFIG.CANVAS_H * scale) + "px";
  }
window.addEventListener("resize", resize);
resize();

// ---- Focus management for keyboard ----
// Desktop browsers require focus for reliable key events.
// Click/tap the canvas once to capture focus (we also try on load).
canvas.focus({ preventScroll: true });
canvas.addEventListener("pointerdown", () => {
  canvas.focus({ preventScroll: true });
});
  // ----------------------------
  // INPUT (keyboard + touch => one intent)
  // ----------------------------
  const input = {
    left: false,
    right: false,
    up: false,
    down: false,
    jump: false,
    pause: false,
    start: false,
  };

  // "pressed this frame" flags (edge-trigger)
  const pressed = {
    jump: false,
    pause: false,
    start: false,
  };

  function clearPressed() {
    pressed.jump = pressed.pause = pressed.start = false;
  }

 document.addEventListener("keydown", (e) => {
  const k = e.key.toLowerCase();

  // Prevent arrow keys / space from scrolling the page
  if (
    k === "arrowleft" || k === "arrowright" ||
    k === "arrowup" || k === "arrowdown" ||
    k === " " || k === "spacebar"
  ) {
    e.preventDefault();
  }

  if (k === "arrowleft" || k === "a") input.left = true;
  if (k === "arrowright" || k === "d") input.right = true;
  if (k === "arrowup" || k === "w") input.up = true;
  if (k === "arrowdown" || k === "s") input.down = true;

  if (k === " " || k === "spacebar") {
    if (!input.jump) pressed.jump = true;
    input.jump = true;
  }

  if (k === "escape" || k === "p") {
    if (!input.pause) pressed.pause = true;
    input.pause = true;
  }

  if (k === "enter") {
    if (!input.start) pressed.start = true;
    input.start = true;
  }
});

document.addEventListener("keyup", (e) => {
  const k = e.key.toLowerCase();

  if (k === "arrowleft" || k === "a") input.left = false;
  if (k === "arrowright" || k === "d") input.right = false;
  if (k === "arrowup" || k === "w") input.up = false;
  if (k === "arrowdown" || k === "s") input.down = false;

  if (k === " " || k === "spacebar") input.jump = false;
  if (k === "escape" || k === "p") input.pause = false;
  if (k === "enter") input.start = false;
});

  // ----------------------------
  // TOUCH CONTROLS (on-canvas buttons)
  // ----------------------------
  const touch = {
    activeId: null,
    buttons: [
      // Left / Right
      { name:"left",  x:30,  y:CONFIG.CANVAS_H-120, w:90, h:90 },
      { name:"right", x:130, y:CONFIG.CANVAS_H-120, w:90, h:90 },

      // Ladder controls
      { name:"up",    x:CONFIG.CANVAS_W-220, y:CONFIG.CANVAS_H-200, w:90, h:70 },
      { name:"down",  x:CONFIG.CANVAS_W-220, y:CONFIG.CANVAS_H-120, w:90, h:70 },

      // Jump / Pause
      { name:"jump",  x:CONFIG.CANVAS_W-120, y:CONFIG.CANVAS_H-120, w:90, h:90 },
      { name:"pause", x:CONFIG.CANVAS_W-70,  y:20, w:50, h:50 },

      // Start button (shown only when not PLAY by your drawTouchButtons())
      { name:"start", x:CONFIG.CANVAS_W/2-80, y:CONFIG.CANVAS_H/2+70, w:160, h:50 },
    ]
  };

  function canvasPointFromEvent(ev) {
    const rect = canvas.getBoundingClientRect();
    const x = (ev.clientX - rect.left) * (canvas.width / rect.width);
    const y = (ev.clientY - rect.top) * (canvas.height / rect.height);
    return { x, y };
  }

  function hitButton(x, y) {
    for (const b of touch.buttons) {
      if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) return b;
    }
    return null;
  }

 function setTouchDown(name, isDown) {
  if (name === "left") input.left = isDown;
  if (name === "right") input.right = isDown;
  if (name === "up") input.up = isDown;
  if (name === "down") input.down = isDown;

  if (name === "jump") {
    if (isDown && !input.jump) pressed.jump = true;
    input.jump = isDown;
  }

  if (name === "pause") {
    if (isDown && !input.pause) pressed.pause = true;
    input.pause = isDown;
  }

  if (name === "start") {
    if (isDown && !input.start) pressed.start = true;
    input.start = isDown;
  }
}

  canvas.addEventListener("pointerdown", (e) => {
    canvas.setPointerCapture(e.pointerId);
    const { x, y } = canvasPointFromEvent(e);
    const b = hitButton(x, y);
    if (!b) return;
    touch.activeId = e.pointerId;
    setTouchDown(b.name, true);
    e.preventDefault();
  });

  canvas.addEventListener("pointerup", (e) => {
    if (touch.activeId !== e.pointerId) return;
    // Release all touch-keys (simple)
    for (const b of touch.buttons) setTouchDown(b.name, false);
    touch.activeId = null;
    e.preventDefault();
  });

  canvas.addEventListener("pointercancel", (e) => {
    if (touch.activeId !== e.pointerId) return;
    for (const b of touch.buttons) setTouchDown(b.name, false);
    touch.activeId = null;
  });

  // ----------------------------
  // UPDATE / RENDER
  // ----------------------------
  function update(dt) {
    game.timeInState += dt;

    // State transitions (UI-only for now)
    if (game.state === State.START) {
      if (pressed.start || pressed.jump) setState(State.PLAY);
    } else if (game.state === State.PLAY) {
      if (pressed.pause) setState(State.PAUSE);

      // placeholder: score ticks up to prove update loop works
      game.score += dt * 10 * game.mult;

      // quick debug transitions (temporary)
      if (game.debug) {
        if (pressed.start) setState(State.WIN);
        if (pressed.jump) setState(State.GAME_OVER);
      }
    } else if (game.state === State.PAUSE) {
      if (pressed.pause || pressed.start || pressed.jump) setState(State.PLAY);
    } else if (game.state === State.WIN) {
      if (pressed.start || pressed.jump) {
        game.score = 0; game.mult = 1; game.lives = 3;
        setState(State.START);
      }
    } else if (game.state === State.GAME_OVER) {
      if (pressed.start || pressed.jump) {
        game.score = 0; game.mult = 1; game.lives = 3;
        setState(State.START);
      }
    }

    clearPressed();
  }

  function render() {
    // Background
    ctx.fillStyle = "#0f1526";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Title / placeholder world frame
    ctx.strokeStyle = "#2c3a66";
    ctx.lineWidth = 2;
    ctx.strokeRect(18, 18, canvas.width - 36, canvas.height - 36);

    // HUD
    ctx.fillStyle = "#d7e0ff";
    ctx.font = "16px system-ui, -apple-system, Segoe UI, Roboto, Arial";
    ctx.fillText(`STATE: ${game.state}`, 30, 50);
    ctx.fillText(`Score: ${Math.floor(game.score)}`, 30, 72);
    ctx.fillText(`Mult: x${game.mult.toFixed(1)}`, 30, 94);
    ctx.fillText(`Lives: ${game.lives}`, 30, 116);

    const bits =
      (input.left ? "L" : "-") +
      (input.right ? "R" : "-") +
      (input.up ? "U" : "-") +
      (input.down ? "D" : "-") +
      (input.jump ? "J" : "-") +
      (input.pause ? "P" : "-") +
      (input.start ? "S" : "-");
    ctx.fillText(`INPUT: ${bits}`, 30, 138);

    // Touch buttons (always shown for now)
    drawTouchButtons();

    // State overlays
    if (game.state === State.START) drawOverlay("START", "Tap START / Press Enter or Space");
    if (game.state === State.PAUSE) drawOverlay("PAUSED", "Press Esc/P or Tap Pause");
    if (game.state === State.WIN) drawOverlay("YOU WIN", "Tap START / Press Enter or Space");
    if (game.state === State.GAME_OVER) drawOverlay("GAME OVER", "Tap START / Press Enter or Space");
  }

function drawTouchButtons() {
  for (const b of touch.buttons) {

    // Hide START button during PLAY
    if (b.name === "start" && game.state === State.PLAY) continue;

    ctx.fillStyle = "rgba(255,255,255,0.10)";
    ctx.fillRect(b.x, b.y, b.w, b.h);

    ctx.strokeStyle = "rgba(255,255,255,0.30)";
    ctx.strokeRect(b.x, b.y, b.w, b.h);

    ctx.fillStyle = "#ffffff";
    ctx.font = "14px system-ui";
    ctx.textAlign = "center";
    ctx.fillText(b.name.toUpperCase(), b.x + b.w/2, b.y + b.h/2 + 5);
    ctx.textAlign = "left";
  }
}
  
function drawOverlay(title, subtitle) {
  // Dim background lightly (still lets buttons show)
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Center panel
  const pw = 520, ph = 190;
  const px = (canvas.width - pw) / 2;
  const py = (canvas.height - ph) / 2 - 30;

  ctx.fillStyle = "rgba(10,12,18,0.85)";
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = "rgba(255,255,255,0.20)";
  ctx.strokeRect(px, py, pw, ph);

  ctx.fillStyle = "#ffffff";
  ctx.font = "44px system-ui, -apple-system, Segoe UI, Roboto, Arial";
  ctx.textAlign = "center";
  ctx.fillText(title, canvas.width / 2, py + 78);

  ctx.fillStyle = "#cbd6ff";
  ctx.font = "18px system-ui, -apple-system, Segoe UI, Roboto, Arial";
  ctx.fillText(subtitle, canvas.width / 2, py + 118);
  ctx.textAlign = "left";
}


  // ----------------------------
  // LOOP
  // ----------------------------
  function frame(ts) {
    if (!game.lastTs) game.lastTs = ts;
    let dt = (ts - game.lastTs) / 1000;
    game.lastTs = ts;

    if (dt > CONFIG.DT_CLAMP) dt = CONFIG.DT_CLAMP;

    update(dt);
    render();
    requestAnimationFrame(frame);
  }

  // Optional: enable debug transitions by flipping this to true
  game.debug = false;

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
