        state='INTRO_SHATTER';stateT=0;shatterT=0;rampReveal=0;buildingFade=1;
        initBricks();
        boom(W/2,300,36,true);
        shakeAmt=14;
      }
      break;

    case 'INTRO_SHATTER':
      shatterT+=dt;
      // Building fades out
      buildingFade=Math.max(1-shatterT*1.2,0);
      // Bricks activate top→bottom, tumble down
      bricks.forEach(b=>{
        if(shatterT>b.delay){
          b.active=true;
          b.vy+=400*dt;
          b.y+=b.vy*dt;
          b.x+=b.vx*dt;
          b.rot+=b.rotV*dt;
          if(!b.exploded && b.y>b.startY+30){
            b.exploded=true;
            boom(b.x+b.w/2, b.y+b.h/2, 2);
          }
        }
      });
      // Platforms/grid reveal — delay until wave 2+ clears (0.5s after start)
      rampReveal=Math.min(Math.max(shatterT-0.4,0)/2.2,1);
      // Shake on first hit
      if(shatterT>0.5&&shatterT<0.55){ shakeAmt=10; boom(W/2,500,28,true); playSfx_memorialCrash(); /* N-FIX-2 — 4-layer crash on visual shatter */ }
      if(shatterT>1.2&&shatterT<1.25){ shakeAmt=8; }
      if(shatterT>3.5){ state='GAMEPLAY'; stateT=0; particles=[]; bricks=[]; capsules.length=0; capsuleSpawnT=0; capsuleSpawnInterval=2.5+Math.random()*2.0; dtjAnimState='IDLE'; dtjAnimT=0; dtjAnimX=DTJ_GAMEPLAY_X; helpers.length=0; player.lives=3; player.invulnT=0; player.platformsReached=new Set([0]); playerScore=0; multiplier=MULT_BASE; multiplierT=0; levelStartTime=totalT; scoreFloats.length=0; resetStats(); pickupSpawnTimer=0; pickupRespawnDelay=0; pickup.active=false; spawnFirstPickup(); pelosi.active=false; pelosi.phase='IDLE'; pelosi.phaseT=0; pelosi.timer=PELOSI_INTERVAL_MIN+Math.random()*(PELOSI_INTERVAL_MAX-PELOSI_INTERVAL_MIN); pelosi.facing=-1; pelosi.targetCapsule=null; pelosiFlash.active=false; tornPieces.length=0; introHasPlayed=true; /* K — single set-site for skip-intro gate */ /* N-FIX-7 — BGM start is state-driven via tickBGM/computeDesiredMusic */ }
      break;
  }

  // ── RENDER ───────────────────────────────
  ctx.clearRect(0,0,W,H);

  switch(state) {

    case 'INTRO_BLACK': {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      const a=Math.min(stateT/0.9,1);
      ctx.globalAlpha=a;
      ctx.fillStyle='#cc0000'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText('● INSERT QUARTER ●',W/2,H/2);
      ctx.globalAlpha=1;
      break;
    }

    case 'INTRO_TITLE': {
      ctx.fillStyle='#000'; ctx.fillRect(0,0,W,H);
      // CRT scanlines
      for(let sl=0;sl<H;sl+=3){ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,sl,W,1);}
      const a=Math.min(stateT/0.6,1); ctx.globalAlpha=a;
      ctx.shadowColor='#cc0000'; ctx.shadowBlur=30;
      ctx.fillStyle='#cc0000'; ctx.font='bold 48px monospace'; ctx.textAlign='center';
      ctx.fillText('DNC',W/2,H/2-70);
      ctx.shadowBlur=0;
      ctx.fillStyle='#ffcc00'; ctx.font='bold 22px monospace';
      ctx.fillText('vs.',W/2,H/2-28);
      ctx.shadowColor='#4466ff'; ctx.shadowBlur=20;
      ctx.fillStyle='#ffffff'; ctx.font='bold 44px monospace';
      ctx.fillText('DJT',W/2,H/2+24);
      ctx.shadowBlur=0;
      ctx.fillStyle='#888'; ctx.font='10px monospace';
      ctx.fillText('CLIMB THE TOWER OF POWER',W/2,H/2+62);
      ctx.fillStyle='#333'; ctx.font='9px monospace';
      ctx.fillText('© SATIRE ENTERTAINMENT  ★  ALL FICTIONAL',W/2,H-28);
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.font='10px monospace';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-10);
      break;
    }

    case 'INTRO_ESCALATOR': {
      drawNightCity();

      // Draw escalator FIRST (back layer)
      drawEscalatorStructure(esc.t);

      // Character — hidden inside escalator glass during 'rise'
      if(esc.phase==='walk'){
        // Walking toward escalator from right — fully visible
        // DTJ walking in escalator — use walk sprite, flip to face left
        // Djt_walk2 already faces left — no flip needed
        const escWalkFrame = Math.floor(esc.armSwing * 3) % 2 === 0 ? 'dtj_walk2' : 'dtj_walk';
        drawSprite(escWalkFrame, esc.x, esc.y, 120, false);
      } else {
        // Inside escalator — clip to tube area so he appears inside it
        ctx.save();
        const dx=ESC_X2-ESC_X1, dy=ESC_Y2-ESC_Y1;
        const ang=Math.atan2(dy,dx);
        const len=Math.sqrt(dx*dx+dy*dy);
        ctx.translate(ESC_X1,ESC_Y1); ctx.rotate(ang);
        ctx.beginPath(); ctx.rect(-2,-36,len+4,60); ctx.clip();
        ctx.rotate(-ang); ctx.translate(-ESC_X1,-ESC_Y1);
        // draw at escalator position — slightly smaller inside tube
        drawSprite('dtj_idle', esc.x, esc.y, 105, true);  // DTJ riding escalator
        ctx.restore();
      }

      // D.T.J. label
      if(esc.phase==='walk'){
        ctx.fillStyle='#ffcc00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
        ctx.fillText('DJT',esc.x,esc.y-128);  // above head
      }

      // Chyron
      ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,H-55,W,32);
      ctx.fillStyle='#cc0000'; ctx.fillRect(0,H-55,W,5);
      ctx.fillStyle='#ffcc00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
      ctx.fillText('DJT ARRIVES AT TOWER  ★  LIVE COVERAGE',W/2,H-32);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-8);
      break;
    }

    case 'INTRO_STAIRS': {
      // Apply zoom transform — building scales so stairs top aligns with TOP.y
      ctx.save();
      ctx.translate(zoomOx, zoomOy);
      ctx.scale(zoomS, zoomS);
      drawLincolnBuilding(1);
      ctx.restore();

      // DTJ in zoomed coords: transform his building-space position to screen space
      const dtjScreenX = stairsX * zoomS + zoomOx;
      const dtjScreenY = stairsY * zoomS + zoomOy;
      const stairsH = 120 * zoomS;
      if (stairsPhase === 'walk') {
        // Walking right toward stairs — flip sprite to face right
        const stWalkFrame = Math.floor(stairsT * 4) % 2 === 0 ? 'dtj_walk2' : 'dtj_walk';
        drawSprite(stWalkFrame, dtjScreenX, dtjScreenY, stairsH, true);
      } else if (stairsPhase === 'climb') {
        // Climbing stairs — facing left (toward camera), no flip
        const clWalkFrame = Math.floor(stairsT * 4) % 2 === 0 ? 'dtj_walk2' : 'dtj_walk';
        drawSprite(clWalkFrame, dtjScreenX, dtjScreenY, stairsH, false);
      } else {
        // At top — walking left to gameplay position, no flip
        const topFrame = stairsX > TOP.x + 85 ? 'dtj_walk2' : 'dtj_idle';
        drawSprite(topFrame, dtjScreenX, dtjScreenY, stairsH, false);
      }

      // "D.T.J." nameplate when at top
      if(stairsPhase==='top'){
        ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(W/2-80,H/2-20,160,30);
        ctx.fillStyle='#ffcc00'; ctx.font='bold 14px monospace'; ctx.textAlign='center';
        ctx.fillText('DJT HAS ARRIVED',W/2,H/2);
      }

      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-12);
      break;
    }

    case 'INTRO_TAUNT': {
      // Keep final zoom during taunt
      ctx.save();
      ctx.translate(ZOOM_OX_END, ZOOM_OY_END);
      ctx.scale(ZOOM_S_END, ZOOM_S_END);
      drawLincolnBuilding(1);
      ctx.restore();

      // All positions in screen space (already zoomed)
      const tauntSY = stairsY;  // stairsY was already snapped to TOP.y
      const tvAlpha = Math.min(stateT / 0.8, 1);
      ctx.globalAlpha = tvAlpha;
      drawTV(tauntSY - 80, tauntSY - 100, 'CNN', totalT);
      drawTV(tauntSY + 40, tauntSY - 100, 'MSNBC', totalT);
      ctx.globalAlpha = 1;
      if(stateT < 2.5) {
        const phrases = ['RUSSIA HOAX!', 'INSURRECTION!', 'THREAT TO DEMOCRACY!'];
        const pi = Math.floor(stateT * 1.2) % phrases.length;
        const pa = Math.sin(stateT * 3) * 0.5 + 0.5;
        ctx.globalAlpha = pa;
        ctx.fillStyle = '#ff4444'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        ctx.fillText(phrases[pi], stairsX - 40, tauntSY - 130 - (stateT % 0.8) * 20);
        ctx.globalAlpha = 1;
      }
      // Taunt — phase 1: idle, phase 2: djt6 arm raise
      const tauntSprite = stateT >= 2.5 ? 'djt6' : 'dtj_idle';
      drawSprite(tauntSprite, stairsX, stairsY, 110);
      if(tauntBubble>0.05) drawBubble(stairsX+30, stairsY-80, 'FAKE NEWS!', tauntBubble);
      ctx.fillStyle='rgba(255,255,255,0.3)'; ctx.font='10px monospace'; ctx.textAlign='center';
      ctx.fillText('TAP / ANY KEY TO SKIP',W/2,H-12);
      break;
    }

    case 'INTRO_SHATTER': {
      // Fading building behind — keep final zoom
      if(buildingFade>0){
        ctx.save();
        ctx.translate(ZOOM_OX_END, ZOOM_OY_END);
        ctx.scale(ZOOM_S_END, ZOOM_S_END);
        drawLincolnBuilding(buildingFade);
        ctx.restore();
      }

      // Gameplay grid phasing in
      if(rampReveal>0){
        ctx.globalAlpha=rampReveal;
        drawGameplay(false);
        ctx.globalAlpha=1;
      }

      // Bricks tumbling
      const shakeX=(Math.random()-0.5)*shakeAmt;
      const shakeY=(Math.random()-0.5)*shakeAmt;
      ctx.save(); ctx.translate(shakeX,shakeY);
      bricks.forEach(b=>{
        if(!b.active) return;
        ctx.save();
        ctx.translate(b.x+b.w/2, b.y+b.h/2);
        ctx.rotate(b.rot);
        ctx.fillStyle=b.color;
        ctx.fillRect(-b.w/2,-b.h/2,b.w,b.h);
        // Mortar line
        ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1;
        ctx.strokeRect(-b.w/2,-b.h/2,b.w,b.h);
        // Highlight
        ctx.fillStyle='rgba(255,255,255,0.15)';
        ctx.fillRect(-b.w/2,-b.h/2,b.w,3);
        ctx.restore();
      });
      ctx.restore();

      // DTJ stays at his platform position during shatter
      if(buildingFade > 0 || rampReveal < 1) {
        ctx.globalAlpha = Math.max(buildingFade, rampReveal);
        drawSprite('dtj_idle', DTJ_GAMEPLAY_X, TOP.y, 110);
        ctx.globalAlpha = 1;
      }

      // Particles
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;

      // Screen flash on big impacts
      if(shatterT<0.12){
        ctx.fillStyle=`rgba(255,255,255,${(0.12-shatterT)/0.12*0.7})`;
        ctx.fillRect(0,0,W,H);
      }
      if(shatterT>0.5&&shatterT<0.62){
        ctx.fillStyle=`rgba(255,180,0,${(0.62-shatterT)/0.12*0.5})`;
        ctx.fillRect(0,0,W,H);
      }
      break;
    }

    case 'GAMEPLAY': {
      // H2 — survival score: +SCORE_PER_SECOND × multiplier per second (no float spawns; HUD score
      // ticks visibly at +10/s base, +30/s while ×3 boost is active). I5 — also tracked into
      // stats.survivalScore for the cutscene breakdown.
      {
        const inc = SCORE_PER_SECOND * dt * multiplier;
        playerScore += inc;
        stats.survivalScore += inc;
      }
      updatePlayer(dt);
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);
      drawGameplay(shakeAmt>0);
      // Particles leftover
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      // Press to start
      if(stateT<4){
        const ba=Math.sin(stateT*4)>0;
        if(ba){
          ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H/2-55,W,75);
          ctx.fillStyle='#ffcc00'; ctx.font='bold 18px monospace'; ctx.textAlign='center';
          ctx.fillText('PRESS ANY KEY TO PLAY',W/2,H/2-16);
          ctx.fillStyle='#aaa'; ctx.font='11px monospace';
          ctx.fillText('← → MOVE   SPACE JUMP   A=UP  Z=DOWN',W/2,H/2+14);
        }
      }
      break;
    }

    // H1 — 0.6s pause after the win trigger. Player is frozen (updatePlayer NOT called).
    // Capsules / helpers / Pelosi / pickup keep animating so the world doesn't visibly stall.
    // Capsule-kill is suppressed via the state guard inside updateCapsules. I7 — at end of
    // freeze we now hand off to the cutscene chain, not directly to a final overlay.
    case 'WIN_FREEZE': {
      winFreezeT += dt;
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);
      drawGameplay(false);
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;
      if (winFreezeT >= WIN_FREEZE_DURATION) {
        // N-FIX-7 — state-driven: CUTSCENE_FADE_IN maps to SILENT in computeDesiredMusic.
        // tickBGM transitions BGM_ROTATION → SILENT next tick (cancel ramps + 100ms fade).
        state = 'CUTSCENE_FADE_IN';
        stateT = 0;
        cutsceneT = 0;
      }
      break;
    }

    // J — DEATH_REACTION: ragdoll spin (phase1) → burst into debris (phase2). NOT a freeze —
    // capsules / helpers / Pelosi / pickup keep updating beneath so the world carries on around
    // the dying player. Capsule re-hit is blocked by the GAMEPLAY-only guard inside updateCapsules
    // + the explicit DEATH_REACTION/GAME_OVER guard in hit(). drawGameplay's player-render block
    // checks `state === 'DEATH_REACTION'` and switches to a rotated draw (phase1) or suppresses
    // the player draw entirely (phase2).
    case 'DEATH_REACTION': {
      deathReactionT += dt;
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);

      if (deathPhase === 'phase1') {
        // Ragdoll physics — separate from updatePlayer so platform collision is bypassed (player
        // tumbles through the world). Gravity matches walk-state GRAVITY=1400 for visual continuity.
        player.x += player.deathVx * dt;
        player.y += player.deathVy * dt;
        player.deathVy += GRAVITY * dt;
        player.deathRotation += 720 * dt;                 // two full rotations per second
        // Phase1 → phase2 transition: passed below FLOOR by 40px OR phase1 cap elapsed (whichever first).
        const fellThrough = player.y > FLOOR.y + DEATH_BURST_FALL_TRIGGER;
        const cappedOut   = deathReactionT >= DEATH_PHASE1_MAX_DURATION;
        if (fellThrough || cappedOut) {
          deathPhase = 'phase2';
          // K — burst spawn delegated to shared spawnRagdollBurst (also used by Antifa splat).
          spawnRagdollBurst(player.x, player.y - 24, DEATH_DEBRIS_COUNT);
          playSfx_burst();                                      // N — pop+fzzt on phase2 trigger
        }
      }
      // K — debris physics ticks every frame in the main loop's tickRagdollDebris(); local
      // tick removed. Render still happens after drawGameplay so debris draws on top.

      drawGameplay(false);                                  // renders world; player handled per state inside
      // Existing particles trail
      particles.forEach(p=>{
        ctx.globalAlpha=Math.max(p.life,0);
        ctx.fillStyle=p.color;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha=1;

      // End-of-reaction transition (lives decrement + branch).
      if (deathReactionT >= DEATH_REACTION_DURATION) {
        player.lives -= 1;
        deathReactionT = 0;
        deathPhase = 'phase1';
        if (player.lives <= 0) {
          // Capture final score for the GAME_OVER overlay total + initials-entry trigger.
          gameOverFinalScore = playerScore;
          // K-FIX-5 — highScoreNew computed now (snapshot at game-over moment). Used by
          // drawScoreBreakdown to draw the green 'NEW HIGH SCORE!' line. Insertion deferred
          // to submitInitialsEntry after the player enters their initials.
          highScoreNew = scoreMakesTop5(playerScore);
          // L-FIX-1 — was: state='GAME_OVER' immediately + trigger initials entry here.
          // Now: state='GAMEOVER_PENDING' so the DTJ dance + bubbles play in full before the
          // overlay covers them. Initials-entry trigger MOVED to the GAMEOVER_PENDING →
          // GAME_OVER transition (when dtjDanceState === 'IDLE' && !bubble.active).
          state = 'GAMEOVER_PENDING';
          stateT = 0;
          gameOverPendingT = 0;        // N-FIX-8 — dedicated PENDING timer; floor of 6.0s before GAME_OVER fires
          // N-FIX-9 diagnostic — TEMPORARY. Logs the moment PENDING is entered with current
          // dance state. Removed in N-FIX-10 once gate behavior is confirmed.
          if (typeof console !== 'undefined') {
            console.log('PENDING ENTERED at frame', performance.now().toFixed(0),
              'dtjDanceState =', dtjDanceState,
              'dtjDanceCycles =', dtjDanceCycles,
              'dtjDanceT =', dtjDanceT.toFixed(3),
              'lives =', player.lives);
          }
        } else {
          // L — score PERSISTS across respawn (lives already decremented). Multiplier and
          // briefcase reset (streak loss penalty). Capsules cleared for clean restart.
          // Helpers / Pelosi / SS / pickup INTENTIONALLY LEFT IN PLACE — mid-action entities
          // continue across the respawn (funny). Platforms-reached re-seeded inside the helper.
          resetForRespawn();
          playSfx_respawn();                                   // N — ready ding on respawn
          // N-FIX-6 BUG 4 — DON'T unmute BGM at respawn. The dance is still running for
          // ~2s more (cycles=1 → 3.0s total, dance started 1.0s before respawn). Unmuting
          // here caused BGM + YMCA to overlap audibly during the post-respawn dance phase.
          // bgmDeathMuted stays true; tickDtjDance dance-end branch handles the unmute when
          // the dance actually finishes (single source of truth for BGM-restoration timing).
          state = 'GAMEPLAY';
          stateT = 0;
        }
      }
      break;
    }

    // L-FIX-1 — GAMEOVER_PENDING: wait for DTJ dance + bubble to finish before showing the
    // GAME_OVER overlay. Player is dead (drawGameplay's player-render block checks for this
    // state and suppresses the player). World keeps living: capsules/helpers/Pelosi/SS keep
    // ticking so mid-action chaos plays out underneath the dance. Transition to GAME_OVER
    // when both dtjDanceState === 'IDLE' AND !bubble.active. Initials-entry trigger
    // moved here from DEATH_REACTION end so it fires at the moment the overlay actually
    // appears (and not during the dance).
    case 'GAMEOVER_PENDING': {
      updateCapsules(dt);
      updatePickup(dt);
      updateHelpers(dt);
      updatePelosi(dt);
      updateSS(dt);
      drawGameplay(false);
      // N-FIX-8 — dedicated gameOverPendingT counter. Replaces N-FIX-6's `stateT >= 6.0`
      // gate to isolate the timer from any code path that resets stateT mid-PENDING.
      // Math: dance starts at hit+0.2s during DEATH_REACTION; DEATH_REACTION ends at
      // hit+1.2s = PENDING entry; dance ends at hit+0.2+(3.0*2)=6.2s = PENDING+5.0s.
      // With this 6.0s floor on gameOverPendingT, PENDING runs PENDING+6.0s = hit+7.2s,
      // giving the dance a full second of post-IDLE buffer for YMCA tail to fully decay
      // before the GAME_OVER overlay covers the dance.
      gameOverPendingT += dt;
      // N-FIX-9 diagnostic — TEMPORARY. Logs every frame inside PENDING so Brian can see if
      // the gate is incrementing correctly and which condition trips first. Removed in N-FIX-10.
      if (typeof console !== 'undefined') {
        console.log('PENDING TICK:',
          'gameOverPendingT =', gameOverPendingT.toFixed(3),
          'dt =', dt.toFixed(4),
          'dtjDanceState =', dtjDanceState,
          'bubble.active =', bubble.active,
          'willTransition =', (gameOverPendingT >= 6.0 && dtjDanceState === 'IDLE' && !bubble.active));
      }
      if (gameOverPendingT >= 6.0 && dtjDanceState === 'IDLE' && !bubble.active) {
        if (highScoreNew) {
          initialsEntryActive = true;
          initialsCursor      = 0;
          initialsLetters[0]  = 'A';
          initialsLetters[1]  = 'A';
          initialsLetters[2]  = 'A';
          initialsConfirmedT  = 0;
          playSfx_newHighScore();                                  // N — chime ladder on new high
        }
        // N-FIX-7 — state-driven: GAME_OVER maps to SILENT in computeDesiredMusic; tickBGM
        // transitions on next frame. No explicit stopBGM call needed.
        playSfx_gameOver();                                       // N — sad horn on overlay reveal
        state = 'GAME_OVER';
        stateT = 0;
      }
      break;
    }

    // J — GAME_OVER: breakdown overlay reuses CUTSCENE_SCORE layout via drawScoreBreakdown.
    // K — when initialsEntryActive: hide the TAP TO RESTART prompt (gated via passing empty
    // prompt) and overlay the initials UI on top of the breakdown. Submitting the 3rd letter
    // sets initialsEntryActive=false and starts the 1.0s "INITIALS SAVED" confirmation, after
    // which the prompt re-appears.
    case 'GAME_OVER': {
      const showRestartPrompt = !initialsEntryActive && initialsConfirmedT <= 0;
      drawScoreBreakdown({
        header:        'GAME OVER',
        total:         gameOverFinalScore,
        prompt:        showRestartPrompt ? 'TAP TO RESTART' : '',
        pulseT:        stateT,
        showHighScore: true,
        // K-FIX-5 — pass the leaderboard array (top-5). drawScoreBreakdown uses it to render
        // the TOP 5 list (L-FIX-3 removed the standalone HIGH SCORE summary row above it).
        // Empty array → TOP 5 hidden entirely; (optional) NEW HIGH SCORE! line still renders.
        highScores:    highScores,
        isNewHigh:     highScoreNew,
        showCredit:    true,                              // J — creator credit at very bottom
      });
      // K — initials entry UI overlays the breakdown when active. After submit, the
      // INITIALS SAVED confirmation displays for 1.0s before TAP TO RESTART re-appears.
      if (initialsEntryActive) {
        drawInitialsEntryUI();
      } else if (initialsConfirmedT > 0) {
        ctx.save();
        ctx.fillStyle = '#aaffaa';
        ctx.font = 'bold 18px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('INITIALS SAVED', W/2, 730);
        ctx.restore();
      }
      break;
    }

    // I1 — cutscene state machine. Each phase below renders a placeholder for now; I2..I6 will
    // populate the visuals (RNC stage bg, dialogue, eagle, score breakdown, between-levels sky).
    // Gameplay simulation is suspended in all CUTSCENE_* states (no updateCapsules etc.).

    case 'CUTSCENE_FADE_IN': {
      cutsceneT += dt;
      // Fade gameplay → black. Render frozen gameplay first, then a black quad whose alpha rises
      // from 0 → 1 over CUTSCENE_FADE_DURATION.
      drawGameplay(false);
      const a = Math.min(stateT / CUTSCENE_FADE_DURATION, 1);
      ctx.fillStyle = 'rgba(0,0,0,' + a.toFixed(3) + ')';
      ctx.fillRect(0, 0, W, H);
      if (stateT >= CUTSCENE_FADE_DURATION) {
        state = 'CUTSCENE_PHASE1';
        stateT = 0;
        // I-CORR-3 — push the two PHASE1 dialogue captions on transition entry. They render in the
        // top-of-canvas strip (single visible at a time, fade-in/hold/fade-out).
        pushCaption('DNC', "YOU'RE FIRED, MR. PRESIDENT!", 1.8);
        pushCaption('DJT', 'WITCH HUNT!', 1.2);
      }
      break;
    }

    case 'CUTSCENE_PHASE1': {
      cutsceneT += dt;
      drawRncStage();

      // I3 — DNC walks from x=80 to x=200 over 2.0s (60 px/s, 120 px), then idles. drawDonkey
      // expects the y arg as the foot position; STAGE_FLOOR_Y (=540) is the gold-star carpet line.
      const DNC_START_X = 80;
      const DNC_TARGET_X = 200;
      const DNC_WALK_DUR = (DNC_TARGET_X - DNC_START_X) / 60;     // = 2.0s
      const dncProgress = Math.min(stateT, DNC_WALK_DUR) / DNC_WALK_DUR;
      const dncX = DNC_START_X + (DNC_TARGET_X - DNC_START_X) * dncProgress;
      const dncWalking = stateT < DNC_WALK_DUR;
      drawDonkey(dncX, STAGE_FLOOR_Y, 1.0, false, dncWalking, stateT);

      // DTJ idle in front of the podium (right side of stage). 80px tall per spec.
      // I-CORR-4 — height multiplied by dtjScale so DTJ pops to 1.6x during the "WITCH HUNT!"
      // caption hold (and shrinks back during fadeout). Feet stay pinned at STAGE_FLOOR_Y because
      // drawSprite footFrac=1.0 anchors the bottom of the sprite at y. Faces LEFT (toward DNC,
      // his accuser) — no flip.
      const dtjX = 320;
      drawSprite('dtj_idle', dtjX, STAGE_FLOOR_Y, 80 * dtjScale, false, 1.0);

      // I-CORR-3 — captions render in the top strip (pushed on FADE_IN→PHASE1 entry).
      renderCutsceneCaption();

      if (stateT >= CUTSCENE_PHASE1_DURATION) {
        // N-FIX-7 — state-driven: CUTSCENE_PHASE3 maps to NESSUN_DORMA in computeDesiredMusic.
        // tickBGM transitions SILENT → NESSUN_DORMA next tick (cancel ramps + 100ms fade-out
        // + 200ms fade-in to 1.0 + playNessunDorma scheduling).
        state = 'CUTSCENE_PHASE3';
        stateT = 0;
      }
      break;
    }

    case 'CUTSCENE_PHASE3': {
      cutsceneT += dt;
      drawRncStage();

      // DNC stays at her PHASE1 ending position, idle, watching.
      drawDonkey(200, STAGE_FLOOR_Y, 1.0, false, false, 0);

      // I-EAGLE-REWRITE — 4-step DTJ pose sequence ending in a HARD CUT to a pre-composed
      // eagle_carry sprite. No runtime compositing, no rotation, no fade. Mutual exclusion:
      // dtjStageMode === 'NONE' iff comboActive === true (verified below by render gate).
      //
      //   STEP1 IDLE       0.0–0.8s   dtj_idle facing forward (no flip)
      //   STEP2 TURN       0.8–1.4s   dtj_walk side-profile facing left
      //   STEP3 SURPRISED  1.4–2.0s   dtj_surprised mouth-open looking up
      //   STEP4 CARRIED    2.0–exit   eagle_carry combined sprite ascending + drifting left
      //
      // DTJ x stays at DTJ_STAGE_X across all steps (he turns/reacts in place). At t=2.0 the
      // hard cut places the combo at the exact same x with foot at STAGE_FLOOR_Y so the cut
      // reads in-place. Combo then ascends at 220 px/s with -30 px/s drift.
      const DTJ_STAGE_X = 320;

      if (stateT < 0.8) {
        dtjStageMode = 'IDLE';      comboActive = false;
      } else if (stateT < 1.4) {
        dtjStageMode = 'WALK';      comboActive = false;
      } else if (stateT < 2.0) {
        dtjStageMode = 'SURPRISED'; comboActive = false;
      } else {
        // First frame of STEP4: hard cut. Lazy-init combo position + push the THANK YOU caption.
        if (!comboActive) {
          combo.x = DTJ_STAGE_X;
          combo.y = STAGE_FLOOR_Y;                       // foot anchor — combo bottom == DTJ bottom
          pushCaption('DJT', 'THANK YOU PATRIOTS!', 2.0);
          playSfx_eagleScreech();                        // N — eagle screech at hard-cut moment
        }
        dtjStageMode = 'NONE';
        comboActive  = true;
        combo.y -= 220 * dt;                              // ascend
        combo.x -=  30 * dt;                              // slight leftward drift
      }

      // RENDER GATE — mutually exclusive. Stage DTJ XOR combo, never both in one frame.
      if      (dtjStageMode === 'IDLE')      drawSprite('dtj_idle',      DTJ_STAGE_X, STAGE_FLOOR_Y, 80, false, 1.0);
      else if (dtjStageMode === 'WALK')      drawSprite('dtj_walk',      DTJ_STAGE_X, STAGE_FLOOR_Y, 80, false, 1.0);
      else if (dtjStageMode === 'SURPRISED') drawSprite('dtj_surprised', DTJ_STAGE_X, STAGE_FLOOR_Y, 80, false, 1.0);
      // dtjStageMode === 'NONE' renders no individual DTJ sprite this frame.
      if (comboActive) drawSprite('eagle_carry', combo.x, combo.y, COMBO_H, false, 1.0);

      // Phase exit: combo foot < 0 means the entire combined sprite is above the canvas top.
      if (comboActive && combo.y < 0) {
        state = 'CUTSCENE_SCORE';
        stateT = 0;
        comboActive  = false;                             // SCORE has no combo render
        dtjStageMode = 'NONE';
      }

      // I-CORR-3 — caption strip renders flush above the cutscene scene background.
      renderCutsceneCaption();
      break;
    }

    case 'CUTSCENE_SCORE': {
      cutsceneT += dt;
      // I5 — full score breakdown overlay. J — render delegated to shared drawScoreBreakdown
      // helper (reused by GAME_OVER). showHighScore=false → no high-score block on level-complete.
      drawScoreBreakdown({
        header:        'LEVEL 1 COMPLETE',
        total:         winFinalScore,
        prompt:        'TAP TO CONTINUE',
        pulseT:        stateT,
        showHighScore: false,
      });
      // I-CORR-3 — render any caption that's still fading out from PHASE3 ascent.
      renderCutsceneCaption();
      break;
    }

    case 'CUTSCENE_BETWEEN': {
      cutsceneT += dt;
      drawCutsceneSky(dt);

      // I-EAGLE-REWRITE (direction-fix addendum) — eagle_carry.png shows DTJ + eagle oriented
      // for LEFTWARD flight, so the combined sprite enters from off-screen RIGHT and travels
      // right-to-left across the sky. Speed 80 px/s, hold at t=4.5s. Spawn x is tuned so the
      // sprite lands at canvas center (W/2 = 240) cleanly, not too far left. PHASE3 ascent
      // already drifts left (-30 px/s), so combined cutscene reads consistently: eagle exits
      // upper-left in PHASE3, then a fresh pass right→left in BETWEEN.
      // Mutually exclusive: never render an individual DTJ sprite here. dtjStageMode = 'NONE'.
      if (!comboActive) {
        comboActive  = true;
        dtjStageMode = 'NONE';
        combo.x = W / 2 + 80 * 4.5;                       // = 600; lands at W/2 at t=4.5s
        combo.y = H * 0.4 + COMBO_H * 0.5;                // mid-canvas vertically
      }
      if (stateT < 4.5) combo.x -= 80 * dt;               // leftward at 80 px/s; hold from t=4.5s
      drawSprite('eagle_carry', combo.x, combo.y, COMBO_H, false, 1.0);

      // I-CORR-3 — DTJ caption rotation lives in the top-of-canvas strip. The 3 lines are
      // pushed in cutsceneAdvance (SCORE→BETWEEN). renderCutsceneCaption() draws current.

      // I6 — end card revealed at t >= 5.0s.
      // K-FIX-4 — wording updated to win-state language. Was "LEVEL 2 COMING SOON" + "TAP TO
      // RESTART". Now four lines: "LEVEL 1 COMPLETE!" hero header in gold + "LEVEL 2 COMING
      // SOON" subtitle + "TAP TO CONTINUE" action prompt + creator credit. "RESTART" wording
      // sounded like game-over language; "CONTINUE" reads as forward progress (which is what
      // K-FIX-3 made it — score and lives carry through). GAME_OVER overlay still uses
      // "TAP TO RESTART" because that IS a restart.
      if (stateT >= 5.0) {
        // Line 1 — hero header (gold, larger weight matching breakdown TOTAL styling).
        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('LEVEL 1 COMPLETE!', W/2, 200);
        // Line 2 — subtitle (white, current size from prior reveal).
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 22px monospace';
        ctx.fillText('LEVEL 2 COMING SOON', W/2, 240);
        // Line 3 — pulsing action prompt.
        const pulseB = 0.5 + 0.5 * Math.sin(stateT * 4);
        ctx.fillStyle = 'rgba(255,255,255,' + (0.35 + 0.55 * pulseB).toFixed(3) + ')';
        ctx.font = 'bold 14px monospace';
        ctx.fillText('TAP TO CONTINUE', W/2, 278);
        // K-FIX-5 — auto-continue countdown. 10-second window starts at t=5.0s; at t=15.0s the
        // level transition fires automatically via resetForLevelTransition() (same path as a
        // tap). Tap remains available throughout — K-FIX-2 guard in cutsceneAdvance allows tap
        // from t>=5.0s, so player can skip the countdown by tapping.
        const elapsedSinceReveal = stateT - 5.0;
        const secondsLeft = Math.max(0, Math.ceil(10.0 - elapsedSinceReveal));
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.font = '11px monospace';
        ctx.fillText('(AUTO-CONTINUE IN ' + secondsLeft + ')', W/2, 296);
        // Line 4 — K-FIX-3 dark gold credit. Pushed down 4px to clear the countdown line.
        ctx.fillStyle = '#9a7a00';
        ctx.font = '10px monospace';
        ctx.fillText('Created by Brian Albert', W/2, 322);
        // Auto-continue trigger.
        if (stateT >= 15.0) {
          resetForLevelTransition();
          break;
        }
      }

      // I-CORR-3 — caption strip flush above sky horizon.
      renderCutsceneCaption();
      break;
    }
  }

  // N — PAUSED case is its own state; render gameplay underneath frozen + overlay on top.
  if (state === 'PAUSED') {
    // Draw last-known gameplay frame underneath the dim overlay. drawGameplay's update calls
    // are skipped because we're not in GAMEPLAY case, but the world entities are stationary
    // (they don't tick during PAUSED), so re-rendering the static scene is correct.
    drawGameplay(false);
    drawPauseOverlay();
  }
  // N — global icons render OUTSIDE the state switch so they're always visible (audio always
  // togglable; pause icon visible during GAMEPLAY + PAUSED only — gated inside drawPauseIcon
  // call here via state check). Drawn LAST so they sit on top of overlays.
  drawAudioIcon();
  if (isPausableState() || state === 'PAUSED') drawPauseIcon();
}

requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
