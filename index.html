    //   phase1: rotated sprite about body center (deathRotation accumulates at 720°/s)
    //   phase2: suppressed entirely (debris IS the visual; rendered globally elsewhere)
    if (h.type === 'ANTIFA' && h.state === 'RAGDOLL') {
      if (h.ragdollPhase === 'phase2') continue;
      ctx.save();
      ctx.translate(h.x, h.y - h.h * 0.5);
      ctx.rotate(h.deathRotation * Math.PI / 180);
      drawSprite(h.sprite, 0, h.h * 0.5, h.h, false, 1.0);
      ctx.restore();
      continue;
    }
    drawSprite(h.sprite, h.x, h.y, h.h, h.vx < 0, 1.0);
  }
}

// K — Secret Service activate/update/draw. Spawns 3 stationary units when an Antifa starts
// climbing ladder[5]. Grab-and-throw any Antifa exiting onto TOP near ladder[5]. Fade out 0.5s
// after the last Antifa entity despawns. ZERO interaction with player or capsules — never appears
// in any AABB check against either. ZERO score awarded for throws (decorative gag only).
function activateSS() {
  const lad5 = ladders[SS_TARGET_LADDER_IX];
  ss.active = true;
  ss.fadeAlpha = 1;
  ss.fadeOutTimer = 0;
  ss.units[0].x = DTJ_GAMEPLAY_X + 60;                   // bodyguard next to DTJ
  ss.units[0].y = TOP.y;
  ss.units[1].x = lad5.x - 30;                           // left flank
  ss.units[1].y = TOP.y;
  ss.units[2].x = lad5.x + LADDER_W + 30;                // right flank
  ss.units[2].y = TOP.y;
  for (const u of ss.units) { u.state = 'IDLE'; u.stateT = 0; u.targetAntifa = null; }
  if (typeof console !== 'undefined') console.log('SS ACTIVATED at t=' + totalT.toFixed(2));
}

function updateSS(dt) {
  // Activation scan: any Antifa currently climbing ladder[5] AND ss not yet active.
  if (!ss.active) {
    const lad5 = ladders[SS_TARGET_LADDER_IX];
    for (const h of helpers) {
      if (h.type === 'ANTIFA' && h.state === 'CLIMB' && h.currentLad === lad5) {
        activateSS();
        break;
      }
    }
  }
  if (!ss.active && ss.fadeAlpha <= 0) return;

  // Throw-trigger scan: any ungrabbed non-ragdoll Antifa whose plat is TOP and whose x is within
  // SS_GRAB_X_RANGE of ladder[5] cx → assign to nearest IDLE flank unit, transition to GRAB.
  if (ss.active) {
    const lad5    = ladders[SS_TARGET_LADDER_IX];
    const lad5Cx  = lad5.x + LADDER_W / 2;
    const ssLeft  = ss.units[1];
    const ssRight = ss.units[2];
    for (const h of helpers) {
      if (h.type !== 'ANTIFA') continue;
      if (h.state !== 'WALK') continue;
      if (h.grabbed) continue;
      if (h.plat !== TOP) continue;
      if (Math.abs(h.x - lad5Cx) > SS_GRAB_X_RANGE) continue;
      // Pick nearest IDLE flank.
      const leftIdle  = ssLeft.state  === 'IDLE';
      const rightIdle = ssRight.state === 'IDLE';
      if (!leftIdle && !rightIdle) continue;
      let chosen;
      if      (!leftIdle)  chosen = ssRight;
      else if (!rightIdle) chosen = ssLeft;
      else chosen = (Math.abs(ssLeft.x - h.x) <= Math.abs(ssRight.x - h.x)) ? ssLeft : ssRight;
      chosen.state = 'GRAB';
      chosen.stateT = 0;
      chosen.targetAntifa = h;
      h.grabbed = true;
    }
  }

  // Per-unit tick.
  for (const u of ss.units) {
    if (u.state === 'GRAB') {
      u.stateT += dt;
      if (u.targetAntifa) {
        u.targetAntifa.x = u.x;
        u.targetAntifa.y = u.y - SS_HEIGHT * 0.5;        // pin to hand
      }
      if (u.stateT >= SS_GRAB_DURATION) {
        // THROW — launch antifa into RAGDOLL state. ZERO score per spec (decorative only).
        const a = u.targetAntifa;
        if (a) {
          a.state          = 'RAGDOLL';
          a.ragdollPhase   = 'phase1';
          a.ragdollT       = 0;
          a.ragdollPhaseT  = 0;
          a.deathVx        = (Math.random() < 0.5 ? -1 : 1) * SS_THROW_VX_MAG;
          a.deathVy        = SS_THROW_VY;
          a.deathRotation  = 0;
          a.grabbed        = false;
          playSfx_antifaThrown();                              // N — yeet whoosh on throw
        }
        u.state = 'IDLE';
        u.stateT = 0;
        u.targetAntifa = null;
      }
    }
  }

  // Deactivation: count active Antifa entities (including ragdolling ones — they still occupy
  // helpers[]). When the last one is gone, start the 0.5s fade.
  let antifaCount = 0;
  for (const h of helpers) if (h.type === 'ANTIFA') antifaCount++;
  if (ss.active && antifaCount === 0 && ss.fadeOutTimer === 0) {
    ss.fadeOutTimer = SS_FADE_DURATION;
  }
  if (ss.fadeOutTimer > 0) {
    ss.fadeOutTimer -= dt;
    ss.fadeAlpha = Math.max(0, ss.fadeOutTimer / SS_FADE_DURATION);
    if (ss.fadeOutTimer <= 0) {
      ss.active       = false;
      ss.fadeAlpha    = 0;
      ss.fadeOutTimer = 0;
      for (const u of ss.units) { u.state = 'IDLE'; u.stateT = 0; u.targetAntifa = null; }
    }
  }
}

function drawSS() {
  if (!ss.active && ss.fadeAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = ss.fadeAlpha;
  for (const u of ss.units) {
    drawSprite('secret_service', u.x, u.y, SS_HEIGHT, false, 1.0);
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  G2 — NANCY PELOSI CAMEO (FLOOR walker, per April 30 2026 Notion revision)
// ─────────────────────────────────────────────
// Independent 30–45s timer. On fire: spawn at right screen edge on FLOOR, walk LEFT at 50 px/s.
// If she walks within ~30px of a capsule on FLOOR → GRAB → SLAM (glass shatter particles) →
// TEAR (pelosi_idle → pelosi_tear; two paper pieces fly off in arcs) → award PELOSI_BONUS (+500)
// → turn around, walk back RIGHT, despawn off the right edge. If she reaches x≈60 (left limit)
// without grabbing: SHRUG (0.4s, no sprite swap, small arm-up bounce via y-bob) → walk back right,
// no points. No collision with player at any phase.
//
// Phase machine (J — added CARRY_TO_ANCHOR between GRAB and SLAM):
//   IDLE → WALKING_LEFT → (GRAB → CARRY_TO_ANCHOR → SLAM → TEAR | SHRUG) → WALKING_RIGHT → IDLE
const PELOSI_HEIGHT           = 80;
const PELOSI_WALK_SPD         = 50;
const PELOSI_GRAB_RANGE_X     = 30;
const PELOSI_GRAB_DURATION    = 0.4;
const PELOSI_SLAM_DURATION    = 0.3;
const PELOSI_TEAR_DURATION    = 0.6;
const PELOSI_SHRUG_DURATION   = 0.4;
const PELOSI_LEFT_LIMIT       = 240;       // C1 — halfway across FLOOR (W/2). Was 60.
// J — smash anchor. After GRAB, Pelosi walks the capsule to this x before SLAM so the smash
// always plays in full view, never half-off-canvas. Same value as PELOSI_LEFT_LIMIT (canvas
// center) — kept as a separate constant since it expresses a different intent.
const PELOSI_SMASH_X          = 240;
const PELOSI_ANCHOR_TOLERANCE = 4;         // px — Pelosi snaps to PELOSI_SMASH_X within this
const PELOSI_INTERVAL_MIN     = 30.0;
const PELOSI_INTERVAL_MAX     = 45.0;
const PELOSI_BONUS            = 500;
const PELOSI_FLASH_LIFETIME   = 1.5;
const PELOSI_TORN_LIFETIME    = 1.0;

const pelosi = {
  active: false,
  phase: 'IDLE',
  phaseT: 0,
  timer: PELOSI_INTERVAL_MIN + Math.random() * (PELOSI_INTERVAL_MAX - PELOSI_INTERVAL_MIN),
  x: 0, y: 0,
  facing: -1,                                                     // -1 = facing left, +1 = facing right
  targetCapsule: null,
};
const pelosiFlash = { active: false, t: 0, x: 0, y: 0 };
const tornPieces = [];                                            // paper shards flying off after a tear

function findFloorCapsuleNearPelosi() {
  // Capsule must be on FLOOR AND within PELOSI_GRAB_RANGE_X of pelosi.x.
  for (const c of capsules) {
    if (c.onPlat !== FLOOR) continue;
    if (Math.abs(c.x - pelosi.x) < PELOSI_GRAB_RANGE_X) return c;
  }
  return null;
}

function spawnPelosiGlassShatter(x, y) {
  // White-blue glass shard burst — reuses the existing particles[] system.
  const cols = ['#ddffff', '#aaeeff', '#ffffff', '#88ccff', '#ccccff'];
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 110;
    particles.push({
      x: x, y: y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 60,                                 // slight upward bias
      life: 1,
      decay: 1.1 + Math.random() * 0.5,
      r: 2 + Math.random() * 3,
      color: cols[Math.floor(Math.random() * cols.length)],
    });
  }
}

function spawnPelosi() {
  pelosi.active = true;
  pelosi.phase = 'WALKING_LEFT';
  pelosi.phaseT = 0;
  pelosi.x = W + 20;                                              // start just off-screen right
  pelosi.y = FLOOR.y;                                             // foot at floor surface
  pelosi.facing = -1;
  pelosi.targetCapsule = null;
}

function updatePelosi(dt) {
  // Bonus flash + torn pieces tick regardless of pelosi.active so they finish their animation
  // even if Pelosi has already despawned.
  if (pelosiFlash.active) {
    pelosiFlash.t += dt;
    if (pelosiFlash.t >= PELOSI_FLASH_LIFETIME) pelosiFlash.active = false;
  }
  for (let i = tornPieces.length - 1; i >= 0; i--) {
    const t = tornPieces[i];
    t.t   += dt;
    t.x   += t.vx * dt;
    t.y   += t.vy * dt;
    t.vy  += 240 * dt;                                            // gravity
    t.rot += t.rotV * dt;
    if (t.t > PELOSI_TORN_LIFETIME || t.x < -50 || t.x > W + 50 || t.y > H + 50) {
      tornPieces.splice(i, 1);
    }
  }

  if (!pelosi.active) {
    pelosi.timer -= dt;
    if (pelosi.timer <= 0) {
      spawnPelosi();
      pelosi.timer = PELOSI_INTERVAL_MIN + Math.random() * (PELOSI_INTERVAL_MAX - PELOSI_INTERVAL_MIN);
    }
    return;
  }

  pelosi.phaseT += dt;
  switch (pelosi.phase) {
    case 'WALKING_LEFT': {
      pelosi.x -= PELOSI_WALK_SPD * dt;
      pelosi.facing = -1;
      const cap = findFloorCapsuleNearPelosi();
      if (cap) {
        pelosi.targetCapsule = cap;
        pelosi.phase = 'GRAB';
        pelosi.phaseT = 0;
      } else if (pelosi.x <= PELOSI_LEFT_LIMIT) {
        pelosi.x = PELOSI_LEFT_LIMIT;
        pelosi.phase = 'SHRUG';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'GRAB': {
      if (pelosi.phaseT >= PELOSI_GRAB_DURATION) {
        // J — capsule is captured but NOT destroyed yet. Pelosi will carry it to PELOSI_SMASH_X
        // before slamming. Setting `carried = true` makes updateCapsules skip the carried capsule
        // entirely (no roll, no fall, no player-collision, no off-screen despawn). vx=0 is
        // belt-and-suspenders — even if updateCapsules ran for one frame before the flag was
        // checked, vx=0 prevents motion.
        if (pelosi.targetCapsule) {
          pelosi.targetCapsule.carried = true;
          pelosi.targetCapsule.vx = 0;
        }
        pelosi.phase = 'CARRY_TO_ANCHOR';
        pelosi.phaseT = 0;
      }
      break;
    }

    // J — CARRY_TO_ANCHOR: walk Pelosi (and the carried capsule) to PELOSI_SMASH_X before the
    // SLAM/TEAR sequence plays. Direction depends on which side of the anchor she's on. On
    // arrival, splice the capsule + spawn the glass shatter (work that was previously in GRAB
    // end), then transition to SLAM. Defensive: if the carried capsule has somehow been removed
    // (shouldn't happen — carried=true skips all despawn paths), fall through to SHRUG and exit.
    case 'CARRY_TO_ANCHOR': {
      const carriedAlive = pelosi.targetCapsule && capsules.indexOf(pelosi.targetCapsule) >= 0;
      if (!carriedAlive) {
        pelosi.targetCapsule = null;
        pelosi.phase = 'SHRUG';
        pelosi.phaseT = 0;
        break;
      }
      const dx = PELOSI_SMASH_X - pelosi.x;
      if (Math.abs(dx) <= PELOSI_ANCHOR_TOLERANCE) {
        // Arrived. Snap to anchor, splice capsule, spawn shatter, transition to SLAM.
        pelosi.x = PELOSI_SMASH_X;
        const ci = capsules.indexOf(pelosi.targetCapsule);
        if (ci >= 0) capsules.splice(ci, 1);
        spawnPelosiGlassShatter(pelosi.x, pelosi.y - PELOSI_HEIGHT * 0.55);
        playSfx_pelosiSlam();                                  // N — glass shatter on slam
        pelosi.phase = 'SLAM';
        pelosi.phaseT = 0;
        break;
      }
      // Walk toward anchor; facing follows movement direction.
      if (dx > 0) {
        pelosi.x += PELOSI_WALK_SPD * dt;
        pelosi.facing = 1;
      } else {
        pelosi.x -= PELOSI_WALK_SPD * dt;
        pelosi.facing = -1;
      }
      // Drag the capsule with her at hand height. Capsule is rendered separately by drawCapsules
      // (which iterates capsules[]); we just keep its position pinned to Pelosi's hand each frame.
      pelosi.targetCapsule.x = pelosi.x;
      pelosi.targetCapsule.y = pelosi.y - PELOSI_HEIGHT * 0.5;
      break;
    }

    case 'SLAM': {
      if (pelosi.phaseT >= PELOSI_SLAM_DURATION) {
        pelosi.phase = 'TEAR';
        pelosi.phaseT = 0;
      }
      break;
    }
    case 'TEAR': {
      if (pelosi.phaseT >= PELOSI_TEAR_DURATION) {
        // Spawn two paper pieces flying off in opposite arcs (one upper-left, one upper-right).
        const baseY = pelosi.y - PELOSI_HEIGHT * 0.55;
        tornPieces.push({ x: pelosi.x - 6, y: baseY, vx: -180, vy: -240, rot: 0, rotV:  6, t: 0 });
        tornPieces.push({ x: pelosi.x + 6, y: baseY, vx:  180, vy: -260, rot: 0, rotV: -6, t: 0 });
        playSfx_pelosiTear();                                  // N — paper rip + low rumble
        // H2 — Pelosi tear → +500 × multiplier (was flat 500). pelosiFlash overlay still shown.
        stats.pelosiCount++;
        addScore(PELOSI_BONUS, true, pelosi.x, pelosi.y - PELOSI_HEIGHT, '#ffcc00');
        pelosiFlash.active = true;
        pelosiFlash.t = 0;
        pelosiFlash.x = pelosi.x;
        pelosiFlash.y = pelosi.y - PELOSI_HEIGHT - 10;
        pelosi.phase = 'WALKING_RIGHT';
        pelosi.phaseT = 0;
        pelosi.facing = 1;
      }
      break;
    }
    case 'SHRUG': {
      // Small arm-up bounce — cosmetic y-bob during shrug since we don't have a separate shrug sprite.
      if (pelosi.phaseT >= PELOSI_SHRUG_DURATION) {
        pelosi.phase = 'WALKING_RIGHT';
        pelosi.phaseT = 0;
        pelosi.facing = 1;
      }
      break;
    }
    case 'WALKING_RIGHT': {
      pelosi.x += PELOSI_WALK_SPD * dt;
      pelosi.facing = 1;
      if (pelosi.x > W + 20) {
        pelosi.active = false;
        pelosi.phase = 'IDLE';
        pelosi.phaseT = 0;
        pelosi.targetCapsule = null;
      }
      break;
    }
  }
}

function drawPelosi() {
  if (pelosi.active) {
    const sprite = (pelosi.phase === 'TEAR') ? 'pelosi_tear' : 'pelosi_idle';
    // Cosmetic shrug-bounce: small upward bob during SHRUG phase (no sprite swap available).
    let y = pelosi.y;
    if (pelosi.phase === 'SHRUG') {
      const t = pelosi.phaseT / PELOSI_SHRUG_DURATION;
      y -= Math.sin(t * Math.PI) * 6;                             // half-sine bob, peak ~6px up
    }
    // facing < 0 (walking left) → flip=true so the right-facing default sprite mirrors to face left.
    drawSprite(sprite, pelosi.x, y, PELOSI_HEIGHT, pelosi.facing < 0, 1.0);
  }
  // Torn paper pieces
  for (const t of tornPieces) {
    const a = Math.max(0, 1 - t.t / PELOSI_TORN_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(t.x, t.y);
    ctx.rotate(t.rot);
    ctx.fillStyle = '#f8f4d8';
    ctx.fillRect(-7, -10, 14, 20);
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.strokeRect(-7, -10, 14, 20);
    // ink lines
    ctx.fillStyle = '#222';
    ctx.fillRect(-5, -7, 10, 1);
    ctx.fillRect(-5, -3, 10, 1);
    ctx.fillRect(-5,  1, 10, 1);
    ctx.restore();
  }
  // Bonus flash floats up
  if (pelosiFlash.active) {
    const a = 1 - (pelosiFlash.t / PELOSI_FLASH_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = '#ffcc00';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('+' + PELOSI_BONUS, pelosiFlash.x, pelosiFlash.y - pelosiFlash.t * 30);
    ctx.restore();
  }
}

      life: 1, decay: 0.7 + Math.random() * 0.5,

// ─────────────────────────────────────────────
//  BRICK TUMBLE  (shatter transition)
// ─────────────────────────────────────────────
let bricks = [];
let shakeAmt = 0;

function initBricks() {
  bricks = [];
  // Bricks cascade FROM DTJ's feet (TOP platform) DOWN through each platform
  // Each platform level = one cascade wave, top to bottom
  // This makes the platforms look like ruins of the building structure

  const platLevels = [
    TOP,           // wave 0 — starts at DTJ's feet
    platforms[4],  // wave 1
    platforms[3],  // wave 2
    platforms[2],  // wave 3
    platforms[1],  // wave 4
    platforms[0],  // wave 5 — floor
  ];

  platLevels.forEach((plat, wave) => {
    const bw = 38, bh = 16;
    const cols = Math.floor(plat.w / bw) + 2;
    for (let col = 0; col < cols; col++) {
      const localX = col * bw - 4;
      const bx = plat.x + localX;
      // Tilt-adjusted y at this x position
      const mid = plat.x + plat.w / 2;
      const rad = plat.tilt * Math.PI / 180;
      const by = plat.y + Math.tan(rad) * (bx - mid);

      bricks.push({
        x: bx,
        startY: by,
        y: by,
        w: bw - 2, h: bh - 2,
        // Cascade outward from center — inner bricks fall first
        vx: (col - cols/2) * 12 + (Math.random()-0.5) * 40,
        vy: 0,
        rot: 0,
        rotV: (Math.random()-0.5) * 6,
        // Delay cascades: wave controls which platform, col controls inside-out order
        // Inner columns (closer to center) go first within each wave
        delay: wave * 0.25 + Math.abs(col - cols/2) * 0.03 + Math.random()*0.05,
        active: false,
        wave,
        color: `hsl(${35+wave*8},${22+Math.random()*18}%,${42+Math.random()*18}%)`
      });
    }
  });
}

  // Moon
  ctx.fillStyle = '#ffffee';
  ctx.shadowColor = '#ffffaa'; ctx.shadowBlur = 20;
  ctx.beginPath(); ctx.arc(380, 60, 28, 0, Math.PI * 2); ctx.fill();

  // Moon crater detail

  ctx.beginPath(); ctx.arc(390, 52, 7, 0, Math.PI * 2); ctx.fill();

  // Background buildings silhouette

    {x:0,   w:50,  h:320, color:'#080618'},
    {x:45,  w:35,  h:280, color:'#090720'},
    {x:75,  w:60,  h:400, color:'#07061a'},
    {x:130, w:40,  h:260, color:'#0a0820'},
    {x:165, w:80,  h:500, color:'#060515'}, // tall center tower

    {x:305, w:55,  h:420, color:'#070618'},
    {x:355, w:40,  h:310, color:'#0a0920'},
    {x:390, w:50,  h:360, color:'#080719'},
    {x:435, w:50,  h:280, color:'#090820'},
  ];
  buildings.forEach(b => {
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, H - b.h - 80, b.w, b.h);

    for (let wy = H - b.h - 70; wy < H - 90; wy += 22) {

  const gg = ctx.createLinearGradient(0, H - 80, 0, H);
  gg.addColorStop(0, '#0e0d22');
  gg.addColorStop(1, '#181630');
  ctx.fillStyle = gg;
  ctx.fillRect(0, H - 80, W, 80);

  // Street reflections
  ctx.fillStyle = 'rgba(200,164,74,0.06)';
  ctx.fillRect(0, H - 40, W, 40);

  // Street lights
  [80, 200, 340, 420].forEach(lx => {
    ctx.strokeStyle = '#555577';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(lx, H - 80); ctx.lineTo(lx, H - 160); ctx.stroke();
    ctx.fillStyle = '#ffee88';
    ctx.shadowColor = '#ffee88'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(lx, H - 162, 4, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// ─────────────────────────────────────────────
//  ESCALATOR DRAWING  (covers character while riding)
// ─────────────────────────────────────────────
const ESC_X1 = 80, ESC_Y1 = H - 90;   // bottom entry
const ESC_X2 = 260, ESC_Y2 = 200;     // top exit

function drawEscalatorStructure(animT) {
  const dx = ESC_X2 - ESC_X1, dy = ESC_Y2 - ESC_Y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  const ang = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(ESC_X1, ESC_Y1);
  ctx.rotate(ang);

  // Glass tube / enclosure — the character is hidden inside this
  ctx.fillStyle = 'rgba(180,220,255,0.12)';
  ctx.strokeStyle = 'rgba(180,220,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(-10, -38, len + 20, 60, 6);
  ctx.fill(); ctx.stroke();

  // Gold handrail top
  ctx.strokeStyle = '#d4af37';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(0, -26); ctx.lineTo(len, -26); ctx.stroke();

  // Gold handrail bottom
  ctx.strokeStyle = '#b8960c';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(0, 18); ctx.lineTo(len, 18); ctx.stroke();

  // Moving steps inside
  const stepSpacing = 28;
  const scrollOffset = (animT * 60) % stepSpacing;
  ctx.strokeStyle = 'rgba(212,175,55,0.7)';
  ctx.lineWidth = 2;
  for (let sx = -scrollOffset; sx < len + 10; sx += stepSpacing) {
    ctx.beginPath(); ctx.moveTo(sx, -20); ctx.lineTo(sx + 16, -20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx + 16, -20); ctx.lineTo(sx + 16, -4); ctx.stroke();
  }

  // Side frame / structural
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(-12, -40, 12, 80);
  ctx.fillRect(len, -40, 12, 80);

  // Gold trim strips
  ctx.fillStyle = '#d4af37';
  ctx.fillRect(0, -40, len, 4);
  ctx.fillRect(0, 36, len, 4);

  ctx.restore();

  // Base platform at bottom entry
  ctx.fillStyle = '#c8a44a';
  ctx.fillRect(ESC_X1 - 20, ESC_Y1 - 4, 50, 8);
  // Top landing platform
  ctx.fillRect(ESC_X2 - 20, ESC_Y2 - 4, 50, 8);
}

// ─────────────────────────────────────────────
//  LINCOLN MEMORIAL PARODY BUILDING
// ─────────────────────────────────────────────
function drawLincolnBuilding(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // Night sky behind
  const sg = ctx.createLinearGradient(0, 0, 0, H);
  sg.addColorStop(0, '#04040e');
  sg.addColorStop(1, '#0c0c28');
  ctx.fillStyle = sg; ctx.fillRect(0, 0, W, H);

  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.a * 0.8})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  });

  // Reflection pool / reflecting pool in front
  ctx.fillStyle = '#0a0a20';
  ctx.fillRect(40, 680, 400, 60);
  const rg = ctx.createLinearGradient(0, 680, 0, 740);
  rg.addColorStop(0, 'rgba(180,180,220,0.08)');
  rg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = rg; ctx.fillRect(40, 680, 400, 60);

  // Building layout: 3/8 building (top), 5/8 stairs (bottom)
  // H=854: building occupies y=40..320 (280px), stairs y=320..794 (474px, 15 steps)
  const BX = 20, BW = 440;
  const BLDG_TOP = 40;      // pediment peak
  const BLDG_BASE = 320;    // top of stairs / base of columns
  const STAIR_BOT = 794;    // bottom of stairs = ground
  const N_STEPS = 15;
  const STEP_H = Math.floor((STAIR_BOT - BLDG_BASE) / N_STEPS); // ~31px each

  // Pediment (triangular top)
  ctx.fillStyle = '#d8d8c8';
  ctx.beginPath();
  ctx.moveTo(BX, BLDG_BASE - 160); ctx.lineTo(BX + BW/2, BLDG_TOP);
  ctx.lineTo(BX + BW, BLDG_BASE - 160);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#aaa898'; ctx.lineWidth = 1; ctx.stroke();

  // Entablature band
  ctx.fillStyle = '#e2e2d2';
  ctx.fillRect(BX, BLDG_BASE - 160, BW, 26);

  // Frieze text
  ctx.fillStyle = '#888878';
  ctx.font = 'bold 8px monospace'; ctx.textAlign = 'center';
  ctx.fillText('LINCOLN MEMORIAL  ★  (THIS IS A PARODY)', W/2, BLDG_BASE - 140);

  // Columns — 12 fluted
  const COL_TOP = BLDG_BASE - 134;
  const COL_BOT = BLDG_BASE - 8;
  for (let i = 0; i < 12; i++) {
    const cx = BX + 18 + i * 34;
    const cg = ctx.createLinearGradient(cx, 0, cx + 20, 0);
    cg.addColorStop(0, '#c8c8b8'); cg.addColorStop(0.3, '#e4e4d4');
    cg.addColorStop(0.7, '#d8d8c8'); cg.addColorStop(1, '#b8b8a8');
    ctx.fillStyle = cg;
    ctx.fillRect(cx, COL_TOP, 20, COL_BOT - COL_TOP);
    ctx.fillStyle = '#e8e8d8'; ctx.fillRect(cx-2, COL_TOP-4, 24, 8);
    ctx.fillStyle = '#d0d0c0'; ctx.fillRect(cx-2, COL_BOT-2, 24, 8);
  }

  // Stylobate
  ctx.fillStyle = '#d8d8c8';
  ctx.fillRect(BX - 6, BLDG_BASE - 10, BW + 12, 12);

  // Steps — 15 steps filling the bottom 5/8
  for (let s = 0; s < N_STEPS; s++) {
    const sx = BX - s * 6, sw = BW + s * 12;
    const sy = BLDG_BASE + s * STEP_H;
    const stepG = ctx.createLinearGradient(0, sy, 0, sy + STEP_H);
    stepG.addColorStop(0, '#e0e0d0'); stepG.addColorStop(1, '#c8c8b8');
    ctx.fillStyle = stepG;
    ctx.fillRect(sx, sy, sw, STEP_H);
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(sx, sy + STEP_H - 4, sw, 4);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(sx, sy, sw, 3);
  }

  // Ground
  ctx.fillStyle = '#0a1a0a'; ctx.fillRect(0, STAIR_BOT, W, 60);
  ctx.fillStyle = '#0d220d'; ctx.fillRect(0, STAIR_BOT, W, 8);

  ctx.restore();
}

// ─────────────────────────────────────────────

  ctx.strokeStyle = 'rgba(100,120,200,0.3)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-2,2); ctx.lineTo(-2,20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(1,2);  ctx.lineTo(1,20);  ctx.stroke();
  ctx.restore();

  // Shoes — brown boots
  ctx.fillStyle = '#5c3820';
  ctx.beginPath(); ell(-7, 24, 8, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ell(7, 24, 8, 5, 0, 0, Math.PI*2); ctx.fill();

// ─────────────────────────────────────────────
//  PLATFORM DRAWING
// ─────────────────────────────────────────────
function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x + p.w/2, p.y + p.h/2);
  ctx.rotate(p.tilt * Math.PI / 180);
  const hw = p.w/2, hh = p.h/2;
  // Shadow
  ctx.fillStyle = '#6b5220';
  ctx.fillRect(-hw+3, -hh+4, p.w, p.h);
  // Body
  const pg = ctx.createLinearGradient(0,-hh,0,hh);
  pg.addColorStop(0,'#e8c46a'); pg.addColorStop(0.3,'#c8a44a'); pg.addColorStop(1,'#9a7830');
  ctx.fillStyle = pg;
  ctx.fillRect(-hw,-hh,p.w,p.h);
  // Rivet bolts
  ctx.fillStyle = '#6b5220';
  for (let rx = -hw+14; rx < hw-14; rx += 38) {
    ctx.beginPath(); ctx.arc(rx, 0, 3.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8a44a';
    ctx.beginPath(); ctx.arc(rx-0.5,-0.5,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#6b5220';
  }
  ctx.restore();
}

// ─────────────────────────────────────────────
//  LADDER DRAWING
// ─────────────────────────────────────────────
function drawLadder(l) {
  const {x, y, h} = l;
  // Rails
  const lg = ctx.createLinearGradient(x,0,x+LADDER_W,0);
  lg.addColorStop(0,'#c8a800'); lg.addColorStop(0.5,'#f0d020'); lg.addColorStop(1,'#c8a800');
  ctx.fillStyle = lg;
  ctx.fillRect(x, y, 4, h);
  ctx.fillRect(x+LADDER_W-4, y, 4, h);
  // Rungs
  for (let ry = y+8; ry < y+h-4; ry+=16) {
    ctx.fillStyle = '#a08800';
    ctx.fillRect(x+4, ry, LADDER_W-8, 5);
    ctx.fillStyle = '#d4b000';
    ctx.fillRect(x+4, ry, LADDER_W-8, 2);
  }
}

// ─────────────────────────────────────────────
//  TV (small, on top platform)
// ─────────────────────────────────────────────
function drawTV(x, y, label, t) {
  const w=36, h=30;
  // Stand
  ctx.fillStyle='#222244';
  ctx.fillRect(x+w/2-3,y+h,6,7);
  ctx.fillRect(x+w/2-8,y+h+6,16,3);
  // Case
  ctx.fillStyle='#1a1a3a';
  ctx.strokeStyle='#4444aa'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.roundRect(x,y,w,h,4); ctx.fill(); ctx.stroke();
  // Bezel
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.fill();
  // Screen
  ctx.save();
  ctx.beginPath(); ctx.roundRect(x+3,y+3,w-6,h-9,2); ctx.clip();
  ctx.fillStyle = label==='CNN' ? '#0d0808' : '#08080d';
  ctx.fillRect(x+3,y+3,w-6,h-9);
  // Scan band
  const sb = ((t*25)%(h-9))+y+3;
  ctx.fillStyle = label==='CNN' ? 'rgba(255,50,50,0.15)':'rgba(50,100,255,0.15)';
  ctx.fillRect(x+3,sb,w-6,5);
  // Static noise
  for(let ni=0;ni<6;ni++){
    ctx.fillStyle=`rgba(255,255,255,${Math.random()*0.06})`;
    ctx.fillRect(x+3+Math.random()*(w-6), y+3+Math.random()*(h-9), Math.random()*8+2, 1);
  }
  // Tiny text
  ctx.fillStyle = label==='CNN'?'#ff4444':'#4488ff';
  ctx.font='4px monospace'; ctx.textAlign='left';
  ctx.fillText('BREAKING',x+4,y+10);
  ctx.fillStyle='#aaa'; ctx.fillText('LIVE',x+4,y+15);
  // Scan lines overlay
  for(let sl=y+3;sl<y+h-6;sl+=2){
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(x+3,sl,w-6,1);
  }
  ctx.restore();
  // Power LED
  ctx.fillStyle=label==='CNN'?'#ff2200':'#0055ff';
  ctx.beginPath(); ctx.arc(x+w-6,y+h-5,2,0,Math.PI*2); ctx.fill();
  // Label
  ctx.fillStyle=label==='CNN'?'#cc0000':'#0033bb';
  ctx.fillRect(x+3,y+h-8,w-6,7);
  ctx.fillStyle='#fff'; ctx.font='bold 5px monospace'; ctx.textAlign='center';
  ctx.fillText(label,x+w/2,y+h-3);
}

// ─────────────────────────────────────────────
//  TICKER
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
//  TOUCH CONTROL BOXES
// ─────────────────────────────────────────────
const BW = 90, BH = 75;
const boxLeft  = { x: 0,      y: H-BH,       w: BW,   h: BH, action:'left'  };
const boxRight = { x: BW,     y: H-BH,       w: BW,   h: BH, action:'right' };
const boxJump  = { x: 0,      y: H-BH*2,     w: BW*2, h: BH, action:'jump'  };
const boxUp    = { x: W-BW, y: H*0.45,      w: BW, h: BH, action:'up'    };
const boxDown  = { x: W-BW, y: H*0.45+BH,   w: BW, h: BH, action:'down'  };
const boxJump2 = { x: W-BW, y: H*0.45-BH,   w: BW, h: BH, action:'jump'  };
const boxJump3 = { x: W-BW, y: H*0.45+BH*2, w: BW, h: BH, action:'jump'  };
const allBoxes = [boxLeft, boxRight, boxJump, boxJump2, boxJump3, boxUp, boxDown];

function getBoxAt(tx, ty) {
  for (const b of allBoxes) {
    if (tx>=b.x && tx<=b.x+b.w && ty>=b.y && ty<=b.y+b.h) return b;
  }
  return null;
}

function applyTouchState() {
  touch.left=touch.right=touch.climbUp=touch.climbDown=false;
  for (const id in activeTouches) {
    const a = activeTouches[id].action;
    if (a==='left')  touch.left=true;
    if (a==='right') touch.right=true;
    if (a==='up')    touch.climbUp=true;
    if (a==='down')  touch.climbDown=true;
  }
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  ensureAudioContext();                                          // L — first-input audio gate (mobile primary path)
  // N — speaker + pause icon hit-test (canvas-pixel coords). Icons render top-right; tap-zones
  // checked BEFORE state routing so the toggles work in any state where the icons are visible
  // (audio: any state; pause: only in pausable states, but the icon is rendered then).
  {
    const rN = canvas.getBoundingClientRect();
    const txN = (e.clientX - rN.left) / scale, tyN = (e.clientY - rN.top) / scale;
    if (pointInIconBox(txN, tyN, SPEAKER_BOX)) { toggleAudio(); return; }
    if (pointInIconBox(txN, tyN, PAUSE_BOX))   { togglePause(); return; }
  }
  // N — PAUSED eats canvas taps (icon taps already handled above).
  if (state === 'PAUSED') return;
  // I1 — cutscene tap routes through cutsceneAdvance (per-state advance rules).
  // WIN_FREEZE / CUTSCENE_FADE_IN eat input; intro states skipToGame; GAMEPLAY = normal.
  // J — DEATH_REACTION eats input. GAME_OVER tap = restartFromGameOver (full reset).
  // K — INITIALS_ENTRY routes tap through handleInitialsTap before any restart logic.
  if (state === 'WIN_FREEZE' || state === 'CUTSCENE_FADE_IN' || state === 'DEATH_REACTION' || state === 'GAMEOVER_PENDING') return;
  if (state === 'GAME_OVER' && initialsEntryActive) {
    const r2=canvas.getBoundingClientRect();
    const tx2=(e.clientX-r2.left)/scale, ty2=(e.clientY-r2.top)/scale;
    handleInitialsTap(tx2, ty2);
    return;
  }
  if (state === 'GAME_OVER') { restartFromGameOver(); return; }
  if (state.indexOf('CUTSCENE_') === 0) { cutsceneAdvance(); return; }
  if (state === 'INTRO_BLACK') return;                     // N-FIX-5 BUG 2 — prime audio only, don't skip intro
  if (state !== 'GAMEPLAY') { skipToGame(); return; }
  canvas.setPointerCapture(e.pointerId);
  const r=canvas.getBoundingClientRect();
  const tx=(e.clientX-r.left)/scale, ty=(e.clientY-r.top)/scale;
  const b=getBoxAt(tx,ty);
  activeTouches[e.pointerId]={action:b?b.action:null,box:b};
  if (b&&b.action==='jump') { touch.jump=true; setTimeout(()=>{touch.jump=false;},120); }
  applyTouchState();
});
canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!(e.pointerId in activeTouches)) return;
  const r=canvas.getBoundingClientRect();
  const tx=(e.clientX-r.left)/scale, ty=(e.clientY-r.top)/scale;
  const b=getBoxAt(tx,ty);
  const prev=activeTouches[e.pointerId];
  if (b&&b.action==='jump'&&prev.action!=='jump') { touch.jump=true; setTimeout(()=>{touch.jump=false;},120); }
  activeTouches[e.pointerId]={action:b?b.action:null,box:b};
  applyTouchState();
});
canvas.addEventListener('pointerup',     e=>{delete activeTouches[e.pointerId]; applyTouchState(); endInitialsArrowHold(); /* K-FIX-5 — release initials arrow hold */});
canvas.addEventListener('pointercancel', e=>{delete activeTouches[e.pointerId]; applyTouchState(); endInitialsArrowHold();});

// iOS Safari fallback — touch events in case pointer events don't fire
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();   // K-FIX-2 — also suppresses synthesized pointerdown on iOS Safari
                        // so cutsceneAdvance / restart paths don't double-fire per tap.
                        // Listener registered with {passive:false} below to honor preventDefault.
  ensureAudioContext(); // L — first-input audio gate (iOS Safari fallback path)
  // N — speaker + pause icon hit-test before state routing.
  {
    const r0 = canvas.getBoundingClientRect();
    const t0N = e.changedTouches[0];
    if (t0N) {
      const txN = (t0N.clientX - r0.left) / scale, tyN = (t0N.clientY - r0.top) / scale;
      // N-FIX-9 diagnostic — TEMPORARY. Logs raw touch coords + scaled canvas-space coords +
      // icon hit-box positions so Brian can see whether iPhone touches register at all and
      // whether the scale transform lands inside the SPEAKER_BOX / PAUSE_BOX regions.
      // Removed in N-FIX-10.
      if (typeof console !== 'undefined') {
        console.log('TOUCH DIAG:',
          'touchX =', t0N.clientX,
          'touchY =', t0N.clientY,
          'rectLeft =', r0.left,
          'rectTop =', r0.top,
          'scale =', scale,
          'canvasW =', canvas.width,
          'canvasClientW =', canvas.clientWidth,
          'scaledX =', txN.toFixed(1),
          'scaledY =', tyN.toFixed(1),
          'speakerBox =', SPEAKER_BOX,
          'pauseBox =', PAUSE_BOX,
          'speakerHit =', pointInIconBox(txN, tyN, SPEAKER_BOX),
          'pauseHit =', pointInIconBox(txN, tyN, PAUSE_BOX));
      }
      if (pointInIconBox(txN, tyN, SPEAKER_BOX)) { toggleAudio(); return; }
      if (pointInIconBox(txN, tyN, PAUSE_BOX))   { togglePause(); return; }
    }
  }
  // N — PAUSED eats canvas taps.
  if (state === 'PAUSED') return;
  // I1 — cutscene tap routes through cutsceneAdvance (per-state advance rules).
  // WIN_FREEZE / CUTSCENE_FADE_IN eat input; intro states skipToGame; GAMEPLAY = normal.
  // J — DEATH_REACTION eats input. GAME_OVER tap = restartFromGameOver (full reset).
  // K — INITIALS_ENTRY routes tap through handleInitialsTap.
  if (state === 'WIN_FREEZE' || state === 'CUTSCENE_FADE_IN' || state === 'DEATH_REACTION' || state === 'GAMEOVER_PENDING') return;
  if (state === 'GAME_OVER' && initialsEntryActive) {
    const r3=canvas.getBoundingClientRect();
    const t0=e.changedTouches[0];
    if (t0) handleInitialsTap((t0.clientX-r3.left)/scale, (t0.clientY-r3.top)/scale);
    return;
  }
  if (state === 'GAME_OVER') { restartFromGameOver(); return; }
  if (state.indexOf('CUTSCENE_') === 0) { cutsceneAdvance(); return; }
  if (state === 'INTRO_BLACK') return;                     // N-FIX-5 BUG 2 — prime audio only, don't skip intro
  if (state !== 'GAMEPLAY') { skipToGame(); return; }
  for (const t of e.changedTouches) {
    const r=canvas.getBoundingClientRect();
    const tx=(t.clientX-r.left)/scale, ty=(t.clientY-r.top)/scale;
    const b=getBoxAt(tx,ty);
    if (!b) continue;
    // Use touch identifier offset to avoid collision with pointer IDs
    activeTouches['t'+t.identifier]={action:b.action,box:b};
    if (b.action==='jump'){touch.jump=true;setTimeout(()=>{touch.jump=false;},120);}
  }
  applyTouchState();
},{passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) delete activeTouches['t'+t.identifier];
  applyTouchState();
  endInitialsArrowHold();                    // K-FIX-5 — release initials arrow hold on lift
},{passive:false});
canvas.addEventListener('touchcancel', e=>{
  // K-FIX-5 — touchcancel parity. Browser cancels touch (e.g. interrupted by system gesture);
  // release any held arrow so the cycle stops repeating.
  endInitialsArrowHold();
  applyTouchState();
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  for (const t of e.changedTouches) {
    const r=canvas.getBoundingClientRect();
    const tx=(t.clientX-r.left)/scale, ty=(t.clientY-r.top)/scale;
    const b=getBoxAt(tx,ty);
    const prev=activeTouches['t'+t.identifier];
    if (b&&b.action==='jump'&&(!prev||prev.action!=='jump')){touch.jump=true;setTimeout(()=>{touch.jump=false;},120);}
    activeTouches['t'+t.identifier]={action:b?b.action:null,box:b};
  }
  applyTouchState();
},{passive:false});

function drawDpad() {
  if (state!=='GAMEPLAY') return;
  ctx.save();
  const defs=[
    {b:boxJump,  icon:'JUMP', big:false},
    {b:boxJump2, icon:'JUMP', big:false},
    {b:boxJump3, icon:'JUMP', big:false},
    {b:boxLeft,  icon:'◀',   big:true},
    {b:boxRight, icon:'▶',   big:true},
    {b:boxUp,    icon:'▲',   big:true},
    {b:boxDown,  icon:'▼',   big:true},
  ];
  for (const {b,icon,big} of defs) {
    const active=Object.values(activeTouches).some(t=>t.box===b);
    // F2 — button rectangles barely visible by default. Idle fill 0.10→0.08, idle stroke 0.2→0.15.
    // Active state still ~2× idle so a tap still gives a visible feedback flash.
    ctx.fillStyle=active?'rgba(255,255,255,0.18)':'rgba(255,255,255,0.08)';
    ctx.beginPath(); ctx.roundRect(b.x+2,b.y+2,b.w-4,b.h-4,10); ctx.fill();
    ctx.strokeStyle=active?'rgba(255,255,255,0.30)':'rgba(255,255,255,0.15)';
    ctx.lineWidth=1.5; ctx.stroke();
    // F2 — icon labels unchanged per spec (text colors and font kept exactly as before).
    ctx.fillStyle=active?'#fff':'rgba(255,255,255,0.55)';
    ctx.font=big?'bold 28px monospace':'bold 16px monospace';
    ctx.textAlign='center';
    ctx.fillText(icon, b.x+b.w/2, b.y+b.h/2+big?10:6);
  }
  ctx.restore();
}

// E2 corrected — top-bar layout (top to bottom): TICKER then HUD. Named constants pin both
// stripes against the top edge of the canvas so a future swap or resize lives in one place.
const TICKER_Y      = 0;                        // E2 — ticker pinned at very top of canvas
const TICKER_HEIGHT = 18;
const HUD_Y         = TICKER_Y + TICKER_HEIGHT; // = 18, directly below the ticker
const HUD_HEIGHT    = 24;

function drawTicker() {
  const ty = TICKER_Y;
  ctx.fillStyle='#cc0000'; ctx.fillRect(0,ty,W,TICKER_HEIGHT);
  // BREAKING badge — yellow on the LEFT, unchanged
  ctx.fillStyle='#ffff00'; ctx.fillRect(0,ty,70,TICKER_HEIGHT);
  ctx.fillStyle='#cc0000'; ctx.font='bold 9px monospace'; ctx.textAlign='center';
  ctx.fillText('BREAKING',35,ty+13);
  // Divider
  ctx.fillStyle='#fff'; ctx.fillRect(70,ty+2,2,TICKER_HEIGHT-4);
  // Scrolling text
  ctx.save();
  ctx.beginPath(); ctx.rect(72,ty,W-72,TICKER_HEIGHT); ctx.clip();
  ctx.fillStyle='#ffff00'; ctx.font='bold 10px monospace'; ctx.textAlign='left';
  ctx.fillText(TICKER, tickX, ty+13);
  ctx.restore();
}

// ─────────────────────────────────────────────
//  HUD
// ─────────────────────────────────────────────
// Block 3 — canvas-path heart. cx,cy is the visual center; size is full width.
function drawHeart(cx, cy, size, filled) {
  const s = size;
  ctx.beginPath();
  // Two-circle top + V-bottom heart, centered at (cx, cy)
  const topY = cy - s * 0.10;
  const lobeR = s * 0.28;
  ctx.moveTo(cx, cy + s * 0.42);
  ctx.bezierCurveTo(cx - s * 0.55, cy + s * 0.05,  cx - s * 0.55, cy - s * 0.40,  cx - lobeR, cy - s * 0.40);
  ctx.bezierCurveTo(cx - s * 0.10, cy - s * 0.40,  cx,            topY,           cx,         cy - s * 0.05);
  ctx.bezierCurveTo(cx,            topY,           cx + s * 0.10, cy - s * 0.40,  cx + lobeR, cy - s * 0.40);
  ctx.bezierCurveTo(cx + s * 0.55, cy - s * 0.40,  cx + s * 0.55, cy + s * 0.05,  cx,         cy + s * 0.42);
  ctx.closePath();
  if (filled) {
    ctx.fillStyle = '#ff4444';
    ctx.fill();
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#992222';
    ctx.stroke();
  } else {
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = '#883333';
    ctx.stroke();
  }
}

// ─────────────────────────────────────────────
//  I2 — CUTSCENE BACKGROUNDS
// ─────────────────────────────────────────────
// rnc_stage backdrop. The PNG is 960×541 (16:9-ish). Game canvas is 480×854 portrait.
// We scale the stage to canvas WIDTH (480 wide → 270.5 tall) and letterbox solid black above
// and below. STAGE_FLOOR_Y is the canvas y where sprites' feet should sit on the gold-star
// carpet floor (per spec — close to the lower-third of the scaled stage band).
const STAGE_CANVAS_TOP   = 292;
const STAGE_FLOOR_Y      = 540;
const STAGE_LEFT_BOUND   = 0;
const STAGE_RIGHT_BOUND  = W;

function drawRncStage() {
  // Black backdrop (letterbox bars above/below the stage band)
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const cached = spriteCache['rnc_stage'];
  if (!cached) return;                                    // sprite not loaded yet — keep the bars
  const stageH = W * (cached.height / cached.width);      // preserve aspect at canvas width
  ctx.drawImage(cached, 0, STAGE_CANVAS_TOP, W, stageH);
}

// I-EAGLE-REWRITE — drawDtjCarried (rotated -45° runtime composite) removed. The carry now uses
// a pre-composed eagle_carry.png drawn via plain drawSprite — no rotation, no per-frame compose.

// Procedural sky for CUTSCENE_BETWEEN. Vertical gradient + 3–5 drifting cloud blobs.
// Cloud state initialized lazily on first draw and re-seeded any time the cutscene re-enters.
const CUTSCENE_CLOUDS = [];

// I-EAGLE-REWRITE — replaces I4's cutsceneEagle + I-CORR-4's carriedActive/drawDtjCarried.
// PHASE3 is now a 4-step DTJ pose sequence ending in a HARD CUT to a pre-composed eagle_carry
// PNG (eagle gripping DTJ as one sprite). No runtime compositing, no rotation, no fade.
// dtjStageMode  : which individual DTJ sprite renders on stage (mutually exclusive with comboActive)
//   'IDLE'      — dtj_idle, faces forward (PHASE1 + PHASE3 step1)
//   'WALK'      — dtj_walk, side-profile facing left (PHASE3 step2 — turn)
//   'SURPRISED' — dtj_surprised, mouth open looking up (PHASE3 step3)
//   'NONE'      — no individual DTJ sprite at all (PHASE3 step4 + BETWEEN + SCORE)
// comboActive  : when true, render the combined eagle_carry PNG at (combo.x, combo.y).
// combo        : { x, y } — foot-anchored position of the combined sprite (drawSprite footFrac=1.0).
// CONTRACT: comboActive==true MUST imply dtjStageMode==='NONE'. Never render two DTJ-class
//           sprites in the same frame.
let dtjStageMode = 'NONE';
let comboActive  = false;
const combo = { x: 0, y: 0 };
const COMBO_H = 160;                                  // combined eagle_carry render height (px)
function seedCutsceneClouds() {
  CUTSCENE_CLOUDS.length = 0;
  const N = 4 + Math.floor(Math.random() * 2);            // 4 or 5 clouds
  for (let i = 0; i < N; i++) {
    CUTSCENE_CLOUDS.push({
      x: Math.random() * W,
      y: 80 + Math.random() * 380,                        // upper / middle band
      r: 28 + Math.random() * 22,                         // base blob radius
      spd: 8 + Math.random() * 8,                         // ~10 px/s leftward drift
    });
  }
}
function drawCutsceneSky(dt) {
  if (CUTSCENE_CLOUDS.length === 0) seedCutsceneClouds();
  // Vertical gradient — light blue (top) to deeper blue (bottom)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0,    '#9ec9ee');
  g.addColorStop(0.55, '#5ea0d2');
  g.addColorStop(1,    '#27579b');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Drift + render clouds. Each cloud is three overlapping white circles for that "puffy" look.
  for (const c of CUTSCENE_CLOUDS) {
    c.x -= c.spd * dt;
    if (c.x < -c.r * 3) c.x = W + c.r * 3;                // wrap around right edge
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath();
    ctx.arc(c.x,             c.y,           c.r,         0, Math.PI*2);
    ctx.arc(c.x + c.r * 0.8, c.y - c.r*0.2, c.r * 0.85,  0, Math.PI*2);
    ctx.arc(c.x - c.r * 0.7, c.y - c.r*0.1, c.r * 0.75,  0, Math.PI*2);
    ctx.fill();
  }
}

// J — shared score-breakdown overlay. Reused by CUTSCENE_SCORE (level complete) and GAME_OVER
// (lives exhausted). Same fonts, same spacing, same row component. Layout-identical except for
// the header text, the total value, the prompt text, an optional high-score block + creator
// credit line at the bottom (both GAME_OVER opt-ins).
//   opts = {
//     header,        // header line, e.g. 'LEVEL 1 COMPLETE' or 'GAME OVER'
//     total,         // numeric total to display (already-final score)
//     prompt,        // pulsing prompt text, e.g. 'TAP TO CONTINUE' or 'TAP TO RESTART'
//     pulseT,        // time used for the prompt pulse (CUTSCENE_SCORE uses stateT, GAME_OVER same)
//     showHighScore, // bool — L-FIX-3: render TOP 5 list + (optional) NEW HIGH SCORE! line. The standalone HIGH SCORE summary row was removed (TOP 5 rank #1 in gold conveys the same info).
//     highScores,    // K-FIX-5 — array of {initials, score} (the top-5 leaderboard, may be empty)
//     isNewHigh,     // bool — when true, render 'NEW HIGH SCORE!' line (only used if showHighScore)
//     showCredit,    // bool — when true, render 'Created by Brian Albert' subtle line at very bottom
//   }
function drawScoreBreakdown(opts) {
  drawRncStage();
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, 0, W, H);

  // Header
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 26px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(opts.header, W/2, 120);

  // Breakdown rows: label-left at x=70, value-right at x=410
  const labelX = 70, valueX = 410;
  let y = 200;
  const ROW = 38;
  ctx.font = 'bold 13px monospace';
  ctx.fillStyle = '#fff';
  function row(label, val, color) {
    ctx.fillStyle = '#cccccc';
    ctx.textAlign = 'left';
    ctx.fillText(label, labelX, y);
    ctx.fillStyle = color || '#ffeb70';
    ctx.textAlign = 'right';
    ctx.fillText('+' + val, valueX, y);
    y += ROW;
  }
  row('Survival:',         Math.floor(stats.survivalScore),                     '#aaffaa');
  row('Capsules cleared:', stats.clearedCount    * CAPSULE_CLEAR_SCORE,         '#aaffaa');
  row('Helper kills:',     stats.helperKillCount * HELPER_KILL_SCORE,           '#ff88ff');
  row('Briefcases:',       stats.briefcaseCount  * BRIEFCASE_SCORE,             '#88ff88');
  row('Platforms:',        stats.platformCount   * PLATFORM_REACH_BONUS,        '#88ddff');
  row('Pelosi tears:',     stats.pelosiCount     * PELOSI_BONUS,                '#ffcc00');
  row('Time bonus:',       stats.timeBonus,                                     '#ffaa55');
  row('WIN BONUS:',        stats.winBonus,                                      '#ffcc00');

  // Divider + total
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(labelX, y - 10); ctx.lineTo(valueX, y - 10); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('TOTAL:', labelX, y + 18);
  ctx.fillStyle = '#ffcc00';
  ctx.font = 'bold 24px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(Math.floor(opts.total).toString(), valueX, y + 22);
  y += ROW;

  // J — high-score block (GAME_OVER only). K-FIX-5 — now sources from opts.highScores array
  // (top-5 leaderboard). L-FIX-3 — DELETED the standalone "HIGH SCORE: BRI 4325" summary row
  // that used to live here. The TOP 5 list below already shows the top entry as rank #1 in
  // gold ("1. BRI 4325") with its score column right-aligned at LB_SCORE_X=360, so the summary
  // row was redundant. The summary row used valueX=410 which sat 50px right of the TOP 5 score
  // column — that mismatch was the misalignment Brian kept seeing. Removing the row eliminates
  // both the redundancy and the visual misalignment in one move. NEW HIGH SCORE! line still
  // gates on opts.isNewHigh. Leaderboard rows render below when opts.highScores has at least
  // one entry.
  if (opts.showHighScore) {
    y += 14;
    const board = opts.highScores || [];
    if (opts.isNewHigh) {
      ctx.fillStyle = '#aaffaa';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('NEW HIGH SCORE!', W/2, y + 12);
      y += 22;
    }
    // K-FIX-5 — TOP 5 leaderboard. Subheader + up to 5 rows. Format per spec:
    //   "1. BRI 5799"
    //   "2. BA  4325"  (initials are 3 chars, spaces preserved here — leaderboard is a list
    //   "3. B   2200"   context where blank slots read clearly without underscore substitution)
    // Empty leaderboard hides subheader + rows entirely.
    if (board.length > 0) {
      y += 8;
      ctx.font = 'bold 12px monospace';
      ctx.fillStyle = '#aaccff';
      ctx.textAlign = 'center';
      ctx.fillText('TOP 5', W/2, y);
      y += 16;
      // L-FIX-1 — column-aligned via THREE fillText calls per row at fixed canvas-pixel x
      // positions, NOT via padStart/padEnd string concatenation. L-FIX-2 — extracted into a
      // single shared drawLeaderboardRow inline-helper so rank #1's gold-row render is
      // STRUCTURALLY identical to rows 2-5 (only ctx.fillStyle differs). Pre-L-FIX-2 the
      // gold/white split lived inside the loop body and could drift if any future edit
      // accidentally introduced a per-rank font/align divergence; the helper makes that
      // structurally impossible.
      const LB_ROW_W       = 240;                          // visual width of leaderboard column
      const LB_LEFT        = (W - LB_ROW_W) / 2;           // = 120; centers the column
      const LB_RANK_X      = LB_LEFT + 0;                  // left edge for "1."
      const LB_INITIALS_X  = LB_LEFT + 50;                 // left edge for initials
      const LB_SCORE_X     = LB_LEFT + LB_ROW_W;           // right edge for score
      const LB_FONT        = '14px monospace';             // single font value for all 5 rows
      function drawLeaderboardRow(rank, entry, rowY) {
        // Identical layout for every rank. The ONLY per-rank difference is fillStyle (gold for
        // rank 1, white for 2-5). Font, x positions, and alignment are constants.
        ctx.font = LB_FONT;
        ctx.fillStyle = (rank === 1) ? '#ffcc00' : '#dddddd';
        ctx.textAlign = 'left';
        ctx.fillText(rank + '.', LB_RANK_X, rowY);
        ctx.textAlign = 'left';
        ctx.fillText(entry.initials, LB_INITIALS_X, rowY);
        ctx.textAlign = 'right';
        ctx.fillText(String(Math.floor(entry.score)), LB_SCORE_X, rowY);
      }
      for (let i = 0; i < board.length; i++) {
        drawLeaderboardRow(i + 1, board[i], y);
        y += 18;
      }
      ctx.textAlign = 'left';                              // restore default
    }
  }

  // Pulsing prompt. K — empty-string opt-out (used while INITIALS_ENTRY UI overlays the prompt).
  if (opts.prompt) {
    const pulse = 0.5 + 0.5 * Math.sin(opts.pulseT * 4);
    ctx.fillStyle = 'rgba(255,255,255,' + (0.35 + 0.55 * pulse).toFixed(3) + ')';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(opts.prompt, W/2, 780);
  }

  // J — creator credit (GAME_OVER only). K-FIX-3 — dark gold full-opacity (was subtle gray
  // 0.6 alpha; too faint to read against the black GAME_OVER overlay). Same font + position.
  if (opts.showCredit) {
    ctx.fillStyle = '#9a7a00';
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Created by Brian Albert', W/2, 820);
  }
}

function drawHUD() {
  // F1 — HUD background fill REMOVED. Lives, title, and score render directly over the night sky.
  // J — hearts replaced with mini DNC sprites scaled down (no new asset). Block O polish revisits
  // if it reads muddy at this size. drawDonkey is foot-anchored; sc=0.3 yields ~22-25px tall.
  // Lives count is rendered left-to-right; missing lives just don't draw (no outlined slot).
  const dncSc    = 0.3;
  const dncStep  = 16;                             // x-spacing between mini-DNCs at this scale
  const dncStartX = 14;
  const dncFootY  = HUD_Y + HUD_HEIGHT - 1;        // feet at the very bottom of the HUD bar
  for (let i = 0; i < player.lives; i++) {
    drawDonkey(dncStartX + i * dncStep, dncFootY, dncSc, false, false, 0);
  }

  // Title (centered)
  ctx.fillStyle='#ffffff'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
  ctx.fillText('DNC vs DJT', W/2, HUD_Y + 17);

  // J — score + high score, right-aligned. SCORE on the upper line, HI on the lower line so the
  // HUD typography matches the existing 13px monospace SCORE style without crowding the title.
  ctx.fillStyle='#ffcc00'; ctx.font='bold 13px monospace'; ctx.textAlign='right';
  ctx.fillText('SCORE ' + Math.floor(playerScore), W-8, HUD_Y + 11);
  // J — HIGH SCORE display rule: blank dashes when the player has never set a score.
  // K-FIX-5 — sources the top entry from highScores (was: highScore + highScoreInitials globals).
  // Three-way display preserved from K-FIX-2/4:
  //   leaderboard empty                       → 'HI ---'
  //   top entry initials empty (after trim)   → 'HI 4325' (legacy J-save migrated as '   ')
  //   top entry initials non-empty            → 'HI BRI 4325'  (trailing spaces trimmed)
  ctx.fillStyle='#aaccff'; ctx.font='bold 11px monospace';
  let hiText;
  if (highScores.length === 0) {
    hiText = 'HI ---';
  } else {
    const top = highScores[0];
    const trimmed = (top.initials || '').replace(/\s+$/, '');
    if (!trimmed) hiText = 'HI ' + Math.floor(top.score);
    else          hiText = 'HI ' + trimmed + ' ' + Math.floor(top.score);
  }
  ctx.fillText(hiText, W-8, HUD_Y + 22);

  // Block D — multiplier badge. E2 corrected — badge placed flush BELOW the HUD bar (in the
  // gameplay area) so it stays visible while boosted regardless of bar order.
  if (multiplier > 1.0) {
    const badgeY = HUD_Y + HUD_HEIGHT;           // sits flush under the HUD bar
    ctx.fillStyle = 'rgba(0,30,15,0.85)';
    ctx.fillRect(W-58, badgeY, 58, 16);
    ctx.fillStyle = '#44ff88';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('×' + multiplier.toFixed(1), W-8, badgeY + 12);
  }
}

// ─────────────────────────────────────────────
//  SPEECH BUBBLE
// ─────────────────────────────────────────────
// Existing intro/cutscene bubble — used by INTRO_TAUNT (FAKE NEWS! over DTJ on the rooftop).
// Renders ABOVE a position with downward tail. Block L's dance bubble was originally calling
// this with y=TOP.y-110=30 which placed it BEHIND the news ticker. L-FIX-1 routes dance/taunt
// in-game bubbles through drawSideBandBubble below; this function is unchanged for INTRO_TAUNT.
function drawBubble(x, y, text, alpha) {
  ctx.save(); ctx.globalAlpha = alpha;
  const pw=180, ph=48, px=x-pw/2, py=y-ph-20;
  ctx.fillStyle='#fff'; ctx.strokeStyle='#cc0000'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,8); ctx.fill(); ctx.stroke();
  // Tail
  ctx.beginPath(); ctx.moveTo(x-12,py+ph); ctx.lineTo(x,py+ph+20); ctx.lineTo(x+12,py+ph); ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#cc0000'; ctx.font='bold 15px monospace'; ctx.textAlign='center';
  ctx.fillText(text, x, py+22);
  ctx.restore();
}

// L-FIX-1 — in-game bubble for DTJ dance + (future) Block M taunt. Fixed position in the
// right-side empty band between the news ticker bottom (y=18) and the TOP platform (y=140),
// between the static barrel area and the canvas right edge. Tail points LEFT toward DTJ on TOP.
// Word-wrapped, multi-line, larger font than the HUD/ticker so the gag reads at a glance.
const SIDE_BUBBLE_X       = 300;                          // left edge
const SIDE_BUBBLE_Y       = 50;                           // top edge (below ticker @ y=18)
const SIDE_BUBBLE_W       = 170;
const SIDE_BUBBLE_H_MAX   = 90;                           // visual cap; actual height shrinks if fewer lines
const SIDE_BUBBLE_PAD     = 10;
const SIDE_BUBBLE_LINE_H  = 18;
const SIDE_BUBBLE_FONT    = 'bold 14px sans-serif';
const SIDE_BUBBLE_MAX_LINES = 3;                          // wrap cap

function wrapBubbleText(text, maxWidth) {
  ctx.font = SIDE_BUBBLE_FONT;
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    if (lines.length >= SIDE_BUBBLE_MAX_LINES) break;
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth) {
      if (current) lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current && lines.length < SIDE_BUBBLE_MAX_LINES) lines.push(current);
  return lines;
}

function drawSideBandBubble(text, alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  // Wrap text to fit inside (width - 2*pad).
  const innerW = SIDE_BUBBLE_W - 2 * SIDE_BUBBLE_PAD;
  const lines = wrapBubbleText(text, innerW);
  const usedH = Math.min(SIDE_BUBBLE_H_MAX,
                         SIDE_BUBBLE_PAD * 2 + lines.length * SIDE_BUBBLE_LINE_H);
  const px = SIDE_BUBBLE_X;
  const py = SIDE_BUBBLE_Y;
  const pw = SIDE_BUBBLE_W;
  const ph = usedH;
  // Bubble body
  ctx.fillStyle = '#ffffff';
  ctx.strokeStyle = '#cc0000';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(px, py, pw, ph, 10); ctx.fill(); ctx.stroke();
  // Tail — small triangle on LEFT edge at vertical mid-bubble, pointing LEFT toward DTJ.
  const tailY = py + ph / 2;
  ctx.beginPath();
  ctx.moveTo(px,         tailY - 8);
  ctx.lineTo(px - 14,    tailY);
  ctx.lineTo(px,         tailY + 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Text — dark red on white, centered horizontally within the bubble, stacked vertically.
  ctx.fillStyle = '#cc0000';
  ctx.font = SIDE_BUBBLE_FONT;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  let ty = py + SIDE_BUBBLE_PAD;
  for (const line of lines) {
    ctx.fillText(line, px + pw / 2, ty);
    ty += SIDE_BUBBLE_LINE_H;
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// I-CORR-3 — caption system replaces per-character speech bubbles for ALL cutscene dialogue.
// I-CORR-4 — strip is now bottom-aligned to STAGE_CANVAS_TOP (=292) so it sits flush above the
// stage scene with no black gap. Same alignment in SCORE/BETWEEN states.
// ONE caption visible at a time. Sub-states FADE_IN → HOLD → FADE_OUT.
const captionQueue = [];
let captionCurrent = null;          // { speaker, text, holdSec }
let captionPhase = 'idle';          // 'idle' | 'fadein' | 'hold' | 'fadeout'
let captionPhaseT = 0;
const CAPTION_FADE_IN     = 0.2;
const CAPTION_FADE_OUT    = 0.3;
const CAPTION_DEFAULT_HOLD = 1.5;

// I-EAGLE-REWRITE — carriedActive removed. Replaced by dtjStageMode + comboActive (declared
// above near the cutscene state vars). Gating moved into the PHASE3 step machine.

// I-CORR-4 — dtjScale grows DTJ on stage when the "WITCH HUNT!" caption is held, easing back
// when the caption fades out. Applied to the on-stage DTJ render in PHASE1 only.
let dtjScale = 1.0;
let dtjScaleTarget = 1.0;
const DTJ_SCALE_HOLD     = 1.6;
const DTJ_SCALE_EASE_DUR = 0.15;
const DTJ_SCALE_RATE     = (DTJ_SCALE_HOLD - 1.0) / DTJ_SCALE_EASE_DUR;       // = 4.0/sec

function pushCaption(speaker, text, holdSec) {
  captionQueue.push({ speaker: speaker, text: text, holdSec: (holdSec != null ? holdSec : CAPTION_DEFAULT_HOLD) });
}

function clearCaptions() {
  captionQueue.length = 0;
  captionCurrent = null;
  captionPhase = 'idle';
  captionPhaseT = 0;
  // I-CORR-4 — drop any zoom-in-progress; stage DTJ snaps back to 1.0x next frame.
  dtjScaleTarget = 1.0;
}

// I-CORR-4 — true if the currently-held caption is the DJT "WITCH HUNT!" punchline. Used to gate
// the on-stage DTJ zoom-in.
function captionIsWitchHunt(cap) {
  return cap && cap.speaker === 'DJT' && cap.text === 'WITCH HUNT!';
}

function tickCaptions(dt) {
  if (captionPhase === 'idle') {
    if (captionQueue.length > 0) {
      captionCurrent = captionQueue.shift();
      captionPhase = 'fadein';
      captionPhaseT = 0;
    }
    // I-CORR-4 — out of caption: ensure DTJ shrinks back.
    dtjScaleTarget = 1.0;
  } else {
    captionPhaseT += dt;
    if (captionPhase === 'fadein' && captionPhaseT >= CAPTION_FADE_IN) {
      captionPhase = 'hold';
      captionPhaseT = 0;
      // I-CORR-4 — entering HOLD on "WITCH HUNT!" → grow DTJ.
      if (captionIsWitchHunt(captionCurrent)) dtjScaleTarget = DTJ_SCALE_HOLD;
    } else if (captionPhase === 'hold' && captionPhaseT >= captionCurrent.holdSec) {
      captionPhase = 'fadeout';
      captionPhaseT = 0;
      // I-CORR-4 — leaving HOLD on "WITCH HUNT!" → shrink DTJ back.
      if (captionIsWitchHunt(captionCurrent)) dtjScaleTarget = 1.0;
    } else if (captionPhase === 'fadeout' && captionPhaseT >= CAPTION_FADE_OUT) {
      captionPhase = 'idle';
      captionCurrent = null;
      captionPhaseT = 0;
    }
  }

  // I-CORR-4 — ease dtjScale toward target every frame (linear @ DTJ_SCALE_RATE).
  if (dtjScale < dtjScaleTarget) dtjScale = Math.min(dtjScaleTarget, dtjScale + DTJ_SCALE_RATE * dt);
  else if (dtjScale > dtjScaleTarget) dtjScale = Math.max(dtjScaleTarget, dtjScale - DTJ_SCALE_RATE * dt);
}

function renderCutsceneCaption() {
  if (!captionCurrent) return;
  const cap = captionCurrent;
  let alpha = 1;
  if      (captionPhase === 'fadein')  alpha = Math.min(1, captionPhaseT / CAPTION_FADE_IN);
  else if (captionPhase === 'fadeout') alpha = Math.max(0, 1 - captionPhaseT / CAPTION_FADE_OUT);

  const PAD_X           = 16;
  const PAD_Y           = 8;
  const SPEAKER_FONT_PX = 12;
  const TEXT_FONT_PX    = 18;
  const LINE_HEIGHT     = 22;
  const MAX_LINES       = 3;

  // Word-wrap dialogue to canvas width minus padding.
  ctx.save();
  ctx.font = 'bold ' + TEXT_FONT_PX + 'px monospace';
  const maxTextWidth = W - 2 * PAD_X;
  const words = cap.text.split(' ');
  const lines = [];
  let cur = '';
  for (const word of words) {
    if (lines.length >= MAX_LINES) break;
    const trial = cur ? cur + ' ' + word : word;
    if (ctx.measureText(trial).width <= maxTextWidth) cur = trial;
    else { if (cur) lines.push(cur); cur = word; }
  }
  if (cur && lines.length < MAX_LINES) lines.push(cur);
  // Truncation guard: if user passes a long string AND wrap exceeds MAX_LINES, append ellipsis.
  if (lines.length === MAX_LINES) {
    let combinedLength = 0;
    for (const ln of lines) combinedLength += ln.length + 1;
    if (combinedLength < cap.text.length) lines[MAX_LINES - 1] += '…';
  }

  const stripH = PAD_Y + SPEAKER_FONT_PX + 4 + lines.length * LINE_HEIGHT + PAD_Y;
  // I-CORR-4 — bottom-align the strip to the top edge of the cutscene scene background
  // (STAGE_CANVAS_TOP=292 per Block I I2). This puts the caption flush against the top of
  // the stage with no black gap. Same y for SCORE/BETWEEN — positions consistently across phases.
  const STRIP_TOP_Y = STAGE_CANVAS_TOP - stripH;

  ctx.globalAlpha = alpha;
  // Strip background — semi-transparent black, full canvas width
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillRect(0, STRIP_TOP_Y, W, stripH);
  // Top + bottom 1px gold borders
  ctx.fillStyle = 'rgba(204,153,51,0.9)';
  ctx.fillRect(0, STRIP_TOP_Y, W, 1);
  ctx.fillRect(0, STRIP_TOP_Y + stripH - 1, W, 1);

  // Speaker label (color-coded)
  let speakerColor;
  if      (cap.speaker === 'DNC') speakerColor = '#88aaff';
  else if (cap.speaker === 'DJT') speakerColor = '#ffcc00';
  else                              speakerColor = '#ffffff';
  ctx.fillStyle = speakerColor;
  ctx.font = 'bold ' + SPEAKER_FONT_PX + 'px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(cap.speaker + ':', PAD_X, STRIP_TOP_Y + PAD_Y);

  // Dialogue lines
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + TEXT_FONT_PX + 'px monospace';
  ctx.textAlign = 'center';
  let ly = STRIP_TOP_Y + PAD_Y + SPEAKER_FONT_PX + 4;
  for (const line of lines) {
    ctx.fillText(line, W / 2, ly);
    ly += LINE_HEIGHT;
  }

  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ─────────────────────────────────────────────
//  GAMEPLAY LAYOUT
// ─────────────────────────────────────────────
function drawGameplay(shake) {
  const sx = shake ? (Math.random()-0.5)*shakeAmt : 0;
  const sy = shake ? (Math.random()-0.5)*shakeAmt : 0;
  ctx.save(); ctx.translate(sx, sy);

  // Sky
  const sg = ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#090918'); sg.addColorStop(1,'#12123a');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    ctx.fillStyle=`rgba(255,255,255,${s.a*0.5})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });

  // Ground
  ctx.fillStyle='#08081e'; ctx.fillRect(0,804,W,50);
  ctx.fillStyle='#0a0a28'; ctx.fillRect(0,804,W,6);

  // Platforms
  platforms.forEach(drawPlatform);
  // Ladders
  ladders.forEach(drawLadder);

  // TVs on top platform
  // F2 — CNN stack stays on left; MSNBC stack moves to right edge of TOP.
  // Layout: CNN(left) → DTJ → barrel → MSNBC(right edge).
  drawTV(TOP.x+8,            TOP.y-68, 'CNN',   totalT);
  drawTV(TOP.x+8,            TOP.y-34, 'CNN',   totalT+0.4);
  drawTV(TOP.x+TOP.w-40,     TOP.y-68, 'MSNBC', totalT);
  drawTV(TOP.x+TOP.w-40,     TOP.y-34, 'MSNBC', totalT+0.4);

  // Block 2.6 — static barrel decoration on TOP, screen-LEFT of DTJ (which is DTJ's right hand side).
  // Drawn AFTER platforms but BEFORE DTJ so DTJ overlaps it visually if they cross.
  // Decorative only — no entity, no collision. Capsules spawn FROM this position (TOP.x+50).
  // y arg is the foot/bottom edge sitting on TOP surface; footFrac=1.0 anchors the bottom there.
  // F3 — static barrel renders at 2x (CAPSULE_R*4). Rolling capsule (barrel_endview) size unchanged.
  drawSprite('barrel_upright', BARREL_X, TOP.y, CAPSULE_R * 4, false, 1.0);

  // Capsules + pickup + helpers + Pelosi (rendered behind DNC/DTJ).
  // Burning Briefcase entity deleted in C2 v2.
  drawCapsules();
  drawPickup();
  drawHelpers();
  drawPelosi();
  // K — Secret Service rendered BEHIND DTJ (z-order: helpers → SS → DTJ → DNC). The 3 SS units
  // are stationary on TOP, fade in when Antifa start climbing ladder[5], fade out 0.5s after the
  // last Antifa dies. Decorative-only — never participates in any AABB check.
  drawSS();

  // D.T.J. — C3 / D1 state-driven render. dtj_throw is fired ONLY at BARREL_X (twice per throw,
  // once with no flip for COCK and once mirrored for RELEASE). dtj_idle is fired ONLY at
  // DTJ_GAMEPLAY_X. Walk frames cycle dtj_walk/dtj_walk2 every 0.1s during the two walk phases.
  //   IDLE:          dtj_idle at DTJ_GAMEPLAY_X (no flip)
  //   WALK_TO_BARREL: dtj_walk(2) cycle, x interpolates DTJ_GAMEPLAY_X → BARREL_X (no flip)
  //   THROW_COCK:    dtj_throw at BARREL_X, flip=false   (wind-up, arm pulled right)
  //   THROW_RELEASE: dtj_throw at BARREL_X, flip=true    (follow-through, arm extended left)
  //   WALK_BACK:     dtj_walk(2) cycle, x interpolates BARREL_X → DTJ_GAMEPLAY_X (flip=true)
  // L — DTJ render: dance overrides the throw-anim state machine. While dancing, DTJ is locked
  // to DTJ_GAMEPLAY_X (no walk-to-barrel motion) and the pose cycles through DTJ_DANCE_POSES.
  // The throw machine still ticks underneath (capsules continue to spawn on schedule), but the
  // render slot is owned by the dance.
  if (dtjDanceState === 'DANCING') {
    const tWithinCycle = dtjDanceT % DTJ_DANCE_CYCLE_DURATION;
    const danceSprite  = getDtjDancePose(tWithinCycle);
    drawSprite(danceSprite, DTJ_GAMEPLAY_X, TOP.y, 110, false, 1.0);
    // L — dance speech bubble (LOSER!/SAD! cycle 1, GREATEST WIN EVER! cycle 2).
    // L-FIX-1 — routed through drawSideBandBubble (right-side empty band, x=300/y=50). Block L
    // had this calling drawBubble at y=TOP.y-110=30 which placed the bubble BEHIND the news
    // ticker (ticker bottom at y=18, original bubble top at y=-38 — completely off-canvas).
    // L-FIX-1 / M — bubble render moved out of the dance-only branch; now drawn at the end of
    // drawGameplay so it renders for BOTH dance bubbles (during DANCING) and taunt bubbles
    // (during GAMEPLAY). Single render call site below before drawHUD.
  } else if (dtjAnimState === 'IDLE') {
    drawSprite('dtj_idle', DTJ_GAMEPLAY_X, TOP.y, 110, false, 1.0);
  } else if (dtjAnimState === 'THROW_COCK') {
    drawSprite('dtj_throw', dtjAnimX, TOP.y, 110, false, 1.0);
  } else if (dtjAnimState === 'THROW_RELEASE') {
    drawSprite('dtj_throw', dtjAnimX, TOP.y, 110, true, 1.0);
  } else {
    // WALK_TO_BARREL or WALK_BACK — alternate walk frames every 0.1s
    const walkSprite = (Math.floor(dtjAnimT * 10) % 2 === 0) ? 'dtj_walk' : 'dtj_walk2';
    const walkFlip   = (dtjAnimState === 'WALK_BACK');         // walk-back faces left
    drawSprite(walkSprite, dtjAnimX, TOP.y, 110, walkFlip, 1.0);
  }

  // Player character (DNC). J — death reaction overrides normal render:
  //   phase1 → render rotated about body center (deathRotation accumulates at 720°/s)
  //   phase2 → suppress player render entirely; debris IS the player visual now
  if (state === 'GAMEOVER_PENDING') {
    // L-FIX-1 — player is dead; world keeps running underneath the DTJ dance. Suppress
    // player render entirely (debris already drained by the time we enter GAMEOVER_PENDING
    // from DEATH_REACTION end).
  } else if (state === 'DEATH_REACTION' && deathPhase === 'phase2') {
    // No-op — debris draw happens in the DEATH_REACTION state case after drawGameplay.
  } else if (state === 'DEATH_REACTION' && deathPhase === 'phase1') {
    ctx.save();
    ctx.translate(player.x, player.y - 24);                // approx body center; foot 24 below
    ctx.rotate(player.deathRotation * Math.PI / 180);
    drawDonkey(0, 24, 0.65, false, false, 0);              // foot at +24 from rotation pivot
    ctx.restore();
  } else {
    const walking = player.vx !== 0 || player.onLadder;
    // Block 3 — blink during invulnerability: toggle alpha every 0.1s (5 flashes/s).
    // Method: Math.floor(invulnT * 10) % 2 chooses dim/bright frame.
    const blinkDim = player.invulnT > 0 && Math.floor(player.invulnT * 10) % 2 === 0;
    // K addendum — horizontal jitter while shakeT > 0 (set by ejectPlayerFromLadder5).
    const shakeDx = player.shakeT > 0 ? (Math.random() - 0.5) * 2 * PLAYER_SHAKE_AMPLITUDE : 0;
    if (blinkDim) { ctx.save(); ctx.globalAlpha = 0.4; }
    drawDonkey(player.x + shakeDx, player.y, 0.65, player.facing < 0, walking, player.walkT);
    if (blinkDim) ctx.restore();
  }

  // Block 2.5 — green $ box decorations removed (Block 4 will replace with real briefcase pickups)

  // H2 — score-float "+N" text near each scoring event. Drawn inside the gameplay zoom transform
  // so the floats stay anchored to the world position they spawned at (not the HUD).
  for (const sf of scoreFloats) {
    const a = Math.max(0, 1 - sf.t / SCORE_FLOAT_LIFETIME);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.fillStyle = sf.color;
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 2;
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.strokeText(sf.text, sf.x, sf.y);
    ctx.fillText(sf.text, sf.x, sf.y);
    ctx.restore();
  }

  ctx.restore();

  // K — ragdoll debris + one-frame burst flash render on TOP of the gameplay world (under HUD).
  // Used by both player DEATH_REACTION and Antifa RAGDOLL bursts. Drains naturally as items
  // expire (life=0.4s); shared global pool, no per-entity tracking.
  renderRagdollDebrisAndFlash();

  // M — bubble render (right-side empty band) drawn AFTER all gameplay sprites + debris so it
  // sits visually on top of the world, but BEFORE drawHUD so HUD score/HI text never get
  // covered. Single render path used by both Block L dance bubbles and Block M taunt bubbles.
  if (bubble.active) drawSideBandBubble(bubble.text, getBubbleAlpha());

  drawHUD();
  drawTicker();
  drawDpad();
  // N — icons + pause overlay drawn at outer-loop level (after the state switch) so they're
  // always on top regardless of which state's case body rendered.
}


// ─────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────
let lastT = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts-lastT)/1000, 0.05);
  lastT = ts; totalT += dt; stateT += dt;

  // Ticker scroll
  tickX -= 70*dt;
  if (tickX < -(ctx.measureText(TICKER).width||1200)) tickX = W;

  // Star twinkle
  stars.forEach(s=>{ s.a+=((Math.random()-0.5)*0.025); s.a=Math.max(0.1,Math.min(1,s.a)); });

  // Particles
  particles.forEach(p=>{
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vy+=260*dt; p.life-=p.decay*dt;
  });
  particles=particles.filter(p=>p.life>0);

  // K — ragdoll debris ticks every frame regardless of state so items drain naturally even if
  // state changes mid-burst (e.g. player wins to cutscene with Antifa debris still in flight).
  tickRagdollDebris(dt);

  // L — DTJ dance ticks every frame so it survives DEATH_REACTION → GAMEPLAY respawn
  // transitions cleanly. Trigger countdown + dance progression + speech bubble lifecycle
  // + YMCA synth scheduling are all owned by tickDtjDance.
  tickDtjDance(dt);

  // M — taunt timer ticks every frame; the function gates internally on state==='GAMEPLAY' +
  // dance-not-active + bubble-not-active so it's a no-op during intros/cutscenes/dance/etc.
  // N — also gates on state==='PAUSED' (state==='GAMEPLAY' check excludes PAUSED implicitly).
  tickTaunts(dt);

  // N — BGM scheduler. Internally gates on bgmActive + state==='PAUSED' check; no-op when
  // BGM is stopped (intros, GAME_OVER, etc.). Schedules notes ahead by BGM_LOOKAHEAD seconds.
  tickBGM();

  // K — initials-entry "INITIALS SAVED" confirmation timer ticks here so the 1.0s display
  // shows even if the GAME_OVER case re-renders from scratch each frame.
  if (initialsConfirmedT > 0) initialsConfirmedT = Math.max(0, initialsConfirmedT - dt);

  // Shake decay
  if (shakeAmt>0) shakeAmt=Math.max(0,shakeAmt-18*dt);

  // H2 — score floats tick: ride upward and fade. Despawn when life expires or off-screen.
  for (let i = scoreFloats.length - 1; i >= 0; i--) {
    const sf = scoreFloats[i];
    sf.t += dt;
    sf.y -= 30 * dt;
    if (sf.t >= SCORE_FLOAT_LIFETIME) scoreFloats.splice(i, 1);
  }

  // I-CORR-3 — top-of-canvas caption strip (fade-in → hold → fade-out → next from queue).
  // Ticks every frame regardless of state so out-of-CUTSCENE clears settle naturally.
  tickCaptions(dt);

  // State transitions
  switch(state) {
    case 'INTRO_BLACK':
      // N-FIX-5 BUG 2 — gate auto-advance on audioContext existing. INTRO_BLACK shows the
      // "INSERT QUARTER" prompt; the page sits there until the user gestures (which both
      // primes audioContext and triggers the advance below). Without this gate, INTRO_BLACK
      // auto-advances at 1.4s post-page-load — BEFORE any user gesture, while audioContext
      // is still null — and playEscalatorMusic bails on its !audioContext guard. Result was:
      // entire intro ran silently. With the gate, the user MUST gesture before the song
      // schedules; that gesture also creates audioContext.
      if(stateT>1.4 && audioContext){state='INTRO_TITLE';stateT=0; /* N-FIX-7 — escalator music now state-driven via tickBGM/computeDesiredMusic */ }
      // N-FIX-5 BUG 2 — fallback: if user never gestures (e.g. silent test rig), still
      // advance after 5s so the intro doesn't deadlock. Music will be silent in that case.
      else if(stateT>5.0 && !audioContext){state='INTRO_TITLE';stateT=0; /* silent advance — no audio gesture */ }
      break;

    case 'INTRO_TITLE':
      if(stateT>2.8){state='INTRO_ESCALATOR';stateT=0;esc={x:W+60,y:H-80,phase:'walk',t:0,progress:0,armSwing:0}; /* N-FIX-4 — escalator music continues from INTRO_TITLE; no re-trigger here */ } break;
                              // INTRO-ESC FIX — walk-phase y was H-110 (744), which floated DTJ
                              // ~30px above the street top. Set to H-80 (774) so feet sit on the
                              // street where lamp pole bases meet the ground (drawNightCity:
                              // ctx.fillRect(0, H-80, W, 80) — street strip starts at H-80).
                              // Rise-phase interpolation overwrites esc.y from ESC_Y1 (H-90=764)
                              // so transitioning to rise produces a small "step up onto the
                              // escalator" snap that reads naturally.

    case 'INTRO_ESCALATOR':
      esc.t+=dt; esc.armSwing=totalT;
      if(esc.phase==='walk'){
        esc.x-=90*dt; // walk left toward escalator entry
        if(esc.x<=ESC_X1+10){esc.phase='rise';esc.progress=0;}
      } else {
        esc.progress=Math.min(esc.progress+dt/3.5,1); // 3.5s ride
        // interpolate along escalator line
        esc.x=ESC_X1+(ESC_X2-ESC_X1)*esc.progress;
        esc.y=ESC_Y1+(ESC_Y2-ESC_Y1)*esc.progress;
        if(esc.progress>=1&&stateT>5.5){
          // N-FIX-7 — state-driven music handles the escalator→stairs swap. State change
          // INTRO_ESCALATOR → INTRO_STAIRS triggers transitionToMusic(AVE_MARIA): cancels
          // pending ramps, fades bgmChannel to 0 over 100ms, fades back to 1.0 over 200ms,
          // and schedules Ave Maria notes. No setTimeout needed — every audio decision is
          // owned by the state machine in tickBGM.
          state='INTRO_STAIRS'; stateT=0;
          stairsPhase='walk'; stairsX=-60; stairsY=H-110; stairsT=0;
        }
      }
      break;

    case 'INTRO_STAIRS':
      stairsT+=dt;
      if(stairsPhase==='walk'){
        stairsX+=110*dt;
        // Zoom in during walk: 0→2.5s ease from establishing shot to final zoom
        const zp = Math.min(stairsT / 2.5, 1);
        const ze = zp * zp * (3 - 2 * zp); // smoothstep easing
        zoomS  = ZOOM_S_START  + (ZOOM_S_END  - ZOOM_S_START)  * ze;
        zoomOx = ZOOM_OX_START + (ZOOM_OX_END - ZOOM_OX_START) * ze;
        zoomOy = ZOOM_OY_START + (ZOOM_OY_END - ZOOM_OY_START) * ze;
        if(stairsX>=STAIR_MID_X-10){stairsPhase='climb';}
      } else if(stairsPhase==='climb'){
        // Walk up the stairs — 11 steps, each ~17px rise
        const climbDur=3.0;
        const prog=Math.min(stairsT/climbDur,1); // stairsT resets at phase change
        // stairs go from bottom step (y≈794) up to top step (y≈607)
        stairsX=STAIR_MID_X+(prog*0)  ; // stays roughly centered
        stairsY=794 - prog*(794 - STAIR_TOP_Y);
        if(prog>=1){stairsPhase='top'; stairsT=0;}
      } else if(stairsPhase==='top') {
        // Block C — walk from stair center to gameplay position (DTJ_GAMEPLAY_X=320),
        // bidirectional in case future layouts put DTJ left or right of STAIR_MID_X.
        const targetX = DTJ_GAMEPLAY_X;
        const walkSpeed = 80;        // px per second
        stairsY = TOP.y;
        const dx = targetX - stairsX;
        if (Math.abs(dx) > walkSpeed * dt) {
          stairsX += Math.sign(dx) * walkSpeed * dt;
        } else {
          // Reached target — hold briefly then transition
          stairsX = targetX;
          if (stairsT > 1.2) {       // 1.2s at top before taunt
            // N-FIX-7 — state-driven: INTRO_TAUNT maps to SILENT in computeDesiredMusic.
            state='INTRO_TAUNT'; stateT=0; tauntArm=0; tauntBubble=0; introTauntSfxFired=false;
          }
        }
      }
      break;

    case 'INTRO_TAUNT':
      // Phase 1 (0-2.5s): TVs are broadcasting, DTJ watches arms down
      // Phase 2 (2.5s+): DTJ raises arms, yells FAKE NEWS
      if(stateT < 2.5) {
        tauntArm = 0;
        tauntBubble = 0;
      } else {
        tauntArm = Math.min((stateT-2.5)/0.9, 1);
        tauntBubble = stateT > 3.2 ? Math.min((stateT-3.2)/0.5, 1) : 0;
        // N — fire FAKE NEWS! intro-taunt SFX once when the bubble starts to appear (stateT=3.2).
        if (!introTauntSfxFired && stateT > 3.2) {
          playSfx_introTaunt();
          introTauntSfxFired = true;
        }
      }
      if(stateT > 6.0){
